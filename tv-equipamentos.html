<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
/* 🔐 TF-GUARD Fase 1 */
(function(){
  if(location.pathname==='/login'||location.pathname==='/login.html')return;
  var K=localStorage.getItem('tf_key');
  if(!K){location.replace('/login?next='+encodeURIComponent(location.pathname));return;}
  var _f=window.fetch;
  window.fetch=function(u,o){
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('/api/auth')===-1&&u.indexOf('k=')===-1){
        u+=(u.indexOf('?')>-1?'&':'?')+'k='+encodeURIComponent(localStorage.getItem('tf_key')||'');
      }
    }catch(e){}
    return _f.call(this,u,o);
  };
})();
</script>

<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Cpolygon%20points%3D%2218%2C2%208%2C18%2015%2C18%2014%2C30%2024%2C14%2017%2C14%22%20fill%3D%22%233b9eff%22%20stroke%3D%22%233b9eff%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV — Equipamentos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#252525;
  --text:#fff;--muted:#888;
  --accent:#f5c800;--green:#22c55e;--wa:#25d366;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;--fb:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);}

/* HEADER */
header{
  text-align:center;padding:32px 20px 24px;border-bottom:1px solid var(--border);
  position:relative;
}
.brand{font-family:var(--fh);font-size:28px;font-weight:800;letter-spacing:-1px;}
.brand span{color:var(--accent);}
.brand-sub{font-family:var(--fm);font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:0.08em;}
.header-stripe{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}

/* FILTER TABS */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;}
.filter-btn{font-family:var(--fm);font-size:11px;font-weight:600;padding:8px 20px;border-radius:8px;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:6px;}
.filter-btn:hover{border-color:#444;color:var(--text);}
.filter-btn.active-all{border-color:var(--accent);color:var(--accent);background:rgba(245,200,0,0.07);}
.filter-btn.active-micro{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,0.08);}
.filter-btn.active-tv{border-color:#3b9eff;color:#3b9eff;background:rgba(59,158,255,0.08);}
.filter-btn.active-bebe{border-color:#3b9eff;color:#3b9eff;background:rgba(59,158,255,0.08);}

/* GRID */
.grid-wrap{max-width:1200px;margin:0 auto;padding:32px 20px 60px;}
.grid-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
.grid-title{font-family:var(--fh);font-size:20px;font-weight:800;}
.grid-title span{color:var(--accent);}
.grid-count{font-family:var(--fm);font-size:11px;color:var(--muted);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}

/* PRODUCT CARD */
.prod-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;transition:transform 0.2s,border-color 0.2s;
  display:flex;flex-direction:column;
}
.prod-card:hover{transform:translateY(-4px);border-color:#333;}

/* CAROUSEL */
.carousel{position:relative;aspect-ratio:4/3;background:var(--surface2);overflow:hidden;}
.carousel-imgs{display:flex;height:100%;transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);}
.carousel-img{width:100%;height:100%;flex-shrink:0;object-fit:cover;}
.carousel-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--border);}
.carousel-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.6);
  color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all 0.15s;backdrop-filter:blur(4px);
}
.carousel-btn:hover{background:rgba(0,0,0,0.85);}
.carousel-btn.prev{left:8px;}
.carousel-btn.next{right:8px;}
.carousel-dots{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.35);transition:all 0.2s;cursor:pointer;}
.dot.active{background:#fff;width:14px;border-radius:3px;}
.foto-count{
  position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);
  color:#fff;font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:20px;
  backdrop-filter:blur(4px);
}

/* CARD BODY */
.card-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:10px;}
.card-code{font-family:var(--fm);font-size:11px;color:var(--accent);font-weight:500;}
.card-desc{font-size:13px;line-height:1.55;color:var(--text);flex:1;}
.card-cap{font-family:var(--fm);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.card-cap::before{content:'⚡';font-size:11px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px;gap:10px;}
.card-price{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--green);}
.card-price-sub{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:1px;}

/* WHATSAPP BUTTON */
.btn-wa{
  display:flex;align-items:center;gap:7px;padding:10px 16px;border-radius:9px;
  background:var(--wa);color:#fff;border:none;cursor:pointer;
  font-family:var(--fb);font-size:12px;font-weight:600;
  transition:all 0.2s;white-space:nowrap;text-decoration:none;
}
.btn-wa:hover{filter:brightness(1.1);transform:scale(1.03);}
.btn-wa svg{width:18px;height:18px;flex-shrink:0;}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;font-family:var(--fm);font-size:13px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:16px;display:block;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:200px;gap:12px;flex-direction:column;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  .grid{grid-template-columns:1fr;}
  .card-footer{flex-direction:column;align-items:flex-start;}
  .btn-wa{width:100%;justify-content:center;}
}

/* ── CHECKOUT MODAL ── */
.ov-checkout{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:12px;overflow-y:auto;}
.ov-checkout.open{display:flex;}
.ck-modal{background:#111;border:1px solid #252525;border-radius:16px;width:100%;max-width:440px;max-height:96dvh;overflow-y:auto;display:flex;flex-direction:column;}
.ck-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;}
.ck-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
.ck-close{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px;}
.ck-body{padding:20px;display:flex;flex-direction:column;gap:14px;}
.ck-produto{background:#1a1a1a;border-radius:10px;padding:12px;display:flex;gap:10px;align-items:center;}
.ck-foto{width:56px;height:56px;border-radius:8px;object-fit:cover;background:#222;flex-shrink:0;}
.ck-info{flex:1;min-width:0;}
.ck-cod{font-family:'DM Mono',monospace;font-size:9px;color:#888;}
.ck-nome{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ck-preco{font-size:15px;font-weight:800;color:#f5c800;}
.ck-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#888;display:block;margin-bottom:5px;}
.ck-input{width:100%;background:#1a1a1a;border:1px solid #252525;border-radius:8px;padding:10px 13px;font-family:'Inter',sans-serif;font-size:13px;color:#fff;outline:none;transition:border-color .15s;}
.ck-input:focus{border-color:rgba(59,158,255,.5);}
.ck-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ck-pag{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ck-pag-btn{padding:12px 8px;border-radius:10px;border:2px solid #252525;background:#1a1a1a;color:#888;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.ck-pag-btn.sel-pix{border-color:#22c55e;background:rgba(34,197,94,.08);color:#22c55e;}
.ck-pag-btn.sel-cartao{border-color:#3b9eff;background:rgba(59,158,255,.08);color:#3b9eff;}
.ck-pag-icon{font-size:20px;display:block;margin-bottom:4px;}
.ck-pag-desc{font-family:'DM Mono',monospace;font-size:8px;color:inherit;opacity:.7;margin-top:2px;}
.ck-btn{width:100%;padding:14px;border-radius:10px;border:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;background:#f5c800;color:#000;transition:all .15s;}
.ck-btn:hover{background:#f5d842;transform:translateY(-1px);}
.ck-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.ck-msg{padding:10px 13px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;display:none;}
.ck-msg.ok{background:rgba(34,197,94,.1);color:#22c55e;}
.ck-msg.err{background:rgba(239,68,68,.1);color:#ef4444;}
/* ── BOTÃO COMPRAR NO CARD ── */
.btn-comprar{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:8px;border:none;background:#f5c800;color:#000;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .15s;}
.btn-comprar:hover{background:#f5d842;transform:translateY(-1px);}
/* ── SUCCESS BANNER ── */
.mp-success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);border-radius:12px;padding:16px;text-align:center;font-family:'Inter',sans-serif;font-size:13px;color:#22c55e;margin-bottom:16px;display:none;}
</style>
</head>
<body>

<header>
  <div class="brand">Reparo<span>Eletro</span></div>
  <div class="brand-sub">// equipamentos revisados à venda</div>
  <div class="header-stripe"></div>
</header>

<div class="grid-wrap">
  <div class="filter-bar">
    <button class="filter-btn active-all" id="f-all"   onclick="setFilter(null)">🔍 Todos</button>
    <button class="filter-btn" id="f-micro" onclick="setFilter('Microondas')">📡 Microondas</button>
    <button class="filter-btn" id="f-bebe"  onclick="setFilter('Bebedouro')">💧 Bebedouro</button>
    <button class="filter-btn" id="f-tv"    onclick="setFilter('TV')">📺 Televisão</button>
  </div>
  <div class="grid-header">
    <div class="grid-title">Equipamentos <span>Disponíveis</span></div>
    <div class="grid-count" id="grid-count"></div>
  </div>
  <div class="mp-success" id="mp-success-banner">✅ Pagamento aprovado! Em breve entraremos em contato. Obrigado!</div>
<div id="grid-content">
    <div class="loading">
      <div class="spinner"></div>
      <div style="font-family:var(--fm);font-size:11px;color:var(--muted);">Carregando...</div>
    </div>
  </div>
</div>

<script>
const WA_NUMBER = "5531998301617";

async function load() {
  try {
    // Carrega Microondas/Bebedouros (api/vendas) + Televisões (api/tv-vendas) em paralelo
    const [r1, r2] = await Promise.all([
      fetch('/api/vendas?action=load').then(r=>r.json()),
      fetch('/api/tv-vendas?action=load').then(r=>r.json()),
    ]);
    const equipamentos = ((r1.produtos||[]).filter(p=>!p.vendido));
    const televisoes   = ((r2.produtos||[]).filter(p=>!p.vendido)
                           .map(p=>({...p, _fonte:'tv'})));
    allProdutos = [...equipamentos, ...televisoes];
    setFilter(activeFilter);
  } catch(e) {
    document.getElementById('grid-content').innerHTML =
      `<div class="empty"><span class="empty-icon">⚠️</span>Erro ao carregar: ${e.message}</div>`;
  }
}

let allProdutos = [], activeFilter = null;

function setFilter(tipo) {
  activeFilter = tipo;
  document.getElementById('f-all').className   = 'filter-btn' + (tipo===null?       ' active-all':'');
  document.getElementById('f-micro').className = 'filter-btn' + (tipo==='Microondas'?' active-micro':'');
  document.getElementById('f-bebe').className  = 'filter-btn' + (tipo==='Bebedouro'? ' active-bebe':'');
  document.getElementById('f-tv').className    = 'filter-btn' + (tipo==='TV'?        ' active-tv':'');
  const filtered = tipo === 'TV'
    ? allProdutos.filter(p => p._fonte === 'tv')
    : tipo
      ? allProdutos.filter(p => p.tipo === tipo)
      : allProdutos;
  render(filtered);
}

function render(produtos) {
  const count = document.getElementById('grid-count');
  count.textContent = `${produtos.length} equipamento${produtos.length!==1?'s':''}`;

  if (!produtos.length) {
    document.getElementById('grid-content').innerHTML =
      `<div class="empty"><span class="empty-icon">📦</span>Nenhum equipamento disponível no momento.<br>Volte em breve!</div>`;
    return;
  }

  const cards = produtos.map(p => cardHTML(p)).join('');
  document.getElementById('grid-content').innerHTML = `<div class="grid">${cards}</div>`;
}

function cardHTML(p) {
  const fotos  = p.fotos || [];
  const hasFotos = fotos.length > 0;
  const precoFmt = parseFloat(p.preco).toLocaleString('pt-BR',{minimumFractionDigits:2,style:'currency',currency:'BRL'});

  const carouselInner = hasFotos
    ? fotos.map(f => `<img class="carousel-img" src="${f}" loading="lazy"/>`).join('')
    : `<div class="carousel-placeholder">📷</div>`;

  const dots = fotos.length > 1
    ? `<div class="carousel-dots">${fotos.map((_,i) =>
        `<div class="dot ${i===0?'active':''}" onclick="goTo('${p.id}',${i})"></div>`
      ).join('')}</div>` : '';

  const prevBtn = fotos.length > 1 ? `<button class="carousel-btn prev" onclick="slide('${p.id}',-1)">‹</button>` : '';
  const nextBtn = fotos.length > 1 ? `<button class="carousel-btn next" onclick="slide('${p.id}',1)">›</button>` : '';
  const fotoCount = fotos.length > 1 ? `<div class="foto-count">📷 ${fotos.length}</div>` : '';

  const msgWA = encodeURIComponent(
    `Olá! Tenho interesse no equipamento:\n\n📦 Código: ${p.codigo}\n📝 ${p.descricao}${p.capacidade?'\n⚡ '+p.capacidade:''}\n💰 Valor: ${precoFmt}\n\nPoderia me passar mais informações?`
  );

  return `
    <div class="prod-card" id="card-${p.id}" data-idx="0" data-total="${fotos.length}">
      <div class="carousel">
        <div class="carousel-imgs" id="imgs-${p.id}">${carouselInner}</div>
        ${prevBtn}${nextBtn}${dots}${fotoCount}
      </div>
      <div class="card-body">
        <div class="card-code">${p.codigo}</div>
        <div class="card-desc">${p.descricao}</div>
        ${p.capacidade ? `<div class="card-cap">${p.capacidade}</div>` : ''}
        <div class="card-footer">
          <div>
            <div class="card-price">${precoFmt}</div>
            <div class="card-price-sub">à vista</div>
          </div>
          <button class="btn-comprar" onclick="abrirCheckout('${p.id}')">⚡ Comprar Agora</button>
          <a class="btn-wa" href="https://wa.me/${WA_NUMBER}?text=${msgWA}" target="_blank">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            WhatsApp
          </a>
        </div>
      </div>
    </div>`;
}

function slide(id, dir) {
  const card  = document.getElementById(`card-${id}`);
  const total = parseInt(card.dataset.total);
  if (total <= 1) return;
  let idx = parseInt(card.dataset.idx) + dir;
  if (idx < 0) idx = total - 1;
  if (idx >= total) idx = 0;
  goTo(id, idx);
}

function goTo(id, idx) {
  const card = document.getElementById(`card-${id}`);
  const imgs = document.getElementById(`imgs-${id}`);
  card.dataset.idx = idx;
  imgs.style.transform = `translateX(-${idx * 100}%)`;
  card.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===idx));
}

load();

// ── CHECKOUT TV ──────────────────────────────────────────────
var ckProduto = null;
var ckPag     = null;

function abrirCheckout(id) {
  ckProduto = allProdutos.find(p => p.id === id);
  if (!ckProduto) return;
  ckPag = null;

  // Preencher produto no modal
  var f = (ckProduto.fotos || [])[0] || '';
  var img = document.getElementById('ck-foto');
  if (f) { img.src = f; img.style.display = 'block'; } else { img.style.display = 'none'; }
  document.getElementById('ck-cod').textContent   = ckProduto.codigo || '';
  document.getElementById('ck-nome').textContent  = ckProduto.descricao || '';
  document.getElementById('ck-preco').textContent = parseFloat(ckProduto.preco).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2});

  // Reset campos
  ['ck-nome-in','ck-tel-in','ck-cpf-in','ck-end-in','ck-cep-in'].forEach(id => {
    var el = document.getElementById(id); if (el) el.value = '';
  });
  ['ck-pix','ck-cartao'].forEach(id => {
    var el = document.getElementById(id); if (el) el.className = 'ck-pag-btn';
  });
  document.getElementById('ck-total').textContent = '—';
  document.getElementById('ck-btn-pagar').disabled = true;
  document.getElementById('ck-btn-pagar').textContent = 'Selecione a forma de pagamento';
  var msg = document.getElementById('ck-msg'); msg.style.display='none';

  document.getElementById('ov-checkout').classList.add('open');
}

function fecharCheckout() {
  document.getElementById('ov-checkout').classList.remove('open');
  ckProduto = null; ckPag = null;
}

function setPag(tipo) {
  ckPag = tipo;
  document.getElementById('ck-pix').className    = 'ck-pag-btn' + (tipo==='pix'?    ' sel-pix':'');
  document.getElementById('ck-cartao').className = 'ck-pag-btn' + (tipo==='cartao'? ' sel-cartao':'');

  var preco = parseFloat(ckProduto?.preco || 0);
  var final = tipo === 'pix' ? Math.round(preco * 0.90 * 100) / 100 : preco;
  document.getElementById('ck-total').textContent =
    final.toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2}) +
    (tipo === 'pix' ? ' (PIX -10%)' : ' (3x sem juros)');

  var btn = document.getElementById('ck-btn-pagar');
  btn.disabled = false;
  btn.textContent = '🔒 Ir para Pagamento Seguro';
}

async function finalizarCheckoutTV() {
  var nome = (document.getElementById('ck-nome-in').value || '').trim();
  var tel  = (document.getElementById('ck-tel-in').value  || '').trim();
  if (!nome || !tel) {
    mostrarMsgCK('Preencha nome e telefone obrigatoriamente', 'err'); return;
  }
  if (!ckPag) { mostrarMsgCK('Selecione a forma de pagamento', 'err'); return; }

  var btn = document.getElementById('ck-btn-pagar');
  btn.disabled = true; btn.textContent = '⏳ Gerando pagamento...';

  var preco = parseFloat(ckProduto.preco);
  var precoFinal = ckPag === 'pix' ? Math.round(preco * 0.90 * 100) / 100 : preco;

  try {
    var r = await fetch('/api/checkout-mp-criar', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        itens: [{
          id:     ckProduto.id,
          codigo: ckProduto.codigo,
          nome:   ckProduto.descricao + (ckPag==='pix'?' (PIX -10%)':''),
          preco:  precoFinal,
          foto:   (ckProduto.fotos||[])[0] || null
        }],
        comprador: {
          nome:     nome,
          telefone: tel,
          cpf:      (document.getElementById('ck-cpf-in').value || '').trim(),
          endereco: (document.getElementById('ck-end-in').value || '').trim(),
          cep:      (document.getElementById('ck-cep-in').value || '').trim()
        },
        metodoPagamento: ckPag,
        origem: 'tv'
      })
    }).then(r => r.json());

    if (r.ok && r.checkoutUrl) {
      window.location.href = r.checkoutUrl;
    } else {
      mostrarMsgCK('Erro ao gerar pagamento: ' + (r.error || 'tente novamente'), 'err');
      btn.disabled = false; btn.textContent = '🔒 Ir para Pagamento Seguro';
    }
  } catch(e) {
    mostrarMsgCK('Erro de conexão: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '🔒 Ir para Pagamento Seguro';
  }
}

function mostrarMsgCK(txt, tipo) {
  var el = document.getElementById('ck-msg');
  el.textContent = txt; el.style.display = 'block';
  el.className = 'ck-msg ' + tipo;
}

// Mostrar banner de sucesso se retornou do MP
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('mp') === 'success') {
    var el = document.getElementById('mp-success-banner');
    if (el) el.style.display = 'block';
    window.history.replaceState({}, '', window.location.pathname);
  }
})();

</script>

    <div class="ck-body">

      <!-- Forma de pagamento -->
      <div>

          <button class="ck-pag-btn" id="ck-pix" onclick="setPag('pix')">
            <span class="ck-pag-icon">🏦</span>
            PIX
            <div class="ck-pag-desc">10% de desconto</div>
          </button>
          <button class="ck-pag-btn" id="ck-cartao" onclick="setPag('cartao')">
            <span class="ck-pag-icon">💳</span>

            <div class="ck-pag-desc">3x sem juros</div>
          </button>
        </div>
      </div>
      <!-- Dados pessoais -->
      <div>
        <label class="ck-label">Nome completo *</label>
        <input class="ck-input" id="ck-nome-in" placeholder="Seu nome completo">
      </div>
      <div class="ck-row">
        <div>
          <label class="ck-label">Telefone *</label>
          <input class="ck-input" id="ck-tel-in" placeholder="(31) 9 0000-0000" type="tel">
        </div>
        <div>
          <label class="ck-label">CPF</label>
          <input class="ck-input" id="ck-cpf-in" placeholder="000.000.000-00">
        </div>
      </div>
      <div>

      </div>
      <div class="ck-row">

          <label class="ck-label">CEP</label>
          <input class="ck-input" id="ck-cep-in" placeholder="00000-000">
        </div>
        <div><!-- espaço --></div>
      </div>
      <!-- Preço final -->
      <div style="background:#1a1a1a;border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:#888;">TOTAL A PAGAR</span>
        <span style="font-size:18px;font-weight:800;color:#f5c800;" id="ck-total">—</span>
      </div>
      <div class="ck-msg" id="ck-msg"></div>
      <button class="ck-btn" id="ck-btn-pagar" onclick="finalizarCheckoutTV()" disabled>
        Selecione a forma de pagamento
      </button>
      <div style="text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:#444;">
        🔒 Pagamento seguro via Mercado Pago · Seus dados estão protegidos
      </div>
    </div>
  </div>
</div>
</body>
