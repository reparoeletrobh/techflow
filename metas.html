<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metas — Reparo Eletro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d; --surface:#161616; --surface2:#1f1f1f; --border:#333;
  --accent:#f5c800; --accent2:#ffde59; --text:#ffffff; --muted:#aaa;
  --green:#22c55e; --green2:#16a34a;
  --fh:'Syne',sans-serif; --fm:'DM Mono',monospace; --fb:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden;}

/* HEADER — idêntico ao técnico */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:54px;border-bottom:2px solid var(--accent);
  background:#0d0d0d;position:sticky;top:0;z-index:100;
}
.logo{font-family:var(--fh);font-size:18px;font-weight:800;display:flex;align-items:center;gap:9px;}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.logo-text span{color:var(--accent);}
.nav-btn{
  font-family:var(--fm);font-size:10px;padding:6px 13px;border-radius:6px;
  border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;
  text-decoration:none;display:inline-flex;align-items:center;
}
.nav-btn:hover{color:var(--text);border-color:var(--accent);}
.nav-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.stat-pill{font-family:var(--fm);font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.stat-pill strong{color:var(--accent);font-size:13px;}
.live-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.15);opacity:.6;}}

/* TOOLBAR */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;
}
.board-title{font-family:var(--fh);font-size:20px;font-weight:800;letter-spacing:-0.5px;}
.board-title span{color:var(--accent);}
.toolbar-right{display:flex;align-items:center;gap:8px;}
.action-btn{
  font-family:var(--fm);font-size:10px;padding:6px 12px;border-radius:6px;
  border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;
}
.action-btn:hover{color:var(--text);border-color:rgba(245,200,0,.4);}
.date-label{font-family:var(--fm);font-size:10px;color:var(--muted);}

/* PROGRESS BAR */
.progress-wrap{
  background:var(--bg);border-top:1px solid var(--border);
  padding:10px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.progress-item{display:flex;align-items:center;gap:8px;flex:1;min-width:160px;}
.progress-label{font-family:var(--fm);font-size:9px;color:var(--muted);white-space:nowrap;}
.progress-bar-bg{flex:1;height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.progress-bar-fg{height:100%;background:var(--accent);border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.progress-bar-fg.done{background:var(--green);}
.progress-pct{font-family:var(--fm);font-size:9px;color:var(--muted);min-width:28px;text-align:right;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
  padding:20px 24px;
}

/* METRIC CARD — no estilo dos cards do técnico */
.mcard{
  border:1px solid var(--border);background:var(--surface);overflow:hidden;border-radius:8px;
  display:flex;flex-direction:column;
  transition:border-color .2s;
}
.mcard:hover{border-color:rgba(245,200,0,.3);}
.mcard.done{border-color:rgba(34,197,94,.35);}

/* Card header — igual col-header do técnico */
.mcard-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border);position:relative;
}
.mcard-head::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--accent);
}
.mcard.done .mcard-head::before{background:var(--green);}
.mcard-title{font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.mcard-icon{font-size:14px;opacity:.8;}

/* Card body */
.mcard-body{padding:14px;display:flex;flex-direction:column;gap:12px;}

/* Twin row: Hoje | Semana */
.twin{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.metric-half{
  background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:10px;display:flex;flex-direction:column;gap:6px;
}
.metric-half-label{font-family:var(--fm);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.metric-half-count{
  font-family:var(--fh);font-size:26px;font-weight:800;line-height:1;color:var(--accent);
  transition:color .3s;
}
.metric-half-count.done{color:var(--green);}
.metric-half-goal{font-family:var(--fm);font-size:8px;color:var(--muted);}
.metric-half-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:2px;}
.metric-half-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);width:0%;}
.metric-half-bar-fill.done{background:var(--green);}

/* Done badge */
.done-badge{
  display:none;
  font-family:var(--fm);font-size:8px;font-weight:600;
  background:rgba(34,197,94,.12);color:var(--green);
  border:1px solid rgba(34,197,94,.25);padding:2px 8px;border-radius:20px;
  letter-spacing:.06em;
}
.mcard.done .done-badge{display:inline-block;}

/* Vendas card — sem meta, só contador */
.counter-only{
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  gap:2px;padding:6px 0;
}
.counter-only .big{font-family:var(--fh);font-size:32px;font-weight:800;color:var(--accent);line-height:1;}
.counter-only .sub{font-family:var(--fm);font-size:8px;color:var(--muted);}

/* LOADING / ERROR */
.loading-wrap{display:flex;align-items:center;justify-content:center;min-height:300px;flex-direction:column;gap:12px;}
.spinner{width:36px;height:36px;border:3px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:var(--fm);font-size:10px;color:var(--muted);}
.error-box{margin:40px 24px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:20px;font-family:var(--fm);font-size:11px;color:#ef4444;text-align:center;}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Reparo<span>Eletro</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <a class="nav-btn" href="/">Home</a>
    <a class="nav-btn" href="/tecnico">Técnico</a>
    <a class="nav-btn" href="/financeiro">Financeiro</a>
    <a class="nav-btn active" href="/metas">Metas</a>
  </div>
  <div class="stat-pill">
    <div class="live-dot"></div>
    <span id="h-date">—</span>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div>
    <div class="board-title">Painel de <span>Metas</span></div>
    <div class="date-label" id="h-week" style="margin-top:3px;">—</div>
  </div>
  <div class="toolbar-right">
    <button class="action-btn" onclick="load()">↻ Atualizar</button>
  </div>
</div>

<!-- BARRA DE PROGRESSO GERAL -->
<div class="progress-wrap" id="progress-wrap" style="display:none;">
</div>

<!-- CONTEÚDO -->
<div id="content">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-text">Carregando metas...</div>
  </div>
</div>

<script>
var METRICS = [
  { key:"coletaSolicitada", title:"Coletas Solicitadas", icon:"📦", goalDay:40,  goalWeek:200, src:"board" },
  { key:"orcEnviado",       title:"Orçamentos Enviados", icon:"📋", goalDay:40,  goalWeek:200, src:"board" },
  { key:"aprovadoLoja",     title:"Aprovados Loja",       icon:"🏪", goalDay:15,  goalWeek:90,  src:"board" },
  { key:"aprovadoTotal",    title:"Aprovados Total",       icon:"✅", goalDay:35,  goalWeek:200, src:"board" },
  { key:"erp",              title:"ERP",                   icon:"💾", goalDay:35,  goalWeek:200, src:"board" },
];

var VENDAS_METRICS = [
  { key:"equipCadastrado", title:"Equip. Cadastrados", icon:"🔧", dayKey:"cadastradosHoje",   weekKey:"cadastradosSemana"  },
  { key:"vendaLoja",       title:"Vendas Loja",         icon:"🏪", dayKey:"vendaLojaHoje",     weekKey:"vendaLojaSemana"    },
  { key:"vendaOnline",     title:"Vendas Online",        icon:"🌐", dayKey:"vendaOnlineHoje",   weekKey:"vendaOnlineSemana"  },
];

function buildHalf(count, goal, id, noMeta) {
  var done = !noMeta && goal > 0 && count >= goal;
  var pct  = (noMeta || goal <= 0) ? 0 : Math.min(count / goal, 1);
  var countClass = "metric-half-count" + (done ? " done" : "");
  var fillClass  = "metric-half-bar-fill" + (done ? " done" : "");
  var html = '<div class="metric-half">' +
    '<div class="metric-half-label" id="lbl-'+id+'"></div>' +
    '<div class="'+countClass+'" id="cnt-'+id+'">'+count+'</div>';
  if (!noMeta && goal > 0) {
    html += '<div class="metric-half-goal">meta: '+goal+'</div>' +
      '<div class="metric-half-bar"><div class="'+fillClass+'" id="bar-'+id+'" style="width:0%"></div></div>';
  }
  html += '</div>';
  return html;
}

function buildCard(m, dayCount, weekCount) {
  var dayDone  = m.goalDay  > 0 && dayCount  >= m.goalDay;
  var weekDone = m.goalWeek > 0 && weekCount >= m.goalWeek;
  var anyDone  = dayDone || weekDone;
  var cardClass = "mcard" + (anyDone ? " done" : "");
  return '<div class="'+cardClass+'" id="card-'+m.key+'">' +
    '<div class="mcard-head">' +
      '<div style="display:flex;align-items:center;gap:8px;">' +
        '<span class="mcard-title">'+m.title+'</span>' +
        '<span class="done-badge">META ✓</span>' +
      '</div>' +
      '<span class="mcard-icon">'+m.icon+'</span>' +
    '</div>' +
    '<div class="mcard-body">' +
      '<div class="twin">' +
        buildHalf(dayCount,  m.goalDay,  m.key+"_d", !m.goalDay) +
        buildHalf(weekCount, m.goalWeek, m.key+"_w", !m.goalWeek) +
      '</div>' +
    '</div>' +
  '</div>';
}

function buildVendasCard(m, dayCount, weekCount) {
  return '<div class="mcard">' +
    '<div class="mcard-head">' +
      '<span class="mcard-title">'+m.title+'</span>' +
      '<span class="mcard-icon">'+m.icon+'</span>' +
    '</div>' +
    '<div class="mcard-body">' +
      '<div class="twin">' +
        '<div class="metric-half">' +
          '<div class="metric-half-label">Hoje</div>' +
          '<div class="metric-half-count" id="cnt-'+m.key+'_d">'+dayCount+'</div>' +
        '</div>' +
        '<div class="metric-half">' +
          '<div class="metric-half-label">Semana</div>' +
          '<div class="metric-half-count" id="cnt-'+m.key+'_w">'+weekCount+'</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function animateBars(today, week) {
  METRICS.forEach(function(m) {
    var dayCount  = today[m.key] ? today[m.key].count : 0;
    var weekCount = week[m.key]  ? week[m.key].count  : 0;
    [[dayCount, m.goalDay, m.key+"_d", "Hoje"], [weekCount, m.goalWeek, m.key+"_w", "Semana"]].forEach(function(x) {
      var count = x[0], goal = x[1], id = x[2], lbl = x[3];
      var lblEl = document.getElementById("lbl-"+id);
      var barEl = document.getElementById("bar-"+id);
      if (lblEl) lblEl.textContent = lbl;
      if (barEl && goal > 0) {
        var pct = Math.min(count/goal, 1);
        barEl.style.width = Math.round(pct*100)+"%";
        if (count >= goal) barEl.classList.add("done");
      }
    });
  });
}

function buildProgressWrap(today, week) {
  var wrap = document.getElementById("progress-wrap");
  wrap.style.display = "flex";
  var html = "";
  METRICS.forEach(function(m) {
    var total = (today[m.key]?.count||0) + (week[m.key]?.count||0);
    var totalGoal = m.goalDay + m.goalWeek;
    var pct = totalGoal > 0 ? Math.min(total/totalGoal,1) : 0;
    var done = pct >= 1;
    var fillClass = "progress-bar-fg" + (done?" done":"");
    html += '<div class="progress-item">' +
      '<span class="progress-label">'+m.icon+' '+m.title+'</span>' +
      '<div class="progress-bar-bg"><div class="'+fillClass+'" style="width:'+Math.round(pct*100)+'%"></div></div>' +
      '<span class="progress-pct">'+Math.round(pct*100)+'%</span>' +
    '</div>';
  });
  wrap.innerHTML = html;
}

async function load() {
  try {
    var r = await fetch("/api/metas");
    var d = await r.json();
    if (!d.ok) throw new Error(d.error || "Erro");

    document.getElementById("h-date").textContent = d.todayLabel || "—";
    document.getElementById("h-week").textContent = "Semana: " + (d.weekLabel || "—");

    var today = d.today || {};
    var week  = d.week  || {};
    var vend  = d.vendas || {};

    // Build grid
    var html = '<div class="grid">';
    METRICS.forEach(function(m) {
      var dc = today[m.key] ? today[m.key].count : 0;
      var wc = week[m.key]  ? week[m.key].count  : 0;
      html += buildCard(m, dc, wc);
    });
    // Linha divisória
    html += '<div style="grid-column:1/-1;border-top:1px solid var(--border);padding-top:4px;font-family:var(--fh);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;">Vendas &amp; Equipamentos</div>';
    VENDAS_METRICS.forEach(function(m) {
      var dc = vend[m.dayKey]  || 0;
      var wc = vend[m.weekKey] || 0;
      html += buildVendasCard(m, dc, wc);
    });
    html += '</div>';
    document.getElementById("content").innerHTML = html;

    // Animate after DOM
    setTimeout(function() {
      animateBars(today, week);
      buildProgressWrap(today, week);
    }, 60);

  } catch(e) {
    document.getElementById("content").innerHTML =
      '<div class="error-box">❌ Erro ao carregar dados: '+e.message+'</div>';
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
