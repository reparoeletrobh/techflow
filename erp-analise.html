<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
/* 🔐 TF-GUARD Fase 1 */
(function(){
  if(location.pathname==='/login'||location.pathname==='/login.html')return;
  var K=localStorage.getItem('tf_key');
  if(!K){location.replace('/login?next='+encodeURIComponent(location.pathname));return;}
  // Papel TV: acesso restrito às telas do sistema TV
  if(localStorage.getItem('tf_role')==='tv'&&location.pathname.indexOf('/tv')!==0){
    location.replace('/tv-adm');return;
  }
  var _f=window.fetch;
  window.fetch=function(u,o){
    var isApi=false;
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('/api/auth')===-1){
        isApi=true;o=o||{};
        var kk=localStorage.getItem('tf_key')||'';
        if(o.headers&&typeof o.headers.set==='function'){o.headers.set('x-tf-key',kk);}
        else{o.headers=Object.assign({},o.headers||{},{'x-tf-key':kk});}
      }
    }catch(e){}
    var p=_f.call(this,u,o);
    if(isApi){
      p=p.then(function(r){
        if(r&&r.status===401&&!window.__tfHealed){
          window.__tfHealed=true;
          localStorage.removeItem('tf_key');
          location.replace('/login?next='+encodeURIComponent(location.pathname));
        }
        return r;
      });
    }
    return p;
  };
  // Navegação/downloads para /api/ (links e window.open) também levam a chave
  document.addEventListener('click',function(ev){
    var a=ev.target&&ev.target.closest?ev.target.closest('a'):null;
    if(a){
      var hu=a.getAttribute('href')||'';
      if(hu.indexOf('/api/')>-1&&hu.indexOf('k=')===-1){
        a.setAttribute('href',hu+(hu.indexOf('?')>-1?'&':'?')+'k='+encodeURIComponent(localStorage.getItem('tf_key')||''));
      }
    }
  },true);
  var _wo=window.open;
  window.open=function(u){
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('k=')===-1){
        u+=(u.indexOf('?')>-1?'&':'?')+'k='+encodeURIComponent(localStorage.getItem('tf_key')||'');
        arguments[0]=u;
      }
    }catch(e){}
    return _wo.apply(window,arguments);
  };
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Análise ERP — Reparo Eletro BH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#e8e8e8;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.hd{background:#0f0f0f;border-bottom:1px solid #1e1e1e;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hd h1{font-size:17px;font-weight:700}.hd h1 span{color:#f5c800}
.hd button{font-size:11px;padding:6px 14px;border-radius:6px;border:1px solid #333;background:transparent;color:#888;cursor:pointer}
.hd button:hover{border-color:#f5c800;color:#f5c800}
.wrap{max-width:1100px;margin:0 auto;padding:20px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:8px;padding:14px}
.kpi .l{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.kpi .v{font-size:24px;font-weight:700}
.kpi .s{font-size:10px;color:#555;margin-top:3px}
.box{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:8px;padding:18px;margin-bottom:16px}
.box h2{font-size:13px;font-weight:700;margin-bottom:12px}
.gold{background:rgba(245,200,0,.04);border-color:rgba(245,200,0,.2)}
.gold h2{color:#f5c800}
.ins{display:flex;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #111;font-size:12px;color:#bbb;line-height:1.6}
.ins:last-child{border:none;margin:0;padding:0}
.ins .ic{font-size:15px;flex-shrink:0}
.ins strong{color:#e8e8e8}
.dist{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.di{background:#151515;border:1px solid #1a1a1a;border-radius:6px;padding:12px;text-align:center}
.di .p{font-size:20px;font-weight:700}.di .l2{font-size:9px;color:#555;text-transform:uppercase;margin-top:3px}.di .v2{font-size:10px;color:#777;margin-top:3px}
.tw{max-height:480px;overflow-y:auto}
.tw::-webkit-scrollbar{width:3px}.tw::-webkit-scrollbar-thumb{background:#2a2a2a}
table{width:100%;border-collapse:collapse;font-size:11px}
th{font-size:9px;text-transform:uppercase;color:#444;padding:7px 10px;border-bottom:1px solid #1a1a1a;text-align:left;background:#0f0f0f;position:sticky;top:0}
td{padding:8px 10px;border-bottom:1px solid #0d0d0d}
tr:hover td{background:rgba(255,255,255,.012)}
.bar-row{display:flex;align-items:center;gap:6px}
.bar{height:3px;flex:1;background:#111;border-radius:2px;overflow:hidden}
.bf{height:3px;border-radius:2px}
.tag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:3px}
#msg{text-align:center;padding:60px;color:#555;font-size:13px}
</style>
</head>
<body>
<div class="hd">
  <h1>📊 Análise <span>ERP</span> — Reparo Eletro BH</h1>
  <button onclick="load()">↺ Atualizar</button>
</div>
<div class="wrap">
  <div id="msg">⟳ Carregando...</div>
  <div id="app" style="display:none"></div>
</div>
<script>
const R=v=>'R$'+(+v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
function cor(v){return !v?'#333':v<200?'#ef4444':v<500?'#f5c800':'#22c55e'}

async function load(){
  const msg=document.getElementById('msg');
  const app=document.getElementById('app');
  msg.textContent='⟳ Carregando...'; msg.style.display='block'; app.style.display='none';
  try{
    // Usar diagnostico-erp (endpoint confirmado) com ?cards=1 para incluir dados
    const res=await fetch('/api/pipe?action=diagnostico-erp&cards=1&_t='+Date.now(),{cache:'no-store'});
    const d=await res.json();
    if(!d.ok) throw new Error(d.error||'Erro API');
    render(d);
  }catch(e){
    msg.textContent='❌ '+e.message;
  }
}

function tipo(c){
  const o=(c.origem||'').toLowerCase();
  if(o.includes('venda'))return'Venda';
  if(o.includes('garantia'))return'Garantia';
  if(o.includes('loja'))return'Loja';
  return'Reparo';
}
function corTipo(t){return{Venda:'#22c55e',Garantia:'#a855f7',Loja:'#3b82f6',Reparo:'#f5c800'}[t]||'#f5c800'}

function render(d){
  const msg=document.getElementById('msg');
  const app=document.getElementById('app');
  const total=d.erpLocal||0;
  const soma=d.erpValorTotal||0;
  const allCards=(d.erpCards||[]).sort((a,b)=>(a.valor||0)-(b.valor||0));
  const comVal=allCards.filter(c=>(c.valor||0)>0);
  const semVal=total-comVal.length;
  const ticket=comVal.length?soma/comVal.length:0;
  const maxVal=Math.max(...allCards.map(c=>c.valor||0),1);
  const faixas={b:comVal.filter(c=>c.valor<200).length,m:comVal.filter(c=>c.valor>=200&&c.valor<500).length,a:comVal.filter(c=>c.valor>=500).length};

  // Distribuição por tipo
  const tipos={};
  allCards.forEach(c=>{const t=tipo(c);tipos[t]=(tipos[t]||{n:0,s:0});tipos[t].n++;tipos[t].s+=(c.valor||0);});

  // Insights
  const tMeta=450;
  const insights=[
    ticket<300?{i:'📉',t:`<strong>Ticket médio: ${R(ticket)}</strong> — abaixo de R$300. Mercado BH pratica R$350–500. Revise precificação nos reparos simples.`}:
    ticket<tMeta?{i:'📊',t:`<strong>Ticket médio: ${R(ticket)}</strong>. Falta ${R(tMeta-ticket)} por ficha para atingir R$${tMeta}. Representa +R$${Math.round((tMeta-ticket)*comVal.length).toLocaleString('pt-BR')} no total.`}:
    {i:'✅',t:`<strong>Ticket médio saudável: ${R(ticket)}</strong> — dentro da faixa ideal.`},
    semVal>total*.3?{i:'⚠️',t:`<strong>${semVal} fichas (${Math.round(semVal/total*100)}%) sem valor</strong> — distorce análise. Preencha para diagnóstico preciso.`}:null,
    Math.round(faixas.b/(comVal.length||1)*100)>35?{i:'🎯',t:`<strong>${Math.round(faixas.b/(comVal.length||1)*100)}% abaixo de R$200</strong>. Implemente valor mínimo de serviço de R$150–180.`}:null,
    {i:'📐',t:`<strong>Top 20% (${Math.ceil(comVal.length*.2)} fichas) = ${Math.round(comVal.slice(-Math.ceil(comVal.length*.2)).reduce((s,c)=>s+(c.valor||0),0)/soma*100)}% do faturamento.</strong> Priorize reparos de alto valor.`},
  ].filter(Boolean);

  msg.style.display='none'; app.style.display='block';
  app.innerHTML=`
<div class="kpis">
  <div class="kpi"><div class="l">Total ERP</div><div class="v" style="color:#f5c800">${total}</div></div>
  <div class="kpi"><div class="l">Ticket Médio</div><div class="v" style="color:${cor(ticket)}">${R(ticket)}</div><div class="s">fichas com valor</div></div>
  <div class="kpi"><div class="l">Volume Total</div><div class="v" style="color:#22c55e">${'R$'+(soma||0).toLocaleString('pt-BR',{minimumFractionDigits:0})}</div></div>
  <div class="kpi"><div class="l">Maior Ticket</div><div class="v" style="color:#22c55e">${'R$'+maxVal.toLocaleString('pt-BR',{minimumFractionDigits:0})}</div></div>
  <div class="kpi"><div class="l">Sem Valor</div><div class="v" style="color:${semVal>5?'#ef4444':'#666'}">${semVal}</div></div>
  <div class="kpi"><div class="l">Total Cards</div><div class="v" style="color:#555">${d.totalCards||0}</div><div class="s">no pipe</div></div>
</div>
<div class="box gold">
  <h2>🧠 Inteligência — Análise do Ticket Médio</h2>
  ${insights.map(i=>`<div class="ins"><div class="ic">${i.i}</div><div>${i.t}</div></div>`).join('')}
</div>
${Object.keys(tipos).length?`<div class="box"><h2>Distribuição por Tipo</h2><div class="dist">
  ${Object.entries(tipos).sort((a,b)=>b[1].n-a[1].n).map(([t,v])=>`<div class="di"><div class="p" style="color:${corTipo(t)}">${Math.round(v.n/total*100)}%</div><div class="l2">${t}</div><div class="v2">${v.n} fichas · ${R(v.s/v.n)}</div></div>`).join('')}
  <div class="di"><div class="p" style="color:#ef4444">${Math.round(faixas.b/(comVal.length||1)*100)}%</div><div class="l2">&lt;R$200</div><div class="v2">${faixas.b}</div></div>
  <div class="di"><div class="p" style="color:#f5c800">${Math.round(faixas.m/(comVal.length||1)*100)}%</div><div class="l2">R$200–499</div><div class="v2">${faixas.m}</div></div>
  <div class="di"><div class="p" style="color:#22c55e">${Math.round(faixas.a/(comVal.length||1)*100)}%</div><div class="l2">R$500+</div><div class="v2">${faixas.a}</div></div>
</div></div>`:''}
${allCards.length?`<div class="box"><h2>Fichas ERP — Menor ao Maior Valor <small style="font-size:10px;color:#555;font-weight:400">${total} fichas · R$${Math.round(soma).toLocaleString('pt-BR')}</small></h2>
<div class="tw"><table>
<thead><tr><th>#</th><th>Nome</th><th>Tipo</th><th>Valor</th><th style="min-width:100px">Barra</th></tr></thead>
<tbody>${allCards.map((c,i)=>`<tr>
<td style="color:#444">${i+1}</td>
<td>${esc(c.nomeContato||'—')}</td>
<td><span class="tag" style="background:${corTipo(tipo(c))}18;color:${corTipo(tipo(c))}">${tipo(c)}</span></td>
<td style="font-weight:700;color:${cor(c.valor||0)}">${c.valor>0?R(c.valor):'<span style="color:#333">—</span>'}</td>
<td><div class="bar-row"><div class="bar"><div class="bf" style="width:${Math.round((c.valor||0)/maxVal*100)}%;background:${cor(c.valor||0)}"></div></div><span style="font-size:9px;color:#444">${Math.round((c.valor||0)/maxVal*100)}%</span></div></td>
</tr>`).join('')}</tbody>
</table></div></div>`:'<div class="box" style="text-align:center;color:#555;padding:40px">Dados individuais não disponíveis — use o Pipe para ver cada ficha.</div>'}`;
}
load();
</script>
</body>
</html>
