<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
/* 🔐 TF-GUARD Fase 1 */
(function(){
  if(location.pathname==='/login'||location.pathname==='/login.html')return;
  var K=localStorage.getItem('tf_key');
  if(!K){location.replace('/login?next='+encodeURIComponent(location.pathname));return;}
  var _f=window.fetch;
  window.fetch=function(u,o){
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('/api/auth')===-1){
        o=o||{};
        var kk=localStorage.getItem('tf_key')||'';
        if(o.headers&&typeof o.headers.set==='function'){o.headers.set('x-tf-key',kk);}
        else{o.headers=Object.assign({},o.headers||{},{'x-tf-key':kk});}
      }
    }catch(e){}
    return _f.call(this,u,o);
  };
})();
</script>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache">
<title>📦 Arquivo — Reparo Eletro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07080a;color:#f0f2f5;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:#0f1114;border-bottom:1px solid #1e2228;position:sticky;top:0;z-index:10;}
.h-title{font-size:13px;font-weight:800;color:#8b93a1;}
.btn{padding:7px 14px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;background:#1e2228;color:#f0f2f5;text-decoration:none;}
.tabs{display:flex;padding:0 16px;background:#0a0b0e;border-bottom:1px solid #1e2228;}
.tab{padding:10px 20px;font-size:12px;font-weight:700;cursor:pointer;color:#5a6270;border-bottom:2px solid transparent;}
.tab.active{color:#f0f2f5;border-bottom-color:#8b93a1;}
#barra{padding:10px 16px;border-bottom:1px solid #1e2228;background:#0a0b0e;display:flex;align-items:center;gap:10px;}
#q{flex:1;background:#181b1f;border:1px solid #22272f;border-radius:8px;padding:9px 14px;font-size:13px;color:#f0f2f5;outline:none;}
#info{font-family:monospace;font-size:11px;color:#5a6270;white-space:nowrap;}
.lista{padding:12px 16px;display:flex;flex-direction:column;gap:8px;max-width:900px;margin:0 auto;}
.card{background:#0f1114;border:1px solid #1e2228;border-left:3px solid #8b93a1;border-radius:10px;padding:12px 14px;}
.c-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.c-nome{font-size:13px;font-weight:700;}
.c-fase{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;background:rgba(139,147,161,.12);color:#8b93a1;white-space:nowrap;text-transform:uppercase;}
.c-info{font-size:11px;color:#5a6270;margin-top:3px;}
.c-datas{font-size:10px;color:#5a6270;margin-top:5px;}
.c-datas b{color:#8b93a1;}
.empty{text-align:center;padding:40px;color:#5a6270;font-size:12px;}
</style>
</head>
<body>
<header>
  <div class="h-title">📦 Arquivo — Fichas Encerradas</div>
  <a href="/adm" class="btn">← ADM</a>
</header>

<div class="tabs">
  <div class="tab active" id="tab-adm" onclick="mudarAba('adm')">🔧 Arquivo ADM</div>
  <div class="tab" id="tab-tv" onclick="mudarAba('tv')">📺 Arquivo TV</div>
  <div class="tab" id="tab-fin" onclick="mudarAba('fin')">💰 Pagos (Financeiro)</div>
  <div class="tab" id="tab-log" onclick="mudarAba('log')">🚚 Logística</div>
  <div class="tab" id="tab-logtv" onclick="mudarAba('logtv')">🚚 Log. TV</div>
</div>

<div id="barra">
  <span style="font-family:monospace;font-size:10px;color:#5a6270;">🔍 RASTREAR</span>
  <input id="q" placeholder="Nome, telefone ou equipamento..." oninput="buscar()">
  <span id="info">—</span>
</div>

<div id="barra-tipo" style="display:flex;gap:6px;padding:8px 16px;border-bottom:1px solid #1e2228;background:#0a0b0e;flex-wrap:wrap;">
  <button class="pill-tipo" id="pt-" onclick="mudarTipo('')" style="padding:6px 12px;border-radius:99px;border:1px solid #8b5cf6;background:rgba(139,92,246,.15);color:#a78bfa;font-size:11px;font-weight:800;cursor:pointer;">Todos</button>
  <button class="pill-tipo" id="pt-ultima" onclick="mudarTipo('ultima')" style="padding:6px 12px;border-radius:99px;border:1px solid #2a2f38;background:#181b1f;color:#f0f2f5;font-size:11px;font-weight:800;cursor:pointer;">📞 Última Chamada</button>
  <button class="pill-tipo" id="pt-finalizado" onclick="mudarTipo('finalizado')" style="padding:6px 12px;border-radius:99px;border:1px solid #2a2f38;background:#181b1f;color:#f0f2f5;font-size:11px;font-weight:800;cursor:pointer;">✅ Finalizado</button>
  <button class="pill-tipo" id="pt-descarte" onclick="mudarTipo('descarte')" style="padding:6px 12px;border-radius:99px;border:1px solid #2a2f38;background:#181b1f;color:#f0f2f5;font-size:11px;font-weight:800;cursor:pointer;">🗑 Descarte</button>
</div>

<div class="lista" id="lista"><div class="empty">Carregando...</div></div>

<script>
var SISTEMA='adm', TIPO='', _timer=null;

function mudarTipo(t){
  TIPO=t;
  ['','ultima','finalizado','descarte'].forEach(function(x){
    var b=document.getElementById('pt-'+x);
    if(b){
      var sel=(x===t);
      b.style.background=sel?'rgba(139,92,246,.15)':'#181b1f';
      b.style.borderColor=sel?'#8b5cf6':'#2a2f38';
      b.style.color=sel?'#a78bfa':'#f0f2f5';
    }
  });
  buscarAgora();
}

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function fdt(iso){
  if(!iso)return '—';
  try{var d=new Date(iso);var p=function(n){return String(n).padStart(2,'0');};
  return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(2);}catch(e){return '—';}
}
function faseLbl(m){
  var s=String(m||'');
  if(s.indexOf('orc_registrado')>-1)return '📝 Orçamento Registrado';
  if(s.indexOf('pago')>-1)return '💰 Pago';
  if(s.indexOf('finalizado')>-1)return '✅ Finalizado';
  if(s.indexOf('ultima')>-1)return '📞 Última Chamada';
  if(s.indexOf('descarte')>-1)return '🗑 Descarte';
  return s||'—';
}

function mudarAba(s){
  SISTEMA=s;
  document.getElementById('tab-adm').classList.toggle('active',s==='adm');
  document.getElementById('tab-tv').classList.toggle('active',s==='tv');
  document.getElementById('tab-fin').classList.toggle('active',s==='fin');
  document.getElementById('tab-log').classList.toggle('active',s==='log');
  document.getElementById('tab-logtv').classList.toggle('active',s==='logtv');
  document.getElementById('barra-tipo').style.display=(s==='adm'||s==='tv')?'flex':'none';
  buscarAgora();
}

function buscar(){ clearTimeout(_timer); _timer=setTimeout(buscarAgora,300); }

async function buscarAgora(){
  var q=document.getElementById('q').value.trim();
  var api=SISTEMA==='tv'?'/api/tv-pipe':(SISTEMA==='fin'?'/api/financeiro':(SISTEMA==='log'?'/api/logistica':(SISTEMA==='logtv'?'/api/tv-logistica':'/api/pipe')));
  var el=document.getElementById('lista');
  el.innerHTML='<div class="empty">⏳ Buscando...</div>';
  try{
    var extra=(SISTEMA!=='fin'&&TIPO)?('&tipo='+TIPO):'';
    var d=await fetch(api+'?action=buscar-arquivo&q='+encodeURIComponent(q)+extra).then(function(r){return r.json();});
    var fichas=d.fichas||[];
    var infoTx=fichas.length+' de '+(d.total||0);
    if(d.porTipo)infoTx+=' · 📞 '+(d.porTipo.ultima||0)+' · ✅ '+(d.porTipo.finalizado||0)+' · 🗑 '+(d.porTipo.descarte||0);
    document.getElementById('info').textContent=infoTx;
    if(!fichas.length){el.innerHTML='<div class="empty">📭 Nenhuma ficha'+(q?' para "'+esc(q)+'"':' no arquivo')+'</div>';return;}
    el.innerHTML=fichas.map(function(f){
      return '<div class="card">'
        +'<div class="c-top"><span class="c-nome">'+esc(f.nome||'—')+'</span>'
        +'<span class="c-fase">'+faseLbl(f.motivoArquivo)+'</span></div>'
        +'<div class="c-info">'+esc(f.equipamento||'—')+(f.valor?' · R$ '+f.valor:'')+'</div>'
        +(f.telefone?'<div class="c-info">📞 '+esc(f.telefone)+'</div>':'')
        +'<div class="c-datas">Encerrada: <b>'+fdt(f.movedAt)+'</b> · Arquivada: <b>'+fdt(f.arquivadoEm)+'</b>'+(f.pipefyId?' · #'+esc(String(f.pipefyId)):'')+'</div>'
        +(SISTEMA==='adm'&&String(f.motivoArquivo||'').indexOf('ultima')>-1
          ?'<div style="display:flex;gap:6px;margin-top:8px;">'
            +'<button onclick="desarquivar(\''+f.id+'\',\'aprovados\',\''+esc(f.nome||'')+'\')" style="flex:1;padding:7px;border-radius:7px;border:1px solid rgba(34,197,94,.4);background:rgba(34,197,94,.08);color:#22c55e;font-size:11px;font-weight:800;cursor:pointer;">✅ Aprovar → Pipe</button>'
            +'<button onclick="desarquivar(\''+f.id+'\',\'solicitar_entrega\',\''+esc(f.nome||'')+'\')" style="flex:1;padding:7px;border-radius:7px;border:1px solid rgba(59,158,255,.4);background:rgba(59,158,255,.08);color:#3b9eff;font-size:11px;font-weight:800;cursor:pointer;">📦 Solicitar Entrega → Pipe</button>'
          +'</div>'
          :'')
      +'</div>';
    }).join('');
  }catch(e){
    el.innerHTML='<div class="empty" style="color:#ef4444;">Erro: '+e.message+'</div>';
  }
}

async function desarquivar(id,fase,nome){
  var lbl=fase==='aprovados'?'APROVADO':'SOLICITAR ENTREGA';
  if(!confirm('Devolver "'+nome+'" ao Pipe na coluna '+lbl+'?'))return;
  try{
    var r=await fetch('/api/pipe?action=desarquivar&id='+encodeURIComponent(id)+'&fase='+fase).then(function(x){return x.json();});
    if(r.ok){alert('✅ '+(r.nome||nome)+' voltou ao Pipe em '+lbl);buscarAgora();}
    else alert('Erro: '+(r.error||'falha'));
  }catch(e){alert('Erro: '+e.message);}
}

buscarAgora();
</script>
</body>
</html>
