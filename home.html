<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reparo Eletro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#050508;display:flex;align-items:center;justify-content:center;}
h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(28px,6vw,52px);
  font-weight:900;
  color:#fff;
  letter-spacing:-1px;
  user-select:none;
}
h1 span{color:#f5c800;}
</style>
</head>
<body>
  <h1>Reparo<span>Eletro</span></h1>

<a href="/conflitos" id="conf-badge" style="position:fixed;top:16px;right:16px;display:none;align-items:center;gap:8px;background:#080d18;border:1px solid rgba(240,64,96,.4);border-radius:99px;padding:8px 16px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#f04060;text-decoration:none;z-index:100;box-shadow:0 0 20px rgba(240,64,96,.2);">
  <span style="width:8px;height:8px;border-radius:50%;background:#f04060;display:inline-block"></span>
  <span id="conf-txt">Conflitos</span>
</a>
<a href="/conflitos" style="position:fixed;top:16px;left:16px;background:#080d18;border:1px solid #1a2540;border-radius:8px;padding:8px 14px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#4a607a;text-decoration:none;z-index:100;">⚡ Conflitos</a>
<script>
fetch('/api/conflitos?action=badge').then(function(r){return r.json();}).then(function(d){
  if(d.criticos>0){
    var el=document.getElementById('conf-badge');
    document.getElementById('conf-txt').textContent=d.criticos+' conflito'+(d.criticos>1?'s':'')+' crítico'+(d.criticos>1?'s':'');
    el.style.display='flex';
  }
}).catch(function(){});
</script>
</body>
</html>
