<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
/* 🔐 TF-GUARD Fase 1 */
(function(){
  if(location.pathname==='/login'||location.pathname==='/login.html')return;
  var K=localStorage.getItem('tf_key');
  if(!K){location.replace('/login?next='+encodeURIComponent(location.pathname));return;}
  var _f=window.fetch;
  window.fetch=function(u,o){
    var isApi=false;
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('/api/auth')===-1){
        isApi=true;o=o||{};
        var kk=localStorage.getItem('tf_key')||'';
        if(o.headers&&typeof o.headers.set==='function'){o.headers.set('x-tf-key',kk);}
        else{o.headers=Object.assign({},o.headers||{},{'x-tf-key':kk});}
      }
    }catch(e){}
    var p=_f.call(this,u,o);
    if(isApi){
      p=p.then(function(r){
        if(r&&r.status===401&&!window.__tfHealed){
          window.__tfHealed=true;
          localStorage.removeItem('tf_key');
          location.replace('/login?next='+encodeURIComponent(location.pathname));
        }
        return r;
      });
    }
    return p;
  };
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Catálogo de Peças — TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#07080a;color:#f0f2f5;min-height:100%;}
html{height:100%;}
.top{display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid #1e2228;background:#07080a;}
.logo{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
.hbtn{background:transparent;border:1px solid #2a2f38;color:#f0f2f5;
  padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;}
.hbtn:hover{background:#1e2228;}
.search-row{display:flex;gap:8px;padding:14px 20px;border-bottom:1px solid #1e2228;}
.sinput{flex:1;background:#181b1f;border:1px solid #2a2f38;border-radius:8px;
  padding:10px 14px;color:#f0f2f5;font-size:14px;outline:none;}
.tabs{display:flex;border-bottom:1px solid #1e2228;}
.tab{padding:12px 20px;font-size:12px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;color:#5a6270;border-bottom:2px solid transparent;}
.tab.on{color:#3b9eff;border-bottom-color:#3b9eff;}
.pg{display:none;padding:20px;}
.pg.on{display:block;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat{background:#0f1114;border:1px solid #1e2228;border-radius:10px;padding:14px;}
.slbl{font-size:10px;color:#5a6270;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.sval{font-size:22px;font-weight:800;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.card{background:#0f1114;border:1px solid #1e2228;border-radius:10px;padding:14px;}
.card-nome{font-size:14px;font-weight:700;margin-bottom:4px;}
.card-sub{font-size:11px;color:#5a6270;margin-bottom:10px;}
.bar-wrap{background:#1e2228;border-radius:4px;height:6px;margin:8px 0;}
.bar{height:6px;border-radius:4px;transition:width .3s;}
.card-btns{display:flex;gap:6px;margin-top:10px;}
.cbtn{flex:1;background:#1e2228;border:none;color:#f0f2f5;padding:8px;
  border-radius:6px;font-size:11px;cursor:pointer;}
.cbtn:hover{background:#2a2f38;}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#5a6270;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-txt{font-size:15px;font-weight:600;color:#f0f2f5;margin-bottom:6px;}
.empty-sub{font-size:13px;}
.form-card{background:#0f1114;border:1px solid #1e2228;border-radius:12px;padding:20px;max-width:560px;}
.form-title{font-size:14px;font-weight:700;margin-bottom:16px;color:#f5c800;}
.fld{margin-bottom:12px;}
.fld label{display:block;font-size:10px;color:#5a6270;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.fld input,.fld select{width:100%;background:#181b1f;border:1px solid #2a2f38;
  border-radius:8px;padding:10px 12px;color:#f0f2f5;font-size:13px;outline:none;}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sbtn{background:#3b9eff;border:none;color:#fff;padding:10px 20px;
  border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
.sbtn:hover{opacity:.85;}
.alrt{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  border-radius:8px;padding:10px 14px;font-size:12px;color:#fca5a5;margin-bottom:12px;display:none;}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}
.qtd{font-size:20px;font-weight:800;}
@media(max-width:480px){
  .stats{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div class="top">
  <div class="logo">🔩 Catálogo de Peças</div>
  <div style="display:flex;gap:8px;">
    <button class="hbtn" onclick="setTab('cad')" style="color:#f97316;border-color:rgba(249,115,22,.3)">+ Cadastrar</button>
    <a href="/tv-adm.html" class="hbtn">← TV</a>
  </div>
</div>

<div class="search-row">
  <input class="sinput" id="search" type="text" placeholder="🔍 Buscar peça, modelo, código..." oninput="buscar()">
</div>

<div id="alerta" class="alrt"></div>

<div class="tabs">
  <div class="tab on" id="tab-est" onclick="setTab('est')">📦 ESTOQUE</div>
  <div class="tab"     id="tab-cad" onclick="setTab('cad')">✚ CADASTRAR</div>
  <div class="tab"     id="tab-his" onclick="setTab('his')">📋 HISTÓRICO</div>
</div>

<!-- ABA ESTOQUE -->
<div class="pg on" id="pg-est">
  <div class="stats">
    <div class="stat"><div class="slbl">Cadastradas</div><div class="sval" id="st-tot" style="color:#3b9eff">—</div></div>
    <div class="stat"><div class="slbl">Em Estoque</div><div class="sval" id="st-ok" style="color:#22c55e">—</div></div>
    <div class="stat"><div class="slbl">Alertas</div><div class="sval" id="st-al" style="color:#f5c800">—</div></div>
    <div class="stat"><div class="slbl">Esgotadas</div><div class="sval" id="st-es" style="color:#ef4444">—</div></div>
  </div>
  <div class="grid" id="grid">
    <div class="empty">
      <div class="empty-icon">⏳</div>
      <div class="empty-txt">Carregando...</div>
    </div>
  </div>
</div>

<!-- ABA CADASTRAR -->
<div class="pg" id="pg-cad">
  <div class="form-card">
    <div class="form-title">✚ NOVA PEÇA</div>
    <div class="alrt" id="cad-msg"></div>
    <div class="fld"><label>Nome da Peça *</label>
      <input id="c-nome" placeholder="Ex: Placa Principal, Capacitor, Magnetron..."></div>
    <div class="fld-row">
      <div class="fld"><label>Tipo</label>
        <select id="c-tipo">
          <option value="">Selecionar...</option>
          <option>TV</option><option>Microondas</option><option>Bebedouro</option>
          <option>Purificador</option><option>Adega</option><option>Forno</option><option>Geral</option>
        </select></div>
      <div class="fld"><label>Marca</label>
        <input id="c-marca" placeholder="Ex: Samsung, LG, Consul"></div>
    </div>
    <div class="fld"><label>Modelo Compatível</label>
      <input id="c-modelo" placeholder="Ex: UN55T4300 (deixe vazio p/ todos)"></div>
    <div class="fld-row">
      <div class="fld"><label>Qtd em Estoque *</label>
        <input id="c-qtd" type="number" min="0" value="1"></div>
      <div class="fld"><label>Qtd Mínima (alerta)</label>
        <input id="c-min" type="number" min="0" value="1"></div>
    </div>
    <div class="fld"><label>Observações</label>
      <input id="c-obs" placeholder="Código de referência, localização no estoque..."></div>
    <button class="sbtn" onclick="cadastrar()">✚ Cadastrar Peça</button>
  </div>
</div>

<!-- ABA HISTÓRICO -->
<div class="pg" id="pg-his">
  <div id="his-list" style="max-width:700px;">
    <div class="empty" style="padding:40px 0;">⏳ Clique para carregar histórico...</div>
  </div>
</div>

<script>
var _pecas = [];
var _tab   = 'est';

function g(id){ return document.getElementById(id); }

// ── TABS ──────────────────────────────────────────────────────
function setTab(id) {
  _tab = id;
  ['est','cad','his'].forEach(function(t){
    g('pg-'+t).className  = 'pg' + (t===id?' on':'');
    g('tab-'+t).className = 'tab'+ (t===id?' on':'');
  });
  if (id==='his') carregarHistorico();
}

// ── CARREGAR ──────────────────────────────────────────────────
async function carregar() {
  var grid = g('grid');
  try {
    var q = (g('search').value||'').trim();
    var url = '/api/tv-pecas?action=listar' + (q?'&q='+encodeURIComponent(q):'');
    var r = await fetch(url).then(function(x){return x.json();});
    _pecas = r.pecas||[];
    renderGrid();
    renderStats();
    renderAlertas(r.pecas||[]);
  } catch(e) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-txt">Erro ao carregar</div><div class="empty-sub">'+e.message+'</div></div>';
  }
}

function buscar() {
  clearTimeout(buscar._t);
  buscar._t = setTimeout(carregar, 280);
}

// ── RENDER GRID ───────────────────────────────────────────────
function renderGrid() {
  var grid = g('grid');
  if (!_pecas.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">📦</div><div class="empty-txt">Catálogo vazio</div><div class="empty-sub">Clique em <strong style="color:#f97316">+ Cadastrar</strong> para adicionar a primeira peça.</div></div>';
    return;
  }
  grid.innerHTML = _pecas.map(function(p){
    var qtd = p.qtd||0, min = p.qtdMin||1;
    var cor = qtd===0?'#ef4444':qtd<=min?'#f5c800':'#22c55e';
    var pct = min>0?Math.min(100,Math.round(qtd/Math.max(min*2,1)*100)):100;
    var status = qtd===0?'Esgotado':qtd<=min?'Baixo':'OK';
    return '<div class="card">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;">'+
        '<div><div class="card-nome">'+esc(p.nomePeca)+'</div>'+
        '<div class="card-sub">'+(p.tipo?p.tipo:'')+(p.marca?' · '+p.marca:'')+(p.modelo?' · '+p.modelo:'')+'</div></div>'+
        '<span class="tag" style="background:'+cor+'22;color:'+cor+'">'+status+'</span>'+
      '</div>'+
      '<div style="display:flex;align-items:baseline;gap:4px;margin:8px 0;">'+
        '<span class="qtd" style="color:'+cor+'">'+qtd+'</span>'+
        '<span style="font-size:11px;color:#5a6270;">unid. / mín '+min+'</span>'+
      '</div>'+
      '<div class="bar-wrap"><div class="bar" style="width:'+pct+'%;background:'+cor+'"></div></div>'+
      (p.obs?'<div style="font-size:11px;color:#5a6270;margin-top:4px;">'+esc(p.obs)+'</div>':'')+
      '<div class="card-btns">'+
        '<button class="cbtn" onclick="darBaixa(\''+p.id+'\',\''+esc(p.nomePeca)+'\','+qtd+')" style="color:#ef4444;">− Usar</button>'+
        '<button class="cbtn" onclick="repor(\''+p.id+'\',\''+esc(p.nomePeca)+'\')">+ Repor</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderStats() {
  var tot=_pecas.length, ok=0, al=0, es=0;
  _pecas.forEach(function(p){
    var q=p.qtd||0,m=p.qtdMin||1;
    if(q===0) es++; else if(q<=m) al++; else ok++;
  });
  g('st-tot').textContent=tot; g('st-ok').textContent=ok;
  g('st-al').textContent=al;  g('st-es').textContent=es;
}

function renderAlertas(pecas) {
  var al=g('alerta');
  var baixas=pecas.filter(function(p){return (p.qtd||0)<=(p.qtdMin||1);});
  if(baixas.length){
    al.textContent='⚠️ '+baixas.map(function(p){return p.nomePeca+' ('+p.qtd+' un.)';}).join(' · ');
    al.style.display='block';
  } else { al.style.display='none'; }
}

// ── CADASTRAR ─────────────────────────────────────────────────
async function cadastrar() {
  var nome=g('c-nome').value.trim();
  if(!nome){alert('Informe o nome da peça');return;}
  var msg=g('cad-msg');
  msg.style.display='none';
  try {
    var r=await fetch('/api/tv-pecas?action=cadastrar',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        nomePeca:nome, tipo:g('c-tipo').value, marca:g('c-marca').value,
        modelo:g('c-modelo').value, qtd:parseInt(g('c-qtd').value)||0,
        qtdMin:parseInt(g('c-min').value)||1, obs:g('c-obs').value
      })
    }).then(function(x){return x.json();});
    if(r.ok){
      ['c-nome','c-marca','c-modelo','c-obs'].forEach(function(id){g(id).value='';});
      g('c-qtd').value='1'; g('c-tipo').value=''; g('c-min').value='1';
      msg.style.cssText='display:block;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#86efac;margin-bottom:12px;';
      msg.textContent='✅ Peça cadastrada com sucesso!';
      setTab('est'); carregar();
    } else { msg.style.display='block'; msg.textContent='❌ '+(r.error||'Erro'); }
  } catch(e){ msg.style.display='block'; msg.textContent='❌ '+e.message; }
}

// ── DAR BAIXA ─────────────────────────────────────────────────
async function darBaixa(id, nome, qtdDisp) {
  var qtd=parseInt(prompt('Dar baixa em "'+nome+'"\nDisponível: '+qtdDisp+'\nQuantidade usada:','1'));
  if(!qtd||qtd<1)return;
  try {
    var r=await fetch('/api/tv-pecas?action=dar-baixa',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pecaId:id,qtdUsada:qtd})
    }).then(function(x){return x.json();});
    if(r.ok){ carregar(); }
    else { alert('Erro: '+(r.error||'falha')); }
  } catch(e){ alert('Erro: '+e.message); }
}

// ── REPOR ─────────────────────────────────────────────────────
async function repor(id, nome) {
  var qtd=parseInt(prompt('Repor estoque de "'+nome+'"\nQuantidade a adicionar:','1'));
  if(!qtd||qtd<1)return;
  try {
    var r=await fetch('/api/tv-pecas?action=repor',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pecaId:id,qtd:qtd})
    }).then(function(x){return x.json();});
    if(r.ok){ carregar(); }
    else { alert('Erro: '+(r.error||'falha')); }
  } catch(e){ alert('Erro: '+e.message); }
}

// ── HISTÓRICO ─────────────────────────────────────────────────
async function carregarHistorico() {
  var el=g('his-list');
  el.innerHTML='<div class="empty" style="padding:40px 0;">⏳ Carregando...</div>';
  try {
    var r=await fetch('/api/tv-pecas?action=historico').then(function(x){return x.json();});
    var usos=r.usos||[];
    if(!usos.length){el.innerHTML='<div class="empty" style="padding:40px 0;"><div class="empty-icon">📋</div><div class="empty-txt">Sem histórico ainda</div></div>';return;}
    el.innerHTML='<table style="width:100%;border-collapse:collapse;font-size:12px;">'+
      '<thead><tr style="color:#5a6270;text-align:left;">'+
      '<th style="padding:8px 12px;">Peça</th><th>Qtd</th><th>OS</th><th>Técnico</th><th>Data</th></tr></thead>'+
      '<tbody>'+usos.map(function(u){
        return '<tr style="border-top:1px solid #1e2228;">'+
          '<td style="padding:8px 12px;">'+esc(u.nomePeca)+'</td>'+
          '<td>'+u.qtdUsada+'</td>'+
          '<td style="color:#5a6270;">'+esc(u.osCliente||u.osId||'—')+'</td>'+
          '<td style="color:#5a6270;">'+esc(u.tecnico||'—')+'</td>'+
          '<td style="color:#5a6270;">'+fmtDt(u.usadoEm)+'</td>'+
        '</tr>';
      }).join('')+'</tbody></table>';
  } catch(e){ el.innerHTML='<div class="empty">❌ '+e.message+'</div>'; }
}

function esc(s){ var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function fmtDt(s){ if(!s)return'—';try{var d=new Date(s);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}catch(e){return s;} }

// ── INIT ──────────────────────────────────────────────────────
carregar();
</script>
</body>
</html>
