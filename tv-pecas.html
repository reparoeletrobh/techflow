<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Catálogo de Peças — TV</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080a;--s1:#0f1114;--s2:#181b1f;--s3:#1e2228;
  --bdr:#1e2228;--tx:#f0f2f5;--mu:#5a6270;--dim:#2a2f38;
  --gr:#22c55e;--ye:#f5c800;--re:#ef4444;--bl:#3b9eff;--or:#f97316;--pu:#a855f7;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;--fb:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);min-height:100vh;}
button{cursor:pointer;font-family:inherit;transition:opacity .15s;}
button:hover{opacity:.85;}
/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid var(--bdr);background:var(--bg);position:sticky;top:0;z-index:50;}
.logo{font-family:var(--fh);font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.logo-ic{width:28px;height:28px;background:linear-gradient(135deg,#3b9eff,#a855f7);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.hbtn{font-family:var(--fm);font-size:10px;padding:5px 12px;border-radius:6px;border:1px solid var(--bdr);background:transparent;color:var(--mu);}
.hbtn:hover{color:var(--tx);border-color:var(--or);}
/* BUSCA RÁPIDA */
.search-bar{padding:12px 20px;border-bottom:1px solid var(--bdr);background:var(--s1);display:flex;align-items:center;gap:10px;}
.search-input{flex:1;background:var(--s2);border:1px solid var(--bdr);border-radius:8px;color:var(--tx);font-family:var(--fm);font-size:11px;padding:9px 14px;outline:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--bl);}
.search-btn{background:var(--bl);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:var(--fm);font-size:10px;font-weight:700;}
.alert-bar{background:rgba(239,68,68,.1);border-bottom:1px solid rgba(239,68,68,.2);padding:8px 20px;font-family:var(--fm);font-size:10px;color:var(--re);display:none;}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bdr);padding:0 20px;background:var(--s1);}
.tab{font-family:var(--fm);font-size:10px;font-weight:700;padding:11px 16px;border-bottom:2px solid transparent;color:var(--mu);cursor:pointer;letter-spacing:.06em;transition:all .15s;}
.tab.ativa{color:var(--or);border-bottom-color:var(--or);}
/* PAGES */
.pg{display:none;padding:20px;}
.pg.show{display:block;}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.stat{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;}
.stat-lbl{font-family:var(--fm);font-size:9px;color:var(--mu);letter-spacing:.08em;margin-bottom:5px;}
.stat-val{font-family:var(--fh);font-size:20px;font-weight:800;}
/* GRID DE PEÇAS */
.pecas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.peca-card{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;transition:border-color .2s;}
.peca-card:hover{border-color:var(--bl);}
.peca-card.alerta{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.04);}
.peca-card.esgotado{border-color:rgba(239,68,68,.6);opacity:.75;}
.peca-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.peca-nome{font-size:13px;font-weight:700;line-height:1.3;}
.peca-qtd{font-family:var(--fh);font-size:20px;font-weight:900;line-height:1;}
.peca-qtd-label{font-family:var(--fm);font-size:8px;color:var(--mu);text-align:right;margin-top:1px;}
.peca-meta{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.peca-tag{font-family:var(--fm);font-size:9px;color:var(--mu);}
.peca-tag span{color:var(--tx);}
.peca-bar{height:4px;background:var(--dim);border-radius:2px;margin-bottom:10px;overflow:hidden;}
.peca-bar-fill{height:100%;border-radius:2px;transition:width .3s;}
.peca-actions{display:flex;gap:6px;flex-wrap:wrap;}
.btn-baixa{background:rgba(239,68,68,.15);color:var(--re);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:5px 10px;font-family:var(--fm);font-size:9px;font-weight:700;}
.btn-repor{background:rgba(34,197,94,.12);color:var(--gr);border:1px solid rgba(34,197,94,.25);border-radius:6px;padding:5px 10px;font-family:var(--fm);font-size:9px;}
.btn-edit{background:var(--s2);border:1px solid var(--bdr);border-radius:6px;padding:5px 10px;font-family:var(--fm);font-size:9px;color:var(--mu);}
/* FORM */
.form-card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:22px;max-width:560px;}
.form-title{font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--or);margin-bottom:18px;}
.fld{margin-bottom:12px;}
.fld label{font-family:var(--fm);font-size:9px;color:var(--mu);letter-spacing:.1em;display:block;margin-bottom:5px;}
.fld input,.fld select,.fld textarea{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:7px;color:var(--tx);font-family:var(--fm);font-size:11px;padding:8px 11px;outline:none;transition:border-color .15s;}
.fld input:focus,.fld select:focus{border-color:var(--or);}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fld-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.btn-primary{background:var(--or);color:#000;font-family:var(--fm);font-size:11px;font-weight:700;padding:10px 24px;border:none;border-radius:8px;}
.f-msg{margin-top:10px;font-family:var(--fm);font-size:10px;display:none;padding:8px 12px;border-radius:6px;}
.f-msg.ok{background:rgba(34,197,94,.1);color:var(--gr);border:1px solid rgba(34,197,94,.2);}
.f-msg.err{background:rgba(239,68,68,.1);color:var(--re);border:1px solid rgba(239,68,68,.2);}
/* HISTÓRIO */
.hist-tbl{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;}
.hist-tbl table{width:100%;border-collapse:collapse;}
.hist-tbl th{font-family:var(--fm);font-size:9px;color:var(--mu);letter-spacing:.08em;padding:9px 12px;text-align:left;border-bottom:1px solid var(--bdr);background:var(--s2);}
.hist-tbl td{font-family:var(--fm);font-size:10px;padding:9px 12px;border-bottom:1px solid var(--bdr);}
.hist-tbl tr:last-child td{border-bottom:none;}
.hist-tbl tr:hover td{background:rgba(255,255,255,.02);}
.empty{padding:40px;text-align:center;color:var(--mu);font-family:var(--fm);font-size:10px;}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
.ov.show{display:flex;}
.mdl{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:22px;width:400px;max-height:90vh;overflow-y:auto;}
.mdl-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.mdl-title{font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:.06em;}
.mdl-close{background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;line-height:1;padding:0;}
/* BADGE STATUS */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-family:var(--fm);font-size:8px;font-weight:700;}
.badge-disp{background:rgba(34,197,94,.15);color:var(--gr);border:1px solid rgba(34,197,94,.2);}
.badge-alerta{background:rgba(245,200,0,.15);color:var(--ye);border:1px solid rgba(245,200,0,.2);}
.badge-esg{background:rgba(239,68,68,.15);color:var(--re);border:1px solid rgba(239,68,68,.2);}
/* TOAST */
.toast-w{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--s1);border:1px solid var(--bdr);border-radius:8px;padding:10px 16px;font-family:var(--fm);font-size:10px;animation:slideUp .2s ease;}
.toast.g{border-color:rgba(34,197,94,.4);color:var(--gr);}
.toast.r{border-color:rgba(239,68,68,.4);color:var(--re);}
@keyframes slideUp{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-ic">🔩</div> Catálogo de Peças</div>
  <div style="display:flex;gap:8px;">
    <button class="hbtn" onclick="trocarAba('cadastrar')" style="color:var(--or);border-color:rgba(249,115,22,.3);">+ Cadastrar Peça</button>
    <a href="/tv-adm.html" class="hbtn">← TV</a>
  </div>
</header>

<!-- BUSCA RÁPIDA -->
<div class="search-bar">
  <input class="search-input" id="search" type="text" placeholder="🔍  Buscar por nome, modelo, código ou tipo de equipamento..."
    oninput="buscaRapida()" onkeydown="if(event.key==='Enter')buscaRapida()">
  <button class="search-btn" onclick="buscaRapida()">Buscar</button>
  <button class="hbtn" onclick="limparBusca()" id="btn-limpar" style="display:none;">✕ Limpar</button>
</div>

<div class="alert-bar" id="alert-bar"></div>

<!-- TABS -->
<div class="tabs">
  <div class="tab ativa" id="tab-estoque"  onclick="trocarAba('estoque')">📦 ESTOQUE</div>
  <div class="tab"        id="tab-cadastrar" onclick="trocarAba('cadastrar')">✚ CADASTRAR</div>
  <div class="tab"        id="tab-historico" onclick="trocarAba('historico')">📋 HISTÓRICO</div>
</div>

<!-- ABA ESTOQUE -->
<div class="pg show" id="pg-estoque">
  <div class="stats">
    <div class="stat"><div class="stat-lbl">PEÇAS CADASTRADAS</div><div class="stat-val" id="st-total" style="color:var(--bl)">—</div></div>
    <div class="stat"><div class="stat-lbl">EM ESTOQUE</div><div class="stat-val" id="st-disp" style="color:var(--gr)">—</div></div>
    <div class="stat"><div class="stat-lbl">ALERTAS DE MÍNIMO</div><div class="stat-val" id="st-alerta" style="color:var(--ye)">—</div></div>
    <div class="stat"><div class="stat-lbl">ESGOTADAS</div><div class="stat-val" id="st-esg" style="color:var(--re)">—</div></div>
  </div>
  <div class="pecas-grid" id="pecas-grid">
    <div class="empty" style="grid-column:1/-1;">Carregando...</div>
  </div>
</div>

<!-- ABA CADASTRAR -->
<div class="pg" id="pg-cadastrar">
  <div class="form-card">
    <div class="form-title">✚ NOVA PEÇA</div>
    <div class="fld">
      <label>NOME DA PEÇA *</label>
      <input id="f-nome" type="text" placeholder="Ex: Magnetron, Capacitor, Placa de Controle...">
    </div>
    <div class="fld-row">
      <div class="fld">
        <label>TIPO DE EQUIPAMENTO</label>
        <select id="f-tipo">
          <option value="">Selecionar...</option>
          <option>Microondas</option>
          <option>Bebedouro</option>
          <option>Purificador</option>
          <option>Adega</option>
          <option>Forno</option>
          <option>Geral</option>
        </select>
      </div>
      <div class="fld">
        <label>MARCA / FABRICANTE</label>
        <input id="f-marca" type="text" placeholder="Ex: Samsung, Consul, Electrolux">
      </div>
    </div>
    <div class="fld">
      <label>MODELO COMPATÍVEL</label>
      <input id="f-modelo" type="text" placeholder="Ex: ME28S, CMS30AB, MEC35 (ou deixe em branco p/ todos)">
    </div>
    <div class="fld">
      <label>CÓDIGO DA PEÇA</label>
      <input id="f-codigo" type="text" placeholder="Ex: DE26-00154H, 42883">
    </div>
    <div class="fld-row">
      <div class="fld">
        <label>QUANTIDADE EM ESTOQUE *</label>
        <input id="f-qtd" type="number" min="0" value="1">
      </div>
      <div class="fld">
        <label>ALERTA DE MÍNIMO</label>
        <input id="f-qtdmin" type="number" min="1" value="1" placeholder="Qtd mínima antes do alerta">
      </div>
    </div>
    <div class="fld">
      <label>OBSERVAÇÕES</label>
      <input id="f-obs" type="text" placeholder="Notas internas, fornecedor, etc.">
    </div>
    <button class="btn-primary" onclick="cadastrarPeca()">Cadastrar Peça</button>
    <div id="f-msg" class="f-msg"></div>
  </div>
</div>

<!-- ABA HISTÓRICO -->
<div class="pg" id="pg-historico">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
    <input class="search-input" id="hist-q" type="text" placeholder="Buscar no histórico por peça, OS, cliente ou técnico..." style="max-width:420px;">
    <button class="search-btn" onclick="carregarHistorico()">Buscar</button>
  </div>
  <div class="hist-tbl">
    <table>
      <thead><tr>
        <th>DATA</th><th>PEÇA</th><th>MODELO</th><th>QTD</th><th>OS / FICHA</th><th>CLIENTE</th><th>TÉCNICO</th><th>OBS</th>
      </tr></thead>
      <tbody id="hist-tbody"><tr><td colspan="8" class="empty">Carregando...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- MODAL DAR BAIXA -->
<div class="ov" id="ov-baixa" onclick="if(event.target===this)fecharBaixa()">
  <div class="mdl">
    <div class="mdl-hd">
      <div class="mdl-title">📤 DAR BAIXA NA PEÇA</div>
      <button class="mdl-close" onclick="fecharBaixa()">×</button>
    </div>
    <div id="baixa-peca-info" style="background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin-bottom:14px;font-family:var(--fm);font-size:11px;"></div>
    <input type="hidden" id="b-id">
    <div class="fld">
      <label>QUANTIDADE USADA *</label>
      <input id="b-qtd" type="number" min="1" value="1">
    </div>
    <div class="fld">
      <label>Nº DA OS / FICHA</label>
      <input id="b-os" type="text" placeholder="Ex: PIPE-1234, TV-0056">
    </div>
    <div class="fld">
      <label>NOME DO CLIENTE</label>
      <input id="b-cliente" type="text" placeholder="Nome do cliente da OS">
    </div>
    <div class="fld">
      <label>TÉCNICO RESPONSÁVEL</label>
      <input id="b-tecnico" type="text" placeholder="Nome do técnico">
    </div>
    <div class="fld">
      <label>OBSERVAÇÕES</label>
      <input id="b-obs" type="text" placeholder="Observações sobre o uso">
    </div>
    <div id="b-msg" style="font-family:var(--fm);font-size:10px;margin-bottom:10px;display:none;"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="hbtn" onclick="fecharBaixa()">Cancelar</button>
      <button onclick="confirmarBaixa()" style="background:var(--re);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-family:var(--fm);font-size:11px;font-weight:700;">📤 Confirmar Baixa</button>
    </div>
  </div>
</div>

<!-- MODAL REPOR ESTOQUE -->
<div class="ov" id="ov-repor" onclick="if(event.target===this)fecharRepor()">
  <div class="mdl">
    <div class="mdl-hd">
      <div class="mdl-title">📥 REPOR ESTOQUE</div>
      <button class="mdl-close" onclick="fecharRepor()">×</button>
    </div>
    <div id="repor-peca-info" style="background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin-bottom:14px;font-family:var(--fm);font-size:11px;"></div>
    <input type="hidden" id="r-id">
    <div class="fld">
      <label>QUANTIDADE A REPOR *</label>
      <input id="r-qtd" type="number" min="1" value="1">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="hbtn" onclick="fecharRepor()">Cancelar</button>
      <button onclick="confirmarRepor()" style="background:var(--gr);color:#000;border:none;border-radius:7px;padding:9px 20px;font-family:var(--fm);font-size:11px;font-weight:700;">📥 Confirmar Reposição</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR PEÇA -->
<div class="ov" id="ov-editar" onclick="if(event.target===this)fecharEditar()">
  <div class="mdl">
    <div class="mdl-hd">
      <div class="mdl-title">✏️ EDITAR PEÇA</div>
      <button class="mdl-close" onclick="fecharEditar()">×</button>
    </div>
    <input type="hidden" id="e-id">
    <div class="fld"><label>NOME DA PEÇA</label><input id="e-nome" type="text"></div>
    <div class="fld-row">
      <div class="fld"><label>TIPO</label>
        <select id="e-tipo">
          <option value="">Selecionar...</option>
          <option>Microondas</option><option>Bebedouro</option><option>Purificador</option>
          <option>Adega</option><option>Forno</option><option>Geral</option>
        </select>
      </div>
      <div class="fld"><label>MARCA</label><input id="e-marca" type="text"></div>
    </div>
    <div class="fld"><label>MODELO COMPATÍVEL</label><input id="e-modelo" type="text"></div>
    <div class="fld"><label>CÓDIGO</label><input id="e-codigo" type="text"></div>
    <div class="fld-row">
      <div class="fld"><label>QUANTIDADE</label><input id="e-qtd" type="number" min="0"></div>
      <div class="fld"><label>MÍNIMO ALERTA</label><input id="e-qtdmin" type="number" min="1"></div>
    </div>
    <div class="fld"><label>OBSERVAÇÕES</label><input id="e-obs" type="text"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px;">
      <button class="hbtn" onclick="fecharEditar()">Cancelar</button>
      <button onclick="salvarEdicao()" style="background:var(--or);color:#000;border:none;border-radius:7px;padding:9px 20px;font-family:var(--fm);font-size:11px;font-weight:700;">💾 Salvar</button>
    </div>
  </div>
</div>

<div class="toast-w" id="toast-w"></div>

<script>
var _pecas = [];

function g(id){ return document.getElementById(id); }
function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function fmtDt(s){ if(!s) return '—'; var d=new Date(s); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }

function toast(msg, tipo) {
  var w=g('toast-w'), el=document.createElement('div');
  el.className='toast '+(tipo||'g'); el.textContent=msg;
  w.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 3000);
}

function trocarAba(id) {
  ['estoque','cadastrar','historico'].forEach(function(t){
    g('pg-'+t).classList.toggle('show', t===id);
    g('tab-'+t).classList.toggle('ativa', t===id);
  });
  if (id==='historico') carregarHistorico();
  if (id==='estoque')   carregarPecas();
}

// ── Busca rápida ─────────────────────────────────────────────────────────────
var _searchTimer = null;
function buscaRapida() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(carregarPecas, 300);
  g('btn-limpar').style.display = g('search').value ? '' : 'none';
}
function limparBusca() {
  g('search').value = '';
  g('btn-limpar').style.display = 'none';
  carregarPecas();
}

// ── Carregar peças ────────────────────────────────────────────────────────────
async function carregarPecas() {
  var q = g('search').value.trim();
  var url = '/api/tv-pecas?action=listar' + (q ? '&q='+encodeURIComponent(q) : '');
  var r = await fetch(url).then(function(x){return x.json();});
  _pecas = r.pecas || [];
  renderEstoque();
  renderStats();
  verificarAlertas();
}

function renderStats() {
  var total  = _pecas.length;
  var disp   = _pecas.filter(function(p){ return (p.qtd||0) > 0; }).length;
  var alerta = _pecas.filter(function(p){ return (p.qtd||0)>0 && (p.qtd||0)<=(p.qtdMin||1); }).length;
  var esg    = _pecas.filter(function(p){ return (p.qtd||0)===0; }).length;
  g('st-total').textContent  = total;
  g('st-disp').textContent   = disp;
  g('st-alerta').textContent = alerta;
  g('st-esg').textContent    = esg;
}

function verificarAlertas() {
  var bar = g('alert-bar');
  var alertas = _pecas.filter(function(p){ return (p.qtd||0) > 0 && (p.qtd||0)<=(p.qtdMin||1); });
  var esg     = _pecas.filter(function(p){ return (p.qtd||0)===0; });
  var msgs = [];
  if (esg.length)     msgs.push('⛔ '+esg.length+' peça(s) esgotada(s)');
  if (alertas.length) msgs.push('⚠️ '+alertas.length+' peça(s) abaixo do mínimo');
  if (msgs.length) { bar.textContent=msgs.join('  ·  '); bar.style.display=''; }
  else bar.style.display='none';
}

function corQtd(p) {
  var qtd=p.qtd||0, min=p.qtdMin||1;
  if (qtd===0) return 'var(--re)';
  if (qtd<=min) return 'var(--ye)';
  return 'var(--gr)';
}
function pctEstoque(p) {
  if (!p.qtd) return 0;
  return Math.min(100, Math.round((p.qtd/(p.qtdMin*3||3))*100));
}
function badgeStatus(p) {
  if ((p.qtd||0)===0) return '<span class="badge badge-esg">ESGOTADO</span>';
  if ((p.qtd||0)<=(p.qtdMin||1)) return '<span class="badge badge-alerta">ESTOQUE BAIXO</span>';
  return '<span class="badge badge-disp">DISPONÍVEL</span>';
}

function renderEstoque() {
  var grid = g('pecas-grid');
  if (!_pecas.length) {
    grid.innerHTML='<div class="empty" style="grid-column:1/-1;text-align:center;padding:40px 20px;"><div style="font-size:40px;margin-bottom:12px;">📦</div><div style="font-size:15px;font-weight:600;color:var(--tx);">Catálogo vazio</div><div style="font-size:12px;color:var(--mu);margin-top:6px;">Clique em <strong style=\"color:var(--or);\">+ Cadastrar Peça</strong> para adicionar a primeira peça ao estoque.</div></div>';
    return;
  }
  grid.innerHTML = _pecas.map(function(p){
    var cor = corQtd(p);
    var pct = pctEstoque(p);
    var isEsg = (p.qtd||0)===0;
    var isAlerta = (p.qtd||0)>0 && (p.qtd||0)<=(p.qtdMin||1);
    var cls = isEsg ? 'peca-card esgotado' : isAlerta ? 'peca-card alerta' : 'peca-card';
    return '<div class="'+cls+'" id="pc-'+p.id+'">' +
      '<div class="peca-top">' +
        '<div>' +
          '<div class="peca-nome">'+esc(p.nomePeca)+'</div>' +
          '<div style="margin-top:3px;">'+badgeStatus(p)+'</div>' +
        '</div>' +
        '<div style="text-align:right">' +
          '<div class="peca-qtd" style="color:'+cor+'">'+( p.qtd||0 )+'</div>' +
          '<div class="peca-qtd-label" style="color:'+cor+'">UNID.</div>' +
        '</div>' +
      '</div>' +
      '<div class="peca-bar"><div class="peca-bar-fill" style="width:'+pct+'%;background:'+cor+';"></div></div>' +
      '<div class="peca-meta">' +
        (p.tipo   ? '<div class="peca-tag">🔧 Tipo: <span>'+esc(p.tipo)+'</span></div>' : '') +
        (p.modelo ? '<div class="peca-tag">📋 Modelo: <span>'+esc(p.modelo)+'</span></div>' : '') +
        (p.marca  ? '<div class="peca-tag">🏷️ Marca: <span>'+esc(p.marca)+'</span></div>' : '') +
        (p.codigo ? '<div class="peca-tag">🔢 Cód.: <span>'+esc(p.codigo)+'</span></div>' : '') +
        '<div class="peca-tag">📦 Mínimo: <span>'+( p.qtdMin||1 )+'</span>  ·  Usos: <span>'+( p.usoCount||0 )+'</span></div>' +
        (p.obs ? '<div class="peca-tag" style="margin-top:2px;opacity:.7;">'+esc(p.obs)+'</div>' : '') +
      '</div>' +
      '<div class="peca-actions">' +
        '<button class="btn-baixa" onclick="abrirBaixa(\''+p.id+'\')">📤 Dar Baixa</button>' +
        '<button class="btn-repor" onclick="abrirRepor(\''+p.id+'\')">📥 Repor</button>' +
        '<button class="btn-edit"  onclick="abrirEditar(\''+p.id+'\')">✏️</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ── Cadastrar peça ────────────────────────────────────────────────────────────
async function cadastrarPeca() {
  var nome = g('f-nome').value.trim();
  if (!nome) { toast('Informe o nome da peça','r'); return; }
  var msg = g('f-msg');
  var r = await fetch('/api/tv-pecas?action=cadastrar', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      nomePeca:nome, tipo:g('f-tipo').value,
      marca:g('f-marca').value.trim(), modelo:g('f-modelo').value.trim(),
      codigo:g('f-codigo').value.trim(), qtd:g('f-qtd').value||1,
      qtdMin:g('f-qtdmin').value||1, obs:g('f-obs').value.trim()
    })
  }).then(function(x){return x.json();});
  if (r.ok) {
    msg.textContent='✅ '+r.peca.nomePeca+' cadastrada com '+r.peca.qtd+' unidade(s)!';
    msg.className='f-msg ok'; msg.style.display='';
    ['f-nome','f-marca','f-modelo','f-codigo','f-obs'].forEach(function(id){ g(id).value=''; });
    g('f-qtd').value='1'; g('f-qtdmin').value='1'; g('f-tipo').value='';
    setTimeout(function(){ msg.style.display='none'; }, 3000);
    toast('✅ Peça cadastrada!');
  } else {
    msg.textContent='❌ '+(r.error||'Erro'); msg.className='f-msg err'; msg.style.display='';
    toast('Erro: '+(r.error||'falha'),'r');
  }
}

// ── Dar baixa ──────────────────────────────────────────────────────────────────
function abrirBaixa(id) {
  var p=_pecas.find(function(x){return x.id===id;});
  if (!p) return;
  if ((p.qtd||0)===0) { toast('Peça esgotada — faça a reposição antes','r'); return; }
  g('b-id').value=id;
  g('b-qtd').value=1;
  g('b-os').value=''; g('b-cliente').value=''; g('b-tecnico').value=''; g('b-obs').value='';
  g('b-msg').style.display='none';
  g('baixa-peca-info').innerHTML=
    '<strong>'+esc(p.nomePeca)+'</strong>' +
    (p.modelo ? ' · '+esc(p.modelo) : '') +
    (p.codigo ? ' · Cód: '+esc(p.codigo) : '') +
    '<br><span style="color:var(--gr);">Em estoque: '+( p.qtd||0 )+' unidade(s)</span>';
  g('ov-baixa').classList.add('show');
}
function fecharBaixa(){ g('ov-baixa').classList.remove('show'); }

async function confirmarBaixa() {
  var id=g('b-id').value, qtd=parseInt(g('b-qtd').value)||1;
  var r = await fetch('/api/tv-pecas?action=dar-baixa',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      pecaId:id, qtdUsada:qtd,
      osId:g('b-os').value.trim(), osCliente:g('b-cliente').value.trim(),
      tecnico:g('b-tecnico').value.trim(), obs:g('b-obs').value.trim()
    })
  }).then(function(x){return x.json();});
  if (r.ok) {
    toast('✅ Baixa registrada! Restam '+r.qtdRestante+' unidade(s)');
    fecharBaixa(); carregarPecas();
  } else {
    var msg=g('b-msg');
    msg.textContent='❌ '+(r.error||'Erro'); msg.style.display=''; msg.style.color='var(--re)';
    toast('Erro: '+(r.error||'falha'),'r');
  }
}

// ── Repor estoque ─────────────────────────────────────────────────────────────
function abrirRepor(id) {
  var p=_pecas.find(function(x){return x.id===id;});
  if (!p) return;
  g('r-id').value=id;
  g('r-qtd').value=1;
  g('repor-peca-info').innerHTML='<strong>'+esc(p.nomePeca)+'</strong><br><span style="color:var(--mu);">Estoque atual: '+( p.qtd||0 )+'</span>';
  g('ov-repor').classList.add('show');
}
function fecharRepor(){ g('ov-repor').classList.remove('show'); }

async function confirmarRepor() {
  var r = await fetch('/api/tv-pecas?action=repor',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ pecaId:g('r-id').value, qtd:g('r-qtd').value||1 })
  }).then(function(x){return x.json();});
  if (r.ok) {
    toast('✅ Estoque atualizado!');
    fecharRepor(); carregarPecas();
  } else toast('Erro: '+(r.error||'falha'),'r');
}

// ── Editar peça ───────────────────────────────────────────────────────────────
function abrirEditar(id) {
  var p=_pecas.find(function(x){return x.id===id;});
  if (!p) return;
  g('e-id').value=id;
  g('e-nome').value=p.nomePeca||''; g('e-tipo').value=p.tipo||'';
  g('e-marca').value=p.marca||'';  g('e-modelo').value=p.modelo||'';
  g('e-codigo').value=p.codigo||''; g('e-qtd').value=p.qtd||0;
  g('e-qtdmin').value=p.qtdMin||1; g('e-obs').value=p.obs||'';
  g('ov-editar').classList.add('show');
}
function fecharEditar(){ g('ov-editar').classList.remove('show'); }

async function salvarEdicao() {
  var r = await fetch('/api/tv-pecas?action=editar',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      id:g('e-id').value, nomePeca:g('e-nome').value.trim(),
      tipo:g('e-tipo').value, marca:g('e-marca').value.trim(),
      modelo:g('e-modelo').value.trim(), codigo:g('e-codigo').value.trim(),
      qtd:g('e-qtd').value||0, qtdMin:g('e-qtdmin').value||1,
      obs:g('e-obs').value.trim()
    })
  }).then(function(x){return x.json();});
  if (r.ok) { toast('✅ Peça atualizada!'); fecharEditar(); carregarPecas(); }
  else toast('Erro: '+(r.error||'falha'),'r');
}

// ── Histórico ─────────────────────────────────────────────────────────────────
async function carregarHistorico() {
  var q=g('hist-q').value.trim();
  var r=await fetch('/api/tv-pecas?action=historico'+(q?'&q='+encodeURIComponent(q):'')).then(function(x){return x.json();});
  var usos=r.usos||[];
  var tbody=g('hist-tbody');
  if (!usos.length) { tbody.innerHTML='<tr><td colspan="8" class="empty">Nenhum uso registrado.</td></tr>'; return; }
  tbody.innerHTML=usos.map(function(u){
    return '<tr>'+
      '<td style="font-size:9px">'+fmtDt(u.usadoEm)+'</td>'+
      '<td><strong>'+esc(u.nomePeca)+'</strong></td>'+
      '<td style="color:var(--mu)">'+esc(u.modelo||'—')+'</td>'+
      '<td style="color:var(--or);font-weight:700;text-align:center">'+( u.qtdUsada||1 )+'</td>'+
      '<td style="color:var(--bl)">'+esc(u.osId||'—')+'</td>'+
      '<td>'+esc(u.osCliente||'—')+'</td>'+
      '<td style="color:var(--mu)">'+esc(u.tecnico||'—')+'</td>'+
      '<td style="color:var(--mu);font-size:9px">'+esc(u.obs||'')+'</td>'+
    '</tr>';
  }).join('');
}

// ── Init ──────────────────────────────────────────────────────────────────────
carregarPecas();
</script>
</body>
</html>
