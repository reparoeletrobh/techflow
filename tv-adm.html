<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Assistência — ADM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080a;--surface:#0f1114;--surface2:#181b1f;--border:#1e2228;
  --text:#f0f2f5;--muted:#5a6270;--dim:#2a2f38;
  --accent:#3b9eff;--sidebar-w:220px;--sidebar-collapsed:60px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  display:flex;height:100vh;overflow:hidden;}

.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;transition:width .25s,min-width .25s;overflow:hidden;}
.sidebar.collapsed{width:var(--sidebar-collapsed);min-width:var(--sidebar-collapsed);}

.sidebar-logo{display:flex;align-items:center;gap:10px;padding:14px 16px;
  border-bottom:1px solid var(--border);height:52px;flex-shrink:0;}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.logo-text{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;white-space:nowrap;
  overflow:hidden;transition:opacity .2s;}
.logo-text span{color:var(--accent);}
.sidebar.collapsed .logo-text{opacity:0;pointer-events:none;}

.nav-section{padding:10px 8px 4px;font-family:'DM Mono',monospace;font-size:9px;
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted);white-space:nowrap;
  overflow:hidden;transition:opacity .2s;}
.sidebar.collapsed .nav-section{opacity:0;}

.nav-items{flex:1;overflow-y:auto;padding:4px 0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:0 12px;height:40px;
  border-radius:8px;margin:2px 8px;cursor:pointer;transition:all .15s;
  color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
  text-decoration:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:rgba(59,158,255,.1);color:var(--accent);}
.nav-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:13px;flex-shrink:0;background:var(--surface2);}
.nav-item.active .nav-icon{background:rgba(59,158,255,.15);}
.nav-label{white-space:nowrap;overflow:hidden;transition:opacity .2s;}
.sidebar.collapsed .nav-label{opacity:0;}
.sidebar.collapsed .nav-item{margin:2px 6px;justify-content:center;padding:0;}
.sidebar.collapsed .nav-section{display:none;}

.toggle-btn{display:flex;align-items:center;gap:8px;padding:12px 16px;
  border-top:1px solid var(--border);cursor:pointer;color:var(--muted);
  font-family:'DM Mono',monospace;font-size:10px;transition:color .15s;flex-shrink:0;}
.toggle-btn:hover{color:var(--text);}
.toggle-icon{transition:transform .25s;}
.toggle-label{white-space:nowrap;overflow:hidden;transition:opacity .2s;}
.sidebar.collapsed .toggle-label{opacity:0;}
.sidebar.collapsed .toggle-icon{transform:scaleX(-1);}

/* CONTENT */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.load-bar{height:2px;background:transparent;transition:background .3s;position:absolute;top:0;left:0;right:0;z-index:10;}
.load-bar.loading{background:linear-gradient(90deg,transparent,var(--accent),transparent);
  background-size:200% 100%;animation:loadAnim 1s infinite;}
@keyframes loadAnim{0%{background-position:200% 0}100%{background-position:-200% 0}}

.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;}
.welcome-icon{font-size:40px;opacity:.3;}
.welcome-text{text-align:center;line-height:1.8;opacity:.5;}
.welcome-arrow{color:var(--accent);opacity:.4;font-size:11px;}

.frame-wrap{flex:1;display:none;}
.frame-wrap.visible{display:flex;}
.frame-wrap iframe{width:100%;height:100%;border:none;background:var(--bg);}

/* MOBILE */
.hamburger{display:none;}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:299;backdrop-filter:blur(2px);}
.mobile-overlay.active{display:block;}
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100dvh;z-index:300;
    transform:translateX(-100%);transition:transform .25s;box-shadow:4px 0 24px rgba(0,0,0,.5);
    width:var(--sidebar-w)!important;min-width:var(--sidebar-w)!important;}
  .sidebar.mobile-open{transform:translateX(0);}
  .sidebar.collapsed .logo-text,.sidebar.collapsed .nav-label,.sidebar.collapsed .toggle-label{opacity:1!important;pointer-events:auto!important;}
  .sidebar.collapsed .nav-item{margin:2px 8px!important;justify-content:flex-start!important;padding:0 12px!important;}
  .toggle-btn{display:none;}
  .hamburger{display:flex;align-items:center;justify-content:center;
    width:36px;height:36px;border:1px solid var(--border);border-radius:8px;
    background:var(--surface);cursor:pointer;position:fixed;top:12px;left:12px;z-index:298;}
  .hamburger span{display:block;width:16px;height:2px;background:var(--text);border-radius:2px;position:relative;}
  .hamburger span::before,.hamburger span::after{content:'';position:absolute;left:0;
    width:16px;height:2px;background:var(--text);border-radius:2px;}
  .hamburger span::before{top:-5px;}
  .hamburger span::after{top:5px;}
  .content{padding-top:52px;}
}
</style>
</head>
<body>

<div class="mobile-overlay" id="mobile-overlay" onclick="closeMobile()"></div>
<button class="hamburger" onclick="toggleMobile()"><span></span></button>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">📺</div>
    <div class="logo-text">TV <span>Assistência</span></div>
  </div>

  <div class="nav-items">
    <div class="nav-section">Principal</div>

    <div class="nav-item" data-url="/tv/tecnico" data-label="Técnico"
         style="--item-color:#3b9eff" onclick="openPage(this)">
      <span class="nav-icon">🔧</span>
      <span class="nav-label">Técnico</span>
    </div>

    <div class="nav-item" data-url="/tv/orcamento" data-label="Orçamento"
         style="--item-color:#f5c800" onclick="openPage(this)">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Orçamento</span>
    </div>

    <div class="nav-item" data-url="/tv/financeiro" data-label="Financeiro"
         style="--item-color:#22c55e" onclick="openPage(this)">
      <span class="nav-icon">💰</span>
      <span class="nav-label">Financeiro</span>
    </div>

    <div class="nav-section">Operação</div>

    <div class="nav-item" data-url="/tv/coleta" data-label="Coleta"
         style="--item-color:#f97316" onclick="openPage(this)">
      <span class="nav-icon">🚚</span>
      <span class="nav-label">Coleta</span>
    </div>

    <div class="nav-item" data-url="/tv/aguardando-retirada" data-label="Ag. Retirada"
         style="--item-color:#f97316" onclick="openPage(this)">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Ag. Retirada</span>
    </div>

    <div class="nav-section">Análise</div>

    <div class="nav-item" data-url="/tv/metricas" data-label="Métricas"
         style="--item-color:#a855f7" onclick="openPage(this)">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Métricas</span>
    </div>

  </div>

  <div class="toggle-btn" onclick="toggleSidebar()">
    <span class="toggle-icon">◀</span>
    <span class="toggle-label">Recolher</span>
  </div>
</div>

<div class="content">
  <div class="load-bar" id="load-bar"></div>
  <div class="welcome" id="welcome">
    <div class="welcome-icon">📺</div>
    <div class="welcome-text">TV Assistência — Sistema de Gestão<br>Selecione um painel na barra lateral</div>
    <div class="welcome-arrow">← escolha um módulo</div>
  </div>
  <div class="frame-wrap" id="frame-wrap">
    <iframe id="main-frame" src="" title="Painel TV"></iframe>
  </div>
</div>

<script>
var sidebar   = document.getElementById('sidebar');
var welcome   = document.getElementById('welcome');
var frameWrap = document.getElementById('frame-wrap');
var frame     = document.getElementById('main-frame');
var loadBar   = document.getElementById('load-bar');
var collapsed = false;
var mobileOpen = false;

function toggleSidebar() {
  collapsed = !collapsed;
  sidebar.classList.toggle('collapsed', collapsed);
  var lbl = sidebar.querySelector('.toggle-label');
  if (lbl) lbl.textContent = collapsed ? 'Expandir' : 'Recolher';
}

function toggleMobile() {
  mobileOpen = !mobileOpen;
  sidebar.classList.toggle('mobile-open', mobileOpen);
  document.getElementById('mobile-overlay').classList.toggle('active', mobileOpen);
}
function closeMobile() {
  mobileOpen = false;
  sidebar.classList.remove('mobile-open');
  document.getElementById('mobile-overlay').classList.remove('active');
}

function openPage(el) {
  var url = el.getAttribute('data-url');
  if (!url) return;
  closeMobile();
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  el.classList.add('active');
  welcome.style.display = 'none';
  frameWrap.classList.add('visible');
  loadBar.classList.add('loading');
  frame.onload = function() { loadBar.classList.remove('loading'); };
  frame.src = url;
}
</script>
</body>
</html>
