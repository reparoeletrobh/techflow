<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pipe — Reparo Eletro ADM</title>
<style>
:root{--bg:#0d0d0d;--surface:#161616;--s2:#1e1e1e;--border:#252525;--text:#f0f0f0;--muted:#555;--yellow:#f5c800;--green:#22c55e;--red:#ef4444;--blue:#3b9eff;--purple:#a855f7;--orange:#f97316;--fm:'Inter',system-ui,sans-serif;--fh:'Inter',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fm);font-size:13px;min-height:100vh;}
/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
.hdr-title{font-family:var(--fh);font-size:17px;font-weight:900;letter-spacing:-.3px;}
.hdr-badge{background:rgba(245,200,0,.12);border:1px solid rgba(245,200,0,.3);color:var(--yellow);border-radius:6px;padding:3px 9px;font-size:9px;font-weight:700;letter-spacing:.5px;}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.hdr-btn{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--muted);font-size:11px;cursor:pointer;transition:.15s;font-family:var(--fm);}
.hdr-btn:hover{color:var(--text);border-color:var(--yellow);}
.hdr-btn.primary{background:var(--yellow);color:#000;border-color:var(--yellow);font-weight:700;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.last-sync{font-size:9px;color:var(--muted);}
/* ── STATS BAR ── */
.stats-bar{display:flex;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
.stat{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.stat-val{font-size:16px;font-weight:800;}
/* ── BOARD ── */
.board{display:flex;gap:10px;padding:16px 20px;overflow-x:auto;min-height:calc(100vh - 130px);align-items:flex-start;}
/* ── COLUMN ── */
.col{flex:0 0 230px;display:flex;flex-direction:column;gap:8px;}
.col-hdr{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden;}
.col-stripe{position:absolute;top:0;left:0;right:0;height:3px;}
.col-name{font-size:10px;font-weight:700;display:flex;align-items:center;gap:6px;}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.col-count{margin-left:auto;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:1px 7px;font-size:9px;color:var(--muted);}
/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 11px 9px;position:relative;overflow:hidden;cursor:pointer;transition:.15s;}
.card:hover{border-color:rgba(245,200,0,.3);background:rgba(245,200,0,.02);}
.card-bar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:4px;}
.card-id{font-size:9px;color:var(--muted);}
.card-pipefy{font-size:8px;color:var(--muted);background:var(--s2);border-radius:4px;padding:1px 5px;}
.card-nome{font-size:12px;font-weight:700;margin-top:3px;}
.card-equip{font-size:10px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.card-val{font-size:11px;font-weight:700;color:var(--green);margin-top:4px;}
.card-time{font-size:9px;color:var(--muted);margin-top:4px;}
.card-timer{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;margin-top:5px;}
.timer-ok{background:rgba(34,197,94,.1);color:var(--green);}
.timer-warn{background:rgba(249,115,22,.1);color:var(--orange);}
.timer-late{background:rgba(239,68,68,.1);color:var(--red);}
.card-ac-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;background:rgba(59,158,255,.1);color:var(--blue);margin-top:4px;}
.card-origem{font-size:8px;color:var(--muted);margin-top:3px;}
.card-actions{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.cbtn{border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:9px;font-weight:600;cursor:pointer;background:var(--s2);color:var(--muted);font-family:var(--fm);transition:.12s;}
.cbtn:hover{color:var(--text);}
.cbtn.green{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--green);}
.cbtn.red{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red);}
.cbtn.blue{background:rgba(59,158,255,.1);border-color:rgba(59,158,255,.3);color:var(--blue);}
.cbtn.orange{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.3);color:var(--orange);}
.cbtn.yellow{background:rgba(245,200,0,.1);border-color:rgba(245,200,0,.3);color:var(--yellow);}
/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
.modal-title{font-family:var(--fh);font-size:16px;font-weight:800;}
.form-row{display:flex;flex-direction:column;gap:5px;}
.form-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.form-inp{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:12px;font-family:var(--fm);}
.form-inp:focus{outline:none;border-color:var(--yellow);}
.form-sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:12px;font-family:var(--fm);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-cancel{background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--fm);}
.btn-save{background:var(--yellow);border:none;border-radius:8px;padding:8px 18px;color:#000;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--fm);}
/* ── MOVER SELECT ── */
.move-sel{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:4px 8px;color:var(--text);font-size:10px;font-family:var(--fm);cursor:pointer;}
/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:12px;z-index:9999;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none;max-width:300px;}
.toast.show{opacity:1;transform:none;}
/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">⚡ Pipe</div>
  <div class="hdr-badge">ADM — PILOTO</div>
  <div class="sync-dot" id="sync-dot" title="Sincronizado"></div>
  <div class="last-sync" id="last-sync">—</div>
  <div class="hdr-right">
    <button class="hdr-btn" onclick="syncPipefy()" id="btn-sync">⟳ Sincronizar Pipefy</button>
    <button class="hdr-btn primary" onclick="abrirModalNovo()">+ Nova Ficha</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>
<div class="board" id="board"></div>

<!-- Modal nova ficha -->
<div class="overlay" id="modal-novo" style="display:none;" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-title">Nova Ficha no Pipeline</div>
    <div class="form-row"><div class="form-lbl">Nome do cliente *</div><input class="form-inp" id="f-nome" placeholder="Ex: João Silva"></div>
    <div class="form-row"><div class="form-lbl">Telefone</div><input class="form-inp" id="f-tel" placeholder="(31) 9 9999-0000"></div>
    <div class="form-row"><div class="form-lbl">Equipamento</div><input class="form-inp" id="f-equip" placeholder="Ex: Microondas Electrolux ME41"></div>
    <div class="form-row"><div class="form-lbl">Valor estimado</div><input class="form-inp" id="f-valor" type="number" placeholder="0.00"></div>
    <div class="form-row"><div class="form-lbl">Fase inicial</div>
      <select class="form-sel" id="f-phase"></select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-save" onclick="salvarNovo()">✅ Criar Ficha</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PHASES = [];
let   cards  = [];
let   phMap  = {};

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function toast(msg, ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show';
  t.style.borderColor=ok?'rgba(34,197,94,.3)':'rgba(239,68,68,.3)';
  setTimeout(()=>t.className='toast',3000);
}
async function api(action, body){
  const r=await fetch('/api/pipe?action='+action, body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});
  return r.json();
}
function fmtTempo(ts){
  if(!ts)return'';
  const d=(Date.now()-new Date(ts).getTime())/1000;
  if(d<60)return'agora';
  if(d<3600)return Math.floor(d/60)+'min';
  if(d<86400)return Math.floor(d/3600)+'h';
  return Math.floor(d/86400)+'d';
}
function timerBadge(card){
  if(!card.aguardandoDesde||!['aguardando_aprovacao','sem_resposta'].includes(card.phase))return'';
  const h=(Date.now()-new Date(card.aguardandoDesde).getTime())/3600000;
  if(card.phase==='aguardando_aprovacao'){
    if(h<24)return`<div class="card-timer timer-ok">⏱ ${Math.round(h)}h de 48h</div>`;
    if(h<48)return`<div class="card-timer timer-warn">⚠️ ${Math.round(h)}h — próximo de 48h</div>`;
    return`<div class="card-timer timer-late">🔴 ${Math.round(h)}h sem resposta</div>`;
  }
  if(card.phase==='sem_resposta'){
    return`<div class="card-timer timer-late">🔴 Sem resposta ${Math.round(h)}h</div>`;
  }
  return'';
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  // Stats
  const sb=document.getElementById('stats-bar');
  const aguard = cards.filter(c=>c.phase==='aguardando_aprovacao').length;
  const semR   = cards.filter(c=>c.phase==='sem_resposta').length;
  const aprov  = cards.filter(c=>c.phase==='aprovados').length;
  const receber= cards.filter(c=>c.phase==='receber').length;
  const erp    = cards.filter(c=>c.phase==='erp').length;
  sb.innerHTML=`
    <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val" style="color:var(--yellow)">${cards.length}</div></div>
    <div class="stat"><div class="stat-lbl">Aguardando</div><div class="stat-val" style="color:var(--yellow)">${aguard}</div></div>
    ${semR>0?`<div class="stat"><div class="stat-lbl">Sem Resposta</div><div class="stat-val" style="color:var(--red)">${semR}</div></div>`:''}
    <div class="stat"><div class="stat-lbl">Aprovados</div><div class="stat-val" style="color:var(--green)">${aprov}</div></div>
    <div class="stat"><div class="stat-lbl">Receber</div><div class="stat-val" style="color:var(--green)">${receber}</div></div>
    <div class="stat"><div class="stat-lbl">ERP</div><div class="stat-val" style="color:var(--green)">${erp}</div></div>
  `;

  // Board
  const board=document.getElementById('board');
  board.innerHTML=PHASES.map(ph=>{
    const phCards=cards.filter(c=>c.phase===ph.id);
    const cardsHTML=phCards.map(c=>{
      const opts=PHASES
        .filter(p=>p.id!==c.phase)
        .map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
      const origemLabel = c.origem==='pipefy'?'📌 Pipefy':'🔵 Sistema';
      return `<div class="card" id="card-${c.id}">
        <div class="card-bar" style="background:${ph.cor}"></div>
        <div class="card-top">
          <div class="card-id">${esc(c.id)}</div>
          ${c.pipefyId?`<div class="card-pipefy">PF#${c.pipefyId.slice(-6)}</div>`:''}
        </div>
        <div class="card-nome">${esc(c.nomeContato)}</div>
        ${c.equipamento?`<div class="card-equip">🔧 ${esc(c.equipamento)}</div>`:''}
        ${c.valor>0?`<div class="card-val">R$ ${c.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>`:''}
        ${timerBadge(c)}
        ${c.analiseCompra?`<div class="card-ac-badge">🛒 Análise de Compra</div>`:''}
        <div class="card-time">${origemLabel} · ${fmtTempo(c.criadoEm)}</div>
        <div class="card-actions">
          <select class="move-sel" onchange="moverCard('${c.id}',this.value);this.value=''">
            <option value="">↕ Mover...</option>
            ${opts}
          </select>
          <button class="cbtn ${c.analiseCompra?'blue':''}" onclick="toggleAC('${c.id}')" title="Análise de Compra">🛒</button>
          <button class="cbtn red" onclick="excluir('${c.id}')" title="Remover">🗑</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="col">
      <div class="col-hdr">
        <div class="col-stripe" style="background:${ph.cor}"></div>
        <div class="col-name">
          <div class="col-dot" style="background:${ph.cor}"></div>
          ${esc(ph.name)}
          <div class="col-count">${phCards.length}</div>
        </div>
      </div>
      ${cardsHTML}
    </div>`;
  }).join('');
}

// ── Ações ─────────────────────────────────────────────────────────────────────
async function moverCard(id, phase){
  if(!phase)return;
  const r=await api('mover',{id,phase});
  if(r.ok){
    const c=cards.find(x=>x.id===id);
    if(c){c.phase=phase;c.movedAt=new Date().toISOString();}
    render();
    toast('Movido para '+PHASES.find(p=>p.id===phase)?.name);
  } else toast(r.error||'Erro',false);
}
async function toggleAC(id){
  const r=await api('toggle-analise-compra',{id});
  if(r.ok){const c=cards.find(x=>x.id===id);if(c)c.analiseCompra=r.analiseCompra;render();}
}
async function excluir(id){
  if(!confirm('Remover esta ficha do pipe?'))return;
  const r=await api('excluir',{id});
  if(r.ok){cards=cards.filter(c=>c.id!==id);render();toast('Ficha removida');}
}

// ── Sync Pipefy ───────────────────────────────────────────────────────────────
async function syncPipefy(){
  const btn=document.getElementById('btn-sync');
  btn.textContent='⟳ Sincronizando...';btn.disabled=true;
  const r=await api('sync-pipefy');
  btn.textContent='⟳ Sincronizar Pipefy';btn.disabled=false;
  if(r.ok){
    toast(`✅ ${r.added} fichas importadas, ${r.skipped} já existiam`);
    await load();
  } else toast(r.error||'Erro na sync',false);
}

// ── Modal Nova Ficha ──────────────────────────────────────────────────────────
function abrirModalNovo(){
  // Popular select de fases
  const sel=document.getElementById('f-phase');
  sel.innerHTML=PHASES.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  document.getElementById('modal-novo').style.display='flex';
}
function fecharModal(){ document.getElementById('modal-novo').style.display='none'; }
async function salvarNovo(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome){toast('Nome obrigatório',false);return;}
  const r=await api('add-card',{
    nomeContato: nome,
    telefone:    document.getElementById('f-tel').value.trim(),
    equipamento: document.getElementById('f-equip').value.trim(),
    valor:       parseFloat(document.getElementById('f-valor').value)||0,
    phase:       document.getElementById('f-phase').value,
    origem:      'manual'
  });
  if(r.ok&&r.card){cards.unshift(r.card);render();fecharModal();toast('Ficha criada!');}
  else toast(r.error||'Erro',false);
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function load(){
  const r=await api('load');
  if(r.ok){
    // Popular PHASES
    PHASES.length=0;
    (r.phases||[]).forEach(p=>PHASES.push(p));
    (r.phases||[]).forEach(p=>phMap[p.id]=p);
    cards=r.cards||[];
    if(r.lastSync){
      const d=new Date(r.lastSync);
      document.getElementById('last-sync').textContent='sync '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    }
    render();
  }
}

load();
setInterval(load, 60000); // refresh a cada 1min
</script>
</body>
</html>
