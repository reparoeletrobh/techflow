<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pipe — Reparo Eletro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090909; --s1:#111; --s2:#181818; --s3:#202020;
  --b1:#1f1f1f; --b2:#2a2a2a;
  --text:#e8e8e8; --muted:#484848; --dim:#333;
  --y:#f5c800; --g:#16c784; --r:#ef4444; --b:#3b9eff; --p:#a855f7; --o:#f97316;
  --fm:'Sora',sans-serif; --mono:'IBM Plex Mono',monospace;
  --col-w:minmax(0,1fr);
  --hdr:44px; --stats:34px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fm);font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── HEADER ──────────────────────────────────────────── */
.hdr{height:var(--hdr);display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0;}
.hdr-logo{display:flex;align-items:center;gap:7px;}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:var(--y);box-shadow:0 0 10px var(--y);}
.hdr-name{font-family:var(--fm);font-size:14px;font-weight:800;letter-spacing:-.5px;}
.hdr-name em{color:var(--y);font-style:normal;}
.hdr-sep{width:1px;height:18px;background:var(--b1);}
.hdr-lbl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.hdr-btn{background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:5px 10px;color:var(--muted);font-size:10px;cursor:pointer;font-family:var(--fm);font-weight:600;transition:.15s;display:flex;align-items:center;gap:5px;}
.hdr-btn:hover{border-color:var(--y);color:var(--y);}
.hdr-btn.primary{background:var(--y);color:#000;border-color:var(--y);}
.hdr-btn.primary:hover{background:#e6b800;}
.sync-st{width:6px;height:6px;border-radius:50%;background:var(--g);}
.sync-st.spin{animation:spin 1s linear infinite;background:var(--y);}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── STATS BAR ───────────────────────────────────────── */
.stats{height:var(--stats);display:flex;align-items:center;gap:16px;padding:0 14px;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0;overflow-x:auto;}
.stat{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.stat-val{font-family:var(--mono);font-size:12px;font-weight:600;}
.sdiv{width:1px;height:14px;background:var(--b1);}

/* ── BOARD ───────────────────────────────────────────── */
.board{
  flex:1;
  display:grid;
  grid-template-columns:repeat(10, var(--col-w));
  gap:5px;
  padding:8px;
  overflow-y:auto;
  overflow-x:hidden;
  align-content:start;
}

/* ── COLUMN ──────────────────────────────────────────── */
.col{display:flex;flex-direction:column;gap:4px;min-width:0;}
.col-hdr{
  border-radius:7px 7px 0 0;
  padding:6px 8px 5px;
  display:flex;align-items:center;gap:5px;
  background:var(--s2);
  border:1px solid var(--b1);
  border-bottom:none;
  position:sticky;top:0;z-index:2;
}
.col-stripe{height:2px;border-radius:2px;margin-bottom:4px;}
.col-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.col-n{font-family:var(--mono);font-size:9px;color:var(--muted);flex-shrink:0;background:var(--s3);padding:1px 5px;border-radius:4px;}
.col-body{display:flex;flex-direction:column;gap:3px;min-height:40px;}

/* ── CARD ────────────────────────────────────────────── */
.card{
  background:var(--s2);
  border:1px solid var(--b1);
  border-radius:6px;
  padding:6px 7px 5px;
  position:relative;
  overflow:hidden;
  cursor:default;
  transition:border-color .12s, background .12s;
}
.card:hover{background:var(--s3);border-color:var(--b2);}
.card-lb{position:absolute;left:0;top:0;bottom:0;width:2.5px;}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:3px;margin-bottom:2px;}
.card-nome{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;line-height:1.2;}
.card-id{font-family:var(--mono);font-size:8px;color:var(--muted);flex-shrink:0;}

.card-equip{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.card-val{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--g);margin-top:2px;}

/* Ações aparecem no hover */
.card-actions{
  display:none;
  margin-top:5px;
  gap:3px;
  flex-wrap:wrap;
}
.card:hover .card-actions{display:flex;}
.ca-sel{
  flex:1;background:var(--s1);border:1px solid var(--b2);
  border-radius:4px;padding:3px 4px;color:var(--muted);
  font-size:8px;font-family:var(--fm);cursor:pointer;
  min-width:0;
}
.ca-sel:hover{border-color:var(--y);}
.ca-btn{background:none;border:1px solid var(--b2);border-radius:4px;padding:3px 5px;color:var(--muted);font-size:8px;cursor:pointer;flex-shrink:0;}
.ca-btn:hover{color:var(--r);border-color:var(--r);}
.ca-ac{color:var(--b)!important;border-color:var(--b)!important;}

/* Badges */
.card-ac{display:inline-block;font-size:7px;background:rgba(59,158,255,.12);color:var(--b);border:1px solid rgba(59,158,255,.25);border-radius:3px;padding:1px 4px;margin-top:2px;}
.card-pf{display:inline-block;font-size:7px;background:rgba(72,72,72,.4);color:var(--muted);border-radius:3px;padding:0px 3px;}

/* Timer badge */
.card-timer{display:inline-block;font-size:7px;padding:1px 4px;border-radius:3px;margin-top:2px;font-weight:600;}
.t-ok{background:rgba(22,199,132,.1);color:var(--g);}
.t-warn{background:rgba(249,115,22,.1);color:var(--o);}
.t-late{background:rgba(239,68,68,.1);color:var(--r);}

/* Coluna vazia */
.col-empty{padding:8px 6px;text-align:center;font-size:8px;color:var(--muted);border:1px dashed var(--b1);border-radius:5px;opacity:.5;}

/* ── MODAL ───────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal{background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:20px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:12px;}
.modal-title{font-size:14px;font-weight:800;}
.form-row{display:flex;flex-direction:column;gap:4px;}
.form-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.form-inp{background:var(--s1);border:1px solid var(--b2);border-radius:6px;padding:7px 10px;color:var(--text);font-size:11px;font-family:var(--fm);}
.form-inp:focus{outline:none;border-color:var(--y);}
.form-sel{background:var(--s1);border:1px solid var(--b2);border-radius:6px;padding:7px 10px;color:var(--text);font-size:11px;font-family:var(--fm);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-c{background:transparent;border:1px solid var(--b2);border-radius:6px;padding:7px 14px;color:var(--muted);font-size:10px;cursor:pointer;font-family:var(--fm);}
.btn-s{background:var(--y);border:none;border-radius:6px;padding:7px 16px;color:#000;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--fm);}

/* ── TOAST ───────────────────────────────────────────── */
.toast{position:fixed;bottom:16px;right:16px;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:10px 16px;font-size:11px;z-index:9999;opacity:0;transform:translateY(6px);transition:.2s;pointer-events:none;max-width:280px;}
.toast.show{opacity:1;transform:none;}

/* ── SCROLLBAR ───────────────────────────────────────── */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">
    <div class="hdr-dot"></div>
    <div class="hdr-name">Reparo<em>Eletro</em></div>
  </div>
  <div class="hdr-sep"></div>
  <div class="hdr-lbl">⚡ Pipe ADM</div>
  <div class="hdr-right">
    <div class="sync-st" id="sync-dot"></div>
    <span id="last-sync" style="font-size:9px;color:var(--muted);">—</span>
    <button class="hdr-btn" onclick="syncPipefy()" id="btn-sync">⟳ Sincronizar</button>
    <button class="hdr-btn primary" onclick="abrirModalNovo()">+ Nova Ficha</button>
  </div>
</div>

<!-- STATS -->
<div class="stats" id="stats-bar">
  <span class="stat"><span class="stat-lbl">Total</span><span class="stat-val" id="st-total" style="color:var(--y)">—</span></span>
  <div class="sdiv"></div>
  <span class="stat"><span class="stat-lbl">Aguardando</span><span class="stat-val" id="st-aguard" style="color:var(--y)">—</span></span>
  <div class="sdiv"></div>
  <span class="stat"><span class="stat-lbl">Aprovados</span><span class="stat-val" id="st-aprov" style="color:var(--g)">—</span></span>
  <div class="sdiv"></div>
  <span class="stat"><span class="stat-lbl">Receber</span><span class="stat-val" id="st-receber" style="color:var(--g)">—</span></span>
  <div class="sdiv"></div>
  <span class="stat"><span class="stat-lbl">ERP</span><span class="stat-val" id="st-erp" style="color:var(--g)">—</span></span>
</div>

<!-- BOARD -->
<div class="board" id="board"></div>

<!-- MODAL NOVA FICHA -->
<div class="overlay" id="modal-novo" style="display:none;" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-title">Nova Ficha</div>
    <div class="form-row"><div class="form-lbl">Nome *</div><input class="form-inp" id="f-nome" placeholder="Ex: João Silva"></div>
    <div class="form-row"><div class="form-lbl">Telefone</div><input class="form-inp" id="f-tel" placeholder="(31) 9 9999-0000"></div>
    <div class="form-row"><div class="form-lbl">Equipamento</div><input class="form-inp" id="f-equip" placeholder="Ex: Microondas Electrolux"></div>
    <div class="form-row"><div class="form-lbl">Valor</div><input class="form-inp" id="f-valor" type="number" placeholder="0.00"></div>
    <div class="form-row"><div class="form-lbl">Fase</div><select class="form-sel" id="f-phase"></select></div>
    <div class="modal-btns">
      <button class="btn-c" onclick="fecharModal()">Cancelar</button>
      <button class="btn-s" onclick="salvarNovo()">✅ Criar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Configuração das fases ─────────────────────────────────────────────────
const PHASE_COLORS = {
  aguardando_aprovacao:'#f5c800', aprovados:'#16c784', video_enviado:'#a855f7',
  analise_compra:'#3b9eff', equipamento_comprado:'#3b9eff', programar_entrega:'#f5c800',
  solicitar_entrega:'#f97316', entrega_solicitada:'#f97316', receber:'#16c784', erp:'#16c784'
};

const SYNC_FASES = [
  { phaseId:'334875152', local:'aguardando_aprovacao', nome:'Aguardando Aprovação' },
  { phaseId:'334879132', local:'aprovados',            nome:'Aprovado' },
  { phaseId:'342533760', local:'video_enviado',        nome:'Vídeo Enviado' },
  { phaseId:'342584529', local:'analise_compra',       nome:'Análise de Compra' },
  { phaseId:'338439265', local:'programar_entrega',    nome:'Programar Entrega' },
  { phaseId:'334875186', local:'solicitar_entrega',    nome:'Solicitar Entrega' },
  { phaseId:'335066834', local:'entrega_solicitada',   nome:'Entrega Solicitada' },
  { phaseId:'334875204', local:'receber',              nome:'Receber' },
  { phaseId:'339008925', local:'erp',                  nome:'ERP' },
];

const PHASES = [];
let cards = [];

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show';
  t.style.borderColor=ok?'rgba(22,199,132,.3)':'rgba(239,68,68,.3)';
  setTimeout(()=>t.className='toast',2800);
}
async function api(action,body){
  const r=await fetch('/api/pipe?action='+action, body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});
  return r.json();
}
function fmtTempo(ts){
  if(!ts)return'';
  const d=(Date.now()-new Date(ts).getTime())/1000;
  if(d<3600)return Math.floor(d/60)+'m';
  if(d<86400)return Math.floor(d/3600)+'h';
  return Math.floor(d/86400)+'d';
}
function timerBadge(c){
  if(!c.aguardandoDesde||!['aguardando_aprovacao','sem_resposta'].includes(c.phase))return'';
  const h=(Date.now()-new Date(c.aguardandoDesde).getTime())/3600000;
  if(h<24)return'<div class="card-timer t-ok">⏱'+Math.round(h)+'h</div>';
  if(h<48)return'<div class="card-timer t-warn">⚠️'+Math.round(h)+'h</div>';
  return'<div class="card-timer t-late">🔴'+Math.round(h)+'h</div>';
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  // Stats
  document.getElementById('st-total').textContent   = cards.length;
  document.getElementById('st-aguard').textContent  = cards.filter(c=>c.phase==='aguardando_aprovacao').length;
  document.getElementById('st-aprov').textContent   = cards.filter(c=>c.phase==='aprovados').length;
  document.getElementById('st-receber').textContent = cards.filter(c=>c.phase==='receber').length;
  document.getElementById('st-erp').textContent     = cards.filter(c=>c.phase==='erp').length;

  const board = document.getElementById('board');
  board.innerHTML = PHASES.map(ph=>{
    const cor = PHASE_COLORS[ph.id] || '#555';
    const phCards = cards.filter(c=>c.phase===ph.id);
    const opts = PHASES.filter(p=>p.id!==ph.id).map(p=>'<option value="'+p.id+'">'+p.name+'</option>').join('');

    const cardsHtml = phCards.length===0
      ? '<div class="col-empty">vazio</div>'
      : phCards.map(c=>{
          const acBadge = c.analiseCompra?'<div class="card-ac">🛒 Compra</div>':'';
          const pfBadge = c.pipefyId?'<span class="card-pf">PF</span>':'';
          const valHtml = c.valor>0?'<div class="card-val">R$'+c.valor.toLocaleString('pt-BR',{minimumFractionDigits:0})+'</div>':'';
          const equipHtml = c.equipamento?'<div class="card-equip">'+esc(c.equipamento.substring(0,40))+'</div>':'';
          return '<div class="card" id="card-'+c.id+'">'+
            '<div class="card-lb" style="background:'+cor+'"></div>'+
            '<div class="card-top">'+
              '<div class="card-nome">'+esc(c.nomeContato)+'</div>'+
              pfBadge+
            '</div>'+
            equipHtml+
            valHtml+
            timerBadge(c)+
            acBadge+
            '<div class="card-actions">'+
              '<select class="ca-sel" onchange="moverCard(\''+c.id+'\',this.value);this.value=\'\'" >'+
                '<option value="">↕ Mover</option>'+opts+
              '</select>'+
              '<button class="ca-btn '+(c.analiseCompra?'ca-ac':'')+'" onclick="toggleAC(\''+c.id+'\')" title="Análise de Compra">🛒</button>'+
              '<button class="ca-btn" onclick="excluir(\''+c.id+'\')" title="Excluir">✕</button>'+
            '</div>'+
          '</div>';
        }).join('');

    return '<div class="col">'+
      '<div class="col-hdr">'+
        '<div class="col-stripe" style="background:'+cor+'"></div>'+
        '<div class="col-title" title="'+ph.name+'">'+ph.name+'</div>'+
        '<div class="col-n">'+phCards.length+'</div>'+
      '</div>'+
      '<div class="col-body">'+cardsHtml+'</div>'+
    '</div>';
  }).join('');
}

// ── Ações ──────────────────────────────────────────────────────────────────
async function moverCard(id,phase){
  if(!phase)return;
  const r=await api('mover',{id,phase});
  if(r.ok){const c=cards.find(x=>x.id===id);if(c)c.phase=phase;render();toast('Movido → '+PHASES.find(p=>p.id===phase)?.name);}
  else toast(r.error||'Erro',false);
}
async function toggleAC(id){
  const r=await api('toggle-analise-compra',{id});
  if(r.ok){const c=cards.find(x=>x.id===id);if(c)c.analiseCompra=r.analiseCompra;render();}
}
async function excluir(id){
  if(!confirm('Remover ficha?'))return;
  const r=await api('excluir',{id});
  if(r.ok){cards=cards.filter(c=>c.id!==id);render();toast('Removida');}
}

// ── Sync Pipefy ────────────────────────────────────────────────────────────
async function syncPipefy(){
  const btn=document.getElementById('btn-sync');
  const dot=document.getElementById('sync-dot');
  btn.disabled=true; dot.className='sync-st spin';
  let totalAdded=0, totalSkipped=0;
  for(let i=0;i<SYNC_FASES.length;i++){
    const fase=SYNC_FASES[i];
    const pct=Math.round(((i+1)/SYNC_FASES.length)*100);
    btn.textContent='⟳ '+pct+'% '+fase.nome+'…';
    try{
      const r=await fetch('/api/pipe?action=sync-fase&phaseId='+fase.phaseId+'&phaseLocal='+fase.local);
      const d=await r.json();
      if(d.ok){totalAdded+=d.added||0;totalSkipped+=d.skipped||0;}
    }catch(e){console.warn('Fase falhou:',fase.nome);}
  }
  btn.textContent='⟳ Sincronizar';btn.disabled=false;dot.className='sync-st';
  toast('✅ '+totalAdded+' importadas · '+totalSkipped+' existentes');
  await load();
}

// ── Modal Nova Ficha ───────────────────────────────────────────────────────
function abrirModalNovo(){
  const sel=document.getElementById('f-phase');
  sel.innerHTML=PHASES.map(p=>'<option value="'+p.id+'">'+p.name+'</option>').join('');
  document.getElementById('modal-novo').style.display='flex';
}
function fecharModal(){document.getElementById('modal-novo').style.display='none';}
async function salvarNovo(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome){toast('Nome obrigatório',false);return;}
  const r=await api('add-card',{
    nomeContato:nome, telefone:document.getElementById('f-tel').value.trim(),
    equipamento:document.getElementById('f-equip').value.trim(),
    valor:parseFloat(document.getElementById('f-valor').value)||0,
    phase:document.getElementById('f-phase').value, origem:'manual'
  });
  if(r.ok&&r.card){cards.unshift(r.card);render();fecharModal();toast('✅ Ficha criada');}
  else toast(r.error||'Erro',false);
}

// ── Load ───────────────────────────────────────────────────────────────────
async function load(){
  const r=await api('load');
  if(r.ok){
    PHASES.length=0;
    (r.phases||[]).forEach(p=>PHASES.push(p));
    cards=r.cards||[];
    if(r.lastSync){
      const d=new Date(r.lastSync);
      document.getElementById('last-sync').textContent=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    }
    render();
  }
}

load();
setInterval(load,90000);
</script>
</body>
</html>
