<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='18,2 8,18 15,18 14,30 24,14 17,14' fill='%23f5c800' stroke='%23f5c800' stroke-linejoin='round'/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pipe — Reparo Eletro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#252525;
  --text:#fff;--muted:#888;--dim:#333;
  --accent:#f5c800;--green:#22c55e;--red:#ef4444;--blue:#3b9eff;--purple:#a855f7;--orange:#f97316;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;--fb:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;display:flex;flex-direction:column;}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:2px solid var(--accent);background:var(--bg);position:sticky;top:0;z-index:200;}
.logo{font-family:var(--fh);font-size:15px;font-weight:800;}
.logo span{color:var(--accent);}
.logo em{color:var(--muted);font-style:normal;font-size:11px;font-family:var(--fm);margin-left:8px;}
.header-right{display:flex;align-items:center;gap:10px;}
.hbtn{font-family:var(--fm);font-size:10px;padding:6px 13px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;text-decoration:none;transition:all .15s;}
.hbtn:hover{color:var(--text);border-color:var(--accent);}
.hbtn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.hbtn.primary:hover{background:#e6b800;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.sync-dot.spin{background:var(--accent);animation:pulse .8s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sync-time{font-family:var(--fm);font-size:9px;color:var(--muted);}

/* ── STATS ── */
.stats-bar{display:flex;gap:16px;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--bg);align-items:center;flex-wrap:wrap;}
.stat-pill{display:flex;align-items:center;gap:5px;}
.stat-lbl{font-family:var(--fm);font-size:9px;color:var(--muted);}
.stat-val{font-family:var(--fm);font-size:12px;font-weight:600;}

/* ── BOARD ── */
.board{display:flex;gap:12px;padding:16px 12px;overflow-x:auto;flex:1;align-items:flex-start;}
.board::-webkit-scrollbar{height:4px;}
.board::-webkit-scrollbar-thumb{background:var(--border);}

/* ── COLUNA ── */
.col{flex-shrink:0;width:290px;display:flex;flex-direction:column;gap:10px;}
.col-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;background:var(--surface);position:relative;overflow:hidden;}
.col-top-stripe{position:absolute;top:0;left:0;right:0;height:2px;}
.col-title{font-family:var(--fh);font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;}
.col-dot{width:8px;height:8px;border-radius:50%;}
.col-count{font-family:var(--fm);font-size:10px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:10px;}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;transition:border .15s;position:relative;overflow:hidden;}
.card-left-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px;}
.card:hover{border-color:#333;}
.card-id{font-family:var(--fm);font-size:9px;color:var(--muted);}
.card-nome{font-weight:600;font-size:14px;}
.card-equip{font-family:var(--fm);font-size:10px;color:var(--accent);}
.card-defeito{font-size:11px;color:var(--muted);line-height:1.4;}
.card-time{font-family:var(--fm);font-size:9px;color:var(--dim);}
.card-val{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--green);}
.card-ac{display:inline-flex;align-items:center;gap:3px;font-family:var(--fm);font-size:9px;background:rgba(59,158,255,.1);color:var(--blue);border:1px solid rgba(59,158,255,.2);border-radius:5px;padding:2px 6px;}
.card-pipefy{font-family:var(--fm);font-size:8px;color:var(--dim);background:var(--surface2);border-radius:4px;padding:1px 5px;}
.card-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;}
.cbtn{font-family:var(--fm);font-size:10px;font-weight:600;padding:6px 12px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;letter-spacing:.3px;}
.cbtn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.cbtn-outline:hover{border-color:var(--text);color:var(--text);}
.cbtn-yellow{background:rgba(245,200,0,.12);border:1px solid rgba(245,200,0,.3);color:var(--accent);}
.cbtn-yellow:hover{background:rgba(245,200,0,.22);}
.cbtn-red{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red);}
.cbtn-red:hover{background:rgba(239,68,68,.18);}
.cbtn-blue{background:rgba(59,158,255,.08);border:1px solid rgba(59,158,255,.2);color:var(--blue);}
.cbtn-blue:hover{background:rgba(59,158,255,.18);}

/* Timer badge */
.timer-badge{display:inline-block;font-family:var(--fm);font-size:9px;padding:2px 7px;border-radius:5px;font-weight:600;}
.timer-ok{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.timer-warn{background:rgba(249,115,22,.1);color:var(--orange);border:1px solid rgba(249,115,22,.2);}
.timer-late{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}

/* Expansão dados */
.card-expand{display:none;border-top:1px solid var(--border);padding-top:10px;margin-top:2px;display:flex;flex-direction:column;gap:6px;}
.card-expand.hidden{display:none!important;}
.expand-row{display:flex;gap:6px;align-items:flex-start;}
.expand-lbl{font-family:var(--fm);font-size:9px;color:var(--muted);min-width:60px;flex-shrink:0;}
.expand-val{font-size:11px;color:var(--text);line-height:1.4;word-break:break-word;}

/* Move select */
.move-sel{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 8px;color:var(--muted);font-family:var(--fm);font-size:10px;cursor:pointer;}
.move-sel:hover{border-color:var(--accent);}

/* ── OVERLAY MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:14px;}
.modal-title{font-family:var(--fh);font-size:16px;font-weight:800;}
.form-row{display:flex;flex-direction:column;gap:5px;}
.form-lbl{font-family:var(--fm);font-size:9px;color:var(--muted);text-transform:uppercase;}
.form-inp{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--fb);font-size:12px;}
.form-inp:focus{outline:none;border-color:var(--accent);}
.form-sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--fb);font-size:12px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-family:var(--fm);font-size:11px;z-index:9999;opacity:0;transform:translateY(6px);transition:.22s;pointer-events:none;}
.toast.show{opacity:1;transform:none;}

@media(max-width:600px){.col{width:260px;}.cbtn{font-size:9px;padding:5px 9px;}}
</style>
</head>
<body>

<header>
  <div class="logo">Reparo<span>Eletro</span><em>⚡ Pipe ADM</em></div>
  <div class="header-right">
    <div class="sync-dot" id="sync-dot"></div>
    <span class="sync-time" id="last-sync">—</span>
    <button class="hbtn" onclick="syncPipefy()" id="btn-sync">⟳ Sincronizar Pipefy</button>
    <button class="hbtn" onclick="showRelatorio()" id="btn-rel">📊 Relatório</button>
    <button class="hbtn primary" onclick="abrirModalNovo()">+ Nova Ficha</button>
  </div>
</header>

<div class="stats-bar" id="stats-bar">
  <div class="stat-pill"><span class="stat-lbl">Total</span>&nbsp;<span class="stat-val" id="st-total" style="color:var(--accent)">—</span></div>
  <div class="stat-pill"><span class="stat-lbl">Aguardando</span>&nbsp;<span class="stat-val" id="st-aguard" style="color:var(--accent)">—</span></div>
  <div class="stat-pill"><span class="stat-lbl">Aprovados</span>&nbsp;<span class="stat-val" id="st-aprov" style="color:var(--green)">—</span></div>
  <div class="stat-pill"><span class="stat-lbl">Vídeo Enviado</span>&nbsp;<span class="stat-val" id="st-video" style="color:var(--purple)">—</span></div>
  <div class="stat-pill"><span class="stat-lbl">Receber</span>&nbsp;<span class="stat-val" id="st-receber" style="color:var(--green)">—</span></div>
  <div class="stat-pill"><span class="stat-lbl">ERP</span>&nbsp;<span class="stat-val" id="st-erp" style="color:var(--green)">—</span></div>
</div>

<div class="board" id="board"></div>

<!-- MODAL NOVA FICHA -->
<div class="ov" id="modal-novo" style="display:none;" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-title">Nova Ficha no Pipe</div>
    <div class="form-row"><div class="form-lbl">Nome do cliente *</div><input class="form-inp" id="f-nome" placeholder="Ex: João Silva"></div>
    <div class="form-row"><div class="form-lbl">Telefone</div><input class="form-inp" id="f-tel" placeholder="(31) 9 9999-0000"></div>
    <div class="form-row"><div class="form-lbl">Equipamento</div><input class="form-inp" id="f-equip" placeholder="Ex: Microondas Electrolux"></div>
    <div class="form-row"><div class="form-lbl">Valor estimado</div><input class="form-inp" id="f-valor" type="number" placeholder="0.00"></div>
    <div class="form-row"><div class="form-lbl">Fase inicial</div><select class="form-sel" id="f-phase"></select></div>
    <div class="modal-btns">
      <button class="cbtn cbtn-outline" onclick="fecharModal()">Cancelar</button>
      <button class="cbtn cbtn-yellow" onclick="salvarNovo()">✅ Criar Ficha</button>
    </div>
  </div>
</div>


<!-- PAINEL RELATÓRIO -->
<div id="painel-rel" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;overflow-y:auto;padding:20px;">
  <div style="max-width:900px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;display:flex;flex-direction:column;gap:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-family:var(--fh);font-size:18px;font-weight:800;">📊 Relatório de Divergências</div>
        <div style="font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:3px;">Compara nosso sistema (Redis) com o Pipefy em tempo real</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="hbtn" onclick="rodarComparacao()" id="btn-rodar">▶ Rodar agora</button>
        <button class="hbtn" onclick="carregarHistorico()" id="btn-hist">🕓 Histórico</button>
        <button class="hbtn" onclick="fecharRelatorio()">✕ Fechar</button>
      </div>
    </div>
    <div id="rel-resultado"></div>
    <div id="rel-historico" style="display:none;"></div>
  </div>
</div>


<div class="toast" id="toast"></div>

<script>
const PHASE_COLORS = {
  aguardando_aprovacao:'#f5c800',aprovados:'#22c55e',video_enviado:'#a855f7',
  analise_compra:'#3b9eff',equipamento_comprado:'#3b9eff',programar_entrega:'#f5c800',
  solicitar_entrega:'#f97316',entrega_solicitada:'#f97316',receber:'#22c55e',erp:'#22c55e'
};
const SYNC_FASES=[
  {phaseId:'334875152',local:'aguardando_aprovacao',nome:'Aguardando Aprovação'},
  {phaseId:'334879132',local:'aprovados',nome:'Aprovado'},
  {phaseId:'342533760',local:'video_enviado',nome:'Vídeo Enviado'},
  {phaseId:'342584529',local:'analise_compra',nome:'Análise de Compra'},
  {phaseId:'338439265',local:'programar_entrega',nome:'Programar Entrega'},
  {phaseId:'334875186',local:'solicitar_entrega',nome:'Solicitar Entrega'},
  {phaseId:'335066834',local:'entrega_solicitada',nome:'Entrega Solicitada'},
  {phaseId:'334875204',local:'receber',nome:'Receber'},
  {phaseId:'339008925',local:'erp',nome:'ERP'},
];
const PHASES=[];
let cards=[];

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show';
  t.style.borderColor=ok?'rgba(34,197,94,.3)':'rgba(239,68,68,.3)';
  setTimeout(()=>t.className='toast',2800);
}
async function api(action,body){
  const r=await fetch('/api/pipe?action='+action,body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{});
  return r.json();
}
function fmtDate(ts){
  if(!ts)return'—';
  return new Date(ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'});
}
function timerHTML(c){
  if(!c.aguardandoDesde||c.phase!=='aguardando_aprovacao')return'';
  const h=(Date.now()-new Date(c.aguardandoDesde).getTime())/3600000;
  if(h<24)return'<span class="timer-badge timer-ok">⏱ '+Math.round(h)+'h</span>';
  if(h<48)return'<span class="timer-badge timer-warn">⚠️ '+Math.round(h)+'h sem resposta</span>';
  return'<span class="timer-badge timer-late">🔴 '+Math.round(h)+'h — AÇÃO NECESSÁRIA</span>';
}

function toggleDados(id){
  const el=document.getElementById('expand-'+id);
  if(el)el.classList.toggle('hidden');
}

function render(){
  document.getElementById('st-total').textContent=cards.length;
  document.getElementById('st-aguard').textContent=cards.filter(c=>c.phase==='aguardando_aprovacao').length;
  document.getElementById('st-aprov').textContent=cards.filter(c=>c.phase==='aprovados').length;
  document.getElementById('st-video').textContent=cards.filter(c=>c.phase==='video_enviado').length;
  document.getElementById('st-receber').textContent=cards.filter(c=>c.phase==='receber').length;
  document.getElementById('st-erp').textContent=cards.filter(c=>c.phase==='erp').length;

  const board=document.getElementById('board');
  board.innerHTML=PHASES.map(ph=>{
    const cor=PHASE_COLORS[ph.id]||'#555';
    const phCards=cards.filter(c=>c.phase===ph.id);
    const opts=PHASES.filter(p=>p.id!==ph.id).map(p=>'<option value="'+p.id+'">'+p.name+'</option>').join('');

    const cardsHtml=phCards.map(c=>{
      const pfBadge=c.pipefyId?'<span class="card-pipefy">PF·'+c.pipefyId.slice(-5)+'</span>':'';
      const valHtml=c.valor>0?'<div class="card-val">R$ '+c.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div>':'';
      const acBadge=c.analiseCompra?'<div class="card-ac">🛒 Análise de Compra</div>':'';
      const equipHtml=c.equipamento?'<div class="card-equip">'+esc(c.equipamento.substring(0,60))+'</div>':'';
      const descHtml=c.descricao&&c.descricao!==c.equipamento?'<div class="card-defeito">'+esc(c.descricao.substring(0,80))+(c.descricao.length>80?'…':'')+'</div>':'';
      return '<div class="card" id="card-'+c.id+'">'+
        '<div class="card-left-bar" style="background:'+cor+'"></div>'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;">'+
          '<span class="card-id">'+esc(c.id)+'</span>'+
          pfBadge+
        '</div>'+
        '<div class="card-nome">'+esc(c.nomeContato)+'</div>'+
        equipHtml+
        descHtml+
        valHtml+
        timerHTML(c)+
        acBadge+
        '<div class="card-time">'+fmtDate(c.movedAt)+'&nbsp;·&nbsp;'+esc(c.origem)+'</div>'+
        '<div class="card-actions">'+
          '<select class="move-sel" onchange="moverCard(\''+c.id+'\',this.value);this.value=\'\'" >'+
            '<option value="">↕ Mover para…</option>'+opts+
          '</select>'+
          '<button class="cbtn cbtn-outline" onclick="toggleDados(\''+c.id+'\')">📋 Ver dados</button>'+
          '<button class="cbtn cbtn-blue'+(c.analiseCompra?' active':'')+'" onclick="toggleAC(\''+c.id+'\')" title="Marcar Análise de Compra">🛒</button>'+
          '<button class="cbtn cbtn-red" onclick="excluir(\''+c.id+'\')">✕</button>'+
        '</div>'+
        '<div class="card-expand hidden" id="expand-'+c.id+'">'+
          (c.telefone?'<div class="expand-row"><span class="expand-lbl">Telefone</span><span class="expand-val">'+esc(c.telefone)+'</span></div>':'')+
          (c.descricao?'<div class="expand-row"><span class="expand-lbl">Descrição</span><span class="expand-val">'+esc(c.descricao)+'</span></div>':'')+
          '<div class="expand-row"><span class="expand-lbl">Origem</span><span class="expand-val">'+esc(c.origem)+'</span></div>'+
          '<div class="expand-row"><span class="expand-lbl">Criado em</span><span class="expand-val">'+fmtDate(c.criadoEm)+'</span></div>'+
          (c.pipefyId?'<div class="expand-row"><span class="expand-lbl">Pipefy ID</span><span class="expand-val">'+esc(c.pipefyId)+'</span></div>':'')+
        '</div>'+
      '</div>';
    }).join('')||'<div style="color:var(--dim);font-family:var(--fm);font-size:10px;padding:8px;">— vazio —</div>';

    return '<div class="col">'+
      '<div class="col-header">'+
        '<div class="col-top-stripe" style="background:'+cor+'"></div>'+
        '<div class="col-title"><div class="col-dot" style="background:'+cor+'"></div>'+ph.name+'</div>'+
        '<div class="col-count">'+phCards.length+'</div>'+
      '</div>'+
      cardsHtml+
    '</div>';
  }).join('');
}

async function moverCard(id,phase){
  if(!phase)return;
  const r=await api('mover',{id,phase});
  if(r.ok){const c=cards.find(x=>x.id===id);if(c)c.phase=phase;render();toast('Movido → '+PHASES.find(p=>p.id===phase)?.name);}
  else toast(r.error||'Erro',false);
}
async function toggleAC(id){
  const r=await api('toggle-analise-compra',{id});
  if(r.ok){const c=cards.find(x=>x.id===id);if(c)c.analiseCompra=r.analiseCompra;render();}
}
async function excluir(id){
  if(!confirm('Remover esta ficha do pipe?'))return;
  const r=await api('excluir',{id});
  if(r.ok){cards=cards.filter(c=>c.id!==id);render();toast('Ficha removida');}
}

async function syncPipefy(){
  const btn=document.getElementById('btn-sync');
  const dot=document.getElementById('sync-dot');
  btn.disabled=true;dot.className='sync-dot spin';
  let totalAdded=0,totalSkipped=0;
  for(let i=0;i<SYNC_FASES.length;i++){
    const fase=SYNC_FASES[i];
    const pct=Math.round(((i+1)/SYNC_FASES.length)*100);
    btn.textContent='⟳ '+pct+'% — '+fase.nome+'…';
    try{
      const r=await fetch('/api/pipe?action=sync-fase&phaseId='+fase.phaseId+'&phaseLocal='+fase.local);
      const d=await r.json();
      if(d.ok){totalAdded+=d.added||0;totalSkipped+=d.skipped||0;}
    }catch(e){console.warn('Fase falhou:',fase.nome);}
  }
  btn.textContent='⟳ Sincronizar Pipefy';btn.disabled=false;dot.className='sync-dot';
  toast('✅ '+totalAdded+' importadas, '+totalSkipped+' já existiam');
  await load();
}

function abrirModalNovo(){
  const sel=document.getElementById('f-phase');
  sel.innerHTML=PHASES.map(p=>'<option value="'+p.id+'">'+p.name+'</option>').join('');
  document.getElementById('modal-novo').style.display='flex';
}
function fecharModal(){document.getElementById('modal-novo').style.display='none';}
async function salvarNovo(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome){toast('Nome obrigatório',false);return;}
  const r=await api('add-card',{
    nomeContato:nome,
    telefone:document.getElementById('f-tel').value.trim(),
    equipamento:document.getElementById('f-equip').value.trim(),
    valor:parseFloat(document.getElementById('f-valor').value)||0,
    phase:document.getElementById('f-phase').value,
    origem:'manual'
  });
  if(r.ok&&r.card){cards.unshift(r.card);render();fecharModal();toast('✅ Ficha criada!');}
  else toast(r.error||'Erro',false);
}

async function load(){
  const r=await api('load');
  if(!r.ok)return;
  PHASES.length=0;
  (r.phases||[]).forEach(p=>PHASES.push(p));
  cards=r.cards||[];
  if(r.lastSync){
    const d=new Date(r.lastSync);
    document.getElementById('last-sync').textContent=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  render();
}

load();
setInterval(load,90000);
</script>
</body>
