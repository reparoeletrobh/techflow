<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='18,2 8,18 15,18 14,30 24,14 17,14' fill='%2322c55e' stroke='%2322c55e' stroke-linejoin='round'/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#252525;
  --text:#fff;--muted:#888;--dim:#333;
  --accent:#f5c800;--green:#22c55e;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;--fb:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;display:flex;flex-direction:column;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:2px solid var(--accent);background:var(--bg);position:sticky;top:0;z-index:100;}
.logo{font-family:var(--fh);font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.logo-icon{width:26px;height:26px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;}
.logo span{color:var(--accent);}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);padding:0 24px;}
.tab{font-family:var(--fm);font-size:12px;font-weight:600;padding:12px 20px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.page{display:none;flex:1;}
.page.active{display:flex;flex-direction:column;}
#page-cadastro{align-items:center;justify-content:center;padding:32px 20px;}
.chat-wrap{width:100%;max-width:560px;display:flex;flex-direction:column;gap:0;height:min(620px,80vh);background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);}
.msg{display:flex;flex-direction:column;max-width:85%;}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;}
.bubble{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;}
.msg.bot  .bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px;}
.msg.user .bubble{background:var(--accent);color:#000;font-weight:500;border-bottom-right-radius:3px;}
.typing-wrap{align-self:flex-start;}
.typing{display:flex;gap:4px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:3px;width:fit-content;}
.td{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
.td:nth-child(2){animation-delay:0.2s;}
.td:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-input-area{border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:8px;align-items:flex-end;background:var(--surface);}
.chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-family:var(--fb);font-size:13px;color:var(--text);outline:none;resize:none;max-height:160px;line-height:1.4;transition:border 0.15s;}
.chat-input:focus{border-color:var(--accent);}
.send-btn{width:40px;height:40px;border-radius:9px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.send-btn:hover{filter:brightness(1.1);}
.send-btn:disabled{background:var(--dim);cursor:not-allowed;}
.send-btn svg{width:16px;height:16px;fill:#000;}
.qr-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.qr-btn{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--accent);background:rgba(245,200,0,0.08);color:var(--accent);cursor:pointer;font-family:var(--fb);transition:all 0.15s;}
.qr-btn:hover{background:var(--accent);color:#000;}
.toast{position:fixed;bottom:18px;right:18px;background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:10px;padding:11px 14px;font-family:var(--fm);font-size:11px;display:flex;align-items:center;gap:8px;transform:translateY(70px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:9999;}
.toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">📋</div>Reparo<span>Eletro</span> — Orçamento</div>
</header>
<div class="tabs">
  <button class="tab active" id="tab-cadastro" onclick="showPage('cadastro')">📝 Cadastro</button>
  <button class="tab" id="tab-orcamento" onclick="showPage('orcamento')">💬 Orçamento</button>
</div>
<div class="page active" id="page-cadastro">
  <div style="display:flex;align-items:center;justify-content:center;flex:1;padding:32px 20px;">
    <div class="chat-wrap">
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-area" id="input-area">
        <textarea class="chat-input" id="chat-input" placeholder="Cole a ficha aqui..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
<div class="page" id="page-orcamento">
  <div style="display:flex;align-items:center;justify-content:center;flex:1;padding:40px 20px;">
    <div style="font-family:var(--fm);font-size:12px;color:var(--muted);text-align:center;">Em breve...</div>
  </div>
</div>
<div class="toast" id="toast">
  <span id="t-icon">✅</span>
  <div><strong id="t-title"></strong><br><span id="t-body" style="color:var(--muted);font-size:10px;"></span></div>
</div>
<script>
var phases = [], solicitarColetaId = null;
var botando = false, aguardandoFicha = true, aguardandoConf = false;
var dados = {};

async function init() {
  try {
    var r = await fetch('/api/orcamento?action=estrutura');
    var d = await r.json();
    if (d.ok) {
      phases = d.phases || [];
      var f = phases.find(function(p){ return p.name.toLowerCase().indexOf('solicitar coleta') >= 0; });
      if (f) solicitarColetaId = f.id;
    }
  } catch(e) {}
  addBot('Ola! Cole a ficha do cliente abaixo para cadastrar no Pipefy.');
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('tab-cadastro').classList.toggle('active', name==='cadastro');
  document.getElementById('tab-orcamento').classList.toggle('active', name==='orcamento');
  document.getElementById('page-'+name).classList.add('active');
}

function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,160)+'px'; }
function scrollDown(){ var m=document.getElementById('chat-msgs'); setTimeout(function(){ m.scrollTop=m.scrollHeight; },60); }

function fmt(txt){
  return txt
    .replace(/Nome:/g,'<strong>Nome:</strong>')
    .replace(/Telefone:/g,'<strong>Telefone:</strong>')
    .replace(/Aparelho:/g,'<strong>Aparelho:</strong>')
    .replace(/Defeito:/g,'<strong>Defeito:</strong>')
    .replace(/Endereco:/g,'<strong>Endereco:</strong>')
    .replace(/\n/g,'<br>');
}

function addBot(txt, qrs) {
  var m=document.getElementById('chat-msgs');
  var div=document.createElement('div'); div.className='msg bot';
  div.innerHTML='<div class="bubble">'+fmt(txt)+'</div>';
  if (qrs && qrs.length) {
    var qrDiv=document.createElement('div'); qrDiv.className='qr-wrap';
    qrs.forEach(function(q){
      var btn=document.createElement('button'); btn.className='qr-btn';
      btn.textContent=q;
      btn.onclick=function(){ sendMsg(q); };
      qrDiv.appendChild(btn);
    });
    div.appendChild(qrDiv);
  }
  m.appendChild(div); scrollDown();
}

function addUser(txt) {
  var m=document.getElementById('chat-msgs');
  var div=document.createElement('div'); div.className='msg user';
  div.innerHTML='<div class="bubble">'+txt.replace(/\n/g,'<br>')+'</div>';
  m.appendChild(div); scrollDown();
}

function showTyping(){
  var m=document.getElementById('chat-msgs');
  var div=document.createElement('div'); div.className='typing-wrap'; div.id='typing';
  div.innerHTML='<div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  m.appendChild(div); scrollDown();
}
function hideTyping(){ var t=document.getElementById('typing'); if(t) t.remove(); }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }

function parseFicha(txt) {
  var lines = txt.split(/[\r\n]+/);
  function get(keys) {
    for (var i=0; i<keys.length; i++) {
      for (var j=0; j<lines.length; j++) {
        var line = lines[j];
        var col  = line.indexOf(':');
        if (col < 0) continue;
        var label = line.slice(0, col).toLowerCase().trim().replace(/[^a-z]/g,'');
        var key   = keys[i].toLowerCase().replace(/[^a-z]/g,'');
        if (label.indexOf(key) >= 0 || key.indexOf(label) >= 0) {
          var val = line.slice(col+1).trim();
          if (val) return val;
        }
      }
    }
    return '';
  }
  return {
    nome:     get(['nome']),
    telefone: get(['telefone','fone','cel','whatsapp','tel']),
    aparelho: get(['aparelho','equipamento','produto']),
    defeito:  get(['defeito','problema','defeit','falha']),
    endereco: get(['cep','endereco','endereço','end','rua','logradouro']),
  };
}

async function sendMsg(txt) {
  if (botando) return;
  var input=document.getElementById('chat-input');
  var msg=(txt||input.value).trim();
  if (!msg) return;
  input.value=''; input.style.height='auto';
  addUser(msg);

  if (aguardandoConf) {
    if (msg==='Confirmar') {
      aguardandoConf=false;
      await criarCard();
    } else {
      aguardandoConf=false; aguardandoFicha=true; dados={};
      showTyping(); await delay(500); hideTyping();
      addBot('Tudo bem! Cole a ficha corrigida.');
    }
    return;
  }

  if (aguardandoFicha) {
    botando=true; document.getElementById('send-btn').disabled=true;
    showTyping(); await delay(700); hideTyping();
    dados = parseFicha(msg);
    var faltando=[];
    if (!dados.nome)     faltando.push('Nome');
    if (!dados.telefone) faltando.push('Telefone');
    if (!dados.aparelho) faltando.push('Aparelho');
    if (!dados.defeito)  faltando.push('Defeito');
    if (faltando.length) {
      addBot('Nao consegui identificar: ' + faltando.join(', ') + '.\n\nVerifique o formato e cole novamente.');
      botando=false; document.getElementById('send-btn').disabled=false;
      return;
    }
    aguardandoFicha=false; aguardandoConf=true;
    var end=dados.endereco||'(nao informado)';
    addBot(
      'Dados identificados, confirma?\n\n'+
      'Nome: '+dados.nome+'\n'+
      'Telefone: '+dados.telefone+'\n'+
      'Aparelho: '+dados.aparelho+'\n'+
      'Defeito: '+dados.defeito+'\n'+
      'Endereco: '+end,
      ['Confirmar','Corrigir']
    );
    botando=false; document.getElementById('send-btn').disabled=false;
  }
}

async function criarCard() {
  botando=true; document.getElementById('send-btn').disabled=true;
  document.getElementById('input-area').style.display='none';
  showTyping();
  try {
    var r=await fetch('/api/orcamento?action=criar-card',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nome:dados.nome,telefone:dados.telefone,aparelho:dados.aparelho,defeito:dados.defeito,endereco:dados.endereco,phaseId:solicitarColetaId})
    });
    var d=await r.json();
    hideTyping();
    if (d.ok) {
      addBot('Card criado no Pipefy!\n\n'+dados.nome+' cadastrado em Solicitar Coleta.',['Novo cadastro']);
    } else {
      addBot('Erro: '+d.error);
      document.getElementById('input-area').style.display='flex';
      aguardandoFicha=true;
    }
  } catch(e) {
    hideTyping();
    addBot('Sem conexao com o Pipefy. Tente novamente.');
    document.getElementById('input-area').style.display='flex';
    aguardandoFicha=true;
  }
  botando=false; document.getElementById('send-btn').disabled=false;
}

document.addEventListener('click', function(e) {
  if (e.target.classList.contains('qr-btn') && e.target.textContent==='Novo cadastro') {
    dados={}; aguardandoFicha=true; aguardandoConf=false;
    document.getElementById('chat-msgs').innerHTML='';
    document.getElementById('input-area').style.display='flex';
    addBot('Pronto! Cole a proxima ficha.');
    document.getElementById('chat-input').focus();
  }
});

function delay(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }

init();
</script>
</body>
</html>
