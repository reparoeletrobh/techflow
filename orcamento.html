<script>
var MSG_PARTES = [
  "*ATENCAO* comunicado importante da Reparo Eletro.",
  "Estamos com mais de 150 equipamentos sem resposta na loja e ficamos sem espaco para trabalhar. Esta prejudicando muito a gente.",
  "Por este motivo conto com a sua colaboracao. Nao tendo resposta, retirada do equipamento ou solicitacao de entrega nos proximos 7 dias. Infelizmente teremos que fazer o descarte do mesmo. Conto com a sua colaboracao."
];
var MSG_UC = MSG_PARTES.join("\n");

function srCard(card) {
  var tel = (card.tel || "").replace(/[^0-9]/g, "");
  if (tel.slice(0,2) === "55" && tel.length >= 12) tel = tel.slice(2);
  if (tel.length === 10) tel = tel.slice(0,2) + "9" + tel.slice(2);
  var waLink = tel ? "https://wa.me/55" + tel + "?text=" + encodeURIComponent(MSG_UC) : null;
  var id = card.pipefyId;

  var wrap = document.createElement("div"); wrap.className = "sr-card";

  var nome = document.createElement("div"); nome.className = "sr-nome";
  nome.textContent = card.nome || card.title || ""; wrap.appendChild(nome);

  if (card.desc) {
    var desc = document.createElement("div"); desc.className = "sr-desc";
    desc.textContent = card.desc.substring(0, 80) + "..."; wrap.appendChild(desc);
  }

  var age = document.createElement("div"); age.className = "sr-age";
  age.textContent = card.age + " dia(s) sem resposta"; wrap.appendChild(age);

  var btns = document.createElement("div");
  btns.style.cssText = "display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;";

  if (waLink) {
    var a = document.createElement("a"); a.href = waLink; a.target = "_blank";
    a.style.textDecoration = "none";
    var bc = document.createElement("button"); bc.className = "sr-btn";
    bc.textContent = "Copiar e Enviar";
    bc.onclick = (function(i) { return function() { alertarCliente(i); }; })(id);
    a.appendChild(bc); btns.appendChild(a);
  }

  var bm = document.createElement("button"); bm.className = "sr-btn";
  bm.id = "btn-al-" + id;
  bm.style.cssText = "background:transparent;border:1px solid var(--border);color:var(--muted);";
  bm.textContent = "Mover p/ Ultima Chamada";
  bm.onclick = (function(i) { return function() { alertarCliente(i); }; })(id);
  btns.appendChild(bm); wrap.appendChild(btns);
  return wrap;
}

function ucCard(card) {
  var wrap = document.createElement("div"); wrap.className = "uc-card";
  var nome = document.createElement("div"); nome.className = "sr-nome";
  nome.textContent = card.nome || card.title || ""; wrap.appendChild(nome);
  if (card.desc) {
    var desc = document.createElement("div"); desc.className = "sr-desc";
    desc.textContent = card.desc.substring(0, 80) + "..."; wrap.appendChild(desc);
  }
  var age = document.createElement("div"); age.className = "uc-age";
  age.textContent = card.age + " dia(s) - " + (card.dataEncerramento ? "Prazo: " + card.dataEncerramento : "Sem data limite");
  wrap.appendChild(age);
  return wrap;
}

function loadMsg(elId, msg) {
  var el = document.getElementById(elId); if (!el) return;
  el.innerHTML = "";
  var d = document.createElement("div");
  d.style.cssText = "font-family:var(--fm);font-size:11px;color:var(--muted);text-align:center;padding:40px;";
  d.textContent = msg; el.appendChild(d);
}

async function loadSemResposta() {
  loadMsg("list-sem", "Carregando...");
  try {
    var r = await fetch("/api/orcamento?action=sem-resposta");
    var d = await r.json();
    var badge = document.getElementById("badge-sem");
    if (badge) badge.textContent = d.cards ? d.cards.length : 0;
    if (!d.ok || !d.cards || !d.cards.length) {
      loadMsg("list-sem", d.error || "Nenhum cliente sem resposta ha mais de 48h");
      return;
    }
    var list = document.getElementById("list-sem"); list.innerHTML = "";
    d.cards.forEach(function(card) { list.appendChild(srCard(card)); });
  } catch(e) { loadMsg("list-sem", "Erro: " + e.message); }
}

async function alertarCliente(pipefyId) {
  var btn = document.getElementById("btn-al-" + pipefyId);
  if (btn) { btn.disabled = true; btn.textContent = "..."; }
  try {
    var r = await fetch("/api/orcamento?action=alertar", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({pipefyId: pipefyId})
    });
    var d = await r.json();
    if (d.ok) {
      showToast("OK", "Movido para Ultima Chamada!", "Prazo: " + (d.dataLimite || ""));
      loadSemResposta();
    } else {
      showToast("Erro", d.error || "", "");
      if (btn) { btn.disabled = false; btn.textContent = "Mover p/ Ultima Chamada"; }
    }
  } catch(e) {
    showToast("Erro", e.message, "");
    if (btn) { btn.disabled = false; btn.textContent = "Mover p/ Ultima Chamada"; }
  }
}

async function loadUltimaChamada() {
  loadMsg("list-ult", "Carregando...");
  try {
    var r = await fetch("/api/orcamento?action=ultima-chamada");
    var d = await r.json();
    var badge = document.getElementById("badge-ult");
    if (badge) badge.textContent = d.cards ? d.cards.length : 0;
    if (!d.ok || !d.cards || !d.cards.length) {
      loadMsg("list-ult", d.error || "Nenhuma ficha em Ultima Chamada");
      return;
    }
    var list = document.getElementById("list-ult"); list.innerHTML = "";
    d.cards.forEach(function(card) { list.appendChild(ucCard(card)); });
  } catch(e) { loadMsg("list-ult", "Erro: " + e.message); }
}
</script>
