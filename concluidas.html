<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
/* 🔐 TF-GUARD Fase 1 */
(function(){
  if(location.pathname==='/login'||location.pathname==='/login.html')return;
  var K=localStorage.getItem('tf_key');
  if(!K){location.replace('/login?next='+encodeURIComponent(location.pathname));return;}
  // Papel TV: acesso restrito às telas do sistema TV
  if(localStorage.getItem('tf_role')==='tv'&&location.pathname.indexOf('/tv')!==0){
    location.replace('/tv-adm');return;
  }
  var _f=window.fetch;
  window.fetch=function(u,o){
    var isApi=false;
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('/api/auth')===-1){
        isApi=true;o=o||{};
        var kk=localStorage.getItem('tf_key')||'';
        if(o.headers&&typeof o.headers.set==='function'){o.headers.set('x-tf-key',kk);}
        else{o.headers=Object.assign({},o.headers||{},{'x-tf-key':kk});}
      }
    }catch(e){}
    var p=_f.call(this,u,o);
    if(isApi){
      p=p.then(function(r){
        if(r&&r.status===401&&!window.__tfHealed){
          window.__tfHealed=true;
          localStorage.removeItem('tf_key');
          location.replace('/login?next='+encodeURIComponent(location.pathname));
        }
        return r;
      });
    }
    return p;
  };
})();
</script>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache">
<title>✅ Concluídas do Dia — Técnico ADM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07080a;color:#f0f2f5;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:#0f1114;border-bottom:1px solid #1e2228;position:sticky;top:0;z-index:10;gap:10px;}
.h-title{font-size:13px;font-weight:800;color:#22c55e;}
.btn{padding:7px 14px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;background:#1e2228;color:#f0f2f5;text-decoration:none;}
#barra{padding:12px 16px;border-bottom:1px solid #1e2228;background:#0a0b0e;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
#data{background:#181b1f;border:1px solid #22272f;border-radius:8px;padding:8px 12px;font-size:13px;color:#f0f2f5;outline:none;}
.kpi{display:flex;gap:8px;font-size:12px;font-weight:800;}
.kpi span{background:#12141a;border:1px solid #1e2228;border-radius:8px;padding:7px 12px;}
.wrap{padding:14px 16px;max-width:980px;margin:0 auto;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#5a6270;padding:8px 10px;border-bottom:1px solid #22272f;}
td{padding:9px 10px;border-bottom:1px solid #16181d;vertical-align:top;}
tr:hover td{background:#0d0f13;}
.tipo-loja{color:#f5c800;font-weight:700;font-size:11px;}
.tipo-del{color:#22c55e;font-weight:700;font-size:11px;}
.tec{font-weight:800;}
.hora{font-family:monospace;color:#5a6270;}
.num{color:#3a4150;font-size:11px;}
.empty{text-align:center;padding:40px;color:#5a6270;font-size:12px;}
</style>
</head>
<body>
<header>
  <div class="h-title">✅ Concluídas do Dia — Loja Feito + Delivery Feito</div>
  <a href="/adm" class="btn">← ADM</a>
</header>

<div id="barra">
  <input type="date" id="data" onchange="carregar()">
  <div class="kpi">
    <span>🏪 Loja Feito: <b id="k-loja" style="color:#f5c800;">0</b></span>
    <span>🚚 Delivery Feito: <b id="k-del" style="color:#22c55e;">0</b></span>
    <span>Σ <b id="k-total">0</b></span>
  </div>
</div>

<div class="wrap">
  <table>
    <thead><tr><th>#</th><th>Ficha</th><th>Caminho</th><th>Técnico</th><th>Hora</th></tr></thead>
    <tbody id="corpo"><tr><td colspan="5" class="empty">Carregando...</td></tr></tbody>
  </table>
</div>

<script>
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

async function carregar(){
  var data=document.getElementById('data').value;
  var corpo=document.getElementById('corpo');
  corpo.innerHTML='<tr><td colspan="5" class="empty">⏳ Carregando...</td></tr>';
  try{
    var d=await fetch('/api/board?action=concluidas-dia&data='+data).then(function(r){return r.json();});
    if(!d.ok)throw new Error(d.error||'falha');
    document.getElementById('k-loja').textContent=d.lojaFeito;
    document.getElementById('k-del').textContent=d.deliveryFeito;
    document.getElementById('k-total').textContent=d.totalConcluidas;
    if(!d.linhas.length){
      corpo.innerHTML='<tr><td colspan="5" class="empty">📭 Nenhuma conclusão em '+data.split('-').reverse().join('/')+'</td></tr>';
      return;
    }
    corpo.innerHTML=d.linhas.map(function(l,i){
      var eLoja=l.tipo.indexOf('Loja Feito')>-1;
      return '<tr>'
        +'<td class="num">'+(i+1)+'</td>'
        +'<td><b>'+esc(l.ficha)+'</b>'+(l.titulo&&l.titulo!==l.ficha?'<div style="font-size:10.5px;color:#5a6270;">'+esc(l.titulo)+'</div>':'')+'</td>'
        +'<td class="'+(eLoja?'tipo-loja':'tipo-del')+'">'+(eLoja?'🏪 ':'🚚 ')+esc(l.tipo)+'</td>'
        +'<td class="tec">'+esc(l.tecnico)+'</td>'
        +'<td class="hora">'+l.hora+'</td>'
      +'</tr>';
    }).join('');
  }catch(e){
    corpo.innerHTML='<tr><td colspan="5" class="empty" style="color:#ef4444;">Erro: '+e.message+'</td></tr>';
  }
}

// Data de hoje (BRT)
document.getElementById('data').value=new Date(Date.now()-3*3600000).toISOString().slice(0,10);
carregar();
</script>
</body>
</html>
