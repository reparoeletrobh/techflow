<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechFlow — Assistência Técnica</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c28;
    --border:#2a2a3a; --accent:#00e5a0; --text:#e8e8f0; --muted:#666680;
    --font-head:'Syne',sans-serif; --font-mono:'DM Mono',monospace; --font-body:'Inter',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;}

  .page{display:none;min-height:100vh;flex-direction:column;}
  .page.active{display:flex;}

  /* ── HEADER ── */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 28px;border-bottom:1px solid var(--border);
    background:rgba(10,10,15,0.97);backdrop-filter:blur(12px);
    position:sticky;top:0;z-index:100;
  }
  .logo{font-family:var(--font-head);font-size:20px;font-weight:800;display:flex;align-items:center;gap:10px;}
  .logo-icon{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}
  .logo span{color:var(--accent);}
  nav{display:flex;gap:6px;}
  .nav-btn{
    font-family:var(--font-mono);font-size:11px;padding:7px 16px;border-radius:8px;
    border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;
  }
  .nav-btn:hover{color:var(--text);border-color:var(--accent);}
  .nav-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600;}
  .header-right{display:flex;gap:16px;align-items:center;}
  .stat-pill{font-family:var(--font-mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
  .stat-pill strong{color:var(--text);font-size:13px;}
  .live-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}

  /* ── BOARD HEADER ── */
  .board-header{padding:20px 28px 14px;display:flex;align-items:center;justify-content:space-between;}
  .board-title{font-family:var(--font-head);font-size:26px;font-weight:800;letter-spacing:-1px;}
  .board-title span{color:var(--accent);}
  .board-actions{display:flex;gap:8px;align-items:center;}
  .board-meta{font-family:var(--font-mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .refresh-btn{
    font-family:var(--font-mono);font-size:11px;padding:6px 14px;border-radius:6px;
    border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;
  }
  .refresh-btn:hover{color:var(--accent);border-color:var(--accent);}
  .refresh-btn.spinning{animation:spin 0.7s linear infinite;pointer-events:none;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── NEW BADGE ── */
  .new-badge{
    background:rgba(0,229,160,0.15);border:1px solid rgba(0,229,160,0.4);
    color:var(--accent);font-family:var(--font-mono);font-size:11px;
    padding:4px 10px;border-radius:20px;animation:fadeIn 0.4s;
  }
  @keyframes fadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}

  /* ── KANBAN ── */
  .kanban-wrapper{flex:1;padding:0 28px 28px;overflow-x:auto;}
  .kanban-board{display:flex;gap:14px;min-width:max-content;min-height:calc(100vh - 185px);}

  .kanban-col{
    width:245px;display:flex;flex-direction:column;border-radius:14px;
    border:1px solid var(--border);background:var(--surface);overflow:hidden;flex-shrink:0;
  }
  .col-header{
    padding:12px 14px 10px;display:flex;align-items:center;gap:8px;
    border-bottom:1px solid var(--border);position:relative;
  }
  .col-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
  .col-title{font-family:var(--font-head);font-size:12px;font-weight:700;flex:1;}
  .col-count{
    font-family:var(--font-mono);font-size:10px;
    background:var(--surface2);border:1px solid var(--border);
    padding:2px 7px;border-radius:20px;color:var(--muted);
  }
  .col-body{flex:1;padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
  .col-body::-webkit-scrollbar{width:3px;}
  .col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  /* ── CARD ── */
  .os-card{
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:11px;transition:all 0.2s;animation:cardIn 0.35s ease;position:relative;overflow:hidden;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(-6px) scale(0.97)}to{opacity:1;transform:none}}
  .os-card:hover{border-color:rgba(255,255,255,0.13);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.3);}
  .card-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:4px 0 0 4px;}
  .card-id{font-family:var(--font-mono);font-size:10px;color:var(--muted);}
  .card-title{font-size:12px;font-weight:500;color:var(--text);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-fields{margin-top:5px;display:flex;flex-direction:column;gap:2px;}
  .card-field{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:7px;border-top:1px solid var(--border);}
  .card-age{font-family:var(--font-mono);font-size:10px;color:var(--muted);}
  .card-by{font-size:10px;color:var(--muted);font-family:var(--font-mono);}
  .card-local{
    font-size:9px;font-family:var(--font-mono);color:var(--accent);
    background:rgba(0,229,160,0.1);border-radius:3px;padding:1px 5px;
    position:absolute;top:8px;right:8px;
  }

  .empty-col{
    flex:1;display:flex;align-items:center;justify-content:center;
    border:2px dashed var(--border);border-radius:8px;color:var(--muted);
    font-size:10px;font-family:var(--font-mono);opacity:0.45;margin:2px;padding:16px;
    text-align:center;line-height:1.6;
  }

  /* ── LOADING / ERROR ── */
  .loading-board{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  .loading-text{font-family:var(--font-mono);font-size:12px;color:var(--muted);}
  .error-banner{
    margin:12px 28px;padding:12px 16px;background:rgba(239,68,68,0.1);
    border:1px solid rgba(239,68,68,0.3);border-radius:10px;
    font-family:var(--font-mono);font-size:12px;color:#ef4444;display:none;
  }

  /* ── FORM PAGES ── */
  #page-mover,#page-criar{align-items:center;justify-content:center;}
  .form-container{width:100%;max-width:540px;padding:36px 24px;}
  .form-title{font-family:var(--font-head);font-size:32px;font-weight:800;letter-spacing:-1.2px;margin-bottom:6px;}
  .form-title span{color:var(--accent);}
  .form-sub{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-bottom:32px;}
  .form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;display:flex;flex-direction:column;gap:22px;}

  .field-group{display:flex;flex-direction:column;gap:8px;}
  .field-label{
    font-family:var(--font-mono);font-size:10px;font-weight:500;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.12em;display:flex;align-items:center;gap:6px;
  }
  .field-label::before{content:'';width:10px;height:1px;background:var(--accent);}

  .f-input{
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:12px 14px;font-family:var(--font-body);font-size:14px;color:var(--text);
    width:100%;outline:none;transition:all 0.2s;
  }
  .f-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,0.1);}
  .f-input::placeholder{color:var(--muted);}

  /* Search com suggestions */
  .search-wrap{position:relative;}
  .suggestions{
    position:absolute;top:100%;left:0;right:0;margin-top:4px;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    overflow:hidden;z-index:50;display:none;
  }
  .sug-item{
    padding:10px 14px;cursor:pointer;transition:background 0.15s;
    display:flex;align-items:center;justify-content:space-between;
    font-family:var(--font-mono);font-size:11px;
  }
  .sug-item:hover{background:var(--surface2);}
  .sug-id{color:var(--accent);}
  .sug-title{color:var(--text);font-size:11px;margin-left:8px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sug-phase{color:var(--muted);font-size:10px;flex-shrink:0;}

  .sel-card-info{
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:12px 14px;display:none;
  }
  .sel-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:4px;}
  .sel-title{font-size:13px;font-weight:500;}
  .sel-phase{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--font-mono);}

  /* Stages grid */
  .stages-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .stage-btn{
    padding:10px 12px;border-radius:9px;border:1px solid var(--border);
    background:var(--surface2);color:var(--muted);font-family:var(--font-body);
    font-size:12px;cursor:pointer;transition:all 0.2s;text-align:left;
    display:flex;align-items:center;gap:8px;
  }
  .stage-btn:hover{border-color:rgba(255,255,255,0.18);color:var(--text);}
  .stage-btn.selected{color:#0a0a0f;border-color:transparent;font-weight:600;}
  .stage-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

  .submit-btn{
    width:100%;padding:15px;border-radius:10px;background:var(--accent);color:var(--bg);
    font-family:var(--font-head);font-size:14px;font-weight:700;border:none;cursor:pointer;
    transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .submit-btn:hover:not(:disabled){background:#00ffb3;transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,229,160,0.25);}
  .submit-btn:disabled{opacity:0.35;cursor:not-allowed;}

  /* ── TOAST ── */
  .toast{
    position:fixed;bottom:28px;right:28px;background:var(--surface);
    border:1px solid var(--border);border-radius:12px;padding:14px 18px;
    font-family:var(--font-mono);font-size:12px;display:flex;align-items:center;gap:10px;
    transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index:9999;box-shadow:0 16px 48px rgba(0,0,0,0.4);max-width:320px;
  }
  .toast.show{transform:translateY(0);opacity:1;}
  .t-icon{font-size:16px;flex-shrink:0;}
  .t-msg strong{display:block;color:var(--text);margin-bottom:2px;}
  .t-msg span{color:var(--muted);font-size:10px;}

  /* ── PIPEFY BADGE ── */
  .pipefy-sync{
    font-family:var(--font-mono);font-size:10px;
    background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);
    color:var(--muted);padding:3px 10px;border-radius:20px;
  }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon">⚡</div>Tech<span>Flow</span></div>
  <nav>
    <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="showPage('mover')">Mover OS</button>
    <button class="nav-btn" onclick="showPage('criar')">Nova OS</button>
  </nav>
  <div class="header-right">
    <div class="stat-pill"><strong id="stat-total">—</strong> OS</div>
    <div class="pipefy-sync">⟳ Pipefy: Aprovado</div>
    <div class="stat-pill"><div class="live-dot"></div> nuvem</div>
  </div>
</header>

<!-- ── DASHBOARD ── -->
<div id="page-dashboard" class="page active">
  <div class="board-header">
    <div class="board-title">Fluxo de <span>OS</span></div>
    <div class="board-actions">
      <span id="new-badge" class="new-badge" style="display:none"></span>
      <button class="refresh-btn" id="refresh-btn" onclick="loadBoard()">↻ Atualizar</button>
      <button class="refresh-btn" id="reset-btn" onclick="confirmReset()" style="color:#ef4444;border-color:rgba(239,68,68,0.3)">⚠ Zerar Dashboard</button>
      <div class="board-meta"><div class="live-dot"></div> sincronizado</div>
    </div>
  </div>
  <div class="error-banner" id="error-banner"></div>
  <div class="kanban-wrapper" id="kanban-wrapper">
    <div class="loading-board"><div class="spinner"></div><div class="loading-text">Carregando do Pipefy...</div></div>
  </div>
</div>

<!-- ── MOVER OS ── -->
<div id="page-mover" class="page">
  <div class="form-container">
    <div class="form-title">Mover <span>OS</span></div>
    <div class="form-sub">// busque e mova para outra etapa do dashboard</div>
    <div class="form-card">

      <div class="field-group">
        <label class="field-label">Buscar OS</label>
        <div class="search-wrap">
          <input class="f-input" id="os-search" type="text" placeholder="Digite o título ou número..." autocomplete="off" oninput="filterCards(this.value)" />
          <div class="suggestions" id="suggestions"></div>
        </div>
      </div>

      <div class="sel-card-info" id="sel-info">
        <div class="sel-label">OS SELECIONADA</div>
        <div class="sel-title" id="sel-title"></div>
        <div class="sel-phase" id="sel-phase"></div>
      </div>

      <div class="field-group">
        <label class="field-label">Colaborador</label>
        <input class="f-input" id="move-collab" type="text" placeholder="Seu nome" oninput="checkMove()" />
      </div>

      <div class="field-group">
        <label class="field-label">Mover para</label>
        <div class="stages-grid" id="move-stages"></div>
      </div>

      <button class="submit-btn" id="btn-move" onclick="submitMove()" disabled>→ Mover OS</button>
    </div>
  </div>
</div>

<!-- ── NOVA OS ── -->
<div id="page-criar" class="page">
  <div class="form-container">
    <div class="form-title">Nova <span>OS</span></div>
    <div class="form-sub">// cria apenas no dashboard, não afeta o Pipefy</div>
    <div class="form-card">

      <div class="field-group">
        <label class="field-label">Título da OS</label>
        <input class="f-input" id="new-title" type="text" placeholder="Ex: iPhone 14 – tela trincada" oninput="checkCreate()" />
      </div>

      <div class="field-group">
        <label class="field-label">Colaborador</label>
        <input class="f-input" id="create-collab" type="text" placeholder="Seu nome" oninput="checkCreate()" />
      </div>

      <div class="field-group">
        <label class="field-label">Etapa inicial</label>
        <div class="stages-grid" id="create-stages"></div>
      </div>

      <button class="submit-btn" id="btn-create" onclick="submitCreate()" disabled>+ Criar OS</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="t-icon" id="t-icon">✅</div>
  <div class="t-msg"><strong id="t-title"></strong><span id="t-body"></span></div>
</div>

<script>
// ── CORES ─────────────────────────────────────────────────────
const COLORS = ['#3b9eff','#a855f7','#f59e0b','#00e5a0','#ff6b35','#10b981','#6b7280','#e879f9','#f43f5e'];

// ── ESTADO ────────────────────────────────────────────────────
let board = null;          // { phases, cards, syncedIds }
let selCardId = null;
let selMovePhase = null;
let selCreatePhase = null;

// ── API ───────────────────────────────────────────────────────
async function api(method, action, body) {
  const url = `/api/board?action=${action}`;
  const opts = method === 'GET'
    ? {}
    : { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) };
  const r = await fetch(url, opts);
  return r.json();
}

// ── CARREGAR BOARD ────────────────────────────────────────────
async function loadBoard() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  btn.textContent = '↻';
  document.getElementById('error-banner').style.display = 'none';

  try {
    const res = await api('GET', 'load');
    if (!res.ok) throw new Error(res.error);
    board = res.board;

    renderBoard();
    renderStageGrids();
    document.getElementById('stat-total').textContent = board.cards.length;

    if (res.newCount > 0) {
      const badge = document.getElementById('new-badge');
      badge.textContent = `+${res.newCount} nova${res.newCount > 1 ? 's' : ''} do Pipefy`;
      badge.style.display = 'inline';
      setTimeout(() => badge.style.display = 'none', 6000);
    }
  } catch(e) {
    document.getElementById('error-banner').style.display = 'block';
    document.getElementById('error-banner').textContent = '⚠️ ' + e.message;
    document.getElementById('kanban-wrapper').innerHTML = '';
  }

  btn.classList.remove('spinning');
  btn.textContent = '↻ Atualizar';
}

// ── RENDER BOARD ──────────────────────────────────────────────
function renderBoard() {
  const wrapper = document.getElementById('kanban-wrapper');
  const b = document.createElement('div');
  b.className = 'kanban-board';

  board.phases.forEach((ph, i) => {
    const color = COLORS[i % COLORS.length];
    const cards = board.cards.filter(c => c.phaseId === ph.id);
    const col = document.createElement('div');
    col.className = 'kanban-col';
    col.innerHTML = `
      <div class="col-header">
        <div class="col-stripe" style="background:${color}"></div>
        <div class="col-title">${ph.name}</div>
        <div class="col-count">${cards.length}</div>
      </div>
      <div class="col-body">
        ${cards.length === 0
          ? '<div class="empty-col">sem OS<br>nesta etapa</div>'
          : cards.map(c => cardHTML(c, color)).join('')}
      </div>`;
    b.appendChild(col);
  });

  wrapper.innerHTML = '';
  wrapper.appendChild(b);
}

function cardHTML(c, color) {
  const fields = (c.fields || []).slice(0, 2).map(f =>
    `<div class="card-field">· ${f.name}: ${f.value || '—'}</div>`).join('');
  const age = c.age != null ? c.age + 'd' : '—';
  return `
    <div class="os-card">
      <div class="card-bar" style="background:${color}"></div>
      ${c.localOnly ? '<span class="card-local">local</span>' : ''}
      <div class="card-id">#${c.pipefyId}</div>
      <div class="card-title">${c.title}</div>
      ${fields ? `<div class="card-fields">${fields}</div>` : ''}
      <div class="card-footer">
        <div class="card-age">🕐 ${age}</div>
        <div class="card-by">${c.movedBy || '—'}</div>
      </div>
    </div>`;
}

// ── STAGE GRIDS ───────────────────────────────────────────────
function renderStageGrids() {
  if (!board) return;
  renderGrid('move-stages', 'move');
  renderGrid('create-stages', 'create');
}

function renderGrid(containerId, mode) {
  const el = document.getElementById(containerId);
  el.innerHTML = board.phases.map((ph, i) => {
    const color = COLORS[i % COLORS.length];
    return `<button class="stage-btn" data-id="${ph.id}" data-mode="${mode}" onclick="pickPhase('${ph.id}','${mode}')">
      <div class="stage-dot" style="background:${color}"></div>${ph.name}
    </button>`;
  }).join('');
}

function pickPhase(id, mode) {
  const grid = mode === 'move' ? 'move-stages' : 'create-stages';
  document.querySelectorAll(`#${grid} .stage-btn`).forEach(b => {
    b.classList.remove('selected'); b.style.background=''; b.style.color='';
  });
  const btn = document.querySelector(`#${grid} .stage-btn[data-id="${id}"]`);
  const i = board.phases.findIndex(p => p.id === id);
  btn.classList.add('selected');
  btn.style.background = COLORS[i % COLORS.length];
  btn.style.color = '#0a0a0f';
  if (mode === 'move') { selMovePhase = id; checkMove(); }
  else { selCreatePhase = id; checkCreate(); }
}

// ── BUSCA OS ──────────────────────────────────────────────────
function filterCards(val) {
  const sug = document.getElementById('suggestions');
  selCardId = null;
  document.getElementById('sel-info').style.display = 'none';
  checkMove();
  if (!val || val.length < 2) { sug.style.display = 'none'; return; }
  const q = val.toLowerCase();
  const hits = (board?.cards || []).filter(c =>
    c.title.toLowerCase().includes(q) || String(c.pipefyId).toLowerCase().includes(q)
  ).slice(0, 6);
  if (!hits.length) { sug.style.display = 'none'; return; }
  sug.style.display = 'block';
  sug.innerHTML = hits.map(c => {
    const ph = board.phases.find(p => p.id === c.phaseId);
    return `<div class="sug-item" onclick="pickCard('${c.pipefyId}')">
      <div><span class="sug-id">#${c.pipefyId}</span><span class="sug-title">${c.title}</span></div>
      <span class="sug-phase">${ph?.name || '—'}</span>
    </div>`;
  }).join('');
}

function pickCard(id) {
  const c = board.cards.find(c => c.pipefyId === id);
  if (!c) return;
  selCardId = c.pipefyId;
  document.getElementById('os-search').value = c.title;
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('sel-title').textContent = c.title;
  const ph = board.phases.find(p => p.id === c.phaseId);
  document.getElementById('sel-phase').textContent = '📍 Etapa atual: ' + (ph?.name || '—');
  document.getElementById('sel-info').style.display = 'block';
  checkMove();
}

function checkMove() {
  document.getElementById('btn-move').disabled =
    !(selCardId && selMovePhase && document.getElementById('move-collab').value.trim());
}
function checkCreate() {
  document.getElementById('btn-create').disabled =
    !document.getElementById('new-title').value.trim();
}

// ── SUBMIT MOVE ───────────────────────────────────────────────
async function submitMove() {
  const btn = document.getElementById('btn-move');
  btn.disabled = true; btn.textContent = '⏳ Movendo...';
  try {
    const res = await api('POST', 'move', {
      pipefyId: selCardId,
      phaseId: selMovePhase,
      movedBy: document.getElementById('move-collab').value.trim(),
    });
    if (!res.ok) throw new Error(res.error);
    const ph = board.phases.find(p => p.id === selMovePhase);
    showToast('✅', 'OS movida!', `${res.card.title} → ${ph?.name}`);
    document.getElementById('os-search').value = '';
    document.getElementById('sel-info').style.display = 'none';
    document.getElementById('move-collab').value = '';
    selCardId = null; selMovePhase = null;
    document.querySelectorAll('#move-stages .stage-btn').forEach(b=>{b.classList.remove('selected');b.style.background='';b.style.color='';});
    await loadBoard();
  } catch(e) { showToast('❌','Erro',e.message); }
  btn.disabled = false;
  btn.innerHTML = '→ Mover OS';
  checkMove();
}

// ── SUBMIT CREATE ─────────────────────────────────────────────
async function submitCreate() {
  const btn = document.getElementById('btn-create');
  btn.disabled = true; btn.textContent = '⏳ Criando...';
  try {
    const res = await api('POST', 'create', {
      title: document.getElementById('new-title').value.trim(),
      phaseId: selCreatePhase || board.phases[0].id,
      createdBy: document.getElementById('create-collab').value.trim() || '—',
    });
    if (!res.ok) throw new Error(res.error);
    showToast('📥','OS criada!', res.card.title);
    document.getElementById('new-title').value = '';
    document.getElementById('create-collab').value = '';
    selCreatePhase = null;
    document.querySelectorAll('#create-stages .stage-btn').forEach(b=>{b.classList.remove('selected');b.style.background='';b.style.color='';});
    await loadBoard();
    showPage('dashboard');
  } catch(e) { showToast('❌','Erro',e.message); }
  btn.disabled = false;
  btn.innerHTML = '+ Criar OS';
  checkCreate();
}

// ── NAV / TOAST ───────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  ['dashboard','mover','criar'].forEach((n,i)=>{
    if(n===name) document.querySelectorAll('.nav-btn')[i].classList.add('active');
  });
}
function showToast(icon,title,msg){
  document.getElementById('t-icon').textContent=icon;
  document.getElementById('t-title').textContent=title;
  document.getElementById('t-body').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4200);
}

// ── RESET ────────────────────────────────────────────────────
async function confirmReset() {
  const ok = confirm("⚠️ Isso vai ZERAR o dashboard e ignorar todas as OS já aprovadas.\n\nSomente OS aprovadas DEPOIS deste momento aparecerão.\n\nConfirma?");
  if (!ok) return;
  const btn = document.getElementById("reset-btn");
  btn.textContent = "⏳ Zerando...";
  btn.style.pointerEvents = "none";
  try {
    const r = await fetch("/api/board?action=reset", { method: "POST", headers: {"Content-Type":"application/json"} });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error);
    showToast("🗑️", "Dashboard zerado!", "Aguardando novas OS aprovadas no Pipefy.");
    await loadBoard();
  } catch(e) {
    showToast("❌", "Erro", e.message);
  }
  btn.textContent = "⚠ Zerar Dashboard";
  btn.style.pointerEvents = "";
}

// ── INIT ──────────────────────────────────────────────────────
loadBoard();
setInterval(loadBoard, 90000);
</script>
</body>
</html>
