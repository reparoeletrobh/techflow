<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechFlow — Assistência Técnica</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28;
    --border: #2a2a3a; --accent: #00e5a0; --text: #e8e8f0; --muted: #666680;
    --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace; --font-body: 'Inter', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; }

  .page { display:none; min-height:100vh; flex-direction:column; }
  .page.active { display:flex; }

  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 32px; border-bottom:1px solid var(--border);
    background:rgba(10,10,15,0.95); backdrop-filter:blur(12px);
    position:sticky; top:0; z-index:100;
  }
  .logo { font-family:var(--font-head); font-size:22px; font-weight:800; display:flex; align-items:center; gap:10px; }
  .logo-icon { width:32px; height:32px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .logo span { color:var(--accent); }

  nav { display:flex; gap:8px; }
  .nav-btn {
    font-family:var(--font-mono); font-size:12px; padding:8px 18px; border-radius:8px;
    border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s;
  }
  .nav-btn:hover { color:var(--text); border-color:var(--accent); }
  .nav-btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:500; }

  .header-right { display:flex; gap:20px; align-items:center; }
  .stat-pill { font-family:var(--font-mono); font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .stat-pill strong { color:var(--text); font-size:14px; }
  .live-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

  .board-header { padding:24px 32px 16px; display:flex; align-items:center; justify-content:space-between; }
  .board-title { font-family:var(--font-head); font-size:28px; font-weight:800; letter-spacing:-1px; }
  .board-title span { color:var(--accent); }
  .board-meta { font-family:var(--font-mono); font-size:11px; color:var(--muted); display:flex; align-items:center; gap:8px; }

  .refresh-btn {
    font-family:var(--font-mono); font-size:11px; padding:6px 14px; border-radius:6px;
    border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s;
  }
  .refresh-btn:hover { color:var(--accent); border-color:var(--accent); }

  .kanban-wrapper { flex:1; padding:0 32px 32px; overflow-x:auto; }
  .kanban-board { display:flex; gap:16px; min-width:max-content; min-height:calc(100vh - 200px); }

  .kanban-col {
    width:250px; display:flex; flex-direction:column; border-radius:14px;
    border:1px solid var(--border); background:var(--surface); overflow:hidden; flex-shrink:0;
  }
  .col-header {
    padding:14px 16px 12px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid var(--border); position:relative;
  }
  .col-stripe { position:absolute; top:0; left:0; right:0; height:3px; border-radius:14px 14px 0 0; }
  .col-title { font-family:var(--font-head); font-size:13px; font-weight:700; flex:1; }
  .col-count { font-family:var(--font-mono); font-size:11px; background:var(--surface2); border:1px solid var(--border); padding:2px 8px; border-radius:20px; color:var(--muted); }

  .col-body { flex:1; padding:12px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
  .col-body::-webkit-scrollbar { width:4px; }
  .col-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .os-card {
    background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px;
    transition:all 0.2s; animation:cardIn 0.3s ease; position:relative; overflow:hidden;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(-8px) scale(0.97)} to{opacity:1;transform:none} }
  .os-card:hover { border-color:rgba(255,255,255,0.15); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
  .card-left-bar { position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:4px 0 0 4px; }
  .card-id { font-family:var(--font-mono); font-size:12px; font-weight:500; color:var(--muted); }
  .card-title { font-size:13px; font-weight:500; color:var(--text); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-fields { margin-top:6px; display:flex; flex-direction:column; gap:2px; }
  .card-field { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:8px; border-top:1px solid var(--border); }
  .card-age { font-family:var(--font-mono); font-size:10px; color:var(--muted); }

  .empty-col {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    border:2px dashed var(--border); border-radius:8px; color:var(--muted);
    font-size:11px; font-family:var(--font-mono); opacity:0.5; margin:4px; padding:20px; text-align:center;
  }

  /* Loading */
  .loading-board { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-family:var(--font-mono); font-size:13px; color:var(--muted); }

  /* Error banner */
  .error-banner {
    margin:16px 32px; padding:14px 18px; background:rgba(239,68,68,0.1);
    border:1px solid rgba(239,68,68,0.3); border-radius:10px;
    font-family:var(--font-mono); font-size:12px; color:#ef4444; display:none;
  }

  /* ── UPDATE PAGE ── */
  #page-atualizar { align-items:center; justify-content:center; }
  .update-container { width:100%; max-width:560px; padding:40px; }
  .update-title { font-family:var(--font-head); font-size:36px; font-weight:800; letter-spacing:-1.5px; margin-bottom:8px; line-height:1; }
  .update-title span { color:var(--accent); }
  .update-subtitle { font-size:14px; color:var(--muted); margin-bottom:40px; font-family:var(--font-mono); }
  .form-section { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px; display:flex; flex-direction:column; gap:24px; }
  .field-group { display:flex; flex-direction:column; gap:10px; }
  .field-label { font-family:var(--font-mono); font-size:11px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; display:flex; align-items:center; gap:6px; }
  .field-label::before { content:''; width:12px; height:1px; background:var(--accent); }

  .os-search-wrap { position:relative; }
  .os-input {
    background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px 18px;
    font-family:var(--font-mono); font-size:18px; font-weight:500; color:var(--text);
    letter-spacing:0.05em; width:100%; outline:none; transition:all 0.2s;
  }
  .os-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,229,160,0.1); }
  .os-input::placeholder { color:var(--muted); font-size:13px; font-weight:400; }

  .os-suggestions {
    position:absolute; top:100%; left:0; right:0; margin-top:4px;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    overflow:hidden; z-index:50; display:none;
  }
  .os-suggestion {
    padding:10px 16px; cursor:pointer; transition:background 0.15s;
    font-family:var(--font-mono); font-size:12px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .os-suggestion:hover { background:var(--surface2); }
  .sug-id { color:var(--accent); }
  .sug-title { color:var(--muted); font-size:11px; }
  .sug-phase { font-size:10px; color:var(--muted); }

  .collab-field {
    background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 16px;
    font-family:var(--font-body); font-size:14px; color:var(--text); width:100%; outline:none; transition:all 0.2s;
  }
  .collab-field:focus { border-color:#a855f7; box-shadow:0 0 0 3px rgba(168,85,247,0.15); }
  .collab-field::placeholder { color:var(--muted); }

  .stages-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .stage-btn {
    padding:12px 14px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface2); color:var(--muted); font-family:var(--font-body);
    font-size:12px; font-weight:500; cursor:pointer; transition:all 0.2s; text-align:left;
    display:flex; align-items:center; gap:10px;
  }
  .stage-btn:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }
  .stage-btn.selected { color:#0a0a0f; border-color:transparent; font-weight:600; }
  .stage-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  .submit-btn {
    width:100%; padding:16px; border-radius:10px; background:var(--accent); color:var(--bg);
    font-family:var(--font-head); font-size:15px; font-weight:700; border:none; cursor:pointer;
    transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .submit-btn:hover { background:#00ffb3; transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,229,160,0.3); }
  .submit-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
  .submit-btn.loading { pointer-events:none; }

  /* ── CREATE PAGE ── */
  #page-criar { align-items:center; justify-content:center; }
  .create-container { width:100%; max-width:560px; padding:40px; }

  /* Toast */
  .toast {
    position:fixed; bottom:32px; right:32px; background:var(--surface);
    border:1px solid var(--border); border-radius:12px; padding:16px 20px;
    font-family:var(--font-mono); font-size:13px; display:flex; align-items:center; gap:12px;
    transform:translateY(80px); opacity:0; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index:9998; box-shadow:0 16px 48px rgba(0,0,0,0.4); max-width:340px;
  }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast-icon { font-size:18px; flex-shrink:0; }
  .toast-msg strong { display:block; color:var(--text); margin-bottom:2px; }
  .toast-msg span { color:var(--muted); font-size:11px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    Tech<span>Flow</span>
  </div>
  <nav>
    <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="showPage('atualizar')">Mover OS</button>
    <button class="nav-btn" onclick="showPage('criar')">Nova OS</button>
  </nav>
  <div class="header-right">
    <div class="stat-pill"><strong id="stat-total">—</strong> OS abertas</div>
    <div class="stat-pill"><div class="live-dot"></div> Pipefy</div>
  </div>
</header>

<!-- ── DASHBOARD ── -->
<div id="page-dashboard" class="page active">
  <div class="board-header">
    <div>
      <div class="board-title">Fluxo de <span>Ordens de Serviço</span></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="refresh-btn" onclick="loadBoard()">↻ Atualizar</button>
      <div class="board-meta"><div class="live-dot"></div> Sincronizado com Pipefy</div>
    </div>
  </div>
  <div class="error-banner" id="error-banner"></div>
  <div class="kanban-wrapper" id="kanban-wrapper">
    <div class="loading-board">
      <div class="spinner"></div>
      <div class="loading-text">Carregando OS do Pipefy...</div>
    </div>
  </div>
</div>

<!-- ── MOVER OS ── -->
<div id="page-atualizar" class="page">
  <div class="update-container">
    <div class="update-title">Mover <span>OS</span></div>
    <div class="update-subtitle">// busque a OS e selecione a nova etapa</div>
    <div class="form-section">

      <div class="field-group">
        <label class="field-label">Buscar OS</label>
        <div class="os-search-wrap">
          <input class="os-input" id="os-search" type="text" placeholder="Digite o título ou ID da OS..." autocomplete="off" oninput="filterOS(this.value)" />
          <div class="os-suggestions" id="os-suggestions"></div>
        </div>
      </div>

      <div id="selected-card-info" style="display:none; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px 16px;">
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:4px;">OS SELECIONADA</div>
        <div id="sel-title" style="font-size:14px;font-weight:500;"></div>
        <div id="sel-phase" style="font-size:12px;color:var(--muted);margin-top:3px;font-family:var(--font-mono);"></div>
      </div>

      <div class="field-group">
        <label class="field-label">Colaborador</label>
        <input class="collab-field" id="collab-input" type="text" placeholder="Seu nome" autocomplete="off" oninput="checkMoveReady()" />
      </div>

      <div class="field-group">
        <label class="field-label">Mover para etapa</label>
        <div class="stages-grid" id="stages-grid"></div>
      </div>

      <button class="submit-btn" id="submit-move-btn" onclick="submitMove()" disabled>
        <span>→</span> Mover Ordem de Serviço
      </button>
    </div>
  </div>
</div>

<!-- ── NOVA OS ── -->
<div id="page-criar" class="page">
  <div class="create-container">
    <div class="update-title">Nova <span>OS</span></div>
    <div class="update-subtitle">// cadastre uma nova ordem de serviço</div>
    <div class="form-section">

      <div class="field-group">
        <label class="field-label">Título da OS</label>
        <input class="collab-field" id="new-title" type="text" placeholder="Ex: iPhone 13 - Tela quebrada" autocomplete="off" oninput="checkCreateReady()" />
      </div>

      <div class="field-group">
        <label class="field-label">Cliente</label>
        <input class="collab-field" id="new-cliente" type="text" placeholder="Nome do cliente" autocomplete="off" />
      </div>

      <div class="field-group">
        <label class="field-label">Etapa inicial</label>
        <div class="stages-grid" id="create-stages-grid"></div>
      </div>

      <button class="submit-btn" id="submit-create-btn" onclick="submitCreate()" disabled>
        <span>+</span> Criar Ordem de Serviço
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toast-icon">✅</div>
  <div class="toast-msg">
    <strong id="toast-title"></strong>
    <span id="toast-body"></span>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────
let pipeData = null;       // { name, phases: [{id,name,cards:{edges:[{node}]}}] }
let allCards = [];         // flat list of all cards
let selectedCardId = null;
let selectedMovePhaseId = null;
let selectedCreatePhaseId = null;

const PHASE_COLORS = [
  '#3b9eff','#a855f7','#f59e0b','#00e5a0','#ff6b35','#10b981','#6b7280',
  '#e879f9','#f43f5e','#14b8a6','#fb923c','#8b5cf6'
];

// ── API CALLS ──────────────────────────────────────────────────
async function apiGet(action) {
  const r = await fetch(`/api/pipefy?action=${action}`);
  return r.json();
}
async function apiPost(action, body) {
  const r = await fetch(`/api/pipefy?action=${action}`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  return r.json();
}

// ── LOAD BOARD ─────────────────────────────────────────────────
async function loadBoard() {
  const wrapper = document.getElementById('kanban-wrapper');
  wrapper.innerHTML = `<div class="loading-board"><div class="spinner"></div><div class="loading-text">Carregando OS do Pipefy...</div></div>`;
  document.getElementById('error-banner').style.display = 'none';

  try {
    const res = await apiGet('board');
    if (!res.ok) throw new Error(res.error || 'Erro ao carregar dados');
    pipeData = res.data;
    allCards = [];
    pipeData.phases.forEach(ph => {
      ph.cards.edges.forEach(e => {
        allCards.push({ ...e.node, phaseId: ph.id, phaseName: ph.name });
      });
    });
    renderBoard();
    renderStageGrids();
    document.getElementById('stat-total').textContent = allCards.length;
  } catch(e) {
    wrapper.innerHTML = '';
    const banner = document.getElementById('error-banner');
    banner.style.display = 'block';
    banner.textContent = '⚠️ Erro ao conectar ao Pipefy: ' + e.message;
  }
}

// ── RENDER BOARD ───────────────────────────────────────────────
function renderBoard() {
  const wrapper = document.getElementById('kanban-wrapper');
  const board = document.createElement('div');
  board.className = 'kanban-board';

  pipeData.phases.forEach((phase, i) => {
    const color = PHASE_COLORS[i % PHASE_COLORS.length];
    const cards = phase.cards.edges.map(e => e.node);
    const col = document.createElement('div');
    col.className = 'kanban-col';
    col.innerHTML = `
      <div class="col-header">
        <div class="col-stripe" style="background:${color}"></div>
        <div class="col-title">${phase.name}</div>
        <div class="col-count">${cards.length}</div>
      </div>
      <div class="col-body">
        ${cards.length === 0
          ? '<div class="empty-col">sem OS<br>nesta etapa</div>'
          : cards.map(c => renderCard(c, color)).join('')}
      </div>
    `;
    board.appendChild(col);
  });

  wrapper.innerHTML = '';
  wrapper.appendChild(board);
}

function renderCard(c, color) {
  const fields = (c.fields || []).slice(0, 2);
  const fieldsHtml = fields.map(f => `<div class="card-field">📌 ${f.name}: ${f.value || '—'}</div>`).join('');
  return `
    <div class="os-card">
      <div class="card-left-bar" style="background:${color}"></div>
      <div class="card-id">#${c.id}</div>
      <div class="card-title">${c.title}</div>
      ${fieldsHtml ? `<div class="card-fields">${fieldsHtml}</div>` : ''}
      <div class="card-footer">
        <div class="card-age">🕐 ${c.age != null ? c.age + 'd' : '—'}</div>
      </div>
    </div>`;
}

// ── STAGES GRIDS ───────────────────────────────────────────────
function renderStageGrids() {
  renderStageGrid('stages-grid', 'move');
  renderStageGrid('create-stages-grid', 'create');
}

function renderStageGrid(containerId, mode) {
  if (!pipeData) return;
  const grid = document.getElementById(containerId);
  grid.innerHTML = pipeData.phases.map((ph, i) => {
    const color = PHASE_COLORS[i % PHASE_COLORS.length];
    return `
      <button class="stage-btn" data-id="${ph.id}" data-mode="${mode}" onclick="selectPhase('${ph.id}','${mode}')">
        <div class="stage-dot" style="background:${color}"></div>
        ${ph.name}
      </button>`;
  }).join('');
}

function selectPhase(phaseId, mode) {
  const grid = mode === 'move' ? 'stages-grid' : 'create-stages-grid';
  document.querySelectorAll(`#${grid} .stage-btn`).forEach(b => {
    b.classList.remove('selected');
    b.style.background = '';
    b.style.color = '';
  });
  const btn = document.querySelector(`#${grid} .stage-btn[data-id="${phaseId}"]`);
  const idx = pipeData.phases.findIndex(p => p.id === phaseId);
  const color = PHASE_COLORS[idx % PHASE_COLORS.length];
  btn.classList.add('selected');
  btn.style.background = color;
  btn.style.color = '#0a0a0f';

  if (mode === 'move') { selectedMovePhaseId = phaseId; checkMoveReady(); }
  else { selectedCreatePhaseId = phaseId; checkCreateReady(); }
}

// ── OS SEARCH ─────────────────────────────────────────────────
function filterOS(val) {
  const sug = document.getElementById('os-suggestions');
  selectedCardId = null;
  document.getElementById('selected-card-info').style.display = 'none';
  checkMoveReady();
  if (!val || val.length < 2) { sug.style.display = 'none'; return; }
  const q = val.toLowerCase();
  const matches = allCards.filter(c =>
    c.title.toLowerCase().includes(q) || String(c.id).includes(q)
  ).slice(0, 6);
  if (!matches.length) { sug.style.display = 'none'; return; }
  sug.style.display = 'block';
  sug.innerHTML = matches.map(c => `
    <div class="os-suggestion" onclick="selectCard('${c.id}')">
      <div>
        <span class="sug-id">#${c.id}</span>
        <span style="color:var(--text);margin-left:8px;font-size:12px;">${c.title}</span>
      </div>
      <span class="sug-phase">${c.phaseName}</span>
    </div>`).join('');
}

function selectCard(id) {
  const card = allCards.find(c => c.id === id || String(c.id) === String(id));
  if (!card) return;
  selectedCardId = card.id;
  document.getElementById('os-search').value = card.title;
  document.getElementById('os-suggestions').style.display = 'none';
  document.getElementById('sel-title').textContent = card.title;
  document.getElementById('sel-phase').textContent = '📍 Etapa atual: ' + card.phaseName;
  document.getElementById('selected-card-info').style.display = 'block';
  checkMoveReady();
}

function checkMoveReady() {
  document.getElementById('submit-move-btn').disabled =
    !(selectedCardId && selectedMovePhaseId && document.getElementById('collab-input').value.trim());
}

function checkCreateReady() {
  document.getElementById('submit-create-btn').disabled =
    !document.getElementById('new-title').value.trim();
}

// ── SUBMIT MOVE ────────────────────────────────────────────────
async function submitMove() {
  const btn = document.getElementById('submit-move-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Movendo...';
  try {
    const res = await apiPost('move', { cardId: String(selectedCardId), phaseId: String(selectedMovePhaseId) });
    if (!res.ok) throw new Error(res.error);
    const phaseName = pipeData.phases.find(p => p.id === selectedMovePhaseId)?.name;
    showToast('✅', 'OS movida!', `${res.card.title} → ${phaseName}`);
    document.getElementById('os-search').value = '';
    document.getElementById('selected-card-info').style.display = 'none';
    document.getElementById('collab-input').value = '';
    selectedCardId = null; selectedMovePhaseId = null;
    document.querySelectorAll('#stages-grid .stage-btn').forEach(b => { b.classList.remove('selected'); b.style.background=''; b.style.color=''; });
    await loadBoard();
  } catch(e) {
    showToast('❌', 'Erro', e.message);
  }
  btn.disabled = false;
  btn.innerHTML = '<span>→</span> Mover Ordem de Serviço';
  checkMoveReady();
}

// ── SUBMIT CREATE ──────────────────────────────────────────────
async function submitCreate() {
  const btn = document.getElementById('submit-create-btn');
  const title = document.getElementById('new-title').value.trim();
  btn.disabled = true; btn.textContent = '⏳ Criando...';
  try {
    const res = await apiPost('create', {
      title,
      phaseId: selectedCreatePhaseId || undefined,
    });
    if (!res.ok) throw new Error(res.error);
    showToast('📥', 'OS criada!', res.card.title + ' → ' + res.card.current_phase.name);
    document.getElementById('new-title').value = '';
    document.getElementById('new-cliente').value = '';
    selectedCreatePhaseId = null;
    document.querySelectorAll('#create-stages-grid .stage-btn').forEach(b => { b.classList.remove('selected'); b.style.background=''; b.style.color=''; });
    await loadBoard();
  } catch(e) {
    showToast('❌', 'Erro', e.message);
  }
  btn.disabled = false;
  btn.innerHTML = '<span>+</span> Criar Ordem de Serviço';
  checkCreateReady();
}

// ── NAV ────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const idx = ['dashboard','atualizar','criar'].indexOf(name);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
}

// ── TOAST ──────────────────────────────────────────────────────
function showToast(icon, title, msg) {
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ── INIT ───────────────────────────────────────────────────────
loadBoard();
setInterval(loadBoard, 60000); // auto-refresh a cada 60s
</script>
</body>
</html>
