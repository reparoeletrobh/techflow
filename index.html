<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Cpolygon%20points%3D%2218%2C2%208%2C18%2015%2C18%2014%2C30%2024%2C14%2017%2C14%22%20fill%3D%22%23f5c800%22%20stroke%3D%22%23f5c800%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Técnico</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d; --surface:#161616; --surface2:#1f1f1f; --border:#333;
  --accent:#f5c800; --accent2:#ffde59; --text:#ffffff; --muted:#aaa;
  --fh:'Syne',sans-serif; --fm:'DM Mono',monospace; --fb:'Inter',sans-serif;
  --c-apr:#f5c800; --c-loja:#ff9800; --c-del:#3b9eff;
  --c-rs:#a855f7; --c-rsrua:#00c896;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:54px;border-bottom:2px solid var(--accent);
  background:#0d0d0d;position:sticky;top:0;z-index:100;
}
.logo{font-family:var(--fh);font-size:18px;font-weight:800;display:flex;align-items:center;gap:9px;}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.logo-text span{color:var(--accent);}
nav{display:flex;gap:5px;flex-wrap:wrap;}
.nav-btn{
  font-family:var(--fm);font-size:10px;padding:6px 13px;border-radius:6px;
  border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;
}
.nav-btn:hover{color:var(--text);border-color:var(--accent);}
.nav-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.header-right{display:flex;gap:12px;align-items:center;}
.stat-pill{font-family:var(--fm);font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.stat-pill strong{color:var(--accent);font-size:13px;}
.live-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(1.6)}}

/* ── PAGES ── */
.page{display:none;min-height:calc(100vh - 54px);flex-direction:column;}
.page.active{display:flex;}

/* ── BOARD HEADER ── */
.board-header{
  padding:14px 24px 10px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;
}
.board-title{font-family:var(--fh);font-size:20px;font-weight:800;letter-spacing:-0.5px;}
.board-title span{color:var(--accent);}
.board-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.action-btn{
  font-family:var(--fm);font-size:10px;padding:6px 12px;border-radius:6px;
  border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;
}
.action-btn:hover{color:var(--text);border-color:rgba(245,200,0,0.4);}
.eod-btn{
  font-family:var(--fm);font-size:10px;font-weight:600;padding:6px 14px;border-radius:6px;
  background:var(--accent);color:#000;border:none;cursor:pointer;transition:all 0.15s;
}
.eod-btn:hover{background:var(--accent2);}
.reset-btn{
  font-family:var(--fm);font-size:10px;padding:6px 12px;border-radius:6px;
  border:1px solid rgba(239,68,68,0.2);background:transparent;color:#ef444466;cursor:pointer;transition:all 0.15s;
}
.reset-btn:hover{color:#ef4444;border-color:#ef4444;}
.new-badge{
  background:rgba(245,200,0,0.12);border:1px solid rgba(245,200,0,0.35);
  color:var(--accent);font-family:var(--fm);font-size:10px;padding:3px 9px;border-radius:20px;
}

/* ── KANBAN ── */
.kanban-wrapper{flex:1;padding:14px 24px 0;overflow-x:auto;overflow-y:visible;scrollbar-width:none;}
.kanban-wrapper::-webkit-scrollbar{display:none;}
/* Barra de scroll horizontal customizada */
.hscroll-bar-wrap{
  position:sticky;bottom:0;left:0;right:0;
  background:var(--bg);border-top:1px solid var(--border);
  padding:6px 24px 8px;z-index:50;
}
.hscroll-track{
  height:6px;background:var(--surface2);border-radius:99px;
  cursor:pointer;position:relative;overflow:hidden;
}
.hscroll-thumb{
  position:absolute;top:0;left:0;height:100%;
  background:var(--accent);border-radius:99px;
  transition:opacity 0.2s;opacity:0.7;cursor:grab;min-width:40px;
}
.hscroll-thumb:hover,.hscroll-thumb:active{opacity:1;}
.hscroll-thumb:active{cursor:grabbing;}
.kanban-board{display:flex;gap:11px;min-width:max-content;min-height:calc(100vh - 190px);}
.kanban-col{
  width:215px;display:flex;flex-direction:column;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);overflow:hidden;flex-shrink:0;
}
.col-header{
  padding:10px 12px 8px;display:flex;align-items:center;gap:7px;
  border-bottom:1px solid var(--border);position:relative;
}
.col-stripe{position:absolute;top:0;left:0;right:0;height:2px;}
.col-title{font-family:var(--fh);font-size:11px;font-weight:700;flex:1;text-transform:uppercase;letter-spacing:0.04em;}
.col-count{font-family:var(--fm);font-size:10px;background:var(--surface2);border:1px solid var(--border);padding:1px 7px;border-radius:20px;color:var(--muted);}
.col-body{flex:1;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;}
.col-body::-webkit-scrollbar{width:3px;}
.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.os-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:9px;transition:all 0.15s;animation:cardIn 0.3s ease;position:relative;overflow:hidden;
}
@keyframes cardIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.os-card:hover{border-color:rgba(245,200,0,0.2);transform:translateY(-1px);box-shadow:0 5px 16px rgba(0,0,0,0.4);}
.card-bar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.card-num{font-family:var(--fm);font-size:11px;font-weight:500;color:var(--accent);}
.card-title{font-size:11px;font-weight:500;color:var(--text);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-nome{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-desc{font-size:10px;color:#999;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px;padding-top:6px;border-top:1px solid var(--border);}
.card-age{font-family:var(--fm);font-size:10px;color:var(--muted);}
.card-by{font-size:10px;color:#aaa;font-family:var(--fm);max-width:90px;overflow:hidden;text-overflow:ellipsis;}
.card-local{position:absolute;top:5px;right:5px;font-size:9px;font-family:var(--fm);background:rgba(245,200,0,0.1);color:var(--accent);border-radius:3px;padding:1px 5px;}
.empty-col{flex:1;display:flex;align-items:center;justify-content:center;border:1px dashed var(--border);border-radius:6px;color:#666;font-size:10px;font-family:var(--fm);margin:2px;padding:14px;text-align:center;line-height:1.7;}

/* ── RS PANEL ── */
#page-rs, #page-rs-rua { flex-direction: column; }
.rs-board-wrap { display: flex; flex-direction: column; height: calc(100vh - 54px); }
.rs-stats-bar {
  display: flex; gap: 12px; padding: 12px 24px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.rs-stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 18px; display: flex; flex-direction: column; gap: 2px; min-width: 140px;
}
.rs-stat-label { font-family: var(--fm); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.rs-stat-val { font-family: var(--fh); font-size: 26px; font-weight: 800; }
.rs-stat-sub { font-family: var(--fm); font-size: 10px; color: var(--muted); }
.rs-kanban-wrap { flex: 1; padding: 14px 24px 24px; display: flex; gap: 14px; overflow-x: auto; }

/* ── LOADING / ERROR ── */
.loading-board{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--fm);font-size:11px;color:var(--muted);}
.error-banner{margin:10px 24px;padding:10px 14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;font-family:var(--fm);font-size:11px;color:#ef4444;display:none;}

/* ── FORM PAGES ── */
#page-mover,#page-criar{align-items:center;justify-content:center;}
.form-wrap{width:100%;max-width:520px;padding:28px 20px;}
.form-title{font-family:var(--fh);font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:4px;}
.form-title span{color:var(--accent);}
.form-sub{font-family:var(--fm);font-size:11px;color:var(--muted);margin-bottom:24px;}
.form-card{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:14px;padding:22px;display:flex;flex-direction:column;gap:18px;}

.field-group{display:flex;flex-direction:column;gap:7px;}
.field-label{font-family:var(--fm);font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;display:flex;align-items:center;gap:6px;}
.field-label::before{content:'';width:8px;height:1px;background:var(--accent);}
.f-input{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:11px 13px;font-family:var(--fb);font-size:14px;color:var(--text);
  width:100%;outline:none;transition:all 0.15s;
}
.f-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,200,0,0.1);}
.f-input::placeholder{color:#666;}

/* OS num big */
.os-num-input{
  background:var(--surface2);border:2px solid var(--border);border-radius:10px;
  padding:14px;font-family:var(--fm);font-size:26px;font-weight:500;
  color:var(--accent);letter-spacing:0.1em;text-align:center;
  width:100%;outline:none;transition:all 0.15s;
}
.os-num-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,200,0,0.12);}
.os-num-input::placeholder{color:#666;font-size:14px;letter-spacing:0;}

/* OS search wrap */
.os-search-wrap{position:relative;}

/* Technician select */
.tecnico-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.tecnico-btn{
  padding:9px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);font-family:var(--fb);
  font-size:12px;cursor:pointer;transition:all 0.15s;text-align:center;
}
.tecnico-btn:hover{border-color:rgba(245,200,0,0.3);color:var(--text);}
.tecnico-btn.selected{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}

/* Stages grid */
.stages-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.stage-btn{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--fb);font-size:12px;cursor:pointer;transition:all 0.15s;text-align:left;display:flex;align-items:center;gap:8px;}
.stage-btn:hover{border-color:rgba(245,200,0,0.3);color:var(--text);}
.stage-btn.selected{color:#000;border-color:transparent;font-weight:600;}
.stage-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* Board type selector */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.type-btn{
  padding:12px 8px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);font-family:var(--fb);
  font-size:12px;cursor:pointer;transition:all 0.15s;text-align:center;
}
.type-btn:hover{border-color:rgba(245,200,0,0.3);color:var(--text);}
.type-btn.selected{color:#000;border-color:transparent;font-weight:600;}
.type-btn[data-type="os"].selected{background:var(--accent);}
.type-btn[data-type="rs"].selected{background:var(--c-rs);}
.type-btn[data-type="rs_rua"].selected{background:var(--c-rsrua);}

.submit-btn{
  width:100%;padding:13px;border-radius:8px;background:var(--accent);color:#000;
  font-family:var(--fh);font-size:14px;font-weight:700;border:none;cursor:pointer;
  transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.submit-btn:hover:not(:disabled){background:var(--accent2);transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* ── METAS ── */
#page-metas{align-items:flex-start;padding:24px;overflow-y:auto;}
.metas-wrap{width:100%;max-width:960px;margin:0 auto;}
.metas-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
.metas-title{font-family:var(--fh);font-size:24px;font-weight:800;letter-spacing:-0.5px;}
.metas-title span{color:var(--accent);}
.metas-sub{font-family:var(--fm);font-size:11px;color:var(--muted);margin-top:3px;}
.meta-refresh-btn{font-family:var(--fm);font-size:10px;padding:6px 13px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.meta-refresh-btn:hover{color:var(--accent);border-color:var(--accent);}

.metas-row-label{
  font-family:var(--fm);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);
  margin-bottom:12px;display:flex;align-items:center;gap:10px;
}
.metas-row-label::after{content:'';flex:1;height:1px;background:var(--border);}
.row-date{font-size:11px;color:var(--text);background:var(--surface2);border:1px solid var(--border);padding:2px 10px;border-radius:20px;font-family:var(--fm);}

.metas-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}

/* DONUT CARD */
.donut-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:18px 14px 14px;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;
}
.donut-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0;}
.donut-card.aprovado::before{background:var(--c-apr);}
.donut-card.loja::before{background:var(--c-loja);}
.donut-card.delivery::before{background:var(--c-del);}
.donut-card.prevweek{opacity:0.65;}
.donut-card-label{font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);}

.donut-svg-wrap{position:relative;width:100px;height:100px;}
.donut-svg{transform:rotate(-90deg);}
.donut-track{fill:none;stroke:var(--surface2);stroke-width:9;}
.donut-fill{fill:none;stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(0.34,1.2,0.64,1);}
.donut-fill.aprovado{stroke:var(--c-apr);filter:drop-shadow(0 0 5px rgba(245,200,0,0.4));}
.donut-fill.loja{stroke:var(--c-loja);filter:drop-shadow(0 0 5px rgba(255,152,0,0.4));}
.donut-fill.delivery{stroke:var(--c-del);filter:drop-shadow(0 0 5px rgba(59,158,255,0.4));}
.donut-fill.exceeded{stroke:#22c55e;filter:drop-shadow(0 0 5px rgba(34,197,94,0.5));}
.donut-fill.prevweek{filter:none;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-pct{font-family:var(--fh);font-size:19px;font-weight:800;line-height:1;}
.donut-pct.aprovado{color:var(--c-apr);} .donut-pct.loja{color:var(--c-loja);}
.donut-pct.delivery{color:var(--c-del);} .donut-pct.exceeded{color:#22c55e;} .donut-pct.prevweek{color:var(--muted);}
.donut-pct-sub{font-family:var(--fm);font-size:9px;color:var(--muted);margin-top:1px;}
.donut-stats{width:100%;display:flex;flex-direction:column;gap:4px;}
.donut-stat-row{display:flex;justify-content:space-between;align-items:center;font-family:var(--fm);font-size:10px;}
.donut-stat-row .sl{color:var(--muted);}
.donut-stat-row .sv{color:var(--text);font-weight:500;}
.donut-stat-row .sv.aprovado{color:var(--c-apr);} .donut-stat-row .sv.loja{color:var(--c-loja);}
.donut-stat-row .sv.delivery{color:var(--c-del);} .donut-stat-row .sv.exceeded{color:#22c55e;}
.donut-badge{font-family:var(--fm);font-size:9px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.06em;}
.donut-badge.ok-apr{background:rgba(245,200,0,0.12);color:var(--c-apr);}
.donut-badge.ok-loja{background:rgba(255,152,0,0.12);color:var(--c-loja);}
.donut-badge.ok-del{background:rgba(59,158,255,0.12);color:var(--c-del);}
.donut-badge.exceeded{background:rgba(34,197,94,0.15);color:#22c55e;}

/* Technician table */
.tec-table{width:100%;border-collapse:collapse;font-family:var(--fm);font-size:11px;margin-bottom:28px;}
.tec-table th{padding:8px 12px;text-align:left;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;}
.tec-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);}
.tec-table tr:last-child td{border-bottom:none;}
.tec-bar-wrap{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;min-width:60px;}
.tec-bar{height:100%;border-radius:99px;transition:width 0.6s ease;}

/* RS stat mini cards */
.rs-mini-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
.rs-mini{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.rs-mini-label{font-family:var(--fm);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;}
.rs-mini-val{font-family:var(--fh);font-size:24px;font-weight:800;}
.rs-mini-val.rs{color:var(--c-rs);} .rs-mini-val.rsrua{color:var(--c-rsrua);}

/* Month history */
.month-hist{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:32px;}
.month-bar-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.month-bar-label{font-family:var(--fm);font-size:10px;color:var(--muted);margin-bottom:8px;}
.month-bars{display:flex;gap:3px;align-items:flex-end;justify-content:center;height:60px;}
.month-bar{border-radius:3px 3px 0 0;width:12px;min-height:3px;transition:height 0.5s ease;}
.month-bar.loja{background:var(--c-loja);} .month-bar.delivery{background:var(--c-del);}
.month-bar.rs{background:var(--c-rs);} .month-bar.rsrua{background:var(--c-rsrua);}
.month-val{font-family:var(--fm);font-size:9px;color:var(--muted);margin-top:4px;}

.meta-loading{font-family:var(--fm);font-size:12px;color:var(--muted);padding:60px 0;text-align:center;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:14px;padding:26px;max-width:380px;width:90%;transform:scale(0.95);transition:transform 0.2s;}
.modal-overlay.open .modal{transform:scale(1);}
.modal-title{font-family:var(--fh);font-size:18px;font-weight:800;margin-bottom:8px;}
.modal-title span{color:var(--accent);}
.modal-body{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px;}
.modal-body strong{color:var(--text);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.modal-cancel{font-family:var(--fm);font-size:11px;padding:8px 16px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;}
.modal-cancel:hover{color:var(--text);}
.modal-confirm{font-family:var(--fm);font-size:11px;font-weight:600;padding:8px 16px;border-radius:7px;background:var(--accent);color:#000;border:none;cursor:pointer;}
.modal-confirm:hover{background:var(--accent2);}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:10px;padding:13px 16px;font-family:var(--fm);font-size:11px;display:flex;align-items:center;gap:9px;transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:9999;box-shadow:0 14px 40px rgba(0,0,0,0.5);max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}
.t-icon{font-size:16px;flex-shrink:0;}
.t-msg strong{display:block;color:var(--text);margin-bottom:1px;}
.t-msg span{color:var(--muted);font-size:10px;}

@media(max-width:640px){.metas-row{grid-template-columns:1fr 1fr;} .rs-mini-row{grid-template-columns:1fr 1fr;} .month-hist{grid-template-columns:repeat(3,1fr);}}
</style>

<!-- DASHBOARD -->

      <div class="field-group">

</div>

<!-- NOVA OS -->

  <div class="form-wrap">

<script>
// ── CORES ──────────────────────────────────────────────────────
const COLORS = ['#f5c800','#ff9800','#ef4444','#a855f7','#3b9eff','#00c896','#22c55e','#10b981','#f59e0b','#e879f9'];
const PAGES  = ['dashboard','mover','criar','rs','rs-rua','metas'];

// ── ESTADO ─────────────────────────────────────────────────────
const DEFAULT_BOARD = {
  phases: [
    { id: "aprovado",        name: "Aprovado"           },
    { id: "producao",        name: "Produção"           },
    { id: "cliente_loja",    name: "Cliente Loja"       },
    { id: "urgencia",        name: "Urgência"           },
    { id: "comprar_peca",    name: "Comprar Peça"       },
    { id: "aguardando_peca", name: "Aguardando Peça"    },
    { id: "peca_disponivel", name: "Peça Disponível"    },
    { id: "loja_feito",      name: "Loja Feito"         },
    { id: "delivery_feito",  name: "Delivery Feito"     },
    { id: "aguardando_ret",  name: "Aguardando Retirada"},
  ],
  rsPhases:    [{ id: "rs_loja",  name: "RS na Loja" }, { id: "rs_feito",     name: "RS Feito"      }],
  rsRuaPhases: [{ id: "rs_rua",   name: "RS Rua"     }, { id: "rs_rua_feito", name: "RS Rua Feito"  }],
  cards: [], rsCards: [], rsRuaCards: [], syncedIds: [], movesLog: [],
};
let board = JSON.parse(JSON.stringify(DEFAULT_BOARD)); // começa com fases visíveis imediatamente
let selCardId = null, selMovePhase = null, selCreatePhase = null;
let selTecnico = null, selBoardType = 'os';

// ── API ────────────────────────────────────────────────────────
async function api(method, action, body) {
  const r = await fetch(`/api/board?action=${action}`, method === 'GET' ? {} : {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  });
  return r.json();
}

// ── LOAD BOARD ─────────────────────────────────────────────────
async function loadBoard() {
  document.getElementById('refresh-btn').textContent = '↻';
  document.getElementById('error-banner').style.display = 'none';
  try {
    const r   = await fetch('/api/board?action=load');
    const res = await r.json();
    if (res.board) {
      board = res.board;
      // Garante arrays existem
      if (!Array.isArray(board.rsCards))    board.rsCards    = [];
      if (!Array.isArray(board.rsRuaCards)) board.rsRuaCards = [];
      if (!Array.isArray(board.movesLog))   board.movesLog   = [];
      if (!board.rsPhases?.length)    board.rsPhases    = DEFAULT_BOARD.rsPhases;
      if (!board.rsRuaPhases?.length) board.rsRuaPhases = DEFAULT_BOARD.rsRuaPhases;
    }
  } catch(e) {
    document.getElementById('error-banner').style.display = 'block';
    document.getElementById('error-banner').textContent = '⚠️ Erro ao conectar: ' + e.message;
  }
  renderBoard();
  renderStageGrids();
  document.getElementById('stat-total').textContent = board.cards.length;
  document.getElementById('refresh-btn').textContent = '↻ Atualizar';
  if (document.getElementById('page-rs').classList.contains('active'))     renderRsBoard('rs');
  if (document.getElementById('page-rs-rua').classList.contains('active')) renderRsBoard('rs_rua');
  syncPipefy();
}

async function syncPipefy() {
  try {
    const r = await fetch('/api/board?action=sync');
    const res = await r.json();
    if (!res.ok && !res.board) return;

    if (res.pipefyError) {
      document.getElementById('error-banner').style.display = 'block';
      document.getElementById('error-banner').textContent = '⚠️ Pipefy indisponível — dados podem estar desatualizados.';
    }

    const changed = res.newCount > 0 || res.erpRemoved > 0;
    if (changed) {
      board = res.board;
      renderBoard(); renderStageGrids();
      document.getElementById('stat-total').textContent = board.cards.length;
      if (res.newCount > 0) {
        const b = document.getElementById('new-badge');
        b.textContent = `+${res.newCount} nova${res.newCount>1?'s':''} OS`;
        b.style.display = 'inline';
        setTimeout(() => b.style.display = 'none', 6000);
        playNewCard();
      }
    }
  } catch(e) { console.warn('Sync Pipefy:', e.message); }
}

// ── RENDER BOARD ───────────────────────────────────────────────
function renderBoard() {
  const wrapper = document.getElementById('kanban-wrapper');
  if (!board || !Array.isArray(board.phases)) return;
  const b = document.createElement('div'); b.className = 'kanban-board';
  board.phases.forEach((ph, i) => {
    const color = COLORS[i % COLORS.length];
    const cards = board.cards.filter(c => c.phaseId === ph.id);
    const col = document.createElement('div'); col.className = 'kanban-col';
    col.innerHTML = `
      <div class="col-header">
        <div class="col-stripe" style="background:${color}"></div>
        <div class="col-title">${ph.name}</div>
        <div class="col-count">${cards.length}</div>
      </div>
      <div class="col-body">
        ${cards.length === 0 ? '<div class="empty-col">— vazio —</div>' : cards.map(c => cardHTML(c, color)).join('')}
      </div>`;
    b.appendChild(col);
  });
  wrapper.innerHTML = ''; wrapper.appendChild(b);
  // Atualiza barra de scroll
  setTimeout(() => { const t=document.getElementById('hscroll-thumb'); if(t) t.dispatchEvent(new Event('update')); const w=document.getElementById('kanban-wrapper'); if(w) w.dispatchEvent(new Event('scroll')); }, 50);
}

function cardHTML(c, color) {
  return `
    <div class="os-card">
      <div class="card-bar" style="background:${color}"></div>
      ${c.localOnly ? '<span class="card-local">local</span>' : ''}
      <div class="card-num">#${c.osCode || c.pipefyId}</div>
      <div class="card-title">${c.title}</div>
      ${c.nomeContato ? `<div class="card-nome">👤 ${c.nomeContato}</div>` : ''}
      ${c.descricao   ? `<div class="card-desc">${c.descricao}</div>` : ''}
      <div class="card-footer">
        <div class="card-age">🕐 ${c.age != null ? c.age+'d' : '—'}</div>
        <div class="card-by">${c.tecnico || c.movedBy || '—'}</div>
      </div>
      <button onclick="openSplitModal('${c.pipefyId}')" style="margin-top:7px;width:100%;font-family:var(--fm);font-size:10px;padding:5px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='rgba(245,200,0,0.4)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">✂️ Quebrar</button>
    </div>`;
}

// ── RS BOARDS ──────────────────────────────────────────────────
function renderRsBoard(type) {
  if (!board) return;
  const isRs   = type === 'rs';
  const phases  = isRs ? board.rsPhases    : board.rsRuaPhases;
  const cards   = isRs ? board.rsCards     : board.rsRuaCards;
  const statsEl = document.getElementById(isRs ? 'rs-stats'     : 'rs-rua-stats');
  const boardEl = document.getElementById(isRs ? 'rs-kanban'    : 'rs-rua-kanban');
  const color   = isRs ? 'var(--c-rs)'  : 'var(--c-rsrua)';
  const feitoId = isRs ? 'rs_feito'     : 'rs_rua_feito';

  // Stats
  const today   = new Date().toLocaleDateString('pt-BR',{timeZone:'America/Sao_Paulo'});
  const todayCards = cards.filter(c => c.addedAt && new Date(c.addedAt).toLocaleDateString('pt-BR',{timeZone:'America/Sao_Paulo'}) === today);
  const feitos     = cards.filter(c => c.phaseId === feitoId);
  const feitosHoje = feitos.filter(c => c.movedAt && new Date(c.movedAt).toLocaleDateString('pt-BR',{timeZone:'America/Sao_Paulo'}) === today);

  statsEl.innerHTML = `
    <div class="rs-stat-card">
      <div class="rs-stat-label">Cadastrados Hoje</div>
      <div class="rs-stat-val" style="color:${color}">${todayCards.length}</div>
      <div class="rs-stat-sub">total: ${cards.length}</div>
    </div>
    <div class="rs-stat-card">
      <div class="rs-stat-label">Feitos Hoje</div>
      <div class="rs-stat-val" style="color:${color}">${feitosHoje.length}</div>
      <div class="rs-stat-sub">total feito: ${feitos.length}</div>
    </div>`;

  // Kanban
  const kb = document.createElement('div'); kb.style.cssText = 'display:flex;gap:14px;min-width:max-content;width:100%;';
  phases.forEach((ph, i) => {
    const phCards = cards.filter(c => c.phaseId === ph.id);
    const col = document.createElement('div');
    col.className = 'kanban-col'; col.style.minWidth = '260px'; col.style.width = '320px';
    col.innerHTML = `
      <div class="col-header">
        <div class="col-stripe" style="background:${color}"></div>
        <div class="col-title">${ph.name}</div>
        <div class="col-count">${phCards.length}</div>
      </div>
      <div class="col-body">
        ${phCards.length === 0 ? '<div class="empty-col">— vazio —</div>' : phCards.map(c => rsCardHTML(c, color, type, ph.id, feitoId)).join('')}
      </div>`;
    kb.appendChild(col);
  });
  boardEl.innerHTML = ''; boardEl.appendChild(kb);
}

function rsCardHTML(c, color, boardType, currentPhase, feitoId) {
  const isFeito = currentPhase === feitoId;
  const phases  = boardType === 'rs' ? board.rsPhases : board.rsRuaPhases;
  const otherPhases = phases.filter(p => p.id !== currentPhase);
  const moveOpts = otherPhases.map(p =>
    `<button onclick="moveRsCard('${c.id}','${p.id}','${boardType}')" style="font-family:var(--fm);font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;margin-right:4px;">${p.name}</button>`
  ).join('');
  return `
    <div class="os-card">
      <div class="card-bar" style="background:${color}"></div>
      <div class="card-num">#${c.osCode || c.id.slice(-4)}</div>
      <div class="card-title">${c.title || c.nomeContato || '—'}</div>
      ${c.nomeContato ? `<div class="card-nome">👤 ${c.nomeContato}</div>` : ''}
      ${c.descricao   ? `<div class="card-desc">${c.descricao}</div>` : ''}
      <div style="margin-top:8px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
        ${moveOpts}
        <button onclick="deleteRsCard('${c.id}','${boardType}')" style="font-family:var(--fm);font-size:10px;padding:4px 8px;border-radius:5px;border:1px solid rgba(239,68,68,0.2);background:transparent;color:#ef444466;cursor:pointer;">✕</button>
      </div>
    </div>`;
}

async function moveRsCard(cardId, phaseId, boardType) {
  const res = await api('POST', 'move-rs', { cardId, phaseId, boardType });
  if (!res.ok) { showToast('❌','Erro',res.error); return; }
  board = sanitizeBoardClient(board);
  const arr = boardType === 'rs' ? board.rsCards : board.rsRuaCards;
  const card = arr.find(c => c.id === cardId);
  if (card) { card.phaseId = phaseId; card.movedAt = new Date().toISOString(); }
  renderRsBoard(boardType);

function sanitizeBoardClient(b) {
  if (!b) return b;
  if (!Array.isArray(b.rsCards))    b.rsCards    = [];

function onOsNumInput() {
  const val = document.getElementById('os-num-input').value.trim();
  selCardId = null;
  document.getElementById('os-found-info').style.display = 'none';
  document.getElementById('os-found-info').style.borderLeftColor = '';
  const s = document.getElementById('os-move-suggestions'); if(s) s.remove();
  checkMove();
  if (!val || val.length < 2) return;
  const q = val.toLowerCase();
  const matches = (board?.cards || []).filter(c =>
    (c.osCode && c.osCode.includes(q)) ||
    (c.nomeContato && c.nomeContato.toLowerCase().includes(q)) ||
    (c.title && c.title.toLowerCase().includes(q)) ||
    (c.descricao && c.descricao.toLowerCase().includes(q))
  );
  if (matches.length === 1) { pickMoveCard(matches[0].pipefyId); return; }
  if (matches.length === 0) {
    document.getElementById('os-found-title').textContent = 'Nenhuma OS para "' + val + '"';
    document.getElementById('os-found-phase').textContent = 'Verifique código, nome ou descrição';
    document.getElementById('os-found-info').style.display = 'block';
    document.getElementById('os-found-info').style.borderLeftColor = '#ef4444';
    return;
  }
  // Dropdown
  const wrap = document.querySelector('.os-search-wrap');
  const sugEl = document.createElement('div');
  sugEl.id = 'os-move-suggestions';
  sugEl.style.cssText = 'position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:50;max-height:220px;overflow-y:auto;';
  matches.slice(0, 8).forEach(c => {
    const ph = board.phases.find(p => p.id === c.phaseId);
    const row = document.createElement('div');
    row.style.cssText = 'padding:9px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);transition:background 0.15s;';
    row.onmouseenter = () => row.style.background = 'var(--surface2)';
    row.onmouseleave = () => row.style.background = '';
    row.innerHTML = `<div><span style="font-family:var(--fm);font-size:11px;color:var(--accent)">${c.osCode||'—'}</span><span style="font-size:11px;color:var(--text);margin-left:8px;">${c.nomeContato||c.title}</span></div><span style="font-family:var(--fm);font-size:10px;color:var(--muted);flex-shrink:0;margin-left:8px;">${ph?.name||'—'}</span>`;
    row.onclick = () => { pickMoveCard(c.pipefyId); sugEl.remove(); };
    sugEl.appendChild(row);
  });
  wrap.style.position = 'relative'; wrap.appendChild(sugEl);
}

function donutSVG(count, goal, colorClass) {
  const R = 42, C = 2*Math.PI*R;
  const raw = goal > 0 ? count/goal : 0;
  const pct = Math.round(raw*100);
  const isEx = raw >= 1;
  const cc = isEx ? 'exceeded' : colorClass;
  const offset = C - Math.min(raw,1)*C;
  return `
    <div class="donut-svg-wrap">
      <svg class="donut-svg" width="100" height="100" viewBox="0 0 100 100">
        <circle class="donut-track" cx="50" cy="50" r="${R}"/>
        <circle class="donut-fill ${cc}" cx="50" cy="50" r="${R}" stroke-dasharray="${C}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="donut-center">
        <div class="donut-pct ${cc}">${pct}%</div>
        <div class="donut-pct-sub">${count}/${goal}</div>
      </div>
    </div>`;
}

function donutCard(label, count, goal, colorClass, isPrev) {
  const raw = goal > 0 ? count/goal : 0;
  const isEx = raw >= 1;
  const cc = isEx ? 'exceeded' : colorClass;
  const extra = count > goal ? count-goal : 0;
  const rem   = Math.max(goal-count,0);
  const badgeCls = isEx ? 'exceeded' : `ok-${colorClass}`;
  const badgeTxt = isEx ? `+${extra} além` : `faltam ${rem}`;
  return `
    <div class="donut-card ${colorClass} ${isPrev?'prevweek':''}">
      <div class="donut-card-label">${label}</div>
      ${donutSVG(count, goal, isPrev ? 'prevweek' : colorClass)}
      <div class="donut-stats">
        <div class="donut-stat-row"><span class="sl">Realizados</span><span class="sv ${isPrev?'':cc}">${count}</span></div>
        <div class="donut-stat-row"><span class="sl">Meta</span><span class="sv">${goal}</span></div>
        ${!isPrev?`<div class="donut-stat-row"><span class="donut-badge ${badgeCls}">${badgeTxt}</span></div>`:''}
      </div>
    </div>`;
}

function tecnicoTableHTML(tecHoje, tecSemana) {
  const tecnicos = ['Lucas','Diego','Kassio','Roberto','Carlos'];
  const maxH = Math.max(...tecnicos.map(t => (tecHoje.loja[t]||0)+(tecHoje.delivery[t]||0)), 1);
  const maxS = Math.max(...tecnicos.map(t => (tecSemana.loja[t]||0)+(tecSemana.delivery[t]||0)), 1);
  const rows = tecnicos.map(t => {
    const lH = tecHoje.loja[t]||0, dH = tecHoje.delivery[t]||0, totH = lH+dH;
    const lS = tecSemana.loja[t]||0, dS = tecSemana.delivery[t]||0, totS = lS+dS;
    return `<tr>
      <td>${t}</td>
      <td><span class="sv loja">${lH}</span></td>
      <td><span class="sv delivery">${dH}</span></td>
      <td style="font-weight:600">${totH}</td>
      <td><div class="tec-bar-wrap"><div class="tec-bar" style="width:${totH/maxH*100}%;background:var(--c-loja)"></div></div></td>
      <td style="font-weight:600">${totS}</td>
      <td><div class="tec-bar-wrap"><div class="tec-bar" style="width:${totS/maxS*100}%;background:var(--c-del)"></div></div></td>

  }).join('');
  return `
    <table class="tec-table">
      <thead><tr>
        <th>Técnico</th><th>Loja Hoje</th><th>Delivery Hoje</th><th>Total Hoje</th><th></th>
        <th>Total Semana</th><th></th>

    return `
      <div class="month-bar-card">

          <div class="month-bar loja"    style="height:${scale(m.loja)}px" title="Loja: ${m.loja}"></div>

// ── SONS ───────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

// Som de nova OS entrando no dash — 3 notas ascendentes suaves
function playNewCard() {
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784]; // C5, E5, G5
    notes.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.13);
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.13);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + i * 0.13 + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.13 + 0.28);
      osc.start(ctx.currentTime + i * 0.13);
      osc.stop(ctx.currentTime + i * 0.13 + 0.3);
    });
  } catch(e) {}
}

// Som de Cliente Loja — pulso duplo marcante (dois beeps com timbre diferente)
function playClienteLoja() {
  try {
    const ctx = getAudioCtx();
    [0, 0.18].forEach(delay => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(880, ctx.currentTime + delay);
      osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + delay + 0.12);
      gain.gain.setValueAtTime(0.12, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.14);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.15);
    });
  } catch(e) {}
}

// Desbloqueia AudioContext no primeiro toque do usuário
document.addEventListener('click', () => { try { getAudioCtx(); } catch(e) {} }, { once: true });

// ── SPLIT CARD ─────────────────────────────────────────────────
let splitCardId   = null;
let splitQty      = 2;
let splitTecnico  = null;

const EQUIPAMENTOS = ['Microondas', 'Purificador', 'Adega', 'Forno', 'Outro'];

function openSplitModal(pipefyId) {
  const card = (board?.cards || []).find(c => c.pipefyId === pipefyId);
  if (!card) return;
  splitCardId = pipefyId;
  splitQty    = 2;
  splitTecnico = null;

  document.getElementById('split-card-info').textContent =
    `#${card.osCode || pipefyId} — ${card.title}${card.nomeContato ? ' | ' + card.nomeContato : ''}`;

  // Reset qty buttons
  document.querySelectorAll('.split-qty-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.qty) === 2);
  });
  // Reset tecnico
  document.querySelectorAll('#split-tecnico-grid .tecnico-btn').forEach(b => b.classList.remove('selected'));

  renderSplitRows();
  document.getElementById('split-modal').classList.add('open');
}

function closeSplitModal() {
  document.getElementById('split-modal').classList.remove('open');
}

function pickSplitTecnico(name) {
  splitTecnico = name;
  document.querySelectorAll('#split-tecnico-grid .tecnico-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === name);
  });
}

function setSplitQty(qty) {
  splitQty = qty;
  document.querySelectorAll('.split-qty-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.qty) === qty);
  });
  renderSplitRows();
}

function renderSplitRows() {
  const container = document.getElementById('split-rows');
  const phases = board?.phases || [];
  // Destaque para fases de conclusão e produção
  const keyPhases = phases.filter(p =>
    ['loja_feito','delivery_feito','aprovado','producao','cliente_loja','urgencia'].includes(p.id)
  );

  container.innerHTML = Array.from({length: splitQty}, (_, i) => `
    <div class="split-row" id="split-row-${i}">
      <div class="split-row-num">Equipamento ${i + 1}</div>
      <div class="split-equip-grid">
        ${EQUIPAMENTOS.map(eq => `
          <button class="split-equip-btn ${i===0&&eq==='Microondas'?'selected':''}"
            data-row="${i}" data-equip="${eq}"
            onclick="pickSplitEquip(${i},'${eq}')">
            ${eq}
          </button>`).join('')}
        <input class="split-equip-other" id="split-other-${i}" type="text"
          placeholder="outro..." oninput="pickSplitEquipOther(${i}, this.value)"
          style="display:${i===0?'none':'inline'}"/>
      </div>
      <div style="font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:4px;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.08em;">Fase de destino</div>
      <div class="split-phase-grid">
        ${keyPhases.map((ph, pi) => {
          const color = COLORS[phases.findIndex(p=>p.id===ph.id) % COLORS.length];
          const defPhase = i === 0 ? 'loja_feito' : 'producao';
          return `<button class="split-phase-btn ${ph.id===defPhase?'selected':''}"
            data-row="${i}" data-phase="${ph.id}"
            style="${ph.id===defPhase?'background:'+color+';':''}"
            onclick="pickSplitPhase(${i},'${ph.id}','${color}')">
            <span style="width:6px;height:6px;border-radius:50%;background:${color};display:inline-block"></span>
            ${ph.name}
          </button>`;
        }).join('')}
      </div>
    </div>`).join('');

  // Set default equip for row 0
  const firstEquip = document.querySelector('[data-row="0"][data-equip="Microondas"]');
  if (firstEquip) firstEquip.classList.add('selected');
}

function pickSplitEquip(rowIdx, equip) {
  document.querySelectorAll(`[data-row="${rowIdx}"].split-equip-btn`).forEach(b => b.classList.remove('selected'));
  const btn = document.querySelector(`[data-row="${rowIdx}"][data-equip="${equip}"]`);
  if (btn) btn.classList.add('selected');
  const other = document.getElementById(`split-other-${rowIdx}`);
  if (equip === 'Outro') { other.style.display = 'inline'; other.focus(); }
  else other.style.display = 'none';
}

function pickSplitEquipOther(rowIdx, val) {
  // Clear preset selections
  document.querySelectorAll(`[data-row="${rowIdx}"].split-equip-btn`).forEach(b => {
    b.classList.toggle('selected', b.dataset.equip === 'Outro');
  });
}

function pickSplitPhase(rowIdx, phaseId, color) {
  document.querySelectorAll(`[data-row="${rowIdx}"].split-phase-btn`).forEach(b => {
    b.classList.remove('selected'); b.style.background = '';  b.style.color = '';
  });
  const btn = document.querySelector(`[data-row="${rowIdx}"][data-phase="${phaseId}"]`);
  if (btn) { btn.classList.add('selected'); btn.style.background = color; btn.style.color = '#000'; }
}

function getSplitData() {
  return Array.from({length: splitQty}, (_, i) => {
    // Equipamento
    const selEquipBtn = document.querySelector(`[data-row="${i}"].split-equip-btn.selected`);
    let equip = selEquipBtn?.dataset.equip || '';
    if (equip === 'Outro') equip = document.getElementById(`split-other-${i}`)?.value?.trim() || 'Outro';

    // Fase
    const selPhaseBtn = document.querySelector(`[data-row="${i}"].split-phase-btn.selected`);
    const phaseId = selPhaseBtn?.dataset.phase || (i === 0 ? 'loja_feito' : 'producao');

    return { equipamento: equip, phaseId };
  });
}

async function submitSplit() {
  const btn = document.getElementById('split-confirm-btn');
  btn.disabled = true; btn.textContent = '⏳ Quebrando...';

  const splits = getSplitData();
  try {
    const res = await api('POST', 'split-card', {
      pipefyId: splitCardId, splits, tecnico: splitTecnico
    });
    if (!res.ok) throw new Error(res.error);
    board = (await (await fetch('/api/board?action=load')).json()).board || board;
    renderBoard(); renderStageGrids();
    document.getElementById('stat-total').textContent = board.cards.length;
    closeSplitModal();
    showToast('✂️', 'OS quebrada!', `${res.created} fichas criadas`);
  } catch(e) { showToast('❌','Erro',e.message); }

  btn.disabled = false; btn.textContent = '✂️ Quebrar OS';
}

// ── CLEANUP AGUARDANDO RETIRADA ────────────────────────────────
async function cleanupRet() {
  try {
    const r   = await fetch('/api/board?action=cleanup-ret');
    const res = await r.json();
    if (res.removed > 0) {
      // Recarrega o board para refletir remoções
      await loadBoard();
      const b = document.getElementById('new-badge');
      b.textContent = `−${res.removed} retirada${res.removed>1?'s':''} finalizada${res.removed>1?'s':''}`;
      b.style.background = 'rgba(239,68,68,0.15)';
      b.style.color = '#ef4444';
      b.style.display = 'inline';
      setTimeout(() => { b.style.display='none'; b.style.background=''; b.style.color=''; }, 8000);
    }
  } catch(e) { console.warn('cleanup-ret:', e.message); }
}

function scheduleCleanupRet() {
  // Roda nas próximas ocorrências de 08:00 e 18:00 BRT
  const targets = [8, 18];
  function msUntilNext() {
    const now = new Date(new Date().toLocaleString('en-US', { timeZone:'America/Sao_Paulo' }));
    const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    const nowMin = h*60+m;
    const targetMins = targets.map(t=>t*60);
    let diff = targetMins.find(t=>t>nowMin);
    if (diff === undefined) diff = targetMins[0]+24*60;
    return (diff - nowMin)*60*1000 - s*1000;
  }
  setTimeout(function tick() {
    cleanupRet();
    setTimeout(tick, msUntilNext());
  }, msUntilNext());
}

// ── SCROLL BAR HORIZONTAL ──────────────────────────────────────
function initHScroll() {
  const wrapper = document.getElementById('kanban-wrapper');
  const thumb   = document.getElementById('hscroll-thumb');
  const track   = document.getElementById('hscroll-track');
  if (!wrapper || !thumb || !track) return;

  function updateThumb() {
    const scrollW = wrapper.scrollWidth;
    const clientW = wrapper.clientWidth;
    if (scrollW <= clientW) { thumb.style.width = '100%'; return; }
    const ratio     = clientW / scrollW;
    const thumbW    = Math.max(ratio * track.clientWidth, 40);
    const maxScroll = scrollW - clientW;
    const maxLeft   = track.clientWidth - thumbW;
    const left      = (wrapper.scrollLeft / maxScroll) * maxLeft;
    thumb.style.width = thumbW + 'px';
    thumb.style.left  = left + 'px';
  }

  wrapper.addEventListener('scroll', updateThumb);
  window.addEventListener('resize', updateThumb);

  // Drag thumb
  let dragging = false, startX = 0, startScroll = 0;
  thumb.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX;
    startScroll = wrapper.scrollLeft;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const scrollW  = wrapper.scrollWidth;
    const clientW  = wrapper.clientWidth;
    const maxScroll = scrollW - clientW;
    const thumbW   = thumb.offsetWidth;
    const maxLeft  = track.clientWidth - thumbW;
    const dx       = e.clientX - startX;
    const ratio    = maxScroll / maxLeft;
    wrapper.scrollLeft = Math.max(0, Math.min(startScroll + dx * ratio, maxScroll));
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  // Click on track to jump
  track.addEventListener('click', e => {
    if (e.target === thumb) return;
    const rect     = track.getBoundingClientRect();
    const clickX   = e.clientX - rect.left;
    const scrollW  = wrapper.scrollWidth;
    const clientW  = wrapper.clientWidth;
    const ratio    = (clickX / track.clientWidth);
    wrapper.scrollLeft = ratio * (scrollW - clientW);
  });

  // Touch support
  let tStartX = 0, tStartScroll = 0;
  thumb.addEventListener('touchstart', e => {
    tStartX = e.touches[0].clientX;
    tStartScroll = wrapper.scrollLeft;
  }, { passive: true });
  thumb.addEventListener('touchmove', e => {
    const scrollW  = wrapper.scrollWidth;
    const clientW  = wrapper.clientWidth;
    const maxScroll = scrollW - clientW;
    const thumbW   = thumb.offsetWidth;
    const maxLeft  = track.clientWidth - thumbW;
    const dx       = e.touches[0].clientX - tStartX;
    const ratio    = maxScroll / maxLeft;
    wrapper.scrollLeft = Math.max(0, Math.min(tStartScroll + dx * ratio, maxScroll));
  }, { passive: true });

  updateThumb();
  // Re-update after board renders
  setTimeout(updateThumb, 500);
}

// ── INIT ───────────────────────────────────────────────────────
// Renderiza fases imediatamente com board padrão — não espera API
renderBoard();
renderStageGrids();
initHScroll();
// Busca dados reais do banco em seguida
loadBoard();
// Cleanup de Aguardando Retirada ao abrir + agendado 2x/dia
cleanupRet();
scheduleCleanupRet();
// Banco: atualiza tela a cada 10s
setInterval(() => {
  loadBoard();
}, 10000);
// Pipefy: sync a cada 30s separado
setInterval(() => {
  syncPipefy();
  if (document.getElementById('page-metas').classList.contains('active')) loadGoals();
}, 30000);
