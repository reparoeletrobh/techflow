<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
/* 🔐 TF-GUARD Fase 1 */
(function(){
  if(location.pathname==='/login'||location.pathname==='/login.html')return;
  var K=localStorage.getItem('tf_key');
  if(!K){location.replace('/login?next='+encodeURIComponent(location.pathname));return;}
  var _f=window.fetch;
  window.fetch=function(u,o){
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('/api/auth')===-1){
        o=o||{};
        var kk=localStorage.getItem('tf_key')||'';
        if(o.headers&&typeof o.headers.set==='function'){o.headers.set('x-tf-key',kk);}
        else{o.headers=Object.assign({},o.headers||{},{'x-tf-key':kk});}
      }
    }catch(e){}
    return _f.call(this,u,o);
  };
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Log — Reparo Eletro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#171717;--b1:#1e1e1e;
  --text:#e8e8e8;--muted:#555;--y:#f5c800;--g:#16c784;
  --r:#ef4444;--o:#f97316;--b:#3b9eff;
  --fm:'DM Mono',monospace;--fh:'Syne',sans-serif;--fb:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:12px;}

/* HEADER */
.log-header{
  display:flex;align-items:center;gap:12px;padding:0 20px;
  height:50px;border-bottom:2px solid var(--y);background:var(--s1);
}
.logo{font-family:var(--fh);font-size:14px;font-weight:800;}
.logo span{color:var(--y);}
.logo em{font-style:normal;font-family:var(--fm);font-size:10px;color:var(--muted);margin-left:8px;}
.hdr-r{margin-left:auto;display:flex;gap:8px;align-items:center;}
.hbtn{font-family:var(--fm);font-size:10px;padding:5px 12px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--muted);cursor:pointer;transition:.15s;}
.hbtn:hover{color:var(--text);border-color:var(--y);}
.hbtn.danger{color:var(--r);border-color:rgba(239,68,68,.3);}
.hbtn.danger:hover{background:rgba(239,68,68,.08);}
.st{font-family:var(--fm);font-size:10px;background:var(--s1);border:1px solid var(--b1);padding:3px 9px;border-radius:4px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* TOOLBAR */
.toolbar{
  display:flex;align-items:center;gap:8px;padding:8px 20px;
  border-bottom:1px solid var(--b1);background:var(--s1);flex-wrap:wrap;
}
.fsel{background:var(--bg);border:1px solid var(--b1);border-radius:6px;padding:5px 8px;color:var(--text);font-family:var(--fm);font-size:10px;}
.finp{background:var(--bg);border:1px solid var(--b1);border-radius:6px;padding:5px 10px;color:var(--text);font-family:var(--fm);font-size:10px;outline:none;width:180px;}
.finp:focus{border-color:var(--y);}

/* TABLE */
.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 120px);}
table{width:100%;border-collapse:collapse;min-width:900px;}
thead th{
  position:sticky;top:0;z-index:5;
  background:var(--s2);font-family:var(--fm);font-size:9px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;
  text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap;
}
td{padding:7px 10px;border-bottom:1px solid var(--b1);vertical-align:top;}
tr:hover td{background:rgba(255,255,255,.02);}
tr.err td{border-left:2px solid var(--r);padding-left:8px;}
tr.warn td{border-left:2px solid var(--o);padding-left:8px;}

.ts{font-family:var(--fm);font-size:9px;color:var(--muted);white-space:nowrap;}
.mod{font-family:var(--fm);font-size:9px;background:var(--b1);padding:2px 6px;border-radius:3px;white-space:nowrap;}
.fid{font-family:var(--fm);font-size:9px;color:var(--y);}
.fnm{font-size:11px;}
.acao{font-size:11px;}
.fase{font-family:var(--fm);font-size:10px;white-space:nowrap;}
.arrow{color:var(--muted);margin:0 3px;}
.gtx{color:var(--b);font-size:10px;}
.det{color:var(--muted);font-size:10px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{display:inline-block;font-family:var(--fm);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;}
.bok {background:rgba(22,199,132,.1);color:var(--g);border:1px solid rgba(22,199,132,.2);}
.berr{background:rgba(239,68,68,.1);color:var(--r);border:1px solid rgba(239,68,68,.2);}
.bwrn{background:rgba(249,115,22,.1);color:var(--o);border:1px solid rgba(249,115,22,.2);}

.empty{text-align:center;padding:50px;color:var(--muted);font-family:var(--fm);font-size:11px;}
</style>
</head>
<body>

<div id="diag-banner" style="background:#f5c800;color:#000;padding:8px 20px;font-family:monospace;font-size:12px;font-weight:bold;">
  ✅ LOG.HTML CARREGADO — <span id="diag-time"></span>
  <button onclick="document.getElementById('diag-banner').style.display='none'" style="margin-left:10px;background:#000;color:#f5c800;border:none;padding:2px 8px;cursor:pointer;">✕</button>
</div>
<script>document.getElementById('diag-time').textContent=new Date().toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo'});</script>
<div class="log-header">
  <div class="logo">Reparo<span>Eletro</span><em>📋 Log do Sistema</em></div>
  <div class="hdr-r">
    <div class="dot"></div>
    <span class="st" id="st-total">—</span>
    <button class="hbtn" onclick="carregar()">↻ Atualizar</button>
    <button class="hbtn danger" onclick="limpar()">🗑 Limpar</button>
  </div>
</div>

<div class="toolbar">
  <select class="fsel" id="f-mod" onchange="carregar()">
    <option value="">Todos os módulos</option>
    <option>Pipe ADM</option><option>Orçamento</option><option>Logística</option>
    <option>Frente de Loja</option><option>Board</option><option>Financeiro</option>
    <option>Vendas</option><option>Balcão</option><option>Webhook MP</option>
  </select>
  <select class="fsel" id="f-sts" onchange="carregar()">
    <option value="">Todos os status</option>
    <option value="ok">✅ OK</option>
    <option value="erro">❌ Erro</option>
    <option value="aviso">⚠️ Aviso</option>
  </select>
  <input class="finp" id="f-q" placeholder="🔍 Buscar ficha, ação…" oninput="filtrar(this.value)">
  <select class="fsel" id="f-lim" onchange="carregar()">
    <option value="100">Últimas 100</option>
    <option value="200" selected>Últimas 200</option>
    <option value="500">Últimas 500</option>
  </select>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th>Horário</th><th>Módulo</th><th>Ficha</th><th>Ação</th>
        <th>De → Para</th><th>Gatilho</th><th>Status</th><th>Detalhe</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
var todos = [];
var FASES = {aguardando_aprovacao:'Ag. Aprovação',ultima_chamada:'Última Chamada',aprovados:'Aprovados',video_enviado:'Vídeo Enviado',analise_compra:'Análise Compra',equipamento_comprado:'Equip. Comprado',programar_entrega:'Prog. Entrega',solicitar_entrega:'Solic. Entrega',entrega_solicitada:'Entrega Solic.',receber:'Receber',erp:'ERP',producao:'Produção',cliente_loja:'Cliente Loja',nf_emitida:'NF Emitida',faturamento:'Faturamento',entrega_liberada:'Entrega Lib.',rota_criada:'Rota Criada',pago:'Pago',analise:'Análise',comprado:'Comprado'};
function fn(id){return FASES[id]||id||'';}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function ts(t){
  if(!t)return'—';
  var d=new Date(t);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'America/Sao_Paulo'});
}

function renderizar(lista){
  var tb=document.getElementById('tbody');
  if(!lista.length){tb.innerHTML='<tr><td colspan="8" class="empty">Nenhuma entrada no log ainda.<br><small style="opacity:.5">As ações do sistema aparecerão aqui automaticamente.</small></td></tr>';return;}
  tb.innerHTML=lista.map(function(e){
    var cls=e.status==='erro'?'err':e.status==='aviso'?'warn':'';
    var bdg=e.status==='erro'?'<span class="badge berr">❌ erro</span>':e.status==='aviso'?'<span class="badge bwrn">⚠️ aviso</span>':'<span class="badge bok">✅ ok</span>';
    var dp=e.de&&e.para?esc(fn(e.de))+'<span class="arrow">→</span>'+esc(fn(e.para)):e.para?'→ '+esc(fn(e.para)):e.de?esc(fn(e.de)):' — ';
    return '<tr class="'+cls+'">'+
      '<td class="ts">'+ts(e.ts)+'</td>'+
      '<td><span class="mod">'+esc(e.modulo)+'</span></td>'+
      '<td><div class="fid">'+esc(e.fichaId)+'</div><div class="fnm">'+esc(e.ficha)+'</div></td>'+
      '<td class="acao">'+esc(e.acao)+'</td>'+
      '<td class="fase">'+dp+'</td>'+
      '<td class="gtx">'+esc(e.gatilho||'—')+'</td>'+
      '<td>'+bdg+'</td>'+
      '<td class="det" title="'+esc(e.detalhe)+'">'+esc(e.detalhe||'')+'</td>'+
    '</tr>';
  }).join('');
}

async function carregar(){
  var mod=document.getElementById('f-mod').value;
  var sts=document.getElementById('f-sts').value;
  var lim=document.getElementById('f-lim').value;
  var url='/api/log?action=list&limit='+lim+(mod?'&modulo='+encodeURIComponent(mod):'')+(sts?'&status='+encodeURIComponent(sts):'');
  try{
    var r=await fetch(url);
    var d=await r.json();
    if(!d.ok)throw new Error(d.error||'Erro na API');
    todos=d.entries||[];
    document.getElementById('st-total').textContent=d.total+' entr.';
    var q=document.getElementById('f-q').value;
    renderizar(q?todos.filter(function(e){return JSON.stringify(e).toLowerCase().includes(q.toLowerCase());}):todos);
  }catch(e){
    document.getElementById('tbody').innerHTML='<tr><td colspan="8" class="empty">Erro: '+esc(e.message)+'</td></tr>';
  }
}

function filtrar(q){
  if(!q){renderizar(todos);return;}
  renderizar(todos.filter(function(e){return JSON.stringify(e).toLowerCase().includes(q.toLowerCase());}));
}

async function limpar(){
  if(!confirm('Limpar todo o log?'))return;
  await fetch('/api/log?action=clear');
  todos=[];document.getElementById('st-total').textContent='0 entr.';renderizar([]);
}

carregar();
setInterval(function(){ if(!document.hidden) carregar(); },60000);
</script>
</body>
</html>
