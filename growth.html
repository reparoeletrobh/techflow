<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080a;--surface:#0f1114;--surface2:#181b1f;--border:#1e2228;
  --text:#f0f2f5;--muted:#5a6270;--dim:#2a2f38;
  --accent:#f97316;--green:#22c55e;--red:#ef4444;--blue:#3b9eff;
  --yellow:#f5c800;--purple:#a855f7;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;--fb:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;}
.logo{font-family:var(--fh);font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#f97316,#f5c800);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.hdr-right{display:flex;gap:8px;align-items:center;}
.hbtn{font-family:var(--fm);font-size:10px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.hbtn:hover{color:var(--text);border-color:var(--accent);}
.hbtn.act{color:var(--accent);border-color:rgba(249,115,22,.4);background:rgba(249,115,22,.08);}

/* SCORE DO DIA */
.score-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:16px;}
.score-num{font-family:var(--fh);font-size:28px;font-weight:800;}
.score-label{font-family:var(--fm);font-size:11px;color:var(--muted);}
.score-track{flex:1;height:8px;background:var(--dim);border-radius:4px;overflow:hidden;}
.score-fill{height:100%;border-radius:4px;transition:width .4s ease;background:linear-gradient(90deg,var(--accent),var(--yellow));}
.score-pct{font-family:var(--fh);font-size:16px;font-weight:800;}
.score-data{font-family:var(--fm);font-size:11px;color:var(--muted);}
.score-streak{display:flex;align-items:center;gap:4px;font-family:var(--fm);font-size:11px;color:var(--yellow);}

/* TABS */
.tabs-bar{display:flex;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:52px;z-index:90;}
.tab-btn{font-family:var(--fm);font-size:11px;padding:11px 18px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* PANES */
.pane{display:none;padding:20px;max-width:900px;margin:0 auto;}
.pane.active{display:block;}

/* LISTA DE AÇÕES DO DIA */
.acoes-list{display:flex;flex-direction:column;gap:10px;}

.acao-card{border-radius:12px;border:1px solid var(--border);background:var(--surface);overflow:hidden;transition:all .2s;cursor:pointer;}
.acao-card:hover{border-color:var(--dim);}
.acao-card.feita{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04);}
.acao-card.nao-feita.atrasada{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.04);animation:pulse-red 2s infinite;}
@keyframes pulse-red{0%,100%{border-color:rgba(239,68,68,.5);}50%{border-color:rgba(239,68,68,.9);}}

.acao-inner{display:flex;align-items:center;gap:14px;padding:14px 16px;}
.check-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:18px;}
.feita .check-btn{background:var(--green);border-color:var(--green);}
.nao-feita.atrasada .check-btn{border-color:rgba(239,68,68,.6);}
.acao-body{flex:1;}
.acao-nome{font-family:var(--fb);font-size:14px;font-weight:600;margin-bottom:3px;transition:all .2s;}
.feita .acao-nome{text-decoration:line-through;color:var(--muted);}
.acao-desc{font-family:var(--fm);font-size:10px;color:var(--muted);}
.acao-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;text-align:right;}
.streak-badge{font-family:var(--fh);font-size:13px;font-weight:800;display:flex;align-items:center;gap:3px;}
.freq-badge{font-family:var(--fm);font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid var(--border);color:var(--muted);}
.alert-badge{font-family:var(--fm);font-size:10px;font-weight:700;color:var(--red);display:flex;align-items:center;gap:4px;}

/* SEÇÃO */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-family:var(--fh);font-size:15px;font-weight:800;}
.btn-add{font-family:var(--fm);font-size:11px;padding:6px 14px;border-radius:7px;border:1px solid var(--accent);background:rgba(249,115,22,.1);color:var(--accent);cursor:pointer;font-weight:700;}

/* SEMANA VISUAL */
.semana-grid{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.semana-row{display:flex;align-items:center;gap:8px;}
.semana-nome{font-family:var(--fm);font-size:11px;color:var(--muted);width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.semana-dias{display:flex;gap:4px;}
.dia-dot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:9px;border:1px solid var(--border);}
.dia-dot.ok{background:rgba(34,197,94,.2);border-color:rgba(34,197,94,.4);color:var(--green);}
.dia-dot.miss{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red);}
.dia-dot.skip{background:transparent;color:var(--muted);}
.dia-dot.hoje{border-color:var(--accent);}
.semana-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.semana-header-nome{width:180px;flex-shrink:0;}
.dia-label{width:28px;text-align:center;font-family:var(--fm);font-size:9px;color:var(--muted);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:460px;max-height:90vh;overflow-y:auto;padding:24px;}
.modal-title{font-family:var(--fh);font-size:15px;font-weight:800;margin-bottom:18px;}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.form-label{font-family:var(--fm);font-size:10px;color:var(--muted);}
.form-input,.form-select,.form-textarea{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:var(--fm);font-size:12px;outline:none;transition:border-color .15s;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{min-height:56px;resize:vertical;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.btn-cancel{font-family:var(--fm);font-size:11px;padding:8px 16px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;}
.btn-save{font-family:var(--fm);font-size:11px;padding:8px 18px;border-radius:7px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:700;}
.btn-del{font-family:var(--fm);font-size:11px;padding:8px 16px;border-radius:7px;border:1px solid rgba(239,68,68,.3);background:transparent;color:var(--red);cursor:pointer;margin-right:auto;}

/* CONQUISTAS */
.conquistas{display:flex;flex-wrap:wrap;gap:10px;}
.conquista{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px;}
.conquista.desbloqueada{border-color:rgba(245,200,0,.4);background:rgba(245,200,0,.04);}
.conquista.bloqueada{opacity:.4;}
.conq-icon{font-size:24px;}
.conq-nome{font-family:var(--fh);font-size:13px;font-weight:800;}
.conq-desc{font-family:var(--fm);font-size:10px;color:var(--muted);}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;font-family:var(--fm);font-size:12px;font-weight:700;padding:10px 18px;border-radius:8px;opacity:0;transform:translateY(10px);transition:all .25s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

/* AÇÃO FEITA ANIMAÇÃO */
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.pop{animation:pop .25s ease;}

/* CAT BADGE */
.cat-badge{font-family:var(--fm);font-size:9px;padding:2px 7px;border-radius:4px;}
.cat-instagram{background:rgba(168,85,247,.15);color:var(--purple);}
.cat-google{background:rgba(59,158,255,.15);color:var(--blue);}
.cat-indicacao{background:rgba(34,197,94,.15);color:var(--green);}
.cat-conteudo{background:rgba(245,200,0,.15);color:var(--yellow);}
.cat-pj{background:rgba(249,115,22,.15);color:var(--accent);}
.cat-outros{background:rgba(90,98,112,.15);color:var(--muted);}

.empty{text-align:center;padding:48px;color:var(--muted);font-family:var(--fm);font-size:12px;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🚀</div>
    <span>Growth</span>
  </div>
  <div class="hdr-right">
    <span class="score-data" id="hdr-data"></span>
    <button class="hbtn" onclick="openModalAcao()">+ Ação</button>
  </div>
</header>

<!-- SCORE BAR -->
<div class="score-bar">
  <div>
    <div class="score-label">HOJE</div>
    <div class="score-num" id="score-num">0<span style="font-size:16px;color:var(--muted)">/0</span></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
    <div class="score-track"><div class="score-fill" id="score-fill" style="width:0%"></div></div>
    <div style="display:flex;justify-content:space-between;">
      <span class="score-pct" id="score-pct">0%</span>
      <span class="score-streak" id="score-streak">🔥 — dias seguidos</span>
    </div>
  </div>
  <div id="score-emoji" style="font-size:36px;margin-left:8px;">😴</div>
</div>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="showTab('hoje',this)">Hoje</button>
  <button class="tab-btn" onclick="showTab('semana',this)">Semana</button>
  <button class="tab-btn" onclick="showTab('conquistas',this)">Conquistas</button>
  <button class="tab-btn" onclick="showTab('config',this)">Ações</button>
</div>

<!-- HOJE -->
<div class="pane active" id="pane-hoje">
  <div class="sec-header" style="margin-bottom:16px;">
    <div>
      <div class="sec-title" id="hoje-titulo">Ações de hoje</div>
      <div style="font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:2px;" id="hoje-sub"></div>
    </div>
  </div>
  <div class="acoes-list" id="lista-hoje"></div>
</div>

<!-- SEMANA -->
<div class="pane" id="pane-semana">
  <div class="sec-header"><div class="sec-title">Histórico da semana</div></div>
  <div id="semana-content"></div>
</div>

<!-- CONQUISTAS -->
<div class="pane" id="pane-conquistas">
  <div class="sec-header"><div class="sec-title">🏆 Conquistas</div></div>
  <div class="conquistas" id="lista-conquistas"></div>
</div>

<!-- CONFIG -->
<div class="pane" id="pane-config">
  <div class="sec-header">
    <div class="sec-title">Gerenciar Ações</div>
    <button class="btn-add" onclick="openModalAcao()">+ Nova Ação</button>
  </div>
  <div class="acoes-list" id="lista-config"></div>
</div>

<!-- MODAL AÇÃO -->
<div class="overlay" id="modal-acao">
  <div class="modal">
    <div class="modal-title" id="modal-titulo">Nova Ação de Growth</div>
    <input type="hidden" id="acao-id">
    <div class="form-group">
      <label class="form-label">Nome da ação</label>
      <input class="form-input" id="acao-nome" placeholder="ex: Pedir avaliação Google para 2 clientes">
    </div>
    <div class="form-group">
      <label class="form-label">Descrição / Como fazer</label>
      <textarea class="form-textarea" id="acao-desc" placeholder="ex: Após entregar o equipamento, enviar o link do Google pelo WhatsApp"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select class="form-select" id="acao-cat">
        <option value="google">🔵 Google / SEO</option>
        <option value="instagram">🟣 Instagram</option>
        <option value="indicacao">🟢 Indicação</option>
        <option value="conteudo">🟡 Conteúdo</option>
        <option value="pj">🟠 PJ / B2B</option>
        <option value="outros">⚪ Outros</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Frequência</label>
      <select class="form-select" id="acao-freq">
        <option value="diaria">Diária (todo dia)</option>
        <option value="seg-sex">Seg a Sex (dias úteis)</option>
        <option value="semanal">Semanal (1x por semana)</option>
        <option value="3x-semana">3x por semana</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="btn-del-acao" onclick="deletarAcao()" style="display:none">Excluir</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="salvarAcao()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Estado ──────────────────────────────────────────────────────────────────
var acoes = [];
var registros = {}; // { "2026-06-01": { "acao-id": true/false } }
var HOJE = new Date().toLocaleDateString('en-CA', {timeZone:'America/Sao_Paulo'});
var _editId = null;

// ── Defaults (ações pré-carregadas) ─────────────────────────────────────────
var DEFAULTS = [
  {id:'g1',nome:'Pedir avaliação Google',desc:'Enviar link do GMB pelo WhatsApp para 2 clientes que retiraram hoje',cat:'google',freq:'diaria'},
  {id:'g2',nome:'Responder avaliações Google',desc:'Responder todas as avaliações novas no Google Meu Negócio',cat:'google',freq:'diaria'},
  {id:'g3',nome:'Story no Instagram',desc:'Publicar 1 story (antes/depois, bastidores ou dica rápida)',cat:'instagram',freq:'diaria'},
  {id:'g4',nome:'Post no Instagram',desc:'Publicar 1 post no feed (antes/depois de conserto)',cat:'instagram',freq:'3x-semana'},
  {id:'g5',nome:'Mensagem de indicação',desc:'Enviar WhatsApp para 5 clientes antigos pedindo indicação',cat:'indicacao',freq:'semanal'},
  {id:'g6',nome:'Reativar cliente inativo',desc:'Contatar 2 clientes que não aparecem há mais de 6 meses',cat:'indicacao',freq:'semanal'},
];

// ── Utils ────────────────────────────────────────────────────────────────────
function toast(msg, cor){
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.background=cor||'var(--green)'; t.style.color=cor?'#fff':'#000';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200);
}
function showTab(id,btn){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='semana') renderSemana();
  if(id==='conquistas') renderConquistas();
  if(id==='config') renderConfig();
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function getDiasAtras(n){
  var d=new Date();d.setDate(d.getDate()-n);
  return d.toLocaleDateString('en-CA',{timeZone:'America/Sao_Paulo'});
}

// ── Frequência: deveria aparecer hoje? ───────────────────────────────────────
function aparecerHoje(acao, data){
  var dow = new Date(data+'T12:00:00').getDay(); // 0=Dom
  if(acao.freq==='diaria') return true;
  if(acao.freq==='seg-sex') return dow>=1&&dow<=5;
  if(acao.freq==='semanal'){
    // Aparece às segundas
    return dow===1;
  }
  if(acao.freq==='3x-semana'){
    // Seg, Qua, Sex
    return dow===1||dow===3||dow===5;
  }
  return true;
}

function acoesDoDia(data){
  return acoes.filter(a=>aparecerHoje(a,data));
}

// ── Streak global (dias com 100% das ações) ──────────────────────────────────
function calcStreak(){
  var streak=0;
  for(var i=1;i<=90;i++){
    var d=getDiasAtras(i);
    var acs=acoesDoDia(d);
    if(!acs.length) continue;
    var reg=registros[d]||{};
    var feitas=acs.filter(a=>reg[a.id]).length;
    if(feitas===acs.length) streak++;
    else break;
  }
  return streak;
}

// ── Streak por ação ──────────────────────────────────────────────────────────
function streakAcao(acaoId){
  var streak=0;
  for(var i=1;i<=90;i++){
    var d=getDiasAtras(i);
    var reg=registros[d]||{};
    if(aparecerHoje(acoes.find(a=>a.id===acaoId)||{},d)){
      if(reg[acaoId]) streak++;
      else break;
    }
  }
  return streak;
}

// ── Dias sem fazer (para alertas) ────────────────────────────────────────────
function diasSemFazer(acaoId){
  var dias=0;
  for(var i=1;i<=30;i++){
    var d=getDiasAtras(i);
    var acao=acoes.find(a=>a.id===acaoId);
    if(!acao||!aparecerHoje(acao,d)) continue;
    var reg=registros[d]||{};
    if(!reg[acaoId]) dias++;
    else break;
  }
  return dias;
}

// ── Render hoje ──────────────────────────────────────────────────────────────
function renderHoje(){
  var acs=acoesDoDia(HOJE);
  var reg=registros[HOJE]||{};
  var feitas=acs.filter(a=>reg[a.id]).length;
  var total=acs.length;
  var pct=total?Math.round((feitas/total)*100):0;

  // Score bar
  document.getElementById('score-num').innerHTML=feitas+'<span style="font-size:16px;color:var(--muted)">/'+(total)+'</span>';
  document.getElementById('score-fill').style.width=pct+'%';
  document.getElementById('score-pct').textContent=pct+'%';
  var streak=calcStreak();
  document.getElementById('score-streak').innerHTML='🔥 '+streak+' dia'+(streak!==1?'s':'')+' seguidos';
  var emojis=[['😴',0],['😐',20],['🙂',40],['💪',60],['🔥',80],['⚡',100]];
  var emoji=emojis.reduce((e,x)=>pct>=x[1]?x:e,emojis[0])[0];
  document.getElementById('score-emoji').textContent=emoji;

  // Data header
  var dtFmt=new Date(HOJE+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',timeZone:'America/Sao_Paulo'});
  document.getElementById('hdr-data').textContent=dtFmt;
  document.getElementById('hoje-titulo').textContent='Ações de hoje ('+(feitas)+'/'+total+')';
  document.getElementById('hoje-sub').textContent=pct===100?'✅ Tudo feito hoje! Incrível 🚀':(total-feitas)+' ação'+(total-feitas!==1?'s':'')+' pendente'+(total-feitas!==1?'s':'');

  // Lista — não feitas primeiro (com alerta), depois feitas
  var pendentes=acs.filter(a=>!reg[a.id]);
  var feitasAcs=acs.filter(a=>reg[a.id]);
  var sorted=[...pendentes,...feitasAcs];

  if(!sorted.length){
    document.getElementById('lista-hoje').innerHTML='<div class="empty">Nenhuma ação para hoje.<br>Vá em <b>Ações</b> e cadastre as suas rotinas de growth.</div>';
    return;
  }

  document.getElementById('lista-hoje').innerHTML=sorted.map(a=>{
    var feita=!!reg[a.id];
    var dias=diasSemFazer(a.id);
    var st=streakAcao(a.id);
    var catClass='cat-'+a.cat;
    return '<div class="acao-card '+(feita?'feita':'nao-feita')+(dias>=2&&!feita?' atrasada':'')+'" id="card-'+a.id+'" onclick="toggleAcao(\''+a.id+'\')">'+
      '<div class="acao-inner">'+
        '<div class="check-btn">'+(feita?'✓':'')+'</div>'+
        '<div class="acao-body">'+
          '<div class="acao-nome">'+esc(a.nome)+'</div>'+
          '<div class="acao-desc">'+(a.desc?esc(a.desc):'')+'</div>'+
          '<div style="display:flex;gap:6px;margin-top:5px;align-items:center;">'+
            '<span class="cat-badge '+catClass+'">'+catLabel(a.cat)+'</span>'+
            '<span class="freq-badge">'+freqLabel(a.freq)+'</span>'+
          '</div>'+
        '</div>'+
        '<div class="acao-meta">'+
          (st>0?'<div class="streak-badge" style="color:var(--yellow)">🔥'+st+'</div>':'<div class="streak-badge" style="color:var(--muted)">🔥0</div>')+
          (dias>=2&&!feita?'<div class="alert-badge">🚨 '+dias+'d</div>':'')+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function catLabel(c){
  var m={google:'Google',instagram:'Instagram',indicacao:'Indicação',conteudo:'Conteúdo',pj:'PJ/B2B',outros:'Outros'};
  return m[c]||c;
}
function freqLabel(f){
  var m={diaria:'Diária','seg-sex':'Seg-Sex',semanal:'Semanal','3x-semana':'3x/sem'};
  return m[f]||f;
}

// ── Toggle ação ───────────────────────────────────────────────────────────────
function toggleAcao(id){
  if(!registros[HOJE]) registros[HOJE]={};
  var foi=!!registros[HOJE][id];
  registros[HOJE][id]=!foi;
  if(!foi) toast('✅ Feito! +1 🔥');
  var card=document.getElementById('card-'+id);
  if(card){card.classList.add('pop');setTimeout(()=>card.classList.remove('pop'),300);}
  save();renderHoje();
}

// ── Render semana ─────────────────────────────────────────────────────────────
function renderSemana(){
  var dias7=Array.from({length:7},(_,i)=>getDiasAtras(6-i));
  var html='<div class="semana-header"><div class="semana-header-nome"></div><div class="semana-dias">';
  dias7.forEach(d=>{
    var dt=new Date(d+'T12:00:00');
    var dow=['D','S','T','Q','Q','S','S'][dt.getDay()];
    var num=dt.getDate();
    html+='<div class="dia-label">'+dow+'<br>'+num+'</div>';
  });
  html+='</div></div>';
  html+='<div class="semana-grid">';
  acoes.forEach(a=>{
    html+='<div class="semana-row"><div class="semana-nome" title="'+esc(a.nome)+'">'+esc(a.nome.substring(0,28))+'</div><div class="semana-dias">';
    dias7.forEach(d=>{
      var reg=registros[d]||{};
      var deveria=aparecerHoje(a,d);
      var eh_hoje=d===HOJE;
      if(!deveria){ html+='<div class="dia-dot skip">·</div>'; return; }
      var feita=!!reg[a.id];
      var cls=feita?'ok':(eh_hoje?'':'miss');
      if(eh_hoje&&!feita) cls='skip';
      html+='<div class="dia-dot '+cls+(eh_hoje?' hoje':'')+'">'+
        (feita?'✓':(!eh_hoje&&deveria?'✗':''))+
      '</div>';
    });
    html+='</div></div>';
  });
  html+='</div>';
  document.getElementById('semana-content').innerHTML=html;
}

// ── Render conquistas ─────────────────────────────────────────────────────────
function renderConquistas(){
  var streak=calcStreak();
  var totalFeitas=Object.values(registros).reduce((s,r)=>s+Object.values(r).filter(Boolean).length,0);
  var CONQUISTAS=[
    {icon:'🔥',nome:'Primeira ação',desc:'Complete sua 1ª ação',check:()=>totalFeitas>=1},
    {icon:'⚡',nome:'3 dias seguidos',desc:'100% por 3 dias consecutivos',check:()=>streak>=3},
    {icon:'💪',nome:'7 dias seguidos',desc:'Uma semana perfeita',check:()=>streak>=7},
    {icon:'🏆',nome:'30 dias seguidos',desc:'Um mês de consistência',check:()=>streak>=30},
    {icon:'🌟',nome:'50 ações feitas',desc:'50 check-ins completados',check:()=>totalFeitas>=50},
    {icon:'🚀',nome:'100 ações feitas',desc:'100 check-ins — você é constante',check:()=>totalFeitas>=100},
    {icon:'📈',nome:'Todas hoje',desc:'100% de um dia',check:()=>{var a=acoesDoDia(HOJE);var r=registros[HOJE]||{};return a.length>0&&a.every(ac=>r[ac.id]);}},
  ];
  document.getElementById('lista-conquistas').innerHTML=CONQUISTAS.map(c=>{
    var ok=c.check();
    return '<div class="conquista '+(ok?'desbloqueada':'bloqueada')+'">'+
      '<div class="conq-icon">'+c.icon+'</div>'+
      '<div><div class="conq-nome">'+esc(c.nome)+'</div><div class="conq-desc">'+esc(c.desc)+'</div></div>'+
      (ok?'<div style="font-size:20px;margin-left:auto">✅</div>':'<div style="font-size:16px;margin-left:auto;color:var(--muted)">🔒</div>')+
    '</div>';
  }).join('');
}

// ── Render config ─────────────────────────────────────────────────────────────
function renderConfig(){
  document.getElementById('lista-config').innerHTML=acoes.length?acoes.map(a=>{
    return '<div class="acao-card" style="cursor:default">'+
      '<div class="acao-inner">'+
        '<div class="acao-body">'+
          '<div class="acao-nome">'+esc(a.nome)+'</div>'+
          '<div class="acao-desc">'+esc(a.desc||'')+'</div>'+
          '<div style="display:flex;gap:6px;margin-top:5px;">'+
            '<span class="cat-badge cat-'+a.cat+'">'+catLabel(a.cat)+'</span>'+
            '<span class="freq-badge">'+freqLabel(a.freq)+'</span>'+
          '</div>'+
        '</div>'+
        '<button class="hbtn" onclick="openModalAcao(\''+a.id+'\')">Editar</button>'+
      '</div>'+
    '</div>';
  }).join(''):'<div class="empty">Nenhuma ação. Clique em "+ Nova Ação" para começar.</div>';
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModalAcao(id){
  _editId=id||null;
  document.getElementById('modal-titulo').textContent=id?'Editar Ação':'Nova Ação de Growth';
  document.getElementById('btn-del-acao').style.display=id?'block':'none';
  if(id){
    var a=acoes.find(x=>x.id===id)||{};
    document.getElementById('acao-id').value=a.id||'';
    document.getElementById('acao-nome').value=a.nome||'';
    document.getElementById('acao-desc').value=a.desc||'';
    document.getElementById('acao-cat').value=a.cat||'outros';
    document.getElementById('acao-freq').value=a.freq||'diaria';
  } else {
    ['acao-id','acao-nome','acao-desc'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('acao-cat').value='outros';
    document.getElementById('acao-freq').value='diaria';
  }
  document.getElementById('modal-acao').classList.add('open');
  document.getElementById('acao-nome').focus();
}
function closeModal(){document.getElementById('modal-acao').classList.remove('open');}

function salvarAcao(){
  var nome=document.getElementById('acao-nome').value.trim();
  if(!nome){alert('Nome obrigatório');return;}
  var acao={
    id: _editId||(Date.now().toString(36)),
    nome, desc:document.getElementById('acao-desc').value.trim(),
    cat:document.getElementById('acao-cat').value,
    freq:document.getElementById('acao-freq').value
  };
  if(_editId){ var i=acoes.findIndex(a=>a.id===_editId); if(i>-1)acoes[i]=acao; }
  else acoes.push(acao);
  closeModal(); save(); renderHoje();
  toast(_editId?'Ação atualizada':'Ação criada! Vai aparecer no checklist 🚀');
}

function deletarAcao(){
  if(!confirm('Excluir esta ação?'))return;
  acoes=acoes.filter(a=>a.id!==_editId);
  closeModal(); save(); renderHoje();
  toast('Ação removida','var(--red)');
}

// ── Persistência ─────────────────────────────────────────────────────────────
function save(){
  var data={acoes,registros,savedAt:new Date().toISOString()};
  fetch('/api/growth?action=salvar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).catch(()=>{});
  try{localStorage.setItem('growth_v2',JSON.stringify(data));}catch(e){}
}

function load(){
  fetch('/api/growth?action=carregar').then(r=>r.json()).then(d=>{
    if(d.ok && d.data && Array.isArray(d.data.acoes) && d.data.acoes.length>0){
      acoes=d.data.acoes; registros=d.data.registros||{};
    } else {
      loadLocal();
    }
    renderHoje();
  }).catch(function(){
    loadLocal();
    renderHoje();
  });
}

function loadLocal(){
  try{
    var raw=localStorage.getItem('growth_v2');
    if(raw){
      var d=JSON.parse(raw);
      acoes=Array.isArray(d.acoes)&&d.acoes.length>0 ? d.acoes : [...DEFAULTS];
      registros=d.registros||{};
    } else {
      acoes=[...DEFAULTS];
      registros={};
    }
  }catch(e){
    acoes=[...DEFAULTS];
    registros={};
  }
}

// Fechar modal no overlay
document.getElementById('modal-acao').addEventListener('click',function(e){if(e.target===this)closeModal();});

load();
</script>
</body>
</html>
