<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Cpolygon%20points%3D%2218%2C2%208%2C18%2015%2C18%2014%2C30%2024%2C14%2017%2C14%22%20fill%3D%22%2322c55e%22%20stroke%3D%22%2322c55e%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#252525;
  --text:#fff;--muted:#888;--dim:#333;
  --accent:#f5c800;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;--fb:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;height:50px;border-bottom:2px solid var(--accent);
  background:var(--bg);position:sticky;top:0;z-index:100;
}
.logo{font-family:var(--fh);font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.logo-icon{width:24px;height:24px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;}
.logo span{color:var(--accent);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.tab-btn{font-family:var(--fm);font-size:10px;padding:5px 13px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.tab-btn:hover{color:var(--text);border-color:#444;}
.tab-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.sync-btn{font-family:var(--fm);font-size:10px;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.sync-btn:hover{color:var(--accent);border-color:var(--accent);}
.live-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── PAGES ── */
.page{display:none;}
.page.active{display:block;}

/* ── PAINEL ── */
#page-painel{padding:20px 22px 32px;}
.painel-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.painel-title{font-family:var(--fh);font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.painel-title span{color:var(--accent);}
.painel-sub{font-family:var(--fm);font-size:11px;color:var(--muted);margin-top:3px;}

/* PHASE OVERVIEW STRIP */
.phase-strip{display:flex;gap:8px;margin-bottom:28px;overflow-x:auto;padding-bottom:4px;}
.phase-pill{
  flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;min-width:130px;position:relative;overflow:hidden;
  transition:transform 0.15s;
}
.phase-pill:hover{transform:translateY(-2px);}
.phase-pill-bar{position:absolute;top:0;left:0;right:0;height:2px;}
.phase-pill-name{font-family:var(--fh);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin-bottom:6px;}
.phase-pill-count{font-family:var(--fh);font-size:28px;font-weight:800;line-height:1;}
.phase-pill-label{font-family:var(--fm);font-size:9px;color:var(--dim);margin-top:3px;}

/* SECTION LABEL */
.section-label{font-family:var(--fm);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.section-date{font-size:11px;color:var(--text);background:var(--surface2);border:1px solid var(--border);padding:2px 10px;border-radius:20px;}

/* GOALS GRID */
.goals-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:28px;}

/* DONUT CARD */
.donut-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:20px 16px 16px;display:flex;flex-direction:column;align-items:center;gap:14px;
  position:relative;
}
.donut-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:14px 14px 0 0;}
.donut-card.fat::before{background:#f59e0b;}
.donut-card.rota::before{background:#8b5cf6;}
.donut-card-label{font-family:var(--fh);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);}
.donut-wrap{position:relative;width:110px;height:110px;}
.donut-svg{transform:rotate(-90deg);}
.d-track{fill:none;stroke:var(--surface2);stroke-width:10;}
.d-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(0.34,1.2,0.64,1);}
.d-fill.fat{stroke:#f59e0b;filter:drop-shadow(0 0 6px rgba(245,158,11,0.5));}
.d-fill.rota{stroke:#8b5cf6;filter:drop-shadow(0 0 6px rgba(139,92,246,0.5));}
.d-fill.exceeded{stroke:#22c55e;filter:drop-shadow(0 0 6px rgba(34,197,94,0.6));}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-pct{font-family:var(--fh);font-size:22px;font-weight:800;line-height:1;}
.donut-pct.fat{color:#f59e0b;} .donut-pct.rota{color:#8b5cf6;} .donut-pct.exceeded{color:#22c55e;}
.donut-sub{font-family:var(--fm);font-size:9px;color:var(--muted);margin-top:1px;}
.donut-stats{width:100%;}
.d-row{display:flex;justify-content:space-between;font-family:var(--fm);font-size:10px;padding:3px 0;border-bottom:1px solid var(--border);}
.d-row:last-child{border-bottom:none;}
.d-row .dl{color:var(--muted);}
.d-row .dv{font-weight:500;}
.d-row .dv.fat{color:#f59e0b;} .d-row .dv.rota{color:#8b5cf6;} .d-row .dv.exceeded{color:#22c55e;}
.goal-badge{font-family:var(--fm);font-size:9px;font-weight:600;padding:3px 9px;border-radius:20px;text-transform:uppercase;margin-top:6px;width:100%;text-align:center;}
.goal-badge.fat{background:rgba(245,158,11,0.12);color:#f59e0b;}
.goal-badge.rota{background:rgba(139,92,246,0.12);color:#8b5cf6;}
.goal-badge.exceeded{background:rgba(34,197,94,0.15);color:#22c55e;}

/* FLOW DIAGRAM */
.flow-wrap{display:flex;align-items:center;gap:0;margin-bottom:28px;overflow-x:auto;padding-bottom:4px;}
.flow-step{
  flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;text-align:center;min-width:90px;position:relative;
}
.flow-step-count{font-family:var(--fh);font-size:20px;font-weight:800;}
.flow-step-name{font-family:var(--fm);font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em;}
.flow-arrow{font-family:var(--fm);font-size:14px;color:var(--dim);flex-shrink:0;padding:0 4px;}

/* ── KANBAN ── */
#page-kanban{}
.kanban{display:flex;gap:10px;padding:14px 20px 24px;overflow-x:auto;min-height:calc(100vh - 50px);}
.col{width:240px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.col-head{padding:10px 12px 8px;border-bottom:1px solid var(--border);position:relative;}
.col-stripe{position:absolute;top:0;left:0;right:0;height:2px;}
.col-name{font-family:var(--fh);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;}
.col-count{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:2px;}
.col-body{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;}
.col-body::-webkit-scrollbar{width:2px;}
.col-body::-webkit-scrollbar-thumb{background:var(--border);}

/* FIN CARD */
.fin-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;animation:cardIn 0.25s ease;position:relative;overflow:hidden;}
@keyframes cardIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.fin-card:hover{border-color:#333;}
.fc-bar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.fc-num{font-family:var(--fm);font-size:11px;color:var(--accent);font-weight:500;}
.fc-nome{font-size:11px;font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fc-desc{font-size:10px;color:var(--muted);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.fc-cpf{font-family:var(--fm);font-size:10px;color:#22c55e;margin-top:4px;}
.fc-age{font-family:var(--fm);font-size:9px;color:#333;margin-top:4px;}
.fc-actions{margin-top:8px;display:flex;flex-direction:column;gap:5px;}
.btn-primary{width:100%;padding:7px 10px;border-radius:6px;border:none;cursor:pointer;font-family:var(--fm);font-size:10px;font-weight:600;transition:all 0.15s;}
.btn-primary:hover{filter:brightness(1.12);}
.btn-secondary{width:100%;padding:6px 10px;border-radius:6px;cursor:pointer;font-family:var(--fm);font-size:10px;transition:all 0.15s;background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-secondary:hover{border-color:#444;color:var(--text);}
.btn-danger{border-color:rgba(239,68,68,0.15);color:#ef444455;}
.btn-danger:hover{border-color:#ef4444;color:#ef4444;}
.empty-col{flex:1;display:flex;align-items:center;justify-content:center;color:#2a2a2a;font-family:var(--fm);font-size:10px;text-align:center;padding:12px;}
.cpf-wrap{display:flex;gap:4px;margin-top:4px;}
.cpf-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-family:var(--fm);font-size:11px;color:var(--text);outline:none;min-width:0;}
.cpf-input:focus{border-color:var(--accent);}
.cpf-save{padding:6px 10px;border-radius:6px;border:none;background:var(--accent);color:#000;font-family:var(--fm);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:400;opacity:0;pointer-events:none;transition:opacity 0.2s;backdrop-filter:blur(3px);}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:14px;padding:24px;max-width:380px;width:92%;transform:scale(0.95);transition:transform 0.2s;}
.modal-overlay.open .modal{transform:scale(1);}
.modal-title{font-family:var(--fh);font-size:17px;font-weight:800;margin-bottom:4px;}
.modal-title span{color:var(--accent);}
.modal-info{font-family:var(--fm);font-size:11px;color:var(--muted);margin-bottom:18px;padding:8px 11px;background:var(--surface2);border-radius:7px;border-left:3px solid var(--accent);}
.modal-info strong{color:var(--text);}
.field-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field-label{font-family:var(--fm);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
.f-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:var(--fb);font-size:14px;color:var(--text);width:100%;outline:none;transition:all 0.15s;}
.f-input:focus{border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.modal-cancel{font-family:var(--fm);font-size:11px;padding:8px 15px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;}
.modal-cancel:hover{color:var(--text);}
.modal-confirm{font-family:var(--fm);font-size:11px;font-weight:600;padding:8px 16px;border-radius:7px;background:var(--accent);color:#000;border:none;cursor:pointer;}
.modal-confirm:hover{filter:brightness(1.1);}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:10px;padding:11px 14px;font-family:var(--fm);font-size:11px;display:flex;align-items:center;gap:8px;transform:translateY(70px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.5);}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:640px){
  .goals-grid{grid-template-columns:1fr;}
  .phase-strip{gap:6px;}
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon">💼</div>Reparo<span>Eletro</span> — Financeiro</div>
  <div class="hdr-right">
    <button class="tab-btn active" onclick="showPage('painel')">📊 Painel</button>
    <button class="tab-btn" onclick="showPage('kanban')">📋 Fichas</button>
    <span id="sync-status" style="font-family:var(--fm);font-size:10px;color:var(--muted);"></span>
    <button class="sync-btn" onclick="syncPipefy()">↻ Sync</button>
    <div class="live-dot"></div>
  </div>
</header>

<!-- PAINEL -->
<div id="page-painel" class="page active">
  <div id="painel-content" style="padding:40px;font-family:var(--fm);font-size:12px;color:var(--muted);text-align:center;">
    Carregando...
  </div>
</div>

<!-- KANBAN -->
<div id="page-kanban" class="page">
  <div class="kanban" id="kanban">
    <div style="display:flex;align-items:center;justify-content:center;width:100%;padding:60px;flex-direction:column;gap:12px;">
      <div style="width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;"></div>
      <div style="font-family:var(--fm);font-size:11px;color:var(--muted);">Carregando...</div>
    </div>
  </div>
</div>
@keyframes spin{to{transform:rotate(360deg)}}

<!-- MODAL CPF/CNPJ -->
<div class="modal-overlay" id="cpf-modal">
  <div class="modal">
    <div class="modal-title">📋 Cadastrar <span>CPF / CNPJ</span></div>
    <div class="modal-info" id="cpf-modal-info"></div>
    <div class="field-group">
      <label class="field-label">CPF ou CNPJ do cliente</label>
      <input class="f-input" id="cpf-input" type="text" placeholder="000.000.000-00"
        onkeydown="if(event.key==='Enter')submitCpf()" oninput="maskCpfCnpj(this)"/>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('cpf-modal')">Cancelar</button>
      <button class="modal-confirm" onclick="submitCpf()">Salvar e Avançar →</button>
    </div>
  </div>
</div>

<!-- MODAL MOVER -->
<div class="modal-overlay" id="mover-modal">
  <div class="modal">
    <div class="modal-title" id="mover-title">Mover <span>Ficha</span></div>
    <div class="modal-info" id="mover-modal-info"></div>
    <div id="mover-options" style="display:flex;flex-direction:column;gap:8px;"></div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="modal-cancel" onclick="closeModal('mover-modal')">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="t-icon">✅</span>
  <div><strong id="t-title"></strong><br><span id="t-body" style="color:var(--muted);font-size:10px;"></span></div>
</div>

<script>
const PHASES = [
  { id:"aguardando_dados",  name:"Aguardando Dados",   color:"#6366f1" },
  { id:"nf_emitida",        name:"NF Emitida",          color:"#3b9eff" },
  { id:"faturamento",       name:"Faturamento",        color:"#f59e0b" },
  { id:"pagamento_agendado",name:"Pagamento Agendado", color:"#e879f9" },
  { id:"entrega_agendada",  name:"Entrega Agendada",   color:"#f97316" },
  { id:"entrega_liberada",  name:"Entrega Liberada",   color:"#22c55e" },
  { id:"rota_criada",       name:"Rota Criada",        color:"#8b5cf6" },
  { id:"item_coletado",     name:"Item Coletado",      color:"#ec4899" },
];

let records = [], goals = null, phaseCounts = {}, todayLabel = '', weekLabel = '';
let selId = null, curPage = 'painel';

// ── API ──────────────────────────────────────────────────────
async function api(action, body) {
  const r = await fetch(`/api/financeiro?action=${action}`, body ? {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  } : {});
  return r.json();
}

// ── LOAD ─────────────────────────────────────────────────────
async function load() {
  try {
    const res = await api('load');
    if (!res.ok) throw new Error(res.error);
    records     = res.records || [];
    goals       = res.goals;
    phaseCounts = res.phaseCounts || {};
    todayLabel  = res.todayLabel || '';
    weekLabel   = res.weekLabel  || '';
    if (curPage === 'painel') renderPainel();
    else renderKanban();
  } catch(e) {
    document.getElementById('painel-content').innerHTML =
      `<div style="color:#ef4444;font-family:var(--fm);font-size:12px;">Erro: ${e.message}</div>`;
  }
}

async function syncPipefy() {
  const btn = document.querySelector('.sync-btn');
  const st  = document.getElementById('sync-status');
  btn.textContent = '⏳'; btn.style.pointerEvents = 'none';
  st.textContent  = 'sincronizando...';
  try {
    const res = await api('sync');
    if (res.newCount > 0 || res.removedCount > 0) {
      await load();
      showToast('🔄','Sync concluído',`+${res.newCount} novas, ${res.removedCount} finalizadas`);
    } else { st.textContent = 'sem novidades'; setTimeout(()=>st.textContent='',3000); }
    if (res.pipefyError) st.textContent = '⚠️ ' + res.pipefyError;
  } catch(e) { st.textContent = '⚠️ ' + e.message; }
  btn.textContent = '↻ Sync'; btn.style.pointerEvents = '';
}

// ── PAINEL ────────────────────────────────────────────────────
function renderPainel() {
  if (!goals) return;
  const total = Object.values(phaseCounts).reduce((a,b)=>a+b,0);

  // Phase strip
  const stripHTML = PHASES.map(ph => {
    const cnt = phaseCounts[ph.id] || 0;
    return `
      <div class="phase-pill">
        <div class="phase-pill-bar" style="background:${ph.color}"></div>
        <div class="phase-pill-name">${ph.name}</div>
        <div class="phase-pill-count" style="color:${ph.color}">${cnt}</div>
        <div class="phase-pill-label">ficha${cnt!==1?'s':''}</div>
      </div>`;
  }).join('');

  // Flow diagram
  const flowHTML = PHASES.map((ph,i) => {
    const cnt = phaseCounts[ph.id] || 0;
    const arrow = i < PHASES.length-1 ? '<div class="flow-arrow">→</div>' : '';
    return `
      <div class="flow-step" style="border-top:2px solid ${ph.color}">
        <div class="flow-step-count" style="color:${ph.color}">${cnt}</div>
        <div class="flow-step-name">${ph.name}</div>
      </div>${arrow}`;
  }).join('');

  // Donut generator
  function donut(count, goal, cls, label) {
    const R = 46, C = 2*Math.PI*R;
    const raw = goal > 0 ? count/goal : 0;
    const pct = Math.round(raw*100);
    const isEx = raw >= 1;
    const cc = isEx ? 'exceeded' : cls;
    const offset = C - Math.min(raw,1)*C;
    const rem  = Math.max(goal-count,0);
    const extra = count-goal;
    const badgeText = isEx ? `+${extra} além da meta` : `faltam ${rem}`;
    return `
      <div class="donut-card ${cls}">
        <div class="donut-card-label">${label}</div>
        <div class="donut-wrap">
          <svg class="donut-svg" width="110" height="110" viewBox="0 0 110 110">
            <circle class="d-track" cx="55" cy="55" r="${R}"/>
            <circle class="d-fill ${cc}" cx="55" cy="55" r="${R}"
              stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
          </svg>
          <div class="donut-center">
            <div class="donut-pct ${cc}">${pct}%</div>
            <div class="donut-sub">${count}/${goal}</div>
          </div>
        </div>
        <div class="donut-stats">
          <div class="d-row"><span class="dl">Realizados</span><span class="dv ${cc}">${count}</span></div>
          <div class="d-row"><span class="dl">Meta</span><span class="dv">${goal}</span></div>
        </div>
        <div class="goal-badge ${isEx?'exceeded':cls}">${badgeText}</div>
      </div>`;
  }

  document.getElementById('painel-content').innerHTML = `
    <div class="painel-header">
      <div>
        <div class="painel-title">Painel <span>Financeiro</span></div>
        <div class="painel-sub">// ${total} ficha${total!==1?'s':''} ativas no sistema</div>
      </div>
    </div>

    <div class="section-label">📍 Situação atual — todas as etapas</div>
    <div class="phase-strip">${stripHTML}</div>

// ── KANBAN ────────────────────────────────────────────────────
function renderKanban() {
  const kb = document.getElementById('kanban');
  kb.innerHTML = '';
  PHASES.forEach(ph => {
    const cards = records.filter(r => r.phaseId === ph.id);
    const col   = document.createElement('div'); col.className = 'col';
    col.innerHTML = `
      <div class="col-head">
        <div class="col-stripe" style="background:${ph.color}"></div>
        <div class="col-name">${ph.name}</div>
        <div class="col-count">${cards.length} ficha${cards.length!==1?'s':''}</div>
      </div>
      <div class="col-body">
        ${cards.length ? cards.map(r => cardHTML(r, ph.color)).join('') : '<div class="empty-col">— vazio —</div>'}
      </div>`;
    kb.appendChild(col);
  });
}

function cardHTML(r, color) {
  return `
    <div class="fin-card">
      <div class="fc-bar" style="background:${color}"></div>
      <div class="fc-num">#${r.osCode || r.pipefyId?.slice(-4) || '—'}</div>
      <div class="fc-nome">${r.nomeContato || r.title || '—'}</div>
      ${r.descricao ? `<div class="fc-desc">${r.descricao}</div>` : ''}
      ${r.valor     ? `<div style="font-family:var(--fm);font-size:11px;color:#22c55e;margin-top:3px;">💰 R$ ${parseFloat((r.valor||"0").replace(",",".").replace(/[^0-9.]/g,""))||r.valor}</div>` : ''}
      ${r.servicos  ? `<div style="font-family:var(--fm);font-size:10px;color:#888;margin-top:3px;padding:5px 8px;background:var(--surface2);border-radius:5px;border-left:2px solid #333;">🔧 ${r.servicos}</div>` : ''}
      ${r.cpfCnpj   ? `<div class="fc-cpf">📄 ${r.cpfCnpj}</div>` : ''}
      ${r.phaseId==='pagamento_agendado' && r.dataAgendadaDisplay ? `<div style="font-family:var(--fm);font-size:10px;color:#e879f9;margin-top:4px;">⏰ Cobrança: ${r.dataAgendadaDisplay}</div>` : ''}
      ${r.phaseId==='entrega_agendada' && r.dataAgendadaDisplay ? `<div style="font-family:var(--fm);font-size:10px;color:#f97316;margin-top:4px;">📅 ${r.dataAgendadaDisplay}</div>` : ''}
      ${r.age != null ? `<div class="fc-age">🕐 ${r.age}d</div>` : ''}
      <div class="fc-actions">${buildActions(r)}</div>
    </div>`;
}

function buildActions(r) {
  let h = '';
  if (r.phaseId==='aguardando_dados')
    h += `<button class="btn-primary" style="background:var(--accent);color:#000;" onclick="openNfModal('${r.id}')">📋 Informar CPF / CNPJ</button>`;
  if (r.phaseId==='nf_emitida') {
    if (r.chaveAcesso) {
      const nomeRaw   = 'Nota Fiscal ' + (r.nomeContato||'Cliente').replace(/[^\w\s]/g,'').trim() + ' ' + (r.telefone||'').replace(/\D/g,'').slice(-4);
      h += '<button class="btn-primary" style="background:#3b9eff;color:#fff;" data-chave="' + r.chaveAcesso + '" data-nome="' + nomeRaw.replace(/"/g,'') + '" onclick="baixarDanfe(this)">📄 Baixar DANFE</button>';
    }
    h += '<button class="btn-primary" style="background:#22c55e;color:#000;" onclick="nfEnviada(\'' + r.id + '\')">✅ NF Enviada → Faturamento</button>';
  }
    if (r.phaseId==='faturamento')
    h += `<button class="btn-primary" style="background:#22c55e;color:#000;" onclick="openMoverModal('${r.id}')">💰 Registrar Pagamento</button>`;
  if (r.phaseId==='pagamento_agendado') {
    h += `<button class="btn-primary" style="background:#22c55e;color:#000;" onclick="openMoverPagAgendado('${r.id}')">💰 Recebido — Mover</button>`;
    h += `<button class="btn-primary" style="background:#22c55e;color:#000;" onclick="mover('${r.id}','entrega_liberada')">✅ Entrega Liberada</button>`;
  }
  if (r.phaseId==='entrega_agendada')
    h += `<button class="btn-primary" style="background:#22c55e;color:#000;" onclick="mover('${r.id}','entrega_liberada')">✅ Liberar Entrega</button>`;
  if (r.phaseId==='entrega_liberada')
    h += `<button class="btn-primary" style="background:#8b5cf6;color:#fff;" onclick="mover('${r.id}','rota_criada')">🗺️ Rota Criada</button>`;
  if (r.phaseId==='rota_criada')
    h += `<button class="btn-primary" style="background:#ec4899;color:#fff;" onclick="mover('${r.id}','item_coletado')">📦 Item Coletado</button>`;
  h += `<button class="btn-secondary btn-danger" onclick="excluir('${r.id}')">✕ Excluir</button>`;
  return h;
}

// ── NOTA FISCAL ──────────────────────────────────────────────
var nfSelId = null;

function openNfModal(id) {
  nfSelId = id;
  const r = records.find(x => x.id === id);
  if (!r) return;
  // Preenche modal com dados da ficha
  document.getElementById('nf-modal-info').innerHTML =
    '<strong>#' + (r.osCode||'—') + ' — ' + (r.nomeContato||r.title||'—') + '</strong>';
  document.getElementById('nf-cpfcnpj').value = r.cpfCnpj || '';
  // Valor puxado da ficha e normalizado (vírgula → ponto para input[type=number])
  const _vRaw = String(r.valor || r.valorContrato || '');
  const _vNum = parseFloat(_vRaw.replace(/[^0-9,.]/g,'').replace(',','.')) || 0;
  document.getElementById('nf-valor').value = _vNum > 0 ? _vNum.toFixed(2) : '';
  document.getElementById('nf-valor').removeAttribute('readonly');
  const valorRow = document.getElementById('nf-valor-row');
  if (valorRow) valorRow.style.display = '';
  // Monta descrição padrão com serviço e garantia
  const servDesc = r.servicos ? r.servicos + '. ' : '';
  document.getElementById('nf-desc').value    =
    servDesc + 'Serviço de conserto e manutenção de eletrodoméstico. Garantia de 90 dias.';
  document.getElementById('nf-status').style.display = 'none';
  document.getElementById('nf-modal').style.display  = 'flex';
  setTimeout(() => document.getElementById('nf-cpfcnpj').focus(), 200);
}

function nfModalClose() {
  document.getElementById('nf-modal').style.display = 'none';
}

function nfStatus(msg, color) {
  const el = document.getElementById('nf-status');
  el.textContent = msg;
  el.style.background = color + '22';
  el.style.color = color;
  el.style.border = '1px solid ' + color + '44';
  el.style.display = 'block';
}

async function nfEmitir() {
  const cpfcnpj = document.getElementById('nf-cpfcnpj').value.trim();
  const desc    = document.getElementById('nf-desc').value.trim();
  const valor   = document.getElementById('nf-valor').value.trim();
  if (!cpfcnpj) { nfStatus('Informe o CPF ou CNPJ do tomador.','#ef4444'); return; }
  if (!valor)   { nfStatus('Informe o valor do serviço.','#ef4444'); return; }

  const r = records.find(x => x.id === nfSelId);
  const btn = document.getElementById('nf-btn-emitir');
  btn.disabled = true; btn.textContent = '⏳ Processando...';
  nfStatus('Salvando dados e abrindo emissor...','#3b9eff');

  // 1. Salva CPF/CNPJ e valor na ficha
  await api('set-cpf',   { id: nfSelId, cpfCnpj: cpfcnpj });
  await api('set-valor', { id: nfSelId, valor: valor });

  // 2. Chama API para emissão automática com certificado A1
  nfStatus('Emitindo nota fiscal...', '#3b9eff');
  try {
    const nfRes = await fetch('/api/nfse?action=emitir', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tomadorCpfCnpj: cpfcnpj,
        tomadorNome:    r ? (r.nomeContato || '') : '',
        discriminacao:  desc,
        valor:          valor,
      }),
    });
    const nfData = await nfRes.json();

    if (nfData.ok) {
      // Salva número e chave de acesso na ficha
      await api('emitir-nf', { id: nfSelId, chaveAcesso: nfData.chaveAcesso || '', numeroNF: nfData.nNFSe || nfData.numero || '' });
      await load();
      nfModalClose();
      showToast('✅', 'NF emitida!', 'Chave: ' + (nfData.chaveAcesso || '').slice(0,20) + '...');
    } else {
      // Certificado não configurado ou erro — abre emissor manual como fallback
      if (nfData.error && nfData.error.includes('não configurado')) {
        nfStatus('⚠️ Certificado não configurado. <a href="/nf-setup" target="_blank" style="color:var(--accent)">Configure aqui</a> ou use o emissor manual.', '#f59e0b');
        await api('nf-salvar', { nfId: nfSelId, cpfCnpj, desc, valor, nomeCliente: r?.nomeContato||'', osCode: r?.osCode||'' });
        window.open('https://www.nfse.gov.br/EmissorNacional/DPS/Pessoas', '_blank');
      } else {
        nfStatus('❌ ' + nfData.error, '#ef4444');
      }
    }
  } catch(e) {
    nfStatus('❌ Erro: ' + e.message, '#ef4444');
  }

  btn.disabled = false; btn.textContent = '🧾 Emitir Nota Fiscal';
}

function openCpfModal(id) {
  selId = id;

  document.getElementById('cpf-modal').classList.add('open');

function maskCpfCnpj(input) {
  let v = input.value.replace(/\D/g,'');
  if (v.length<=11) v=v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  else v=v.replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d)/,'$1-$2');
  input.value=v;
}

async function submitCpf() {
  const cpf = document.getElementById('cpf-input').value.trim();
  if (!cpf) return;
  const res = await api('set-cpf',{id:selId,cpfCnpj:cpf});
  if (res.ok) { updateRecord(res.record); closeModal('cpf-modal'); showToast('📋','NF Emitida!','Card movido para NF Emitida'); }

}

async function moverAgendada(id) {
  const dateVal = document.getElementById('agendada-date').value;
  if (!dateVal) { showToast('⚠️','Informe a data',''); return; }
  // Format for display: DD/MM/YYYY
  const [y,m,d] = dateVal.split('-');
  const dateDisplay = `${d}/${m}/${y}`;
  const res = await api('mover',{id, phaseId:'entrega_agendada', dataAgendada: dateVal, dataAgendadaDisplay: dateDisplay});
  if (res.ok) {
    updateRecord(res.record);
    closeModal('mover-modal');
    showToast('📅','Entrega Agendada!', dateDisplay);
    if (curPage==='painel') await load();
  } else showToast('❌','Erro',res.error);
}

}

function openMoverPagAgendado(id) {
  selId = id;

async function moverPagAgendadoParaEntrega(id, phaseId, dateInputId) {
  const dateVal = document.getElementById(dateInputId).value;
  const [y,m,d] = (dateVal||'').split('-');
  const dateDisplay = dateVal ? `${d}/${m}/${y}` : '';
  const res = await api('mover',{id, phaseId, dataAgendada: dateVal, dataAgendadaDisplay: dateDisplay});
  if (res.ok) {
    updateRecord(res.record);
    closeModal('mover-modal');
    showToast('📅','Entrega Agendada!', dateDisplay);
    if (curPage==='painel') await load();
  } else showToast('❌','Erro',res.error);
}

async function mover(id, phaseId) {
  const res = await api('mover',{id,phaseId});
  if (res.ok) {
    updateRecord(res.record);
    const ph = PHASES.find(p=>p.id===phaseId);
    showToast('✅','Movido!',ph?.name||phaseId);
    // Atualiza metas se no painel
    if (curPage==='painel') await load();
  } else showToast('❌','Erro',res.error);
}

async function excluir(id) {
  const r = records.find(x=>x.id===id);
  if (!confirm(`Excluir #${r?.osCode||''} — ${r?.nomeContato||''}?`)) return;
  const res = await api('excluir',{id});
  if (res.ok) { records=records.filter(x=>x.id!==id); renderKanban(); showToast('🗑️','Excluído',''); }
}

function updateRecord(rec) {
  const idx = records.findIndex(r=>r.id===rec.id);
  if (idx>=0) records[idx]=rec; else records.unshift(rec);
  if (curPage==='kanban') renderKanban();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showPage(name) {
  curPage = name;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.tab-btn')[name==='painel'?0:1].classList.add('active');
  if (name==='painel') renderPainel();
  else renderKanban();
}

function showToast(icon,title,msg) {
  document.getElementById('t-icon').textContent=icon;
  document.getElementById('t-title').textContent=title;
  document.getElementById('t-body').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),4000);
}

        style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:var(--fm);font-size:14px;color:#22c55e;outline:none;width:160px;"
        placeholder="0,00"/>
      </div>
    </div>
    <div id="nf-status" style="display:none;font-family:var(--fm);font-size:11px;padding:8px 12px;border-radius:7px;margin-bottom:12px;"></div>
    <div style="font-family:var(--fm);font-size:10px;color:var(--muted);padding:8px 10px;background:var(--surface2);border-radius:7px;margin-bottom:12px;border-left:2px solid var(--accent);">
      ✦ Primeira vez? <a href="/nf-setup" target="_blank" style="color:var(--accent);">Configure o NF Auto</a> para preencher o formulário automaticamente com 1 clique.
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="nfModalClose()" style="font-family:var(--fm);font-size:11px;padding:8px 14px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;">Cancelar</button>
      <button onclick="nfEmitir()" id="nf-btn-emitir" style="font-family:var(--fm);font-size:11px;font-weight:600;padding:8px 16px;border-radius:7px;background:#3b9eff;color:#fff;border:none;cursor:pointer;">🧾 Emitir Nota Fiscal</button>
    </div>
  </div>
</div>
</body>
</html>
