<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
/* 🔐 TF-GUARD Fase 1 */
(function(){
  if(location.pathname==='/login'||location.pathname==='/login.html')return;
  var K=localStorage.getItem('tf_key');
  if(!K){location.replace('/login?next='+encodeURIComponent(location.pathname));return;}
  // Papel TV: acesso restrito às telas do sistema TV
  if(localStorage.getItem('tf_role')==='tv'&&location.pathname.indexOf('/tv')!==0){
    location.replace('/tv-adm');return;
  }
  var _f=window.fetch;
  window.fetch=function(u,o){
    var isApi=false;
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('/api/auth')===-1){
        isApi=true;o=o||{};
        var kk=localStorage.getItem('tf_key')||'';
        if(o.headers&&typeof o.headers.set==='function'){o.headers.set('x-tf-key',kk);}
        else{o.headers=Object.assign({},o.headers||{},{'x-tf-key':kk});}
      }
    }catch(e){}
    var p=_f.call(this,u,o);
    if(isApi){
      p=p.then(function(r){
        if(r&&r.status===401&&!window.__tfHealed){
          window.__tfHealed=true;
          localStorage.removeItem('tf_key');
          location.replace('/login?next='+encodeURIComponent(location.pathname));
        }
        return r;
      });
    }
    return p;
  };
})();
</script>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notas — Reparo Eletro BH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07080a;color:#f0f2f5;min-height:100vh;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:#0d0e12;border-bottom:1px solid #1e2228;position:sticky;top:0;z-index:50;}
.hdr-t{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.content{padding:20px;max-width:800px;margin:0 auto;}
.form-box{background:#0f1114;border:1px solid #1e2228;border-radius:12px;padding:20px;margin-bottom:20px;}
.form-box h3{font-size:11px;font-weight:800;color:#f59e0b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
.inp{width:100%;background:#181b1f;border:1px solid #2a2f38;border-radius:8px;padding:9px 14px;color:#f0f2f5;font-size:13px;outline:none;}
.inp:focus{border-color:#f59e0b;}
.lbl{font-size:10px;color:#5a6270;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.row2{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:flex-end;}
.btn-add{background:#f59e0b;border:none;color:#000;padding:9px 20px;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;height:38px;}
.ok-msg{display:none;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac;border-radius:6px;padding:8px 12px;font-size:12px;margin-top:10px;}
.nota-card{background:#181b1f;border:1px solid #1e2228;border-radius:10px;padding:14px;margin-bottom:10px;}
.nota-texto{font-size:13px;color:#f0f2f5;line-height:1.6;margin-bottom:8px;}
.nota-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge-data{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;}
.badge-ok  {background:rgba(34,197,94,.12);color:#22c55e;}
.badge-warn{background:rgba(245,158,11,.12);color:#f59e0b;}
.badge-late{background:rgba(239,68,68,.12);color:#ef4444;}
.meta{font-size:10px;color:#5a6270;}
.btn-sm{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:none;}
.btn-ok {background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.2);}
.btn-del{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}
.section-title{font-size:11px;font-weight:800;color:#5a6270;text-transform:uppercase;letter-spacing:.08em;margin:20px 0 12px;}
.empty{text-align:center;padding:40px;color:#5a6270;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-t">📝 Notas</div>
  <a href="/" style="color:#5a6270;font-size:12px;text-decoration:none;">← ADM</a>
</div>
<div class="content">

  <div class="form-box">
    <h3>✚ Nova Nota</h3>
    <div style="margin-bottom:10px;">
      <div class="lbl">Conteúdo da Nota</div>
      <textarea id="n-texto" class="inp" rows="4" placeholder="Escreva a nota aqui..." style="resize:vertical;"></textarea>
    </div>
    <div class="row2">
      <div><div class="lbl">📅 Vencimento</div><input type="date" id="n-venc" class="inp"></div>
      <div><div class="lbl">👤 Autor (opcional)</div><input type="text" id="n-autor" class="inp" placeholder="Seu nome"></div>
      <button class="btn-add" onclick="criar()">✚ Adicionar</button>
    </div>
    <div id="ok-msg" class="ok-msg">✅ Nota adicionada!</div>
  </div>

  <div class="section-title" id="sec-ativas">📋 Notas Ativas</div>
  <div id="lista-ativas"><div class="empty">Carregando...</div></div>

  <div class="section-title" style="margin-top:28px;cursor:pointer;" onclick="toggleConc()" id="sec-conc">▶ Notas Concluídas</div>
  <div id="lista-conc" style="display:none;"></div>

</div>
<script>
var _showConc=false;

function corData(ds){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var dt=new Date(ds+'T00:00:00');
  var d=Math.round((dt-hoje)/86400000);
  if(d<0)  return{cls:'badge-late',lbl:dt.toLocaleDateString('pt-BR')+' ⚠️ Vencida'};
  if(d===0)return{cls:'badge-late',lbl:'Hoje 🔴'};
  if(d<=2) return{cls:'badge-warn',lbl:dt.toLocaleDateString('pt-BR')+' 🟠'};
  return{cls:'badge-ok',lbl:dt.toLocaleDateString('pt-BR')+' 🟢'};
}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function card(n,conc){
  var cor=conc?null:corData(n.vencimento);
  return '<div class="nota-card" style="'+(conc?'opacity:.6':'border-color:'+(cor?cor.cls.includes('late')?'rgba(239,68,68,.3)':cor.cls.includes('warn')?'rgba(245,158,11,.3)':'rgba(34,197,94,.25)':'#1e2228'))+';">'
    +'<div class="nota-texto">'+esc(n.texto).replace(/\n/g,'<br>')+'</div>'
    +'<div class="nota-footer">'
    +(n.vencimento?'<span class="badge-data '+(conc?'badge-ok':cor.cls)+'">'+((conc?new Date(n.vencimento+'T00:00:00').toLocaleDateString('pt-BR'):cor.lbl))+'</span>':'')
    +(n.autor?'<span class="meta">👤 '+esc(n.autor)+'</span>':'')
    +'<span class="meta">'+new Date(n.criadaEm).toLocaleDateString('pt-BR')+'</span>'
    +(conc?'<span style="font-size:10px;color:#22c55e;">✅ Concluída</span>':'')
    +'<div style="margin-left:auto;display:flex;gap:5px;">'
    +(conc?'':'<button class="btn-sm btn-ok" onclick="concluir(\''+n.id+'\')">✅ Concluir</button>')
    +'<button class="btn-sm btn-del" onclick="excluir(\''+n.id+'\')">🗑</button>'
    +'</div></div></div>';
}
async function carregar(){
  var r=await fetch('/api/tv-notas?action=listar').then(x=>x.json());
  var at=(r.notas||[]).filter(n=>n.status==='ativa');
  var co=(r.notas||[]).filter(n=>n.status==='concluida');
  at.sort((a,b)=>a.vencimento.localeCompare(b.vencimento));
  var venc=at.filter(n=>corData(n.vencimento).cls==='badge-late').length;
  document.getElementById('sec-ativas').textContent='📋 Notas Ativas'+(venc?' ('+venc+' vencida'+(venc>1?'s':'')+'!)':'');
  document.getElementById('lista-ativas').innerHTML=at.length?at.map(n=>card(n,false)).join(''):'<div class="empty">Nenhuma nota ativa 🎉</div>';
  document.getElementById('lista-conc').innerHTML=co.length?co.map(n=>card(n,true)).join(''):'<div class="empty">Nenhuma nota concluída.</div>';
  document.getElementById('sec-conc').textContent=(_showConc?'▼':'▶')+' Notas Concluídas ('+co.length+')';
}
async function criar(){
  var txt=document.getElementById('n-texto').value.trim();
  var venc=document.getElementById('n-venc').value;
  if(!txt){alert('Escreva o conteúdo da nota');return;}
  if(!venc){alert('Escolha uma data de vencimento');return;}
  var r=await fetch('/api/tv-notas?action=criar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texto:txt,vencimento:venc,autor:document.getElementById('n-autor').value.trim()})}).then(x=>x.json());
  if(r.ok){
    document.getElementById('n-texto').value='';
    document.getElementById('n-venc').value='';
    document.getElementById('n-autor').value='';
    var m=document.getElementById('ok-msg');
    m.style.display='block';
    setTimeout(()=>{m.style.display='none';},2000);
    carregar();
  }
}
async function concluir(id){
  await fetch('/api/tv-notas?action=concluir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
  carregar();
}
async function excluir(id){
  if(!confirm('Excluir esta nota?'))return;
  await fetch('/api/tv-notas?action=excluir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
  carregar();
}
function toggleConc(){
  _showConc=!_showConc;
  document.getElementById('lista-conc').style.display=_showConc?'block':'none';
  carregar();
}
carregar();
</script>
</body>
</html>
