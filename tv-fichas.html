<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache">
<title>Fichas — TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07080a;color:#f0f2f5;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:#0f1114;border-bottom:1px solid #1e2228;position:sticky;top:0;z-index:50;}
.h-title{font-size:13px;font-weight:800;letter-spacing:.03em;}
.h-btns{display:flex;gap:8px;align-items:center;}
.btn{padding:7px 14px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;}
.btn-sync{background:#3b9eff;color:#fff;}
.btn-sync:disabled{opacity:.5;}
.sync-info{font-size:10px;color:#5a6270;}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px;height:calc(100vh - 52px);overflow:hidden;}
.col{background:#0f1114;border:1px solid #1e2228;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;}
.col-hdr{padding:12px 14px;border-bottom:1px solid #1e2228;display:flex;align-items:center;gap:8px;}
.col-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.07);color:#5a6270;margin-left:auto;}
.col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.card{background:#181b1f;border:1px solid #22272f;border-radius:10px;padding:12px;}
.card-nome{font-size:13px;font-weight:700;margin-bottom:3px;}
.card-equip{font-size:11px;color:#3b9eff;font-weight:600;margin-bottom:2px;}
.card-info{font-size:11px;color:#5a6270;margin-bottom:2px;}
.card-tel{font-size:11px;color:#f0f2f5;margin-bottom:8px;}
.card-age{font-size:10px;color:#5a6270;}
.card-btns{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.cbtn{padding:6px 11px;border-radius:6px;border:1px solid;font-size:11px;font-weight:700;cursor:pointer;background:transparent;}
.cbtn-copy{color:#22c55e;border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.08);}
.cbtn-log{color:#3b9eff;border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.08);}
.cbtn-del{color:#5a6270;border-color:rgba(90,98,112,.2);}
.red-border{border-color:rgba(239,68,68,.4)!important;}
.col1{border-top:3px solid #22c55e;}
.col2{border-top:3px solid #3b9eff;}
.col3{border-top:3px solid #ef4444;}
.empty{text-align:center;padding:30px;color:#5a6270;font-size:12px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:#000;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;display:none;z-index:999;}
</style>
</head>
<body>
<header>
  <div class="h-title">📋 Fichas — TV</div>
  <div class="h-btns">
    <span class="sync-info" id="sync-info">—</span>
    <button class="btn btn-sync" id="btn-sync" onclick="sincronizar()">🔄 Sincronizar</button>
    <a href="/tv/adm" class="btn" style="background:#1e2228;color:#f0f2f5;text-decoration:none;">← TV ADM</a>
  </div>
</header>

<div class="board">
  <div class="col col1">
    <div class="col-hdr">
      <span class="col-title" style="color:#22c55e;">📋 Ficha Criada</span>
      <span class="badge" id="b1">0</span>
    </div>
    <div class="col-body" id="col-criada"></div>
  </div>
  <div class="col col2">
    <div class="col-hdr">
      <span class="col-title" style="color:#3b9eff;">✅ Contato Feito</span>
      <span class="badge" id="b2">0</span>
    </div>
    <div class="col-body" id="col-contato"></div>
  </div>
  <div class="col col3">
    <div class="col-hdr">
      <span class="col-title" style="color:#ef4444;">⚠️ Entrar em Contato</span>
      <span class="badge" id="b3">0</span>
    </div>
    <div class="col-body" id="col-entrar"></div>
  </div>
</div>

<div class="toast" id="toast">✅ Copiado!</div>

<script>
const SISTEMA = 'tv';
let _fichas = [];

function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function fdtAge(iso){
  if(!iso) return '';
  const d=Math.floor((Date.now()-new Date(iso).getTime())/60000);
  if(d<60) return d+'min atrás';
  if(d<1440) return Math.floor(d/60)+'h atrás';
  return Math.floor(d/1440)+'d atrás';
}

function cardHTML(f){
  const isCriada = f.status==='criada';
  const isContato= f.status==='contato_feito';
  const isEntrar = f.status==='entrar_contato';
  const isLog    = f.status==='logistica';
  if(isLog) return '';

  const age = isEntrar ? `<div class="card-age" style="color:#ef4444;">🔴 +24h sem cadastro</div>` :
              isContato ? `<div class="card-age">Contato: ${fdtAge(f.contatoFeitoEm)}</div>` :
              `<div class="card-age">Chegou: ${fdtAge(f.criadoEm)}</div>`;

  const btns = isCriada ? `
    <button class="cbtn cbtn-copy" onclick="copiarEnviar('${f.id}')">📋 Copiar e Enviar</button>
    <button class="cbtn cbtn-del" onclick="excluir('${f.id}')">✕</button>
  ` : `
    <button class="cbtn cbtn-log" onclick="cadastrarLogistica('${f.id}')">🚚 Cadastrar em Logística</button>
    <button class="cbtn cbtn-del" onclick="excluir('${f.id}')">✕</button>
  `;

  return `<div class="card${isEntrar?' red-border':''}" id="card-${f.id}">
    <div class="card-nome">${esc(f.nome)}</div>
    <div class="card-equip">${esc(f.equipamento)}</div>
    <div class="card-info">${esc(f.defeito)}</div>
    <div class="card-info">${esc(f.endereco)}</div>
    <div class="card-tel">📞 ${esc(f.telefone)}</div>
    ${age}
    <div class="card-btns">${btns}</div>
  </div>`;
}

function renderCol(id, fichas, statusArr){
  const el=document.getElementById(id);
  const list=fichas.filter(f=>statusArr.includes(f.status));
  document.getElementById(id.replace('col-','b')==='b-criada'?'b1':id==='col-criada'?'b1':id==='col-contato'?'b2':'b3').textContent=list.length;
  el.innerHTML=list.length?list.map(cardHTML).join(''):'<div class="empty">Nenhuma ficha</div>';
}

function renderBadge(id, count){ document.getElementById(id).textContent=count; }

function render(){
  const criadas = _fichas.filter(f=>f.status==='criada');
  const contatos= _fichas.filter(f=>f.status==='contato_feito');
  const entrar  = _fichas.filter(f=>f.status==='entrar_contato');
  const logs=_fichas.filter(f=>f.status==='logistica');
  document.getElementById('b1').textContent=criadas.length;
  document.getElementById('b2').textContent=contatos.length;
  document.getElementById('b3').textContent=entrar.length;
  var sn=document.getElementById('st-novas');if(sn)sn.textContent=criadas.length;
  var sc=document.getElementById('st-contato');if(sc)sc.textContent=contatos.length;
  var sl=document.getElementById('st-log');if(sl)sl.textContent=logs.length;
  var se=document.getElementById('st-entrar');if(se)se.textContent=entrar.length;
  document.getElementById('col-criada').innerHTML =criadas.length ?criadas.map(cardHTML).join(''):'<div class="empty">Nenhuma ficha nova</div>';
  document.getElementById('col-contato').innerHTML=contatos.length?contatos.map(cardHTML).join(''):'<div class="empty">Nenhum contato feito</div>';
  document.getElementById('col-entrar').innerHTML =entrar.length ?entrar.map(cardHTML).join(''):'<div class="empty">Tudo em dia ✅</div>';
}

async function load(){
  try{
    const r=await fetch(`/api/fichas?action=load&sistema=${SISTEMA}`).then(x=>x.json());
    _fichas=r.fichas||[];
    render();
  }catch(e){ console.error(e); }
}

async function sincronizar(){
  const btn=document.getElementById('btn-sync');
  btn.disabled=true; btn.textContent='⏳';
  try{
    const r=await fetch('/api/fichas?action=sync').then(x=>x.json());
    document.getElementById('sync-info').textContent=r.novas?`+${r.novas} nova(s)`:(r.msg||'Sem novas');
    await load();
  }catch(e){ document.getElementById('sync-info').textContent='Erro'; }
  btn.disabled=false; btn.textContent='🔄 Sincronizar';
}

async function copiarEnviar(id){
  const f=_fichas.find(x=>x.id===id);
  if(!f) return;
  const numDigitos=String(f.waNum||'').replace(/\D/g,'');
  const linkWA='https://wa.me/'+numDigitos+'?text='+encodeURIComponent(f.textoCopiar||'');
  try{ await navigator.clipboard.writeText(linkWA); }
  catch{ const ta=document.createElement('textarea');ta.value=linkWA;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta); }
  const t=document.getElementById('toast');t.style.display='block';setTimeout(()=>t.style.display='none',2000);
  // Mover para contato_feito
  await fetch('/api/fichas?action=mover-contato',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,sistema:SISTEMA})});
  await load();
}

async function cadastrarLogistica(id){
  if(!confirm('Cadastrar esta ficha em Logística (Liberado para Coleta)?')) return;
  const r=await fetch('/api/fichas?action=cadastrar-logistica',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,sistema:SISTEMA})}).then(x=>x.json());
  if(r.ok) await load();
  else alert('Erro: '+(r.error||'falha'));
}

async function excluir(id){
  if(!confirm('Remover esta ficha da lista?')) return;
  await fetch('/api/fichas?action=excluir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,sistema:SISTEMA})});
  await load();
}

// Carregar ao abrir e sincronizar + polling a cada 5min
load();
sincronizar();
setInterval(async()=>{ await sincronizar(); }, 5*60*1000);
</script>
</body>
</html>
