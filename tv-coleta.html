<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
/* 🔐 TF-GUARD Fase 1 */
(function(){
  if(location.pathname==='/login'||location.pathname==='/login.html')return;
  var K=localStorage.getItem('tf_key');
  if(!K){location.replace('/login?next='+encodeURIComponent(location.pathname));return;}
  var _f=window.fetch;
  window.fetch=function(u,o){
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('/api/auth')===-1&&u.indexOf('k=')===-1){
        u+=(u.indexOf('?')>-1?'&':'?')+'k='+encodeURIComponent(localStorage.getItem('tf_key')||'');
      }
    }catch(e){}
    return _f.call(this,u,o);
  };
})();
</script>

<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='18,2 8,18 15,18 14,30 24,14 17,14' fill='%2322c55e' stroke='%2322c55e' stroke-linejoin='round'/%3E%3C/svg%3E">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV — Coleta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#03060e;--surface:#080d18;--surface2:#0d1425;--border:#1a2540;--text:#dce8f8;--muted:#4a607a;--accent:#3b9eff;--green:#10d982;--red:#f04060;--yellow:#f5c800;--orange:#f97316;--purple:#a855f7;--fh:'Syne',sans-serif;--fm:'DM Mono',monospace;--fb:'Inter',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;}
.hdr-title{font-family:var(--fh);font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px;}
.hdr-title span{color:var(--green);}
.sync-btn{font-family:var(--fm);font-size:10px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.sync-btn:hover{color:var(--text);border-color:var(--green);}
.hdr-stats{font-family:var(--fm);font-size:10px;color:var(--muted);display:flex;gap:12px;}
.stat-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;}
.tabs{display:flex;gap:0;padding:10px 20px 0;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{font-family:var(--fm);font-size:11px;font-weight:700;padding:8px 22px;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;cursor:pointer;color:var(--muted);background:transparent;transition:all .15s;letter-spacing:.05em;}
.tab.active{background:var(--surface);border-color:var(--border);color:var(--text);}
.tab.coleta.active{color:var(--accent);}
.tab.entrega.active{color:var(--orange);}
.tab:hover:not(.active){color:var(--text);}
.kanban{flex:1;min-height:0;display:flex;gap:0;overflow-x:auto;overflow-y:hidden;}
.kanban::-webkit-scrollbar{height:4px;}
.kanban::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.col{flex:0 0 240px;display:flex;flex-direction:column;border-right:1px solid var(--border);min-height:0;}
.col:last-child{border-right:none;flex:1;}
.col-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.col-name{font-family:var(--fm);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.col-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-family:var(--fm);font-size:10px;font-weight:700;background:var(--surface2);color:var(--muted);padding:0 5px;margin-left:6px;}
.col-body{flex:1;min-height:0;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:8px;}
.col-body::-webkit-scrollbar{width:3px;}
.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.col-empty{font-family:var(--fm);font-size:10px;color:var(--muted);text-align:center;padding:24px 8px;opacity:.5;}
.col[data-phase="liberado_coleta"] .col-name{color:#3b9eff;}
.col[data-phase="liberado_coleta"] .col-badge{background:rgba(59,158,255,.15);color:#3b9eff;}
.col[data-phase="comunicacao_realizada"] .col-name{color:#a855f7;}
.col[data-phase="comunicacao_realizada"] .col-badge{background:rgba(168,85,247,.15);color:#a855f7;}
.col[data-phase="coleta_realizada"] .col-name{color:var(--green);}
.col[data-phase="coleta_realizada"] .col-badge{background:rgba(16,217,130,.15);color:var(--green);}
.col[data-phase="remarcar"] .col-name{color:var(--orange);}
.col[data-phase="remarcar"] .col-badge{background:rgba(249,115,22,.15);color:var(--orange);}
.col[data-phase="orcamento_registrado"] .col-name{color:var(--yellow);}
.col[data-phase="orc_enviado"] .col-name{color:#06b6d4;}
.col[data-phase="orc_enviado"] .col-badge{background:rgba(6,182,212,.15);color:#06b6d4;}
.btn-orc{background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.25);color:#06b6d4;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;width:100%;margin-top:6px;}
.btn-orc:hover{background:rgba(6,182,212,.22);}
.btn-aprov{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:#22c55e;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;}
.btn-reprov{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;}
.orc-info{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.15);border-radius:6px;padding:7px 9px;margin:6px 0;font-size:11px;}
.orc-info-lbl{font-size:9px;color:#5a6270;text-transform:uppercase;letter-spacing:.06em;}
.orc-info-val{color:#f0f2f5;font-weight:700;margin-top:1px;}
.col[data-phase="orcamento_registrado"] .col-badge{background:rgba(245,200,0,.15);color:var(--yellow);}
.col[data-phase="liberado_entrega"] .col-name{color:var(--orange);}
.col[data-phase="liberado_entrega"] .col-badge{background:rgba(249,115,22,.15);color:var(--orange);}
.col[data-phase="comunicacao_entrega"] .col-name{color:#a855f7;}
.col[data-phase="comunicacao_entrega"] .col-badge{background:rgba(168,85,247,.15);color:#a855f7;}
.col[data-phase="entrega_realizada"] .col-name{color:var(--green);}
.col[data-phase="entrega_realizada"] .col-badge{background:rgba(16,217,130,.15);color:var(--green);}
.c-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;transition:border-color .15s;}
.c-card:hover{border-color:rgba(59,158,255,.2);}
.c-num{font-family:var(--fm);font-size:10px;color:var(--accent);margin-bottom:3px;}
.c-nome{font-size:12px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:4px;}
.c-desc{font-size:10px;color:var(--muted);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.c-time{font-family:var(--fm);font-size:9px;color:var(--muted);}
.c-actions{margin-top:8px;display:flex;flex-direction:column;gap:5px;}
.btn-diag{width:100%;font-family:var(--fb);font-size:11px;font-weight:700;padding:8px;border-radius:7px;border:none;cursor:pointer;background:var(--green);color:#000;transition:filter .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-diag:hover{filter:brightness(1.1);}
.btn-diag:disabled{opacity:.4;cursor:not-allowed;filter:none;}
.diag-form{margin-top:8px;display:none;}
.diag-form.open{display:block;}
.diag-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px;font-family:var(--fb);font-size:11px;color:var(--text);resize:vertical;min-height:70px;outline:none;transition:border-color .15s;}
.diag-textarea:focus{border-color:var(--green);}
.diag-submit{width:100%;margin-top:6px;font-family:var(--fm);font-size:10px;font-weight:700;padding:7px;border-radius:6px;border:none;cursor:pointer;background:var(--green);color:#000;transition:filter .15s;}
.diag-submit:hover{filter:brightness(1.1);}
.diag-submit:disabled{opacity:.4;cursor:not-allowed;}
.diag-cancel{width:100%;margin-top:4px;font-family:var(--fm);font-size:10px;padding:5px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.diag-cancel:hover{color:var(--text);border-color:var(--accent);}
.diag-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.chip{font-family:var(--fm);font-size:10px;padding:5px 11px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;}
.chip:hover{border-color:var(--accent);color:var(--text);}
.chip.on{background:rgba(59,158,255,.15);border-color:var(--accent);color:var(--accent);}
.chip.on.condenada{background:rgba(240,64,96,.15);border-color:var(--red);color:var(--red);}
.chip.on.risco{background:rgba(245,200,0,.15);border-color:var(--yellow);color:var(--yellow);}
.chip.on.acrilico{background:rgba(16,217,130,.15);border-color:var(--green);color:var(--green);}
.chip-acrilico-val{width:100%;margin-top:4px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:var(--fb);font-size:12px;color:var(--text);outline:none;display:none;}
.chip-acrilico-val:focus{border-color:var(--green);}
.diag-input{width:100%;margin-bottom:6px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px;font-family:var(--fb);font-size:11px;color:var(--text);outline:none;transition:border-color .15s;}
.diag-input:focus{border-color:var(--green);}
.diag-label{font-family:var(--fm);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.btn-pag{width:100%;font-family:var(--fb);font-size:11px;font-weight:700;padding:8px;border-radius:7px;border:none;cursor:pointer;background:var(--yellow);color:#000;transition:filter .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-pag:hover{filter:brightness(1.1);}
.btn-pag:disabled{opacity:.4;cursor:not-allowed;filter:none;}
.btn-del{width:100%;font-family:var(--fm);font-size:9px;font-weight:700;padding:5px;border-radius:6px;border:1px solid rgba(240,64,96,.3);cursor:pointer;background:rgba(240,64,96,.08);color:var(--red);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;margin-top:4px;}
.btn-del:hover{background:rgba(240,64,96,.18);}
.toast-wrap{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:9999;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:var(--fm);font-size:11px;transform:translateX(200%);opacity:0;transition:all .3s;max-width:280px;}
.toast.show{transform:translateX(0);opacity:1;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<header>
  <div class="hdr-title">🚚 Coleta <span>Kanban</span></div>
  <div class="hdr-stats" id="hdr-stats"></div>
  <button class="sync-btn" onclick="loadCurrent()">↻ Sync</button>
</header>
<div class="tabs">
  <button class="tab coleta active" id="tab-coleta" onclick="switchTab('coleta')">🚚 Coleta</button>
  <button class="tab entrega" id="tab-entrega" onclick="switchTab('entrega')">📦 Entrega</button>
</div>
<div class="kanban" id="kanban">
  <div style="display:flex;align-items:center;justify-content:center;flex:1;font-family:var(--fm);font-size:11px;color:var(--muted);"><div class="spin"></div>&nbsp;Carregando...</div>
</div>
<div class="toast-wrap" id="toasts"></div>
<script>
var COLETA_PHASES=[
  {id:'liberado_coleta',name:'Liberado para Coleta',color:'#3b9eff'},
  {id:'comunicacao_realizada',name:'Comunicação Realizada',color:'#a855f7'},
  {id:'orc_enviado',name:'Orçamento Enviado',color:'#06b6d4'},
  {id:'coleta_realizada',name:'Coleta Realizada',color:'#10d982'},
  {id:'remarcar',name:'Remarcar',color:'#f97316'},
  {id:'orcamento_registrado',name:'Orçamento Registrado',color:'#f5c800'}
];
var ENTREGA_PHASES=[
  {id:'liberado_entrega',name:'Liberado para Entrega',color:'#f97316'},
  {id:'comunicacao_entrega',name:'Comunicação Realizada',color:'#a855f7'},
  {id:'entrega_realizada',name:'Entrega Realizada',color:'#10d982'}
];
var currentTab='coleta';
var byPhase={};

function toast(msg,color){
  var wrap=document.getElementById('toasts');
  var el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  el.style.borderTopColor=color||'var(--green)';
  wrap.appendChild(el);
  requestAnimationFrame(function(){el.classList.add('show');});
  setTimeout(function(){el.classList.remove('show');setTimeout(function(){el.remove();},400);},3500);
}
function fmtDate(iso){if(!iso)return '';var d=new Date(iso);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function osNum(c){if(c.osCode)return c.osCode;var m=String(c.nomeContato||'').match(/\b\d{4}\b/g);return m?m[m.length-1]:String(c.pipefyId).slice(-4);}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-coleta').classList.toggle('active',tab==='coleta');
  document.getElementById('tab-entrega').classList.toggle('active',tab==='entrega');
  loadCurrent();
}

async function loadCurrent(){
  var phases=currentTab==='coleta'?COLETA_PHASES:ENTREGA_PHASES;
  document.getElementById('kanban').innerHTML='<div style="display:flex;align-items:center;justify-content:center;flex:1;font-family:var(--fm);font-size:11px;color:var(--muted);"><div class="spin"></div>&nbsp;Sincronizando com Pipefy...</div>';
  var ctrl=new AbortController();
  var tid=setTimeout(function(){ctrl.abort();},20000);
  try{
    if(currentTab==='coleta'){
      await fetch('/api/tv-board?action=sync-coleta',{signal:ctrl.signal}).catch(function(){});
    } else {
      await fetch('/api/tv-coleta?action=sync-entrega',{signal:ctrl.signal}).catch(function(){});
    }
    var action=currentTab==='coleta'?'load':'load-entrega';
    var r=await fetch('/api/tv-coleta?action='+action,{signal:ctrl.signal});
    clearTimeout(tid);
    var d=await r.json();
    if(!d.ok)throw new Error(d.error||'Erro ao carregar');
    byPhase=d.byPhase||{};
    renderKanban(phases);
  }catch(e){
    clearTimeout(tid);
    var msg=e.name==='AbortError'?'Timeout — servidor demorou demais':esc(e.message);
    document.getElementById('kanban').innerHTML='<div style="display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:12px;font-family:var(--fm);font-size:11px;color:#ef4444;">\u274C '+msg+'<button onclick="loadCurrent()" style="font-family:var(--fm);font-size:10px;padding:6px 16px;border-radius:6px;border:1px solid #ef4444;background:rgba(240,64,96,.1);color:#ef4444;cursor:pointer;">↻ Tentar Novamente</button></div>';
  }
}

function renderKanban(phases){
  var stats=phases.map(function(p){var n=(byPhase[p.id]||[]).length;return n>0?'<span><span class="stat-dot" style="background:'+p.color+'"></span>'+n+'</span>':'';}).filter(Boolean).join('');
  document.getElementById('hdr-stats').innerHTML=stats||'<span>Nenhuma ficha</span>';
  var html=phases.map(function(ph){
    var cards=byPhase[ph.id]||[];
    var cardsHtml=cards.length===0?'<div class="col-empty">— vazio —</div>':cards.map(function(c){
      return currentTab==='coleta'?buildCardColeta(c,ph.id):buildCardEntrega(c,ph.id);
    }).join('');
    return '<div class="col" data-phase="'+ph.id+'"><div class="col-head"><span class="col-name">'+ph.name+'</span><span class="col-badge">'+cards.length+'</span></div><div class="col-body">'+cardsHtml+'</div></div>';
  }).join('');
  document.getElementById('kanban').innerHTML=html;
}

function buildCardColeta(c,phaseId){
  var num=osNum(c);
  var diagBtns='';

  // Botão Passar Orçamento nas fases de liberado/horário marcado
  if(phaseId==='liberado_coleta'||phaseId==='comunicacao_realizada'){
    diagBtns+='<div class="c-actions">'+
      '<button class="btn-orc" onclick="abrirPassarOrc(\''+c.pipefyId+'\')">📄 Passar Orçamento</button>'+
    '</div>';
  }

  // Exibir orçamento e botões Aprovar/Reprovar
  if(phaseId==='orc_enviado'){
    diagBtns+='<div class="orc-info">'+
      '<div class="orc-info-lbl">Peça</div>'+
      '<div class="orc-info-val">'+esc(c.orcPeca||'—')+'</div>'+
      '<div class="orc-info-lbl" style="margin-top:5px;">Valor</div>'+
      '<div class="orc-info-val" style="color:#22c55e;">'+esc(c.orcValor||'—')+'</div>'+
    '</div>'+
    '<div class="c-actions">'+
      '<button class="btn-aprov" onclick="aprovarOrc(\''+c.pipefyId+'\')">✅ Aprovar</button>'+
      '<button class="btn-reprov" onclick="reprovarOrc(\''+c.pipefyId+'\')">❌ Reprovar</button>'+
    '</div>';
  }

  if(phaseId==='coleta_realizada'){
    diagBtns+='<div class="c-actions">'+
      '<button class="btn-diag" id="diag-btn-'+c.pipefyId+'" onclick="abrirDiag(\''+c.pipefyId+'\')">\uD83D\uDCCB Diagnóstico</button>'+
      '<div class="diag-form" id="diag-form-'+c.pipefyId+'">'+
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'+
          '<div class="diag-label" style="margin-bottom:0;">Qtd. TVs</div>'+
          '<input class="diag-input" type="number" min="1" max="10" value="1"'+
            ' id="diag-qtd-'+c.pipefyId+'"'+
            ' style="width:54px;text-align:center;padding:4px 6px;"'+
            ' oninput="renderDiagEquips(\''+c.pipefyId+'\',parseInt(this.value)||1)">'+
        '</div>'+
        '<div id="diag-equips-'+c.pipefyId+'">'+ renderDiagEquipSec(c.pipefyId,0,1) +'</div>'+
        '<button class="diag-submit" onclick="enviarDiag(\''+c.pipefyId+'\')">\u2705 Registrar</button>'+
        '<button class="diag-cancel" onclick="fecharDiag(\''+c.pipefyId+'\')">✕ Cancelar</button>'+
      '</div></div>';
  }
  return '<div class="c-card" id="card-'+c.pipefyId+'">'+
    '<div class="c-num">#'+esc(num)+'</div>'+
    '<div class="c-nome">'+esc(c.nomeContato||'—')+'</div>'+
    (c.descricao?'<div class="c-desc">'+esc(c.descricao)+'</div>':'')+
    '<div class="c-time">\uD83D\uDCC5 '+fmtDate(c.entradaEm||c.movedAt)+'</div>'+
    diagBtns+
    (c.modelo?'<div style="font-family:var(--fm);font-size:10px;color:var(--accent);margin-top:3px;">📺 '+esc(c.modelo)+'</div>':'')+(c.diagnostico?'<div class="c-time" style="margin-top:4px;color:#f5c800;">\uD83D\uDCCB '+esc(c.diagnostico.substring(0,60))+(c.diagnostico.length>60?'…':'')+'</div>':'')+
    '<button class="btn-del" onclick="excluirFicha(\''+c.pipefyId+'\',\'coleta\')">\uD83D\uDDD1 Excluir Ficha</button>'+
    '</div>';
}

function buildCardEntrega(c,phaseId){
  var num=osNum(c);
  var pagBtn='';
  if(phaseId==='entrega_realizada'){
    pagBtn='<div class="c-actions">'+
      '<button class="btn-pag" id="pag-btn-'+c.pipefyId+'" onclick="confirmarPagamento(\''+c.pipefyId+'\')">\uD83D\uDCB0 Confirmar Pagamento</button>'+
    '</div>';
  }
  return '<div class="c-card" id="card-'+c.pipefyId+'">'+
    '<div class="c-num">#'+esc(num)+'</div>'+
    '<div class="c-nome">'+esc(c.nomeContato||'—')+'</div>'+
    (c.descricao?'<div class="c-desc">'+esc(c.descricao)+'</div>':'')+
    '<div class="c-time">\uD83D\uDCC5 '+fmtDate(c.entradaEm||c.movedAt)+'</div>'+

function renderDiagEquips(pid, qtd) {
  var container = document.getElementById('diag-equips-'+pid);

function abrirDiag(id){var f=document.getElementById('diag-form-'+id);var b=document.getElementById('diag-btn-'+id);if(f)f.classList.toggle('open');if(b)b.style.display=f.classList.contains('open')?'none':'flex';}
function fecharDiag(id){var f=document.getElementById('diag-form-'+id);var b=document.getElementById('diag-btn-'+id);if(f)f.classList.remove('open');if(b)b.style.display='flex';}

function toggleChipM(pid,idx,nome){
  var chip=document.getElementById('chip-'+nome+'-'+pid+'-'+idx);
  if(!chip)return;
  chip.classList.toggle('on');
  if(nome==='acrilico'){var v=document.getElementById('chip-acrilico-val-'+pid+'-'+idx);if(v)v.style.display=chip.classList.contains('on')?'block':'none';}
}

function chipTextoIdx(pid,idx){
  return CHIPS_TV.filter(function(c){
    var el=document.getElementById('chip-'+c+'-'+pid+'-'+idx);
    return el&&el.classList.contains('on');
  }).map(function(c){
    if(c==='acrilico'){var v=document.getElementById('chip-acrilico-val-'+pid+'-'+idx);return'Acrilico'+(v&&v.value?': R$'+v.value:'');}
    return c.charAt(0).toUpperCase()+c.slice(1);
  }).join(' | ');
}

function chipTexto(pid){ return chipTextoIdx(pid,0); } // compat legado

function chipTextosMultiplos(pid){
  var qtdEl=document.getElementById('diag-qtd-'+pid);
  var qtd=qtdEl?parseInt(qtdEl.value)||1:1;
  var linhas=[];
  for(var i=0;i<qtd;i++){
    var modeloEl=document.getElementById('diag-modelo-'+pid+'-'+i);
    var modelo=modeloEl?modeloEl.value.trim():'';
    var diag=chipTextoIdx(pid,i);
    if(!diag)continue;
    if(qtd>1){
      linhas.push('TV '+(i+1)+(modelo?' ('+modelo+')':'')+': '+diag);
    } else {
      linhas.push((modelo?modelo+': ':'')+diag);
    }
  }
  return linhas.join(' | ');
}

async function enviarDiag(pid){
  var qtdEl=document.getElementById('diag-qtd-'+pid);
  var qtd=qtdEl?parseInt(qtdEl.value)||1:1;
  // Modelo da primeira TV (para compatibilidade com campo modelo)
  var modeloEl0=document.getElementById('diag-modelo-'+pid+'-0');
  var modelo=modeloEl0?modeloEl0.value.trim():'';
  var texto=chipTextosMultiplos(pid);
  if(!texto){toast('\u26A0\uFE0F Selecione pelo menos uma opção de diagnóstico','var(--orange)');return;}
  var btn=document.querySelector('#diag-form-'+pid+' .diag-submit');
  if(btn){btn.disabled=true;btn.textContent='Enviando...';}
  try{
    var r=await fetch('/api/tv-coleta?action=diagnostico',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pipefyId:pid,texto:texto,modelo:modelo})});
    var d=await r.json();
    if(!d.ok)throw new Error(d.error||'Falha');
    if(d.moveWarning){
      toast('\u26A0\uFE0F Diagnóstico salvo, mas falhou mover no Pipefy: '+d.moveWarning,'var(--orange)');
    } else {
      toast('\u2705 Diagnóstico registrado e enviado para Aguardando Aprovação!','var(--green)');
    }
    await loadCurrent();
  }catch(e){toast('\u274C '+e.message,'#ef4444');if(btn){btn.disabled=false;btn.textContent='\u2705 Registrar';}}
}

async function confirmarPagamento(pid){
  if(!confirm('Confirmar pagamento? Ficha será movida para ERP no Pipefy.'))return;
  var btn=document.getElementById('pag-btn-'+pid);
  if(btn){btn.disabled=true;btn.textContent='Processando...';}
  try{
    var r=await fetch('/api/tv-coleta?action=confirmar-pagamento',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pipefyId:pid})});
    var d=await r.json();
    if(!d.ok)throw new Error(d.error||'Falha');
    var msg='\u2705 Pagamento confirmado!';
    if(d.pipefyERP?.ok)msg+=' \uD83D\uDCC2 Movido para ERP';
    else msg+=' \u26A0\uFE0F ERP: '+(d.pipefyERP?.error||'n\u00E3o movido');
    toast(msg,'var(--yellow)');
    await loadCurrent();
  }catch(e){toast('\u274C '+e.message,'#ef4444');if(btn){btn.disabled=false;btn.textContent='\uD83D\uDCB0 Confirmar Pagamento';}}
}

async function excluirFicha(pid, type) {
  if(!confirm('Excluir exta ficha do kanban?\nEla pode reaparecer no pr\u00F3ximo sync se ainda estiver no Pipefy.')) return;
  var btn = document.querySelector('#card-'+pid+' .btn-del');
  if(btn){btn.disabled=true;btn.textContent='Removendo...';}
  try {
    var r=await fetch('/api/tv-coleta?action=excluir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pipefyId:pid,type:type})});
    var d=await r.json();
    if(!d.ok) throw new Error(d.error||'Falha');
    toast('\uD83D\uDDD1 Ficha removida','var(--red)');
    await loadCurrent();
  } catch(e){toast('\u274C '+e.message,'#ef4444');if(btn){btn.disabled=false;btn.textContent='\uD83D\uDDD1 Excluir Ficha';}}
}

loadCurrent();
setInterval(loadCurrent,60000);

// ── Orçamento TV ───────────────────────────────────────────────────────────
function abrirPassarOrc(pipefyId) {
  document.getElementById('orc-pipefyId').value = pipefyId;
  document.getElementById('orc-peca').value  = '';
  document.getElementById('orc-valor').value = '';
  var m = document.getElementById('modal-orc');
  m.style.display = 'flex';
  setTimeout(function(){ document.getElementById('orc-peca').focus(); }, 100);
}

function fecharModalOrc() {
  document.getElementById('modal-orc').style.display = 'none';
}

async function enviarOrcamento() {
  var pipefyId = document.getElementById('orc-pipefyId').value;
  var peca     = document.getElementById('orc-peca').value.trim();
  var valor    = document.getElementById('orc-valor').value.trim();
  if (!peca)  { alert('Informe a peça'); return; }
  if (!valor) { alert('Informe o valor'); return; }
  try {
    var r = await fetch('/api/tv-coleta?action=passar-orcamento', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pipefyId, peca, valor })
    }).then(function(x){ return x.json(); });
    if (r.ok) {
      fecharModalOrc();
      loadCurrent();
    } else {
      alert('Erro: ' + (r.error || 'falha'));
    }
  } catch(e) { alert('Erro: ' + e.message); }
}

async function aprovarOrc(pipefyId) {
  if (!confirm('Aprovar orçamento? O card irá para o board TV como Cliente Loja.')) return;
  try {
    var r = await fetch('/api/tv-coleta?action=aprovar-orcamento', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pipefyId })
    }).then(function(x){ return x.json(); });
    if (r.ok) {
      loadCurrent();
    } else {
      alert('Erro: ' + (r.error || 'falha'));
    }
  } catch(e) { alert('Erro: ' + e.message); }
}

async function reprovarOrc(pipefyId) {
  if (!confirm('Reprovar orçamento? O card voltará para Remarcar.')) return;
  try {
    var r = await fetch('/api/tv-coleta?action=reprovar-orcamento', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pipefyId })
    }).then(function(x){ return x.json(); });
    if (r.ok) {
      loadCurrent();
    } else {
      alert('Erro: ' + (r.error || 'falha'));
    }
  } catch(e) { alert('Erro: ' + e.message); }
}

// Fechar modal clicando fora
document.addEventListener('click', function(e) {
  var m = document.getElementById('modal-orc');
  if (m && e.target === m) fecharModalOrc();
});

</script>
