<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto — Reparo Eletro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap"></noscript>
<style>
:root{
  --bg:#080b0f;--s1:#0f1318;--s2:#161c23;--s3:#1e262f;
  --border:#252e38;--border2:#2e3a47;
  --text:#f0f4f8;--muted:#6b7f93;--soft:#98afc4;
  --yellow:#f5c800;--green:#2dce76;--red:#ff4b4b;--wa:#25d366;
  --fh:'Fraunces',serif;--fm:'DM Mono',monospace;--fb:'Outfit',sans-serif;
  --sticky-h:72px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);overflow-x:hidden;padding-bottom:var(--sticky-h);}

/* ── STICKY BAR ────────────────────────────────────────────── */
.sticky-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:var(--sticky-h);
  background:rgba(8,11,15,0.96);
  backdrop-filter:blur(16px);
  border-top:1px solid var(--border2);
  display:flex;align-items:center;
  padding:0 20px;gap:16px;
}
.sticky-info{flex:1;min-width:0;}
.sticky-title{
  font-family:var(--fh);font-size:15px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--text);
}
.sticky-delivery{
  display:flex;align-items:center;gap:6px;
  font-size:12px;margin-top:2px;
}
.sticky-delivery-txt{color:var(--green);font-weight:500;}
.sticky-price{
  font-family:var(--fh);font-size:20px;font-weight:900;
  color:var(--yellow);white-space:nowrap;
}
.sticky-btn{
  display:flex;align-items:center;gap:8px;
  padding:11px 22px;border-radius:10px;
  background:var(--yellow);color:#000;
  font-family:var(--fb);font-size:13px;font-weight:700;
  border:none;cursor:pointer;white-space:nowrap;
  transition:all .2s;flex-shrink:0;
}
.sticky-btn:hover{background:#ffd500;transform:translateY(-1px);}
@media(max-width:600px){
  .sticky-price{display:none;}
  .sticky-title{font-size:13px;}
  .sticky-btn{padding:10px 16px;font-size:12px;}
}

/* ── HERO (primeira dobra) ─────────────────────────────────── */
.hero-wrap{
  display:grid;
  grid-template-columns:55% 45%;
  min-height:calc(100vh - var(--sticky-h));
}
@media(max-width:768px){
  .hero-wrap{grid-template-columns:1fr;min-height:auto;}
}

/* ESQUERDA — fotos */
.hero-left{
  position:relative;
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  background:var(--s1);
}
.hero-logo{
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.hero-logo-txt{
  font-family:var(--fh);font-size:20px;font-weight:900;letter-spacing:-0.5px;
}
.hero-logo-txt span{color:var(--yellow);}
.hero-logo-sub{
  font-family:var(--fm);font-size:9px;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;margin-top:1px;
}
.hero-gallery{
  flex:1;position:relative;overflow:hidden;
  background:#0a0c0f;
  min-height:340px;
}
.gallery-track{
  display:flex;height:100%;
  transition:transform .38s cubic-bezier(.4,0,.2,1);
}
.gallery-slide{
  min-width:100%;height:100%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.gallery-slide img{
  max-width:100%;max-height:100%;
  object-fit:contain;
}
.gallery-ph{font-size:80px;color:var(--border);}
/* setas */
.gal-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,0.72);border:1px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:5;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.gal-btn:hover{background:rgba(0,0,0,0.9);border-color:rgba(255,255,255,0.4);}
.gal-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.gal-prev{left:12px;} .gal-next{right:12px;}
/* dots */
.gal-dots{
  position:absolute;bottom:12px;left:0;right:0;
  display:flex;justify-content:center;gap:5px;z-index:5;
}
.gal-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;transition:all .2s;}
.gal-dot.on{background:#fff;width:16px;border-radius:3px;}
/* contador */
.gal-count{
  position:absolute;top:12px;right:12px;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
  font-family:var(--fm);font-size:10px;color:#fff;
  padding:3px 9px;border-radius:20px;z-index:5;
}
/* descrição abaixo das fotos */
.hero-desc{
  padding:18px 24px;border-top:1px solid var(--border);
  font-size:13px;color:var(--soft);line-height:1.65;
  max-height:120px;overflow-y:auto;
}

/* DIREITA — info */
.hero-right{
  padding:32px 28px 28px;
  display:flex;flex-direction:column;gap:20px;
  background:var(--bg);
  overflow-y:auto;
  max-height:calc(100vh - var(--sticky-h));
}
@media(max-width:768px){
  .hero-right{max-height:none;padding:24px 20px;}
  .hero-left{border-right:none;border-bottom:1px solid var(--border);}
}
.prod-code{
  font-family:var(--fm);font-size:10px;color:var(--yellow);
  letter-spacing:2px;text-transform:uppercase;
}
.prod-title{
  font-family:var(--fh);font-size:clamp(22px,3vw,34px);
  font-weight:900;line-height:1.15;letter-spacing:-0.5px;
}
.prod-price-block{}
.prod-price{
  font-family:var(--fh);font-size:clamp(28px,3.5vw,42px);
  font-weight:900;color:var(--green);line-height:1;
}
.prod-price-pix{
  font-size:12px;color:var(--green);margin-top:4px;
  display:flex;align-items:center;gap:5px;
}
.prod-price-pix::before{content:'💚';}
.prod-price-old{
  font-family:var(--fm);font-size:11px;color:var(--muted);
  text-decoration:line-through;margin-bottom:4px;
}

/* Benefícios */
.benefits{
  display:flex;flex-direction:column;gap:0;
  border:1px solid var(--border);border-radius:12px;
  overflow:hidden;
}
.benefit{
  display:flex;align-items:center;gap:14px;
  padding:13px 16px;border-bottom:1px solid var(--border);
  transition:background .15s;
}
.benefit:last-child{border-bottom:none;}
.benefit:hover{background:var(--s1);}
.benefit-icon{
  width:36px;height:36px;border-radius:8px;
  background:var(--s2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.benefit-text{}
.benefit-title{font-size:13px;font-weight:600;color:var(--text);}
.benefit-sub{font-size:11px;color:var(--muted);margin-top:1px;}

/* CTA */
.btn-comprar{
  width:100%;padding:16px;border-radius:12px;
  background:var(--yellow);color:#000;
  font-family:var(--fb);font-size:16px;font-weight:700;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .2s;
}
.btn-comprar:hover{background:#ffd500;transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,200,0,.35);}
.btn-wa{
  width:100%;padding:13px;border-radius:10px;
  background:transparent;color:var(--soft);
  font-family:var(--fb);font-size:14px;font-weight:500;
  border:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;text-decoration:none;
}
.btn-wa:hover{border-color:var(--wa);color:var(--wa);}

/* ── SEÇÕES ABAIXO ─────────────────────────────────────────── */
.container{max-width:1080px;margin:0 auto;padding:0 20px;}
.tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;border-radius:100px;border:1px solid;color:var(--yellow);border-color:rgba(245,200,0,.3);background:rgba(245,200,0,.06);}
.sep{width:48px;height:3px;border-radius:2px;background:var(--yellow);margin:16px 0;}
.sec-hd{font-family:var(--fh);font-size:clamp(28px,4vw,44px);font-weight:900;line-height:1.1;letter-spacing:-.5px;}
.sec-hd em{font-style:italic;color:var(--yellow);}
.sec-sub{font-size:16px;color:var(--soft);line-height:1.7;max-width:580px;margin-top:14px;}

/* PROBLEMA */
.problema{padding:80px 20px;}
.problema-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;margin-top:48px;}
@media(max-width:768px){.problema-grid{grid-template-columns:1fr;}}
.dor-list{display:flex;flex-direction:column;gap:16px;}
.dor-item{display:flex;gap:14px;padding:18px;background:var(--s1);border:1px solid var(--border);border-radius:12px;}
.dor-icon{font-size:24px;flex-shrink:0;margin-top:2px;}
.dor-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.dor-text{font-size:13px;color:var(--soft);line-height:1.6;}
.solucao-box{background:linear-gradient(135deg,rgba(45,206,118,.08),rgba(45,206,118,.02));border:1px solid rgba(45,206,118,.2);border-radius:16px;padding:32px;}
.solucao-box .sep{background:var(--green);}
.solucao-title{font-family:var(--fh);font-size:24px;font-weight:700;margin-bottom:12px;}
.solucao-text{font-size:14px;color:var(--soft);line-height:1.7;margin-bottom:20px;}
.solucao-checks{display:flex;flex-direction:column;gap:10px;}
.solucao-check{display:flex;align-items:center;gap:10px;font-size:14px;}
.solucao-check::before{content:"✓";color:var(--green);font-weight:700;font-size:16px;flex-shrink:0;}

/* PROVA SOCIAL */
.prova{padding:60px 20px 80px;background:var(--s1);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.test-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:40px;}
.test-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:20px;}
.test-stars{color:var(--yellow);font-size:14px;margin-bottom:10px;letter-spacing:2px;}
.test-text{font-size:14px;color:var(--soft);line-height:1.65;font-style:italic;margin-bottom:14px;}
.test-author{display:flex;align-items:center;gap:10px;}
.test-avatar{width:36px;height:36px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.test-name{font-size:13px;font-weight:600;}
.test-loc{font-family:var(--fm);font-size:10px;color:var(--muted);}

/* GARANTIA */
.garantia{padding:60px 20px;}
.garantia-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px;}
@media(max-width:768px){.garantia-grid{grid-template-columns:1fr;}}
.gar-card{text-align:center;padding:28px 20px;background:var(--s1);border:1px solid var(--border);border-radius:14px;transition:border-color .2s;}
.gar-card:hover{border-color:var(--border2);}
.gar-icon{font-size:36px;margin-bottom:14px;}
.gar-title{font-size:16px;font-weight:700;margin-bottom:8px;}
.gar-text{font-size:13px;color:var(--soft);line-height:1.6;}

/* CTA FINAL */
.cta-final{padding:80px 20px;text-align:center;position:relative;overflow:hidden;}
.cta-final-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(245,200,0,.05) 0%,transparent 70%);pointer-events:none;}
.cta-final .sec-hd{max-width:640px;margin:0 auto 16px;}
.cta-final .sec-sub{margin:0 auto 36px;}
.cta-final-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.btn-cta{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:16px 36px;border-radius:12px;background:var(--yellow);color:#000;font-family:var(--fb);font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .2s;text-decoration:none;white-space:nowrap;}
.btn-cta:hover{background:#ffd500;transform:translateY(-2px);box-shadow:0 8px 32px rgba(245,200,0,.35);}
.btn-cta.large{padding:20px 48px;font-size:17px;border-radius:14px;}
.btn-cta.blue{background:#3b9eff;color:#fff;}
.btn-cta.blue:hover{background:#2589ef;box-shadow:0 8px 32px rgba(59,158,255,.3);}

/* FOOTER */
footer{padding:32px 20px;border-top:1px solid var(--border);text-align:center;}
.footer-brand{font-family:var(--fh);font-size:20px;font-weight:900;}
.footer-brand span{color:var(--yellow);}
.footer-text{font-family:var(--fm);font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:.5px;}

/* LOADING STATE */
.loading-hero{
  display:flex;align-items:center;justify-content:center;
  min-height:calc(100vh - var(--sticky-h));
  flex-direction:column;gap:16px;
}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
</style>
</head>
<body>

<!-- ── STICKY BAR ─────────────────────────────────────────── -->
<div class="sticky-bar" id="sticky-bar">
  <div class="sticky-info">
    <div class="sticky-title" id="sticky-title">Carregando...</div>
    <div class="sticky-delivery">
      <span>🚚</span>
      <span class="sticky-delivery-txt" id="sticky-delivery-txt"></span>
    </div>
  </div>
  <div class="sticky-price" id="sticky-price"></div>
  <button class="sticky-btn" onclick="abrirCheckout()">🛒 Adicionar ao Carrinho</button>
</div>

<!-- ── CONTEÚDO PRINCIPAL ─────────────────────────────────── -->
<div id="page-content">
  <div class="loading-hero" id="loading-state">
    <div class="spinner"></div>
    <div class="load-txt">Carregando produto...</div>
  </div>
</div>

<script>
var WA = '5531998301617';
var PRODUTO = null;
var GAL_IDX = 0;

// ── ENTREGA: regra por horário ──────────────────────────────
function textoEntrega(){
  var h = new Date().getHours(), m = new Date().getMinutes();
  var total = h * 100 + m;
  if(total >= 0 && total <= 1545){
    return 'Comprando nos próximos 15 min — Entregamos <strong>AINDA HOJE!</strong>';
  } else {
    return 'Comprando nos próximos 15 min — Entregamos em menos de <strong>24 Horas!</strong>';
  }
}

// ── GALERIA ─────────────────────────────────────────────────
function galGoTo(idx){
  if(!PRODUTO) return;
  var n = PRODUTO.fotos.length;
  GAL_IDX = ((idx % n) + n) % n;
  var track = document.getElementById('gal-track');
  if(track) track.style.transform = 'translateX(-'+GAL_IDX*100+'%)';
  document.querySelectorAll('.gal-dot').forEach(function(d,i){d.classList.toggle('on',i===GAL_IDX);});
  var cnt = document.getElementById('gal-count');
  if(cnt) cnt.textContent = (GAL_IDX+1)+' / '+n;
}
function galSlide(dir){ galGoTo(GAL_IDX + dir); }

// Swipe touch na galeria
var _gSx=0, _gSy=0;
document.addEventListener('touchstart',function(e){
  var t=e.changedTouches[0]; _gSx=t.clientX; _gSy=t.clientY;
},{passive:true});
document.addEventListener('touchend',function(e){
  var t=e.changedTouches[0], dx=t.clientX-_gSx, dy=t.clientY-_gSy;
  if(Math.abs(dx)<30||Math.abs(dy)>Math.abs(dx)) return;
  galSlide(dx<0?1:-1);
},{passive:true});

// ── CHECKOUT ────────────────────────────────────────────────
function abrirCheckout(){
  if(!PRODUTO) return;
  var R = function(v){ return parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,style:'currency',currency:'BRL'}); };
  var msg = encodeURIComponent(
    'Olá! Tenho interesse no equipamento:\n\n'+
    '📦 '+PRODUTO.descricao+'\n'+
    '📋 Cód: '+(PRODUTO.codigo||PRODUTO.id)+'\n'+
    '💰 Valor: '+R(PRODUTO.preco)+'\n\n'+
    'Podemos fechar?'
  );
  window.open('https://wa.me/'+WA+'?text='+msg,'_blank');
}

// ── FORMATAR PREÇO ──────────────────────────────────────────
function R(v){ return parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,style:'currency',currency:'BRL'}); }

// ── RENDERIZAR HERO ─────────────────────────────────────────
function renderHero(p){
  PRODUTO = p;
  var fotos = p.fotos && p.fotos.length ? p.fotos : [];
  var precoOld = Math.round(parseFloat(p.preco) * 2.1);

  // Galeria HTML
  var slidesHtml = fotos.length
    ? fotos.map(function(f,i){
        return '<div class="gallery-slide"><img src="'+f+'" alt="'+p.descricao+'" loading="'+(i===0?'eager':'lazy')+'"></div>';
      }).join('')
    : '<div class="gallery-slide"><div class="gallery-ph">'+(p.tipo==='Microondas'?'📡':'💧')+'</div></div>';

  var dotsHtml = fotos.length > 1
    ? fotos.map(function(_,i){return '<div class="gal-dot'+(i===0?' on':'')+'" onclick="galGoTo('+i+')"></div>';}).join('')
    : '';

  var arrowsHtml = fotos.length > 1
    ? '<button class="gal-btn gal-prev" onclick="galSlide(-1)"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>'+
      '<button class="gal-btn gal-next" onclick="galSlide(1)"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>'+
      '<div class="gal-count" id="gal-count">1 / '+fotos.length+'</div>'
    : '';

  var heroHtml = '<div class="hero-wrap">'+
    // ── ESQUERDA ──
    '<div class="hero-left">'+
      '<div class="hero-logo">'+
        '<div>'+
          '<div class="hero-logo-txt">Reparo<span>Eletro</span></div>'+
          '<div class="hero-logo-sub">equipamentos revisados</div>'+
        '</div>'+
      '</div>'+
      '<div class="hero-gallery">'+
        '<div class="gallery-track" id="gal-track">'+slidesHtml+'</div>'+
        arrowsHtml+
        (dotsHtml?'<div class="gal-dots">'+dotsHtml+'</div>':'')+
      '</div>'+
      '<div class="hero-desc">'+
        (p.descricao||'')+(p.observacao?' — '+p.observacao:'')+(p.capacidade?' · '+p.capacidade:'')+(p.tensao?' · '+p.tensao:'')+
      '</div>'+
    '</div>'+
    // ── DIREITA ──
    '<div class="hero-right">'+
      (p.codigo?'<div class="prod-code">Cód. '+p.codigo+'</div>':'')+
      '<h1 class="prod-title">'+p.descricao+'</h1>'+
      '<div class="prod-price-block">'+
        '<div class="prod-price-old">De '+R(precoOld)+'</div>'+
        '<div class="prod-price">'+R(p.preco)+'</div>'+
        '<div class="prod-price-pix">10% de desconto no PIX à vista</div>'+
      '</div>'+
      '<div class="benefits">'+
        '<div class="benefit"><div class="benefit-icon">🛡️</div><div class="benefit-text"><div class="benefit-title">Garantia de 90 Dias</div><div class="benefit-sub">Coberta pela nossa equipe técnica</div></div></div>'+
        '<div class="benefit"><div class="benefit-icon">💳</div><div class="benefit-text"><div class="benefit-title">Parcelamos em 3x sem Juros</div><div class="benefit-sub">No cartão de crédito</div></div></div>'+
        '<div class="benefit"><div class="benefit-icon">💸</div><div class="benefit-text"><div class="benefit-title">10% de Desconto no Pix</div><div class="benefit-sub">Desconto aplicado automaticamente</div></div></div>'+
        '<div class="benefit"><div class="benefit-icon">🚚</div><div class="benefit-text"><div class="benefit-title">Frete Grátis em BH</div><div class="benefit-sub">Toda a Região Metropolitana de BH</div></div></div>'+
      '</div>'+
      '<button class="btn-comprar" onclick="abrirCheckout()">🛒 Adicionar ao Carrinho</button>'+
      '<a class="btn-wa" href="https://wa.me/'+WA+'?text='+encodeURIComponent('Olá! Tenho interesse no '+p.descricao+' ('+p.codigo+'). Pode me passar mais informações?')+'" target="_blank">'+

// ── CARREGAR PRODUTO ─────────────────────────────────────────
async function init(){
  var params = new URLSearchParams(location.search);
  var prodId = params.get('id');

  if(!prodId){
    document.getElementById('page-content').innerHTML =
      '<div class="loading-hero"><div style="font-family:var(--fm);color:var(--muted)">Produto não encontrado.<br><a href="javascript:history.back()" style="color:var(--yellow)">← Voltar</a></div></div>';
    return;
  }

  // Sticky delivery desde o início
  document.getElementById('sticky-delivery-txt').innerHTML = textoEntrega();

  // Atualizar entrega a cada minuto
  setInterval(function(){
    var el = document.getElementById('sticky-delivery-txt');
    if(el) el.innerHTML = textoEntrega();
  }, 60000);

  try{
    // Tentar cache local primeiro
    var cached = null;
    try{ cached = JSON.parse(localStorage.getItem('re_vsl_v4')||'null'); }catch(e){}

    var produtos = null;
    if(cached && cached.ts && (Date.now()-cached.ts) < 300000){
      produtos = cached.data;
    } else {
      var d = await fetch('/api/vendas?action=load').then(function(r){return r.json();});
      produtos = (d.produtos||[]).filter(function(p){return !p.vendido;}).map(function(p){
        var fotos = Array.isArray(p.fotos)&&p.fotos.length ? p.fotos : [];
        return Object.assign({},p,{fotos:fotos});
      });
      try{ localStorage.setItem('re_vsl_v4', JSON.stringify({ts:Date.now(),data:produtos})); }catch(e){}
    }

    var produto = produtos.find(function(p){ return String(p.id)===String(prodId)||p.codigo===prodId; });

    if(!produto){
      document.getElementById('page-content').innerHTML =
        '<div class="loading-hero"><div style="font-family:var(--fm);color:var(--muted);text-align:center">Produto não disponível.<br><br><a href="javascript:history.back()" style="color:var(--yellow)">← Voltar ao catálogo</a></div></div>';
      return;
    }

    renderHero(produto);

  }catch(e){
    console.error(e);
    document.getElementById('page-content').innerHTML =
      '<div class="loading-hero"><div style="font-family:var(--fm);color:var(--muted)">Erro ao carregar.<br><a href="javascript:history.back()" style="color:var(--yellow)">← Voltar</a></div></div>';
  }
}

init();
</script>
