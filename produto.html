<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto — Reparo Eletro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,300&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap"></noscript>
<style>
:root{
  --bg:#080b0f; --s1:#0f1318; --s2:#161c23;
  --border:#252e38; --border2:#2e3a47;
  --text:#f0f4f8; --muted:#6b7f93; --soft:#98afc4;
  --yellow:#f5c800; --green:#2dce76; --wa:#25d366;
  --fh:'Fraunces',serif; --fm:'DM Mono',monospace; --fb:'Outfit',sans-serif;
  --bar:88px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);overflow-x:hidden;padding-bottom:var(--bar);}

/* ══ STICKY BAR — estilo FastShop ═══════════════════════════ */
.sbar{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  height:var(--bar);
  background:#0d1117;
  border-top:1.5px solid var(--border2);
  box-shadow:0 -6px 32px rgba(0,0,0,.75);
  display:flex;align-items:center;
  padding:0 28px;gap:18px;
}
/* Imagem do produto na barra */
.sbar-thumb{
  width:58px;height:58px;flex-shrink:0;
  border-radius:10px;overflow:hidden;
  border:1px solid var(--border2);
  background:var(--s2);
}
.sbar-thumb img{width:100%;height:100%;object-fit:contain;background:#0a0c0f;}
/* Info */
.sbar-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}
.sbar-name{
  font-family:var(--fh);font-size:16px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sbar-del{font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;}
.sbar-del b{color:var(--green);}
/* Preço */
.sbar-price-wrap{flex-shrink:0;text-align:right;}
.sbar-price{font-family:var(--fh);font-size:26px;font-weight:900;color:var(--yellow);line-height:1;}
.sbar-pix{font-size:10px;color:var(--green);margin-top:2px;}
/* Botão */
.sbar-cta{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:0 30px;height:54px;border-radius:10px;
  background:var(--yellow);color:#000;
  font-family:var(--fb);font-size:14px;font-weight:700;
  border:none;cursor:pointer;white-space:nowrap;letter-spacing:.2px;
  transition:all .18s;
}
.sbar-cta:hover{background:#ffd500;box-shadow:0 5px 20px rgba(245,200,0,.4);transform:translateY(-1px);}
@media(max-width:680px){
  .sbar{padding:0 14px;gap:10px;}
  .sbar-thumb{width:46px;height:46px;}
  .sbar-name{font-size:13px;}
  .sbar-price{font-size:20px;}
  .sbar-pix{display:none;}
  .sbar-cta{padding:0 16px;height:46px;font-size:13px;}
}

/* ══ HERO ══════════════════════════════════════════════════════ */
.hero{
  display:grid;
  grid-template-columns:54% 46%;
  min-height:calc(100vh - var(--bar));
}
@media(max-width:820px){.hero{grid-template-columns:1fr;min-height:auto;}}

/* ── ESQUERDA: galeria ── */
.gleft{
  background:var(--s1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
}
/* logo */
.glogo{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;
}
.glogo-brand{font-family:var(--fh);font-size:18px;font-weight:900;}
.glogo-brand b{color:var(--yellow);}
.glogo-sub{font-family:var(--fm);font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}

/* foto + thumbs lado a lado — estilo FastShop */
.gallery-body{
  flex:1;display:flex;
  overflow:hidden;
  min-height:0;
}
/* coluna vertical de miniaturas (esquerda da foto) */
.thumbs-col{
  width:78px;flex-shrink:0;
  display:flex;flex-direction:column;gap:6px;
  padding:10px 8px;
  overflow-y:auto;
  border-right:1px solid var(--border);
  background:var(--s1);
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.thumbs-col::-webkit-scrollbar{width:3px;}
.thumbs-col::-webkit-scrollbar-thumb{background:var(--border);}
.thumb{
  width:60px;height:60px;flex-shrink:0;
  border-radius:8px;overflow:hidden;
  border:2px solid var(--border);cursor:pointer;
  transition:all .15s;background:#0a0c0f;
}
.thumb img{width:100%;height:100%;object-fit:contain;background:#0a0c0f;}
.thumb.on{border-color:var(--yellow);}
.thumb:hover:not(.on){border-color:var(--border2);}
/* foto principal */
.gmain-wrap{
  flex:1;position:relative;
  background:#08090c;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;min-height:300px;
}
.gmain{
  max-width:100%;max-height:100%;
  width:100%;height:100%;
  object-fit:contain;
  transition:opacity .2s;
}
.gph{font-size:72px;color:var(--border);}
/* setas */
.garrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:38px;height:38px;border-radius:50%;
  background:rgba(8,11,15,.8);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:5;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.garrow:hover{background:rgba(8,11,15,.96);border-color:rgba(255,255,255,.4);}
.garrow svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.garrow.prev{left:10px;}.garrow.next{right:10px;}
.gcount{
  position:absolute;bottom:10px;right:12px;z-index:5;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  font-family:var(--fm);font-size:10px;color:#fff;
  padding:3px 9px;border-radius:20px;
}
/* descrição */
.gdesc{
  padding:12px 16px;border-top:1px solid var(--border);
  font-size:12px;color:var(--soft);line-height:1.6;
}
@media(max-width:820px){
  .gleft{border-right:none;border-bottom:1px solid var(--border);}
  .thumbs-col{width:64px;}
  .thumb{width:50px;height:50px;}
}

/* ── DIREITA: informações ── */
.iright{
  padding:26px 26px 22px;
  display:flex;flex-direction:column;gap:16px;
  overflow-y:auto;
  max-height:calc(100vh - var(--bar));
  background:var(--bg);
}
@media(max-width:820px){.iright{max-height:none;padding:20px 16px;}}
.pcode{font-family:var(--fm);font-size:9px;color:var(--yellow);letter-spacing:2.5px;text-transform:uppercase;}
.ptitle{font-family:var(--fh);font-size:clamp(20px,2.6vw,32px);font-weight:900;line-height:1.12;letter-spacing:-.4px;}
.pold{font-family:var(--fm);font-size:11px;color:var(--muted);text-decoration:line-through;}
.pprice{font-family:var(--fh);font-size:clamp(28px,3.3vw,40px);font-weight:900;color:var(--green);line-height:1;margin-top:3px;}
.ppix{font-size:12px;color:var(--green);margin-top:5px;display:flex;align-items:center;gap:5px;}
.ppix::before{content:'💚';}
/* benefícios */
.bens{border:1px solid var(--border);border-radius:11px;overflow:hidden;}
.ben{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);}
.ben:last-child{border-bottom:none;}
.bic{width:32px;height:32px;border-radius:7px;background:var(--s2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.bt{font-size:13px;font-weight:600;}
.bs{font-size:11px;color:var(--muted);margin-top:1px;}
/* botões */
.btnbuy{
  width:100%;padding:15px;border-radius:10px;
  background:var(--yellow);color:#000;
  font-family:var(--fb);font-size:15px;font-weight:700;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:all .2s;letter-spacing:.2px;
}
.btnbuy:hover{background:#ffd500;transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,200,0,.36);}
.btnwa{
  width:100%;padding:12px;border-radius:9px;
  background:transparent;color:var(--soft);
  font-family:var(--fb);font-size:13px;font-weight:500;
  border:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .2s;text-decoration:none;
}
.btnwa:hover{border-color:var(--wa);color:var(--wa);}

/* ══ SEÇÕES ABAIXO ═══════════════════════════════════════════ */
.ct{max-width:1080px;margin:0 auto;padding:0 20px;}
.tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;border-radius:100px;border:1px solid rgba(245,200,0,.3);color:var(--yellow);background:rgba(245,200,0,.06);}
.sep{width:44px;height:3px;border-radius:2px;background:var(--yellow);margin:14px 0;}
.sh{font-family:var(--fh);font-size:clamp(24px,3.8vw,40px);font-weight:900;line-height:1.1;letter-spacing:-.5px;}
.sh em{font-style:italic;color:var(--yellow);}
.ss{font-size:14px;color:var(--soft);line-height:1.7;max-width:540px;margin-top:12px;}
.sec-prob{padding:68px 20px;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;margin-top:40px;}
@media(max-width:768px){.pgrid{grid-template-columns:1fr;}}
.dors{display:flex;flex-direction:column;gap:13px;}
.dor{display:flex;gap:12px;padding:15px;background:var(--s1);border:1px solid var(--border);border-radius:10px;}
.dic{font-size:22px;flex-shrink:0;margin-top:2px;}
.dt{font-size:14px;font-weight:600;margin-bottom:3px;}
.dx{font-size:12px;color:var(--soft);line-height:1.55;}
.sol{background:linear-gradient(135deg,rgba(45,206,118,.08),rgba(45,206,118,.02));border:1px solid rgba(45,206,118,.2);border-radius:13px;padding:26px;}
.sol .sep{background:var(--green);}
.stitle{font-family:var(--fh);font-size:21px;font-weight:700;margin-bottom:9px;}
.stxt{font-size:13px;color:var(--soft);line-height:1.65;margin-bottom:16px;}
.schecks{display:flex;flex-direction:column;gap:8px;}
.scheck{display:flex;align-items:center;gap:8px;font-size:13px;}
.scheck::before{content:"✓";color:var(--green);font-weight:700;font-size:15px;flex-shrink:0;}
.sec-prova{padding:56px 20px;background:var(--s1);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:13px;margin-top:34px;}
.tcard{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:17px;}
.tstars{color:var(--yellow);font-size:12px;margin-bottom:8px;letter-spacing:2px;}
.ttxt{font-size:13px;color:var(--soft);line-height:1.6;font-style:italic;margin-bottom:11px;}
.tauth{display:flex;align-items:center;gap:9px;}
.tav{width:32px;height:32px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.tnm{font-size:12px;font-weight:600;} .tlc{font-family:var(--fm);font-size:9px;color:var(--muted);}
.sec-gar{padding:56px 20px;}
.ggrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:34px;}
@media(max-width:768px){.ggrid{grid-template-columns:1fr;}}
.gcard{text-align:center;padding:22px 16px;background:var(--s1);border:1px solid var(--border);border-radius:12px;}
.gic{font-size:32px;margin-bottom:11px;} .gt{font-size:15px;font-weight:700;margin-bottom:6px;} .gtx{font-size:12px;color:var(--soft);line-height:1.55;}
.sec-cta{padding:68px 20px;text-align:center;position:relative;overflow:hidden;}
.cta-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(245,200,0,.05),transparent 70%);pointer-events:none;}
.cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:30px;}
.btncta{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:15px 32px;border-radius:10px;background:var(--yellow);color:#000;font-family:var(--fb);font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .2s;text-decoration:none;}
.btncta:hover{background:#ffd500;transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,200,0,.35);}
.btncta.blue{background:#3b9eff;color:#fff;}
.btncta.blue:hover{background:#2589ef;box-shadow:0 8px 24px rgba(59,158,255,.3);}
footer{padding:26px 20px;border-top:1px solid var(--border);text-align:center;}
.fb{font-family:var(--fh);font-size:17px;font-weight:900;} .fb b{color:var(--yellow);}
.fs{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.5px;}
.loading{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--bar));flex-direction:column;gap:13px;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
</style>
</head>
<body>

<!-- ══ STICKY BAR ══════════════════════════════════════════════ -->
<div class="sbar">
  <div class="sbar-thumb"><img id="sb-img" src="" alt="" style="display:none"></div>
  <div class="sbar-info">
    <div class="sbar-name" id="sb-name">Carregando...</div>
    <div class="sbar-del">🚚 <b id="sb-del"></b></div>
  </div>
  <div class="sbar-price-wrap">
    <div class="sbar-price" id="sb-price">—</div>
    <div class="sbar-pix">💚 10% off no PIX</div>
  </div>
  <button class="sbar-cta" onclick="abrirWA()">🛒 Adicionar ao Carrinho</button>
</div>

<!-- ══ CONTEÚDO ════════════════════════════════════════════════ -->
<div id="root">
  <div class="loading"><div class="spinner"></div><p>Carregando produto...</p></div>
</div>

<script>
var WA='5531998301617', PROD=null, IDX=0;

function R(v){return parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,style:'currency',currency:'BRL'});}

function delivery(){
  var h=new Date().getHours(),m=new Date().getMinutes();
  return (h*100+m)<=1545
    ?'Comprando nos próximos 15 min — Entregamos <b>AINDA HOJE!</b>'
    :'Comprando nos próximos 15 min — Entregamos em menos de <b>24 Horas!</b>';
}

function goTo(i){
  if(!PROD||!PROD.fotos.length) return;
  var n=PROD.fotos.length;
  IDX=((i%n)+n)%n;
  var img=document.getElementById('gmain');
  if(img){img.style.opacity='.3';setTimeout(function(){img.src=PROD.fotos[IDX];img.style.opacity='1';},150);}
  document.querySelectorAll('.thumb').forEach(function(t,j){t.classList.toggle('on',j===IDX);});
  var gc=document.getElementById('gcnt');
  if(gc) gc.textContent=(IDX+1)+' / '+n;
}

// swipe
var _sx=0,_sy=0;
document.addEventListener('touchstart',function(e){var t=e.changedTouches[0];_sx=t.clientX;_sy=t.clientY;},{passive:true});
document.addEventListener('touchend',function(e){var t=e.changedTouches[0],dx=t.clientX-_sx,dy=t.clientY-_sy;if(Math.abs(dx)<30||Math.abs(dy)>Math.abs(dx))return;goTo(IDX+(dx<0?1:-1));},{passive:true});

function abrirWA(){
  if(!PROD)return;
  window.open('https://wa.me/'+WA+'?text='+encodeURIComponent('Olá! Tenho interesse:\n\n📦 '+PROD.nome+'\n📋 Cód: '+PROD.codigo+'\n💰 '+R(PROD.preco)+'\n\nPodemos fechar?'),'_blank');
}

function render(p){
  PROD=p;
  var F=p.fotos&&p.fotos.length?p.fotos:[];
  var precoOld=Math.round(parseFloat(p.preco)*2.1);

  // thumbs verticais (coluna esquerda)
  var thumbsHTML=F.length>1
    ?F.map(function(f,i){return '<div class="thumb'+(i===0?' on':'')+'" onclick="goTo('+i+')"><img src="'+f+'" loading="'+(i<3?'eager':'lazy')+'"></div>';}).join('')
    :'';

  // foto principal
  var mainHTML=F.length
    ?'<img class="gmain" id="gmain" src="'+F[0]+'" alt="'+p.nome+'" loading="eager">'
    :'<div class="gph">'+(p.tipo==='Microondas'?'📡':'💧')+'</div>';

  var arrowsHTML=F.length>1
    ?'<button class="garrow prev" onclick="goTo(IDX-1)"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>'+
     '<button class="garrow next" onclick="goTo(IDX+1)"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>'+
     '<div class="gcount" id="gcnt">1 / '+F.length+'</div>'
    :'';

  var waHref='https://wa.me/'+WA+'?text='+encodeURIComponent('Olá! Interesse no '+p.nome+' ('+p.codigo+'). Mais informações?');

  var heroHTML=
    '<div class="hero">'+
      '<div class="gleft">'+
        '<div class="glogo"><div><div class="glogo-brand">Reparo<b>Eletro</b></div><div class="glogo-sub">equipamentos revisados</div></div></div>'+
        '<div class="gallery-body">'+
          (F.length>1?'<div class="thumbs-col">'+thumbsHTML+'</div>':'')+
          '<div class="gmain-wrap">'+mainHTML+arrowsHTML+'</div>'+
        '</div>'+
        '<div class="gdesc">'+p.nome+(p.capacidade?' · '+p.capacidade:'')+(p.tipo?' · '+p.tipo:'')+'</div>'+
      '</div>'+
      '<div class="iright">'+
        (p.codigo?'<div class="pcode">Cód. '+p.codigo+'</div>':'')+
        '<h1 class="ptitle">'+p.nome+'</h1>'+
        '<div><div class="pold">De '+R(precoOld)+'</div><div class="pprice">'+R(p.preco)+'</div><div class="ppix">10% de desconto no PIX à vista</div></div>'+
        '<div class="bens">'+
          '<div class="ben"><div class="bic">🛡️</div><div><div class="bt">Garantia de 90 Dias</div><div class="bs">Coberta pela nossa equipe técnica</div></div></div>'+
          '<div class="ben"><div class="bic">💳</div><div><div class="bt">Parcelamos em 3x sem Juros</div><div class="bs">No cartão de crédito</div></div></div>'+
          '<div class="ben"><div class="bic">💸</div><div><div class="bt">10% de Desconto no Pix</div><div class="bs">Desconto aplicado automaticamente</div></div></div>'+
          '<div class="ben"><div class="bic">🚚</div><div><div class="bt">Frete Grátis em BH</div><div class="bs">Toda a Região Metropolitana de BH</div></div></div>'+

        '<button class="btnbuy" onclick="abrirWA()">🛒 Adicionar ao Carrinho</button>'+

async function init(){
  var id=new URLSearchParams(location.search).get('id');
  if(!id){document.getElementById('root').innerHTML='<div class="loading"><p>ID não informado. <a href="javascript:history.back()" style="color:var(--yellow)">← Voltar</a></p></div>';return;}
  document.getElementById('sb-del').innerHTML=delivery().replace('<b>','').replace('</b>','');
  try{
    // Buscar sempre da API (sem depender do cache que pode ter estrutura errada)
    var d=await fetch('/api/vendas?action=load').then(function(r){return r.json();});
    var lista=(d.produtos||[]).filter(function(p){return !p.vendido;});
    var p=lista.find(function(x){return String(x.id)===String(id)||x.codigo===id;});
    if(!p){
      document.getElementById('root').innerHTML='<div class="loading"><p>Produto não disponível. <a href="javascript:history.back()" style="color:var(--yellow)">← Voltar</a></p></div>';
      return;
    }
    // Normalizar nome
    p.nome = p.descricao || (p.tipo?p.tipo+' ':'')+p.codigo || 'Produto';
    p.fotos = Array.isArray(p.fotos)&&p.fotos.length ? p.fotos : [];
    render(p);
  }catch(e){
    document.getElementById('root').innerHTML='<div class="loading"><p>Erro ao carregar. <a href="javascript:history.back()" style="color:var(--yellow)">← Voltar</a></p></div>';
  }
}
