<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
/* 🔐 TF-GUARD Fase 1 */
(function(){
  if(location.pathname==='/login'||location.pathname==='/login.html')return;
  var K=localStorage.getItem('tf_key');
  if(!K){location.replace('/login?next='+encodeURIComponent(location.pathname));return;}
  // Papel TV: acesso restrito às telas do sistema TV
  if(localStorage.getItem('tf_role')==='tv'&&location.pathname.indexOf('/tv')!==0){
    location.replace('/tv-adm');return;
  }
  var _f=window.fetch;
  window.fetch=function(u,o){
    var isApi=false;
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('/api/auth')===-1){
        isApi=true;o=o||{};
        var kk=localStorage.getItem('tf_key')||'';
        if(o.headers&&typeof o.headers.set==='function'){o.headers.set('x-tf-key',kk);}
        else{o.headers=Object.assign({},o.headers||{},{'x-tf-key':kk});}
      }
    }catch(e){}
    var p=_f.call(this,u,o);
    if(isApi){
      p=p.then(function(r){
        if(r&&r.status===401&&!window.__tfHealed){
          window.__tfHealed=true;
          localStorage.removeItem('tf_key');
          location.replace('/login?next='+encodeURIComponent(location.pathname));
        }
        return r;
      });
    }
    return p;
  };
})();
</script>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache">
<title>🤖 Bot WhatsApp — Copiloto</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07080a;color:#f0f2f5;height:100vh;display:flex;flex-direction:column;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:#0f1114;border-bottom:1px solid #1e2228;gap:10px;}
.h-title{font-size:13px;font-weight:800;color:#25d366;}
.badge-fase{font-size:10px;font-weight:800;background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.4);border-radius:99px;padding:4px 10px;}
.btn{padding:7px 12px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;background:#1e2228;color:#f0f2f5;text-decoration:none;}
main{flex:1;display:flex;overflow:hidden;}
#lista-conv{width:300px;border-right:1px solid #1e2228;overflow-y:auto;background:#0a0b0e;flex-shrink:0;}
.conv{padding:12px 14px;border-bottom:1px solid #14161a;cursor:pointer;}
.conv:hover{background:#0f1114;}
.conv.sel{background:#12151d;border-left:3px solid #25d366;}
.conv-nome{font-size:12.5px;font-weight:800;}
.conv-ultima{font-size:11px;color:#5a6270;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-badge{font-size:9px;font-weight:800;color:#f97316;background:rgba(249,115,22,.12);border-radius:5px;padding:1px 6px;margin-left:6px;}
#chat{flex:1;display:flex;flex-direction:column;min-width:0;}
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
.msg{max-width:70%;padding:9px 12px;border-radius:12px;font-size:12.5px;line-height:1.45;white-space:pre-wrap;word-break:break-word;}
.msg.in{background:#12141a;border:1px solid #1e2228;align-self:flex-start;}
.msg.out{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);align-self:flex-end;}
.msg.acao{align-self:center;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.35);color:#a78bfa;font-size:11px;font-weight:700;border-radius:99px;padding:4px 14px;}
.msg-ts{font-size:9px;color:#5a6270;margin-top:4px;}
#sugestao{border-top:1px solid #1e2228;background:#0d1018;padding:14px 16px;display:none;}
.sug-label{font-size:10px;font-weight:800;color:#a78bfa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
#sug-texto{width:100%;background:#12141a;border:1px solid #2a2f38;border-radius:10px;color:#f0f2f5;font-size:12.5px;padding:10px;min-height:70px;resize:vertical;font-family:inherit;}
.sug-acao{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:#f5c800;background:rgba(245,200,0,.08);border:1px solid rgba(245,200,0,.35);border-radius:8px;padding:5px 10px;margin-top:8px;}
#sug-botoes{display:flex;gap:8px;margin-top:10px;}
.b-aprovar{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(37,211,102,.5);background:rgba(37,211,102,.12);color:#25d366;font-weight:800;font-size:12px;cursor:pointer;}
.b-gerar{padding:10px 14px;border-radius:8px;border:1px solid rgba(139,92,246,.5);background:rgba(139,92,246,.12);color:#a78bfa;font-weight:800;font-size:12px;cursor:pointer;}
.b-desc{padding:10px 14px;border-radius:8px;border:1px solid #2a2f38;background:#181b1f;color:#8b93a1;font-weight:700;font-size:12px;cursor:pointer;}
#vazio{flex:1;display:flex;align-items:center;justify-content:center;color:#5a6270;font-size:13px;text-align:center;padding:30px;}
@media(max-width:760px){#lista-conv{width:110px;}.conv-ultima{display:none;}}
</style>
</head>
<body>
<header>
  <div class="h-title">🤖 Bot WhatsApp <span class="badge-fase">FASE 1 · COPILOTO</span></div>
  <div style="display:flex;gap:8px;">
    <button class="btn" onclick="carregarConversas()">↻</button>
    <a href="/adm" class="btn">← ADM</a>
  </div>
</header>

<main>
  <div id="lista-conv"><div style="padding:20px;color:#5a6270;font-size:11px;text-align:center;">⏳ Carregando...</div></div>
  <div id="chat">
    <div id="vazio">Selecione uma conversa à esquerda.<br><br>💡 As mensagens chegam aqui automaticamente quando o webhook da Meta estiver configurado.</div>
    <div id="msgs" style="display:none;"></div>
    <div id="sugestao">
      <div class="sug-label">💡 Sugestão do bot (revise antes de enviar)</div>
      <textarea id="sug-texto" placeholder="Clique em 🤖 Gerar Sugestão, ou escreva a resposta manualmente..."></textarea>
      <div id="sug-acao-box"></div>
      <div id="sug-botoes">
        <button class="b-gerar" onclick="gerarSugestao()">🤖 Gerar Sugestão</button>
        <button class="b-aprovar" onclick="aprovarEnviar()">✅ Aprovar e Enviar</button>
        <button class="b-desc" onclick="document.getElementById('sug-texto').value='';_acaoSug='nenhuma';document.getElementById('sug-acao-box').innerHTML='';">Limpar</button>
      </div>
    </div>
  </div>
</main>

<script>
var _tel=null,_acaoSug='nenhuma';
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function fdt(ts){if(!ts)return'';var d=new Date(new Date(ts).getTime()-3*3600000);return d.toISOString().slice(11,16);}

var ACAO_LBL={cadastrar_logistica:'🚚 Cadastrar em Logística',enviar_orcamento:'📄 Enviar Orçamento',
  desconto_pix:'💠 Desconto Pix',desconto_balcao:'🏪 Desconto Balcão',proposta_troca:'🔄 Proposta de Troca',
  mover_aprovado:'✅ Mover para Aprovado',registrar_reprovacao:'❌ Orçamento Reprovado (reversão)',escalar_humano:'🙋 Escalar para Humano',nenhuma:''};

async function carregarConversas(){
  var el=document.getElementById('lista-conv');
  try{
    var d=await fetch('/api/wa-bot?action=conversas').then(function(r){return r.json();});
    if(!d.conversas||!d.conversas.length){
      el.innerHTML='<div style="padding:20px;color:#5a6270;font-size:11px;text-align:center;">📭 Nenhuma conversa ainda.<br><br>Configure o webhook na Meta e as mensagens aparecem aqui.</div>';
      return;
    }
    el.innerHTML=d.conversas.map(function(c){
      return '<div class="conv'+(c.tel===_tel?' sel':'')+'" onclick="abrirConversa(\''+c.tel+'\')">'
        +'<div class="conv-nome">'+esc(c.nome||c.tel)+(c.naoRespondida?'<span class="conv-badge">responder</span>':'')+'</div>'
        +'<div class="conv-ultima">'+esc(c.ultimaMsg)+'</div>'
      +'</div>';
    }).join('');
  }catch(e){el.innerHTML='<div style="padding:20px;color:#ef4444;font-size:11px;">Erro: '+e.message+'</div>';}
}

async function abrirConversa(tel){
  _tel=tel;
  document.getElementById('vazio').style.display='none';
  document.getElementById('msgs').style.display='flex';
  document.getElementById('sugestao').style.display='block';
  carregarConversas();
  var box=document.getElementById('msgs');
  box.innerHTML='<div style="color:#5a6270;font-size:11px;text-align:center;">⏳</div>';
  try{
    var d=await fetch('/api/wa-bot?action=historico&tel='+encodeURIComponent(tel)).then(function(r){return r.json();});
    box.innerHTML=(d.msgs||[]).map(function(m){
      if(m.dir==='acao')return '<div class="msg acao">⚡ '+esc(ACAO_LBL[m.texto]||m.texto)+' · '+fdt(m.ts)+'</div>';
      return '<div class="msg '+(m.dir==='in'?'in':'out')+'">'+esc(m.texto)
        +'<div class="msg-ts">'+fdt(m.ts)+(m.via==='copiloto'?' · ✅ aprovada':'')+'</div></div>';
    }).join('')||'<div style="color:#5a6270;font-size:11px;text-align:center;">Sem mensagens</div>';
    box.scrollTop=box.scrollHeight;
    if(d.sugestao&&d.sugestao.resposta){preencherSugestao(d.sugestao);}
  }catch(e){box.innerHTML='<div style="color:#ef4444;font-size:11px;">Erro: '+e.message+'</div>';}
}

function preencherSugestao(s){
  document.getElementById('sug-texto').value=s.resposta||'';
  _acaoSug=(s.acao&&s.acao.tipo)||'nenhuma';
  var bx=document.getElementById('sug-acao-box');
  bx.innerHTML=_acaoSug!=='nenhuma'
    ?'<div class="sug-acao">⚡ Ação sugerida: '+esc(ACAO_LBL[_acaoSug]||_acaoSug)+' <span style="color:#5a6270;font-weight:600;">('+esc((s.acao&&s.acao.motivo)||'')+')</span></div>'
    :'';
}

async function gerarSugestao(){
  if(!_tel)return;
  var ta=document.getElementById('sug-texto');
  ta.value='🤖 Pensando...';
  try{
    var d=await fetch('/api/wa-bot?action=sugerir&tel='+encodeURIComponent(_tel)).then(function(r){return r.json();});
    if(d.ok&&d.sugestao){preencherSugestao(d.sugestao);}
    else{ta.value='';alert('Erro: '+(d.error||'falha'));}
  }catch(e){ta.value='';alert('Erro: '+e.message);}
}

async function aprovarEnviar(){
  if(!_tel)return;
  var texto=document.getElementById('sug-texto').value.trim();
  if(!texto){alert('Escreva ou gere a mensagem primeiro');return;}
  try{
    var d=await fetch('/api/wa-bot?action=enviar',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tel:_tel,texto:texto,acaoAprovada:_acaoSug})
    }).then(function(r){return r.json();});
    if(d.ok){
      document.getElementById('sug-texto').value='';_acaoSug='nenhuma';
      document.getElementById('sug-acao-box').innerHTML='';
      abrirConversa(_tel);
    }else alert('Erro no envio: '+(d.meta||d.error||'falha'));
  }catch(e){alert('Erro: '+e.message);}
}

carregarConversas();
setInterval(function(){ if(!document.hidden){ carregarConversas(); if(_tel)abrirConversa(_tel); } }, 30000);
</script>
</body>
</html>
