<script>
/* 🔐 TF-GUARD Fase 1 */
(function(){
  if(location.pathname==='/login'||location.pathname==='/login.html')return;
  var K=localStorage.getItem('tf_key');
  if(!K){location.replace('/login?next='+encodeURIComponent(location.pathname));return;}
  // Papel TV: acesso restrito às telas do sistema TV
  if(localStorage.getItem('tf_role')==='tv'&&location.pathname.indexOf('/tv')!==0){
    location.replace('/tv-adm');return;
  }
  var _f=window.fetch;
  window.fetch=function(u,o){
    var isApi=false;
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('/api/auth')===-1){
        isApi=true;o=o||{};
        var kk=localStorage.getItem('tf_key')||'';
        if(o.headers&&typeof o.headers.set==='function'){o.headers.set('x-tf-key',kk);}
        else{o.headers=Object.assign({},o.headers||{},{'x-tf-key':kk});}
      }
    }catch(e){}
    var p=_f.call(this,u,o);
    if(isApi){
      p=p.then(function(r){
        if(r&&r.status===401&&!window.__tfHealed){
          window.__tfHealed=true;
          localStorage.removeItem('tf_key');
          location.replace('/login?next='+encodeURIComponent(location.pathname));
        }
        return r;
      });
    }
    return p;
  };
})();
</script>

function injetarImagens(html, query) {

      +'</div>';
  });

  var imgCount = 0;
  html = html.replace(/(<h2[^>]*>.*?<\/h2>)(?!\s*<img)/gi, function(match) {
    imgCount++;

}

      {"@type":"City","name":"Santa Luzia"},
      {"@type":"City","name":"Ribeirão das Neves"},
      {"@type":"City","name":"Ibirité"},
      {"@type":"City","name":"Nova Lima"}
    ],
    "hasOfferCatalog":{"@type":"OfferCatalog","name":"Conserto de Eletrodomésticos",
      "itemListElement":[
        {"@type":"Offer","itemOffered":{"@type":"Service","name":"Conserto de TV em BH"}},
        {"@type":"Offer","itemOffered":{"@type":"Service","name":"Conserto de Geladeira em BH"}},
        {"@type":"Offer","itemOffered":{"@type":"Service","name":"Conserto de Microondas em BH"}},
        {"@type":"Offer","itemOffered":{"@type":"Service","name":"Conserto de Lava e Seca em BH"}},
        {"@type":"Offer","itemOffered":{"@type":"Service","name":"Conserto de Purificador em BH"}}
      ]},
    "sameAs":["https://reparoeletroadm.com"]
  });

  // 3. BreadcrumbList Schema
  injectSchema({
    "@context":"https://schema.org",
    "@type":"BreadcrumbList",
    "itemListElement":[
      {"@type":"ListItem","position":1,"name":"Home","item":BASE},
      {"@type":"ListItem","position":2,"name":"Blog","item":BASE+"/blog"},
      {"@type":"ListItem","position":3,"name":p.categoriaNome,"item":BASE+"/blog/"+p.slug}
    ]
  });

  // 4. FAQ Schema (MUITO importante para AI Overviews do Google)
  if (p.faqs && p.faqs.length) {
    injectSchema({
      "@context":"https://schema.org",
      "@type":"FAQPage",
      "mainEntity": p.faqs.map(function(faq){
        return {
          "@type":"Question",
          "name":faq.q,
          "acceptedAnswer":{"@type":"Answer","text":faq.a}
        };
      })
    });
  }
}

function injectSchema(obj) {
  var s = document.createElement('script');
  s.type = 'application/ld+json';
  s.text = JSON.stringify(obj);
  document.head.appendChild(s);
}

// ── Posts relacionados ────────────────────────────────────────────────────
async function carregarRelacionados(cat, slugAtual) {
  try {
    var r = await fetch('/api/blog?action=listar').then(function(x){return x.json();});
    var rel = (r.posts||[]).filter(function(p){return p.slug!==slugAtual;}).slice(0,4);
    if (!rel.length) return;
    var el = document.getElementById('relacionados-wrap');
    if (!el) return;
    el.innerHTML = '<div class="related-title">📚 Leia também</div>'
      +'<div class="related-grid">'
      +rel.map(function(p){
        return '<a href="/blog/'+escH(p.slug)+'" class="related-card">'
          +'<div class="related-cat">'+escH(p.emoji)+' '+escH(p.categoriaNome)+'</div>'
          +'<div class="related-tit">'+escH(p.titulo)+'</div>'
          +'</a>';
      }).join('')
      +'</div>';
  } catch(e){}
}

// ── FAQ toggle ────────────────────────────────────────────────────────────
function toggleFaq(i) {
  var el = document.getElementById('faq-'+i);
  if (el) el.classList.toggle('open');
}

// ── Analytics ─────────────────────────────────────────────────────────────
function trackView() {
  fetch('/api/blog?action=view',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:_slug,referrer:document.referrer})});
}
function trackCTA() {
  fetch('/api/blog?action=cta',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:_slug})});
  window.open(_waLink,'_blank');
}

function escH(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

if (_slug) carregarPost(); else window.location.href='/blog';
</script>
