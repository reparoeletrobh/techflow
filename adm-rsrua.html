<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#03060e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RS Rua</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{
  background:#03060e;color:#dce8f8;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:16px;min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom,24px);
}

/* HEADER */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:54px;
  background:#080d18;border-bottom:1px solid #1a2540;
  position:sticky;top:0;z-index:200;
  padding-top:env(safe-area-inset-top,0);
}
.logo{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;}
.dot{width:10px;height:10px;background:#f04060;border-radius:50%;box-shadow:0 0 8px #f04060cc;flex-shrink:0;}
.logo em{color:#f04060;font-style:normal;}
.back-btn{
  font-size:13px;padding:9px 16px;border-radius:9px;
  border:1px solid #1a2540;background:transparent;color:#4a607a;
  text-decoration:none;display:inline-flex;align-items:center;gap:5px;
  min-height:40px;
}

/* SUMMARY */
.summary{display:flex;border-bottom:1px solid #1a2540;background:#080d18;}
.sum-item{
  flex:1;padding:10px 6px;text-align:center;
  border-right:1px solid #1a2540;
}
.sum-item:last-child{border-right:none;}
.sum-n{font-size:24px;font-weight:800;line-height:1;color:#f04060;}
.sum-n.g{color:#10d982;}
.sum-l{font-size:10px;color:#4a607a;margin-top:3px;line-height:1.3;}

/* CARDS */
.main{padding:12px 12px 90px;}
.os-card{
  background:#080d18;border:1px solid #1a2540;
  border-left:4px solid #f04060;
  border-radius:16px;margin-bottom:14px;overflow:hidden;
}
.card-top{padding:16px 16px 14px;}
.os-nome{font-size:21px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:5px;}
.os-def{font-size:15px;color:#7a96b8;line-height:1.4;margin-bottom:14px;}
.info-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.info-row{display:flex;align-items:flex-start;gap:10px;}
.info-icon{font-size:18px;flex-shrink:0;}
.info-val{font-size:16px;color:#dce8f8;font-weight:500;line-height:1.3;word-break:break-word;}

/* FASE BADGE */
.fase-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  padding:6px 14px;border-radius:99px;
  background:rgba(240,64,96,.12);color:#f04060;
  border:1px solid rgba(240,64,96,.3);
}

/* FASE SELECTOR */
.fase-sel{
  display:flex;border-top:1px solid #1a2540;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.fase-sel::-webkit-scrollbar{display:none;}
.fase-btn{
  flex:1;min-width:105px;
  padding:14px 8px;text-align:center;
  font-size:13px;font-weight:600;line-height:1.3;
  color:#4a607a;background:transparent;
  border:none;border-right:1px solid #1a2540;
  cursor:pointer;
}
.fase-btn:last-child{border-right:none;}
.fase-btn.on{background:rgba(240,64,96,.1);color:#f04060;}
.fase-btn:active{background:rgba(240,64,96,.2);}

/* ACTION BUTTONS */
.actions{
  padding:12px 12px 14px;
  border-top:1px solid #1a2540;
  display:flex;flex-direction:column;gap:8px;
}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.act{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:17px 12px;border-radius:12px;border:1px solid transparent;
  font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;
  transition:filter .1s;min-height:56px;
}
.act:active{filter:brightness(.75);}
.act.wpp{background:rgba(37,211,102,.1);color:#25d366;border-color:rgba(37,211,102,.25);}
.act.maps{background:rgba(59,158,255,.1);color:#3b9eff;border-color:rgba(59,158,255,.25);}
.act.ok{
  background:rgba(16,217,130,.12);color:#10d982;
  border-color:rgba(16,217,130,.3);
  font-size:16px;padding:20px;min-height:62px;
}
.act.ok:active{background:#10d982;color:#000;}

/* EMPTY / LOADING */
.empty{text-align:center;padding:70px 20px;color:#4a607a;font-size:15px;line-height:1.7;}
.empty-icon{font-size:52px;display:block;margin-bottom:12px;}
.spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:16px;color:#4a607a;font-size:14px;}
.spin{width:30px;height:30px;border:3px solid #1a2540;border-top-color:#f04060;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* FAB REFRESH */
.fab{
  position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));right:16px;
  width:56px;height:56px;border-radius:50%;
  background:#f04060;color:#fff;border:none;
  font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(240,64,96,.5);z-index:100;
  transition:transform .15s;
}
.fab:active{transform:scale(.88);}
.fab.spinning{animation:sp .7s linear infinite;}

/* TOAST */
.toast{
  position:fixed;
  bottom:calc(28px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%) translateY(90px);
  background:#0d1425;border:1px solid #1a2540;border-top:3px solid #f04060;
  border-radius:12px;padding:13px 22px;font-size:14px;font-weight:600;
  white-space:nowrap;opacity:0;transition:all .25s;z-index:999;
  box-shadow:0 8px 30px rgba(0,0,0,.6);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="dot"></div>RS <em>Rua</em></div>
  <a class="back-btn" href="/adm">← ADM</a>
</header>

<div class="summary" id="summary"></div>

<div class="main" id="lista">
  <div class="spinner"><div class="spin"></div>Carregando OS...</div>
</div>

<button class="fab" id="fab" onclick="refresh()">↻</button>
<div class="toast" id="toast"></div>

<script>
var fichas = [];
var busy = false;

var FASES = [
  { id: 'garantia_solicitada', label: 'Garantia\nSolicitada', icon: '📋' },
  { id: 'equip_recolhido',     label: 'Equip.\nRecolhido',   icon: '📦' },
  { id: 'conserto_realizado',  label: 'Conserto\nRealizado',  icon: '🔧' },
];

var tT;
function toast(msg, cor) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.borderTopColor = cor || '#f04060';
  t.classList.add('show'); clearTimeout(tT);
  tT = setTimeout(function(){ t.classList.remove('show'); }, 2800);
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function api(action, body) {
  var opts = { headers: {'Content-Type':'application/json'} };
  if (body) { opts.method = 'POST'; opts.body = JSON.stringify(body); }
  var r = await fetch('/api/garantia?action=' + action, opts);
  return r.json();
}

async function load() {
  var d = await api('load');
  if (!d.ok) return;
  fichas = (d.fichas || []).filter(function(f){ return f.tipo === 'rua'; });
  render();
}

async function refresh() {
  if (busy) return;
  busy = true;
  var fab = document.getElementById('fab');
  fab.classList.add('spinning');
  try { await load(); toast('Atualizado ✓', '#10d982'); }
  finally { busy = false; fab.classList.remove('spinning'); }
}

function render() {
  var ativas    = fichas.filter(function(f){ return !f.concluida; });
  var concluidas = fichas.filter(function(f){ return f.concluida; });

  // summary
  var cnt = {};
  FASES.forEach(function(f){ cnt[f.id] = 0; });
  ativas.forEach(function(f){ if(cnt[f.faseId]!==undefined) cnt[f.faseId]++; });
  document.getElementById('summary').innerHTML =
    FASES.map(function(f){
      return '<div class="sum-item"><div class="sum-n">'+cnt[f.id]+'</div><div class="sum-l">'+f.label.replace('\n','<br>')+'</div></div>';
    }).join('') +
    '<div class="sum-item"><div class="sum-n g">'+concluidas.length+'</div><div class="sum-l">Concluídas</div></div>';

  var el = document.getElementById('lista');
  if (!ativas.length) {
    el.innerHTML = '<div class="empty"><span class="empty-icon">✅</span>Nenhuma OS pendente<br><span style="font-size:13px;color:#2a3a4a">Tudo resolvido por hoje</span></div>';
    return;
  }
  el.innerHTML = ativas.map(function(f){ return card(f); }).join('');
}

function card(f) {
  var tel = (f.telefone||'').replace(/\D/g,'');
  var fase = FASES.find(function(x){ return x.id===f.faseId; }) || FASES[0];
  var mapUrl = f.endereco ? 'https://maps.google.com/?q='+encodeURIComponent(f.endereco) : '';
  var wppMsg = encodeURIComponent('Olá '+f.nome+'! Sou o técnico da Reparo Eletro. Estou a caminho para o conserto em garantia.');

  var pills = FASES.map(function(fs){
    return '<button class="fase-btn'+(f.faseId===fs.id?' on':'')+'" onclick="mover(\''+f.id+'\',\''+fs.id+'\')">'+
      fs.icon+'<br>'+esc(fs.label)+'</button>';
  }).join('');

  var twoActions = tel && mapUrl;
  var actRow = twoActions
    ? '<div class="row2">'+
        '<a class="act wpp" href="https://wa.me/55'+tel+'?text='+wppMsg+'" target="_blank">💬 WhatsApp</a>'+
        '<a class="act maps" href="'+mapUrl+'" target="_blank">🗺️ Maps</a>'+
      '</div>'
    : (tel ? '<a class="act wpp" href="https://wa.me/55'+tel+'?text='+wppMsg+'" target="_blank">💬 WhatsApp</a>' : '')
    + (mapUrl ? '<a class="act maps" href="'+mapUrl+'" target="_blank">🗺️ Ir ao Endereço</a>' : '');

  return '<div class="os-card" id="c-'+f.id+'">' +
    '<div class="card-top">'+
      '<div class="os-nome">'+esc(f.nome)+'</div>'+
      '<div class="os-def">'+esc(f.defeito)+'</div>'+
      '<div class="info-list">'+
        '<div class="info-row"><span class="info-icon">📞</span><span class="info-val">'+esc(f.telefone)+'</span></div>'+
        (f.endereco?'<div class="info-row"><span class="info-icon">📍</span><span class="info-val">'+esc(f.endereco)+'</span></div>':'')+
      '</div>'+
      '<div class="fase-badge">'+fase.icon+' '+esc(fase.label.replace('\n',' '))+'</div>'+
    '</div>'+
    '<div class="fase-sel">'+pills+'</div>'+
    '<div class="actions">'+
      actRow+
      '<button class="act ok" onclick="concluir(\''+f.id+'\')">✅ Marcar como Concluído</button>'+
    '</div>'+
  '</div>';
}

async function mover(id, faseId) {
  var d = await api('mover', {id, faseId});
  if (d.ok) {
    var i = fichas.findIndex(function(f){ return f.id===id; });
    if (i>=0) fichas[i] = d.ficha;
    render();
    var f = FASES.find(function(x){ return x.id===faseId; });
    toast('📍 '+(f?f.label.replace('\n',' '):faseId), '#3b9eff');
  } else { toast('❌ '+(d.error||'Erro'), '#f04060'); }
}

async function concluir(id) {
  var fich = fichas.find(function(f){ return f.id===id; });
  if (!confirm('Concluir OS de '+(fich?fich.nome:'?')+'?')) return;
  var d = await api('concluir', {id});
  if (d.ok) {
    var i = fichas.findIndex(function(f){ return f.id===id; });
    if (i>=0) fichas[i] = d.ficha;
    render(); toast('✅ OS concluída!', '#10d982');
  } else { toast('❌ '+(d.error||'Erro'), '#f04060'); }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
