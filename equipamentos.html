<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Cpolygon%20points%3D%2218%2C2%208%2C18%2015%2C18%2014%2C30%2024%2C14%2017%2C14%22%20fill%3D%22%233b9eff%22%20stroke%3D%22%233b9eff%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipamentos Seminovos — Reparo Eletro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#252525;
  --text:#fff;--muted:#888;--accent:#f5c800;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;--fb:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);font-family:var(--fb);
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px 20px;
}
.wrap{max-width:560px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:32px;}
.brand{font-family:var(--fh);font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.brand span{color:var(--accent);}
.titulo{font-family:var(--fh);font-size:clamp(26px,5vw,38px);font-weight:800;line-height:1.15;letter-spacing:-0.5px;}
.titulo em{color:var(--accent);font-style:normal;}
.subtitulo{font-size:clamp(14px,2vw,17px);color:var(--muted);font-weight:400;line-height:1.5;margin-top:-12px;}
.btns{display:flex;flex-direction:column;gap:14px;width:100%;}
.btn-cat{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-radius:14px;border:1.5px solid var(--border);
  background:var(--surface);color:var(--text);text-decoration:none;
  font-family:var(--fb);font-size:16px;font-weight:600;transition:all .18s;
}
.btn-cat:hover{border-color:var(--accent);background:rgba(245,200,0,0.06);transform:translateY(-2px);}
.btn-cat-left{display:flex;align-items:center;gap:14px;}
.btn-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--surface2);flex-shrink:0;}
.btn-label{text-align:left;}
.btn-label strong{display:block;font-size:16px;}
.btn-label span{display:block;font-size:12px;color:var(--muted);font-weight:400;margin-top:2px;}
.btn-arrow{color:var(--accent);font-size:18px;flex-shrink:0;}
.divider{width:48px;height:1px;background:var(--border);}
.footer-text{font-family:var(--fm);font-size:10px;color:#444;letter-spacing:0.05em;}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">Reparo<span>Eletro</span></div>

  <h1 class="titulo">
    Compre seu Equipamento Seminovo agora com <em>até 70% de desconto</em> em relação ao novo.
  </h1>

  <p class="subtitulo">Qual tipo de equipamento você quer ver o catálogo?</p>

  <div class="btns">
    <a class="btn-cat" href="https://reparoeletroadm.com/microondas-vsl?produto=purificador&cta=ck">
      <div class="btn-cat-left">
        <div class="btn-icon">💧</div>
        <div class="btn-label">
          <strong>Purificador de Água</strong>
          <span>Ver catálogo disponível</span>
        </div>
      </div>
      <span class="btn-arrow">→</span>
    </a>
    <a class="btn-cat" href="https://reparoeletroadm.com/microondas-vsl?produto=microondas&cta=ck">
      <div class="btn-cat-left">
        <div class="btn-icon">📡</div>
        <div class="btn-label">
          <strong>Microondas</strong>
          <span>Ver catálogo disponível</span>
        </div>
      </div>
      <span class="btn-arrow">→</span>
    </a>
  </div>

  <div class="divider"></div>
  <p class="footer-text">REPARO ELETRO BH · EQUIPAMENTOS SEMINOVOS</p>

</div>
</body>
</html>
