.logo span{color:var(--green);}

.sec-header::after{content:'';flex:1;height:1px;background:var(--border);}

.m-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;

.m-card.comunicou{border-color:rgba(168,85,247,.25);}
.m-card.coletado-card{opacity:.45;}
.m-card.remarcado-card{opacity:.55;border-color:rgba(249,115,22,.2);}

.m-desc{font-size:11px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.m-btn.maps{background:rgba(59,158,255,.12);color:var(--accent);border:1px solid rgba(59,158,255,.25);}
.m-btn.rel{background:rgba(245,200,0,.12);color:var(--yellow);border:1px solid rgba(245,200,0,.25);}
.m-btn.remarcar{background:rgba(249,115,22,.12);color:var(--orange);border:1px solid rgba(249,115,22,.25);}

.m-btn:active{filter:brightness(.85);transform:scale(.98);}
.empty-state{font-family:var(--fm);font-size:11px;color:var(--muted);padding:28px 16px;
  text-align:center;border:1px dashed var(--border);border-radius:10px;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;flex-direction:column;overflow-y:auto;}
.ov.open{display:flex;}
.modal{background:var(--surface);margin:auto;width:100%;max-width:480px;border-radius:14px 14px 0 0;
  padding:20px;margin-top:auto;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:var(--fh);font-size:16px;font-weight:800;margin-bottom:16px;

.modal-close{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;}
.modal-section{margin-bottom:16px;}
.modal-label{font-family:var(--fm);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}

.modal-textarea:focus{border-color:var(--accent);}

  document.getElementById('container').innerHTML = html;
}

    '<button class="m-btn rel" onclick="abrirRel(\''+c.pipefyId+'\')">ð Iniciar RelatÃ³rio</button>'+
    '<button class="m-btn remarcar" onclick="remarcarCard(\''+c.pipefyId+'\')">ð Remarcar</button>' +

function abrirRel(pipefyId){relPipefyId=pipefyId;photoB64=null;document.getElementById('rel-desc').value='';document.getElementById('photo-input').value='';document.getElementById('photo-preview').style.display='none';document.getElementById('photo-area-label').textContent='ð· Toque para tirar foto ou selecionar';document.getElementById('modal-rel').classList.add('open');initSigCanvas();}
function fecharRel(){document.getElementById('modal-rel').classList.remove('open');relPipefyId=null;}
function previewPhoto(input){var file=input.files[0];if(!file)return;[new FileReader()].some(function(reader){reader.onload=function(e){photoB64=e.target.result;var prev=document.getElementById('photo-preview');prev.src=photoB64;prev.style.display='';document.getElementById('photo-area-label').textContent='â Foto selecionada';};reader.readAsDataURL(file);});}
function initSigCanvas(){var c=document.getElementById('sig-canvas');c.width=c.offsetWidth||400;c.height=160;sigCtx=c.getContext('2d');sigCtx.fillStyle='#0d1425';sigCtx.fillRect(0,0,c.width,c.height);sigCtx.strokeStyle='#dce8f8';sigCtx.lineWidth=2;sigCtx.lineCap='round';['mousedown','mousemove','mouseup','touchstart','touchmove','touchend'].forEach(function(ev){c.removeEventListener(ev,ev==='mousedown'||ev==='touchstart'?sigStart:ev==='mousemove'||ev==='touchmove'?sigMove:sigEnd);});c.addEventListener('mousedown', sigStart);c.addEventListener('mousemove', sigMove);c.addEventListener('mouseup', sigEnd);c.addEventListener('touchstart', sigStart,{passive:false});c.addEventListener('touchmove', sigMove,{passive:false});c.addEventListener('touchend', sigEnd);}
function sigPos(e,canvas){var r=canvas.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
function sigStart(e){e.preventDefault();sigDrawing=true;var p=sigPos(e,this);sigLastX=p.x;sigLastY=p.y;}
function sigMove(e){if(!sigDrawing)return;e.preventDefault();var p=sigPos(e,this);sigCtx.beginPath();sigCtx.moveTo(sigLastX,sigLastY);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigLastX=p.x;sigLastY=p.y;}
function sigEnd(){sigDrawing=false;}
function limparAssinatura(){if(sigCtx){var c=document.getElementById('sig-canvas');sigCtx.fillStyle='#0d1425';sigCtx.fillRect(0,0,c.width,c.height);}}
