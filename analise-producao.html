<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
/* 🔐 TF-GUARD Fase 1 */
(function(){
  if(location.pathname==='/login'||location.pathname==='/login.html')return;
  var K=localStorage.getItem('tf_key');
  if(!K){location.replace('/login?next='+encodeURIComponent(location.pathname));return;}
  var _f=window.fetch;
  window.fetch=function(u,o){
    try{
      if(typeof u==='string'&&u.indexOf('/api/')>-1&&u.indexOf('/api/auth')===-1&&u.indexOf('k=')===-1){
        u+=(u.indexOf('?')>-1?'&':'?')+'k='+encodeURIComponent(localStorage.getItem('tf_key')||'');
      }
    }catch(e){}
    return _f.call(this,u,o);
  };
})();
</script>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Análise Produção × Técnico</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07080a;color:#f0f2f5;min-height:100vh;padding:20px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
h1{font-size:16px;font-weight:800;}
.sub{font-size:11px;color:#5a6270;margin-top:3px;}
.btn{padding:9px 20px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:#3b9eff;color:#fff;}
.btn:disabled{opacity:.5;cursor:default;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.stat{background:#0f1114;border:1px solid #1e2228;border-radius:10px;padding:14px;}
.stat-n{font-size:26px;font-weight:800;margin-bottom:2px;}
.stat-l{font-size:11px;color:#5a6270;}
.red{color:#ef4444;}.green{color:#22c55e;}.yellow{color:#f59e0b;}.blue{color:#3b9eff;}
.section{background:#0f1114;border:1px solid #1e2228;border-radius:12px;overflow:hidden;margin-bottom:20px;}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid #1e2228;}
.sec-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
.badge-red{background:rgba(239,68,68,.15);color:#ef4444;}
.badge-green{background:rgba(34,197,94,.12);color:#22c55e;}
.badge-yellow{background:rgba(245,158,11,.12);color:#f59e0b;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;font-weight:700;color:#5a6270;text-transform:uppercase;letter-spacing:.06em;padding:10px 18px;text-align:left;border-bottom:1px solid #1e2228;}
td{font-size:12px;padding:10px 18px;border-bottom:1px solid #0d0e12;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.os{font-family:monospace;color:#f59e0b;font-size:11px;font-weight:700;}
.nome{font-weight:600;}
.fase-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;white-space:nowrap;}
.empty{text-align:center;padding:40px;color:#5a6270;font-size:13px;}
.loading{text-align:center;padding:40px;color:#5a6270;}
.spin{display:inline-block;width:18px;height:18px;border:2px solid #1e2228;border-top-color:#3b9eff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-ok{background:rgba(34,197,94,.12);color:#22c55e;}
.tag-atencao{background:rgba(239,68,68,.12);color:#ef4444;}
.tag-em-andamento{background:rgba(59,130,246,.12);color:#60a5fa;}
.tag-na{background:rgba(90,98,112,.15);color:#5a6270;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <h1>🔍 Análise: Produção × Técnico</h1>
    <div class="sub">Fichas em <b>Produção</b> no Frente de Loja que já foram finalizadas no Técnico</div>
  </div>
  <button class="btn" id="btn-analisar" onclick="analisar()">▶ Executar Análise</button>
</div>

<div id="stats-wrap" class="stats" style="display:none;">
  <div class="stat"><div class="stat-n red" id="s-prod">—</div><div class="stat-l">Em Produção (FL)</div></div>
  <div class="stat"><div class="stat-n green" id="s-fin">—</div><div class="stat-l">✅ Finalizadas no Técnico</div></div>
  <div class="stat"><div class="stat-n yellow" id="s-pend">—</div><div class="stat-l">⚙️ Ainda em andamento</div></div>
  <div class="stat"><div class="stat-n blue" id="s-sem">—</div><div class="stat-l">❓ Sem card no board</div></div>
</div>

<div id="resultado">
  <div class="empty">Clique em <b>▶ Executar Análise</b> para carregar os dados.</div>
</div>

<script>
const FASES_FINALIZADAS_BOARD = ['loja_feito','delivery_feito','aguardando_ret','finalizado','entregue','pago'];
const FASES_ANDAMENTO_BOARD   = ['aprovado','barramento','producao','urgencia','conserto','aguardando_peca','peca_disponivel','comprar_peca'];
const FASES_LABELS = {
  loja_feito:'Loja Feito ✅', delivery_feito:'Delivery Feito ✅', aguardando_ret:'Ag. Retirada',
  aprovado:'Aprovado', barramento:'Barramento', producao:'Produção', urgencia:'Urgência',
  conserto:'Conserto', aguardando_peca:'Ag. Peça', peca_disponivel:'Peça Disponível',
  comprar_peca:'Comprar Peça', finalizado:'Finalizado ✅', entregue:'Entregue ✅', pago:'Pago ✅',
  condenado:'Condenado', cliente_loja:'Cliente Loja'
};

function faseLabel(f){ return FASES_LABELS[f] || f || '—'; }
function faseCls(f){
  if(!f) return 'tag-na';
  if(FASES_FINALIZADAS_BOARD.includes(f)) return 'tag-ok';
  if(FASES_ANDAMENTO_BOARD.includes(f))  return 'tag-em-andamento';
  return 'tag-na';
}
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function dataBR(iso){ if(!iso)return'—'; try{ return new Date(iso).toLocaleDateString('pt-BR'); }catch(e){return iso;} }

async function analisar(){
  const btn=document.getElementById('btn-analisar');
  btn.disabled=true; btn.textContent='⏳ Analisando...';
  document.getElementById('resultado').innerHTML='<div class="loading"><span class="spin"></span>Buscando dados...</div>';
  document.getElementById('stats-wrap').style.display='none';

  try{
    // 1. Buscar fichas em produção no frenteloja
    const flRes  = await fetch('/api/frenteloja?action=load-producao').then(r=>r.json());
    // 2. Buscar cards do board do técnico
    const brdRes = await fetch('/api/frenteloja?action=load-board').then(r=>r.json());

    const fichas = flRes.fichas || [];
    const cards  = brdRes.cards || [];

    if(!fichas.length){
      document.getElementById('resultado').innerHTML='<div class="empty">Nenhuma ficha em Produção no momento.</div>';
      btn.disabled=false; btn.textContent='▶ Executar Análise';
      return;
    }

    // Mapear cards por flFichaId
    const cardMap={};
    cards.forEach(c=>{ if(c.flFichaId) cardMap[c.flFichaId]=c; });

    const finalizadas=[], andamento=[], semCard=[];
    fichas.forEach(f=>{
      const card=cardMap[f.id];
      if(!card){ semCard.push({f,card:null}); return; }
      if(FASES_FINALIZADAS_BOARD.includes(card.phaseId)) finalizadas.push({f,card});
      else andamento.push({f,card});
    });

    // Stats
    document.getElementById('stats-wrap').style.display='grid';
    document.getElementById('s-prod').textContent=fichas.length;
    document.getElementById('s-fin').textContent=finalizadas.length;
    document.getElementById('s-pend').textContent=andamento.length;
    document.getElementById('s-sem').textContent=semCard.length;

    let html='';

    // ── Finalizadas no técnico mas ainda em Produção no FL ──────────────────
    if(finalizadas.length){
      html+=`<div class="section">
        <div class="sec-hdr">
          <span class="sec-title red">⚠️ Devem sair da Produção</span>
          <span class="badge badge-red">${finalizadas.length} ficha${finalizadas.length>1?'s':''}</span>
          <span style="font-size:11px;color:#5a6270;margin-left:auto;">Técnico finalizou — aguardam atualização no FL</span>
        </div>
        <table><thead><tr>
          <th>OS</th><th>Cliente</th><th>Fase Board (Técnico)</th><th>Entrada FL</th><th>Último Mov.</th>
        </tr></thead><tbody>`;
      finalizadas.sort((a,b)=>(a.f.nomeContato||'').localeCompare(b.f.nomeContato||''));
      finalizadas.forEach(({f,card})=>{
        html+=`<tr>
          <td><span class="os">${esc(f.osCode||f.id.slice(-6))}</span></td>
          <td><div class="nome">${esc(f.nomeContato||'—')}</div><div style="font-size:10px;color:#5a6270;">${esc(f.telefone||'')}</div></td>
          <td><span class="fase-badge tag-ok">${faseLabel(card.phaseId)}</span></td>
          <td style="color:#5a6270;">${dataBR(f.criadoEm||f.createdAt)}</td>
          <td style="color:#5a6270;">${dataBR(card.movedAt||card.updatedAt)}</td>
        </tr>`;
      });
      html+=`</tbody></table></div>`;
    }

    // ── Em andamento no técnico ──────────────────────────────────────────────
    if(andamento.length){
      html+=`<div class="section">
        <div class="sec-hdr">
          <span class="sec-title blue">⚙️ Em Andamento no Técnico</span>
          <span class="badge" style="background:rgba(59,130,246,.12);color:#60a5fa;">${andamento.length}</span>
        </div>
        <table><thead><tr>
          <th>OS</th><th>Cliente</th><th>Fase atual (Técnico)</th><th>Entrada FL</th>
        </tr></thead><tbody>`;
      andamento.forEach(({f,card})=>{
        html+=`<tr>
          <td><span class="os">${esc(f.osCode||f.id.slice(-6))}</span></td>
          <td><div class="nome">${esc(f.nomeContato||'—')}</div><div style="font-size:10px;color:#5a6270;">${esc(f.telefone||'')}</div></td>
          <td><span class="fase-badge ${faseCls(card.phaseId)}">${faseLabel(card.phaseId)}</span></td>
          <td style="color:#5a6270;">${dataBR(f.criadoEm||f.createdAt)}</td>
        </tr>`;
      });
      html+=`</tbody></table></div>`;
    }

    // ── Sem card no board ────────────────────────────────────────────────────
    if(semCard.length){
      html+=`<div class="section">
        <div class="sec-hdr">
          <span class="sec-title yellow">❓ Sem Card no Board do Técnico</span>
          <span class="badge badge-yellow">${semCard.length}</span>
        </div>
        <table><thead><tr><th>OS</th><th>Cliente</th><th>Entrada FL</th></tr></thead><tbody>`;
      semCard.forEach(({f})=>{
        html+=`<tr>
          <td><span class="os">${esc(f.osCode||f.id.slice(-6))}</span></td>
          <td><div class="nome">${esc(f.nomeContato||'—')}</div><div style="font-size:10px;color:#5a6270;">${esc(f.telefone||'')}</div></td>
          <td style="color:#5a6270;">${dataBR(f.criadoEm||f.createdAt)}</td>
        </tr>`;
      });
      html+=`</tbody></table></div>`;
    }

    if(!html) html='<div class="empty">✅ Nenhuma inconsistência encontrada.</div>';
    document.getElementById('resultado').innerHTML=html;

  }catch(e){
    document.getElementById('resultado').innerHTML=`<div class="empty" style="color:#ef4444;">❌ Erro: ${e.message}<br><small>Verifique o console para detalhes.</small></div>`;
    console.error(e);
  }

  btn.disabled=false; btn.textContent='↺ Atualizar';
}
</script>
</body>
</html>
