<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache">
<title>Fichas — Reparo Eletro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07080a;color:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:#0f1114;border-bottom:1px solid #1e2228;flex-shrink:0;}
.h-title{font-size:13px;font-weight:800;}
.h-btns{display:flex;gap:8px;align-items:center;}
.btn{padding:7px 14px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;}
.btn-sync{background:#3b9eff;color:#fff;}
.btn-sync:disabled{opacity:.5;}
.sync-info{font-size:10px;color:#5a6270;}

/* ── Abas ADM / TV ─────────────────────────────────────────── */
.tabs{display:flex;gap:0;padding:0 16px;background:#0a0b0e;border-bottom:1px solid #1e2228;flex-shrink:0;}
.tab{padding:10px 20px;font-size:12px;font-weight:700;cursor:pointer;color:#5a6270;border-bottom:2px solid transparent;transition:all .15s;position:relative;}
.tab.active{color:#f0f2f5;border-bottom-color:#06b6d4;}
.tab .tab-badge{display:inline-block;background:#06b6d4;color:#000;font-size:9px;font-weight:700;border-radius:6px;padding:1px 5px;margin-left:5px;vertical-align:middle;}
.tab .tab-badge.adm-color{background:#3b9eff;}
.tab .tab-badge.tv-color{background:#06b6d4;}

/* ── Stats ─────────────────────────────────────────────────── */
.stats{display:flex;gap:8px;padding:10px 16px;background:#0a0b0e;border-bottom:1px solid #1e2228;flex-shrink:0;flex-wrap:wrap;}
.stat-box{background:#0f1114;border:1px solid #1e2228;border-radius:8px;padding:7px 14px;font-size:11px;display:flex;align-items:center;gap:6px;}
.stat-lbl{color:#5a6270;}
.stat-val{font-weight:800;font-size:14px;}
.c-green{color:#22c55e;}.c-blue{color:#3b9eff;}.c-purple{color:#a855f7;}.c-red{color:#ef4444;}

/* ── Board ─────────────────────────────────────────────────── */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:12px 16px;flex:1;overflow:hidden;}
.col{background:#0f1114;border:1px solid #1e2228;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;}
.col-hdr{padding:11px 14px;border-bottom:1px solid #1e2228;display:flex;align-items:center;gap:8px;}
.col-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.07);color:#5a6270;margin-left:auto;}
.col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.card{background:#181b1f;border:1px solid #22272f;border-radius:10px;padding:12px;}
.card-nome{font-size:13px;font-weight:700;margin-bottom:3px;}
.card-equip{font-size:11px;font-weight:600;margin-bottom:2px;}
.card-adm .card-equip{color:#3b9eff;}
.card-tv  .card-equip{color:#06b6d4;}
.card-info{font-size:11px;color:#5a6270;margin-bottom:2px;}
.card-tel{font-size:11px;color:#f0f2f5;margin-bottom:6px;}
.card-age{font-size:10px;color:#5a6270;}
.card-btns{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.cbtn{padding:6px 11px;border-radius:6px;border:1px solid;font-size:11px;font-weight:700;cursor:pointer;background:transparent;}
.cbtn-copy{color:#22c55e;border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.08);}
.cbtn-log{color:#3b9eff;border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.08);}
.cbtn-del{color:#5a6270;border-color:rgba(90,98,112,.2);}
.col1{border-top:3px solid #22c55e;}
.col2{border-top:3px solid #3b9eff;}
.col3{border-top:3px solid #ef4444;}
.red-border{border-color:rgba(239,68,68,.4)!important;}
.empty{text-align:center;padding:30px;color:#5a6270;font-size:12px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:#000;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;display:none;z-index:999;}
</style>
</head>
<body>

<header>
  <div class="h-title">📋 Fichas</div>
  <div class="h-btns">
    <span class="sync-info" id="sync-info">—</span>
    <button class="btn btn-sync" id="btn-sync" onclick="sincronizar()">🔄 Sincronizar</button>
    <a href="/adm" class="btn" style="background:#1e2228;color:#f0f2f5;text-decoration:none;">← ADM</a>
  </div>
</header>

<!-- Abas ADM / TV -->
<div class="tabs">
  <div class="tab active" id="tab-adm" onclick="mudarAba('adm')">
    🔧 Fichas ADM
    <span class="tab-badge adm-color" id="badge-adm" style="display:none;">0</span>
  </div>
  <div class="tab" id="tab-tv" onclick="mudarAba('tv')">
    📺 Fichas TV
    <span class="tab-badge tv-color" id="badge-tv" style="display:none;">0</span>
  </div>
</div>

<!-- Contadores -->
<div class="stats">
  <div class="stat-box"><span class="stat-lbl">📋 Novas</span><span class="stat-val c-green" id="st-novas">0</span></div>
  <div class="stat-box"><span class="stat-lbl">✅ Contato Feito</span><span class="stat-val c-blue" id="st-contato">0</span></div>
  <div class="stat-box"><span class="stat-lbl">🚚 Logística</span><span class="stat-val c-purple" id="st-log">0</span></div>
  <div class="stat-box"><span class="stat-lbl">⚠️ Entrar em Contato</span><span class="stat-val c-red" id="st-entrar">0</span></div>
</div>

<!-- Board -->
<div class="board">
  <div class="col col1">
    <div class="col-hdr">
      <span class="col-title" style="color:#22c55e;">📋 Ficha Criada</span>
      <span class="badge" id="b1">0</span>
    </div>
    <div class="col-body" id="col-criada"></div>
  </div>
  <div class="col col2">
    <div class="col-hdr">
      <span class="col-title" style="color:#3b9eff;">✅ Contato Feito</span>
      <span class="badge" id="b2">0</span>
    </div>
    <div class="col-body" id="col-contato"></div>
  </div>
  <div class="col col3">
    <div class="col-hdr">
      <span class="col-title" style="color:#ef4444;">⚠️ Entrar em Contato</span>
      <span class="badge" id="b3">0</span>
    </div>
    <div class="col-body" id="col-entrar"></div>
  </div>
</div>

<div class="toast" id="toast">✅ Link copiado!</div>

<script>
var SISTEMA = 'adm';
var _fichas = [];

function esc(s){ var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function fdtAge(iso){
  if(!iso) return '';
  var d=Math.floor((Date.now()-new Date(iso).getTime())/60000);
  if(d<60) return d+'min atrás';
  if(d<1440) return Math.floor(d/60)+'h atrás';
  return Math.floor(d/1440)+'d atrás';
}

function mudarAba(s){
  SISTEMA=s;
  document.getElementById('tab-adm').classList.toggle('active', s==='adm');
  document.getElementById('tab-tv').classList.toggle('active',  s==='tv');
  load();
}

function cardHTML(f){
  if(f.status==='logistica') return '';
  var isC=f.status==='criada', isCt=f.status==='contato_feito', isE=f.status==='entrar_contato';
  var age=isE?'<div class="card-age" style="color:#ef4444;">🔴 +24h sem cadastro</div>':
          isCt?'<div class="card-age">Contato: '+fdtAge(f.contatoFeitoEm)+'</div>':
          '<div class="card-age">Chegou: '+fdtAge(f.criadoEm)+'</div>';
  var btns=isC?
    '<button class="cbtn cbtn-copy" onclick="copiarEnviar(\''+f.id+'\')">📋 Copiar e Enviar</button>'+
    '<button class="cbtn cbtn-del" onclick="excluir(\''+f.id+'\')">✕</button>':
    '<button class="cbtn cbtn-log" onclick="cadastrarLogistica(\''+f.id+'\')">🚚 Cadastrar em Logística</button>'+
    '<button class="cbtn cbtn-del" onclick="excluir(\''+f.id+'\')">✕</button>';
  return '<div class="card '+(SISTEMA==='tv'?'card-tv':'card-adm')+(isE?' red-border':'')+'" id="card-'+f.id+'">'
    +'<div class="card-nome">'+esc(f.nome)+'</div>'
    +'<div class="card-equip">'+esc(f.equipamento)+'</div>'
    +'<div class="card-info">'+esc(f.defeito)+'</div>'
    +'<div class="card-info">'+esc(f.endereco)+'</div>'
    +'<div class="card-tel">📞 '+esc(f.telefone)+'</div>'
    +age
    +'<div class="card-btns">'+btns+'</div>'
    +'</div>';
}

function render(){
  var criadas =_fichas.filter(function(f){return f.status==='criada';});
  var contatos=_fichas.filter(function(f){return f.status==='contato_feito';});
  var entrar  =_fichas.filter(function(f){return f.status==='entrar_contato';});
  var logs    =_fichas.filter(function(f){return f.status==='logistica';});

  // Badges colunas
  document.getElementById('b1').textContent=criadas.length;
  document.getElementById('b2').textContent=contatos.length;
  document.getElementById('b3').textContent=entrar.length;

  // Contadores
  document.getElementById('st-novas').textContent=criadas.length;
  document.getElementById('st-contato').textContent=contatos.length;
  document.getElementById('st-log').textContent=logs.length;
  document.getElementById('st-entrar').textContent=entrar.length;

  // Badge aba ativa
  var total=criadas.length+entrar.length;
  var badgeId=SISTEMA==='adm'?'badge-adm':'badge-tv';
  var badgeEl=document.getElementById(badgeId);
  if(badgeEl){badgeEl.textContent=total;badgeEl.style.display=total>0?'inline-block':'none';}

  document.getElementById('col-criada').innerHTML =criadas.length ?criadas.map(cardHTML).join(''):'<div class="empty">Nenhuma ficha nova</div>';
  document.getElementById('col-contato').innerHTML=contatos.length?contatos.map(cardHTML).join(''):'<div class="empty">Nenhum contato feito</div>';
  document.getElementById('col-entrar').innerHTML =entrar.length ?entrar.map(cardHTML).join(''):'<div class="empty">Tudo em dia ✅</div>';
}

async function load(){
  try{
    var r=await fetch('/api/fichas?action=load&sistema='+SISTEMA).then(function(x){return x.json();});
    _fichas=r.fichas||[];
    render();
  }catch(e){ console.error(e); }
}

async function sincronizar(){
  var btn=document.getElementById('btn-sync');
  btn.disabled=true; btn.textContent='⏳';
  try{
    var r=await fetch('/api/fichas?action=sync').then(function(x){return x.json();});
    document.getElementById('sync-info').textContent=r.novas?'+'+r.novas+' nova(s)':(r.msg||'Sem novas');
    await load();
    // Atualizar badge da outra aba também
    await atualizarBadgeOutraAba();
  }catch(e){ document.getElementById('sync-info').textContent='Erro'; }
  btn.disabled=false; btn.textContent='🔄 Sincronizar';
}

async function atualizarBadgeOutraAba(){
  try{
    var outra=SISTEMA==='adm'?'tv':'adm';
    var d=await fetch('/api/fichas?action=badge&sistema='+outra).then(function(x){return x.json();});
    var n=d.novas||0;
    var bid=outra==='adm'?'badge-adm':'badge-tv';
    var el=document.getElementById(bid);
    if(el){el.textContent=n;el.style.display=n>0?'inline-block':'none';}
  }catch(e){}
}

async function copiarEnviar(id){
  var f=_fichas.find(function(x){return x.id===id;});
  if(!f) return;
  var num=String(f.waNum||'').replace(/\D/g,'');
  var link='https://wa.me/'+num+'?text='+encodeURIComponent(f.textoCopiar||'');
  try{ await navigator.clipboard.writeText(link); }
  catch(e){ var ta=document.createElement('textarea');ta.value=link;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta); }
  var t=document.getElementById('toast');t.style.display='block';setTimeout(function(){t.style.display='none';},2000);
  await fetch('/api/fichas?action=mover-contato',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,sistema:SISTEMA})});
  await load();
}

async function cadastrarLogistica(id){
  if(!confirm('Cadastrar esta ficha em Logística (Liberado para Coleta)?')) return;
  var r=await fetch('/api/fichas?action=cadastrar-logistica',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,sistema:SISTEMA})}).then(function(x){return x.json();});
  if(r.ok) await load();
  else alert('Erro: '+(r.error||'falha'));
}

async function excluir(id){
  if(!confirm('Remover esta ficha da lista?')) return;
  await fetch('/api/fichas?action=excluir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,sistema:SISTEMA})});
  await load();
}

// Init
load();
sincronizar();
atualizarBadgeOutraAba();
setInterval(function(){ sincronizar(); }, 5*60*1000);
</script>
</body>
</html>
