<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TV — Compras de Peças</title>
<style>
:root{--bg:#0d0d0f;--surface:#18181c;--surface2:#1e1e24;--border:#2a2a32;--text:#e8e8f0;--muted:#666680;--accent:#3b9eff;--green:#10d982;--yellow:#f5c800;--orange:#f97316;--red:#ef4444;--purple:#a855f7;--fh:'Space Grotesk',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fh);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:800;}.hdr-title span{color:var(--accent);}
.hbtn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-family:var(--fm);font-size:10px;color:var(--muted);cursor:pointer;text-decoration:none;}.hbtn:hover{color:var(--text);}
.wrap{display:flex;flex:1;overflow:hidden;min-height:0;}
.sidebar{width:250px;min-width:250px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sb-hd{padding:14px 16px 10px;border-bottom:1px solid var(--border);font-size:12px;font-weight:800;}
.sb-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.fl{font-family:var(--fm);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;}
.fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:var(--fm);font-size:11px;color:var(--text);outline:none;}.fi:focus{border-color:var(--accent);}
.btn-add{background:rgba(16,217,130,.1);border:1px solid rgba(16,217,130,.3);border-radius:8px;padding:8px;font-family:var(--fm);font-size:11px;color:var(--green);cursor:pointer;text-align:center;}.btn-add:hover{background:rgba(16,217,130,.18);}
.urg-row{display:flex;align-items:center;gap:8px;}.urg-row input{accent-color:var(--red);}.urg-row label{font-family:var(--fm);font-size:11px;color:var(--muted);cursor:pointer;}
.kb{flex:1;display:flex;gap:0;overflow-x:auto;overflow-y:hidden;min-height:0;}
.kb-col{flex:0 0 220px;min-width:180px;display:flex;flex-direction:column;border-right:1px solid var(--border);}.kb-col:last-child{border-right:none;}
.kb-hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.kb-title{font-size:11px;font-weight:700;}.kb-badge{font-family:var(--fm);font-size:10px;background:var(--surface2);border-radius:99px;padding:1px 7px;color:var(--muted);}
.kb-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:0;}
.pc{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 11px;transition:border-color .15s;}.pc:hover{border-color:var(--accent);}
.pc.urgente{border-left:3px solid var(--red);}.pc.tv-card{border-left:3px solid var(--accent);}
.pc-nome{font-size:12px;font-weight:800;color:#fff;margin-bottom:3px;}
.pc-modelo{font-family:var(--fm);font-size:9px;color:var(--accent);margin-bottom:2px;}
.pc-peca{font-family:var(--fm);font-size:9px;color:var(--yellow);margin-bottom:2px;}
.pc-desc{font-size:10px;color:var(--muted);margin-bottom:4px;line-height:1.4;}
.pc-meta{font-family:var(--fm);font-size:9px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;}
.pc-acts{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.btn-sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-family:var(--fm);font-size:9px;color:var(--muted);cursor:pointer;}.btn-sm:hover{color:var(--text);}
.sel-bar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:8px 16px;display:none;align-items:center;gap:12px;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,.5);}.sel-bar.show{display:flex;}
.sel-txt{font-family:var(--fm);font-size:11px;color:var(--muted);}
.btn-comprar{background:var(--accent);border:none;border-radius:8px;padding:6px 14px;font-family:var(--fm);font-size:11px;color:#000;font-weight:700;cursor:pointer;}
.btn-clear{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-family:var(--fm);font-size:10px;color:var(--muted);cursor:pointer;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;}.ov.show{display:flex;}
.mod{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;width:360px;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.mod-title{font-size:14px;font-weight:800;}.mod-resumo{font-family:var(--fm);font-size:10px;color:var(--muted);max-height:80px;overflow-y:auto;}
.tt{display:flex;gap:6px;}.tb{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px;font-family:var(--fm);font-size:11px;color:var(--muted);cursor:pointer;}.tb.active{background:rgba(59,158,255,.15);border-color:var(--accent);color:var(--accent);}
.mod-acts{display:flex;gap:8px;}.btn-ok{flex:1;background:var(--accent);border:none;border-radius:8px;padding:9px;font-family:var(--fm);font-size:12px;color:#000;font-weight:700;cursor:pointer;}
.btn-cancel{background:transparent;border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-family:var(--fm);font-size:11px;color:var(--muted);cursor:pointer;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:10px;padding:10px 14px;font-family:var(--fm);font-size:11px;transform:translateY(60px);opacity:0;transition:all .3s;z-index:9999;color:var(--text);}.toast.show{transform:translateY(0);opacity:1;}
.empty{font-family:var(--fm);font-size:10px;color:var(--muted);text-align:center;padding:20px 8px;}
</style></head>
<body>
<div class="hdr"><div class="hdr-title">📺 TV &mdash; <span>Compras de Peças</span></div><a class="hbtn" href="/tv">Home</a></div>
<div class="wrap">
  <div class="sidebar">
    <div class="sb-hd">➕ Cadastrar Peça</div>
    <div class="sb-body">
      <div><div class="fl">Descrição *</div><input class="fi" id="f-desc" placeholder="Ex: Placa Samsung 50"/></div>
      <div><div class="fl">OS / Cliente</div><input class="fi" id="f-os" placeholder="Ex: 6987"/></div>
      <div><div class="fl">Quantidade</div><input class="fi" id="f-qtd" type="number" value="1" min="1"/></div>
      <div><div class="fl">Observação</div><input class="fi" id="f-obs" placeholder="Opcional"/></div>
      <div class="urg-row"><input type="checkbox" id="f-urg"/><label for="f-urg">Urgente</label></div>
      <button class="btn-add" onclick="cadastrar()">+ Adicionar à Fila</button>
    </div>
  </div>
  <div class="kb">
    <div class="kb-col"><div class="kb-hd"><span class="kb-title" style="color:var(--yellow)">🛒 Para Comprar</span><span class="kb-badge" id="kbc-p">0</span></div><div class="kb-body" id="kbl-p"></div></div>
    <div class="kb-col"><div class="kb-hd"><span class="kb-title" style="color:var(--orange)">⏳ Ag. Pagamento</span><span class="kb-badge" id="kbc-a">0</span></div><div class="kb-body" id="kbl-a"></div></div>
    <div class="kb-col"><div class="kb-hd"><span class="kb-title" style="color:var(--green)">✅ Pago</span><span class="kb-badge" id="kbc-pg">0</span></div><div class="kb-body" id="kbl-pg"></div></div>
    <div class="kb-col"><div class="kb-hd"><span class="kb-title" style="color:var(--accent)">🚚 A Caminho</span><span class="kb-badge" id="kbc-c">0</span></div><div class="kb-body" id="kbl-c"></div></div>
    <div class="kb-col"><div class="kb-hd"><span class="kb-title" style="color:var(--purple)">🌐 Online</span><span class="kb-badge" id="kbc-o">0</span></div><div class="kb-body" id="kbl-o"></div></div>
  </div>
</div>
<div class="sel-bar" id="sel-bar"><span class="sel-txt" id="sel-txt">0 selecionadas</span><button class="btn-comprar" onclick="abrirCompra()">🛒 Comprar</button><button class="btn-clear" onclick="clearSel()">✕</button></div>
<div class="ov" id="mod-compra"><div class="mod">
  <div class="mod-title">Finalizar Compra</div>
  <div id="mod-resumo" class="mod-resumo"></div>
  <div><div class="fl">Tipo</div><div class="tt"><button class="tb active" id="tb-loja" onclick="setTipo('loja')">Loja Física</button><button class="tb" id="tb-online" onclick="setTipo('online')">Online</button></div></div>
  <div><div class="fl">Fornecedor</div><input class="fi" id="m-forn" placeholder="Nome da loja ou site"/></div>
  <div id="m-prev-wrap" style="display:none"><div class="fl">Previsão de Chegada</div><input class="fi" id="m-prev" type="date"/></div>
  <div><div class="fl">Valor Total (R$)</div><input class="fi" id="m-valor" type="number" step="0.01" placeholder="0,00"/></div>
  <div><div class="fl">Dados Pgto / Pix</div><input class="fi" id="m-pgto" placeholder="Ex: Pix 11999999999"/></div>
  <div class="mod-acts"><button class="btn-cancel" onclick="fecharCompra()">Cancelar</button><button class="btn-ok" onclick="confirmarCompra()">✅ Confirmar</button></div>
</div></div>
<div class="toast" id="toast"></div>
<script>
var itens=[],sel=new Set(),tipoComprasel='loja';
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,color){var t=document.getElementById('toast');t.textContent=msg;t.style.borderTopColor=color||'var(--accent)';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
async function api(action,body){var opts=body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{};var r=await fetch('/api/tv-compras-pecas?action='+action,opts);return r.json();}
function fd(s){if(!s)return '—';var d=new Date(s);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}
function da(s){if(!s)return 0;return Math.ceil((new Date(s)-new Date())/(1000*60*60*24));}
function buildCard(p){
  var s=sel.has(p.id),isP=p.status==='pendente',isA=p.status==='aguardando_pagamento',isG=p.status==='a_caminho';
  var prev='';if(p.previsaoChegada){var d=da(p.previsaoChegada);prev='<div style="font-family:var(--fm);font-size:9px;color:'+(d<0?'var(--red)':'var(--muted)')+';">'+(d<0?'Atrasada '+Math.abs(d)+'d':'Chega em '+d+'d')+' ('+fd(p.previsaoChegada)+')</div>';}
  var acts='';
  if(isP)acts='<button class="btn-sm" style="color:var(--accent);" onclick="comprar1(''+p.id+'')">Comprar</button><button class="btn-sm" style="color:var(--red);" onclick="del(''+p.id+'')">Remover</button>';
  else if(isA)acts='<button class="btn-sm" style="color:var(--green);" onclick="pagarItem(''+p.id+'')">✅ Pago</button><button class="btn-sm" onclick="vDados(''+p.id+'')">Ver Dados</button>';
  else if(p.status==='pago')acts='<button class="btn-sm" style="color:var(--accent);" onclick="aCaminho([''+p.id+''])">🚚 A Caminho</button>';
  else if(isG)acts='<button class="btn-sm" style="color:var(--green);" onclick="recebido([''+p.id+''])">📦 Recebido</button>';
  return '<div class="pc'+(p.urgente?' urgente':'')+(p.origem==='tv_aprovado'?' tv-card':'')+'" id="ci-'+p.id+'">'
    +(isP?'<input type="checkbox" style="margin-bottom:4px;accent-color:var(--accent);"'+(s?' checked':'')+' onchange="togSel(''+p.id+'',this.checked)"><br>':'')
    +(p.nomeContato?'<div class="pc-nome">'+esc(p.nomeContato)+'</div>':'')
    +(p.modelo?'<div class="pc-modelo">📺 '+esc(p.modelo)+'</div>':'')
    +(p.peca?'<div class="pc-peca">🔧 '+esc(p.peca)+'</div>':'')
    +(p.descricao&&p.descricao!==p.nomeContato?'<div class="pc-desc">'+esc(p.descricao)+'</div>':'')
    +'<div class="pc-meta">'+(p.os?'<span>OS: '+esc(p.os)+'</span>':'')+(p.quantidade>1?'<span>Qtd: '+p.quantidade+'</span>':'')+(p.obs?'<span>'+esc(p.obs)+'</span>':'')+'</div>'
    +(prev?'<div style="margin-top:4px;">'+prev+'</div>':'')
    +(acts?'<div class="pc-acts">'+acts+'</div>':'')
    +'</div>';
}
function render(){
  var cols={'pendente':{b:'kbl-p',c:'kbc-p'},'aguardando_pagamento':{b:'kbl-a',c:'kbc-a'},'pago':{b:'kbl-pg',c:'kbc-pg'},'a_caminho':{b:'kbl-c',c:'kbc-c'},'online':{b:'kbl-o',c:'kbc-o'},'recebido':{b:'kbl-o',c:'kbc-o'}};
  Object.values(cols).forEach(function(c){var b=document.getElementById(c.b);if(b)b.innerHTML='';var d=document.getElementById(c.c);if(d)d.textContent='0';});
  var counts={};
  itens.forEach(function(p){var col=cols[p.status]||cols['pendente'];var body=document.getElementById(col.b);if(body)body.insertAdjacentHTML('beforeend',buildCard(p));counts[col.c]=(counts[col.c]||0)+1;});
  Object.entries(counts).forEach(function(e){var el=document.getElementById(e[0]);if(el)el.textContent=e[1];});
  var bar=document.getElementById('sel-bar');if(bar)bar.classList.toggle('show',sel.size>0);
  var txt=document.getElementById('sel-txt');if(txt)txt.textContent=sel.size+' selecionada'+(sel.size!==1?'s':'');
}
async function load(){var d=await api('load');itens=d.pecas||[];sel.clear();render();}
function togSel(id,v){if(v)sel.add(id);else sel.delete(id);render();}
function clearSel(){sel.clear();render();}
async function cadastrar(){var desc=document.getElementById('f-desc').value.trim();if(!desc){toast('Descrição obrigatória','var(--yellow)');return;}var d=await api('cadastrar',{descricao:desc,os:document.getElementById('f-os').value.trim(),quantidade:document.getElementById('f-qtd').value,obs:document.getElementById('f-obs').value.trim(),urgente:document.getElementById('f-urg').checked,origem:'avulsa'});if(d.ok){['f-desc','f-os','f-obs'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('f-qtd').value='1';document.getElementById('f-urg').checked=false;await load();toast('Peça cadastrada!','var(--green)');}}
async function del(id){if(!confirm('Remover?'))return;var d=await api('deletar',{id});if(d.ok){await load();toast('Removida','var(--muted)');}}
function comprar1(id){sel.clear();sel.add(id);abrirCompra();}
function abrirCompra(){if(!sel.size)return;var ids=[...sel];var items=itens.filter(function(p){return ids.includes(p.id);});document.getElementById('mod-resumo').textContent=items.map(function(p){return(p.nomeContato||p.descricao||p.id)+(p.os?' (OS '+p.os+')':'');}).join(', ');document.getElementById('mod-compra').classList.add('show');}
function fecharCompra(){document.getElementById('mod-compra').classList.remove('show');}
function setTipo(t){tipoComprasel=t;['loja','online'].forEach(function(x){document.getElementById('tb-'+x).className='tb'+(x===t?' active':'');});document.getElementById('m-prev-wrap').style.display=t==='online'?'':'none';}
async function confirmarCompra(){var forn=document.getElementById('m-forn').value.trim();if(!forn){toast('Informe o fornecedor','var(--yellow)');return;}var prev=document.getElementById('m-prev').value;if(tipoComprasel==='online'&&!prev){toast('Informe a previsão','var(--yellow)');return;}var ids=[...sel];var prevs={};ids.forEach(function(id){prevs[id]=prev;});var d=await api('comprar',{ids,fornecedor:forn,tipoCompra:tipoComprasel,dadosPagamento:document.getElementById('m-pgto').value.trim(),valor:document.getElementById('m-valor').value,previsoes:prevs});if(d.ok){fecharCompra();sel.clear();await load();toast('Compra registrada!','var(--green)');}}
async function pagarItem(id){var d=await api('confirmar-pagamento',{ids:[id]});if(d.ok){await load();toast('Pago!','var(--green)');}}
async function aCaminho(ids){var d=await api('marcar-caminho',{ids});if(d.ok){await load();toast('A Caminho!','var(--accent)');}}
async function recebido(ids){var d=await api('marcar-recebido',{ids});if(d.ok){await load();toast('Recebido!','var(--green)');}}
function vDados(id){var p=itens.find(function(x){return x.id===id;});if(!p)return;alert('Fornecedor: '+(p.fornecedor||'—')+'\nTipo: '+(p.tipoCompra||'—')+'\nPgto: '+(p.dadosPagamento||'—')+'\nValor: R$ '+(p.valor||'—'));}
load();
</script>
</body>
</html>
